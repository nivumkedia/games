function spriteColor(typeName) {
    const entry = SR[typeName];
    return entry ? entry[1] : '#cba6f7';
}

function renderGame() {
    const { ctx, canvas, sprites, type } = gameState;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // draw themed background or default grid
    const theme = type && GAME_TYPES[type];
    if (theme) {
        theme.draw(ctx, canvas.width, canvas.height);
    } else {
        ctx.strokeStyle = 'rgba(255,255,255,0.025)';
        ctx.lineWidth = 1;
        for (let x = 0; x <= canvas.width; x += 20) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += 20) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
    }

    // draw background sprites first, then foreground
    const bgTypes = ['road'];
    const sorted = Object.entries(sprites).sort(([,a],[,b]) =>
        (bgTypes.includes(a.typeName)?0:1) - (bgTypes.includes(b.typeName)?0:1));

    sorted.forEach(([name, s]) => {
        if (!s.visible) return;
        ctx.save();
        drawSprite(ctx, canvas, name, s);
        ctx.restore();
    });
}

function drawSprite(ctx, canvas, name, s) {
    const tn = s.typeName;
    const reg = SR[tn];
    const tmpl = reg ? reg[0] : T.SML;
    const c1 = reg ? reg[1] : s.color;
    const c2 = reg ? reg[2] : s.color;
    const c3 = reg ? reg[3] : '#fff';
    const v  = reg ? reg[4] : 0;
    const w = s.w, h = s.h;
    const cx = s.x + w/2, cy = s.y + h/2;

    ctx.save();

    if (tmpl === T.RD) {
        drawBG(ctx, canvas, c1, c2, c3, v);
    } else {
        ctx.translate(cx, cy);
        // shadow
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.beginPath(); ctx.ellipse(2, h*0.5, w*0.38, 5, 0, 0, Math.PI*2); ctx.fill();

        switch(tmpl) {
            case T.HUM: drawHumanoid(ctx,w,h,c1,c2,c3,v); break;
            case T.MON: drawMonster(ctx,w,h,c1,c2,c3,v); break;
            case T.CAR: drawCar(ctx,w,h,c1,c2,c3,v); break;
            case T.TRK: drawTruck(ctx,w,h,c1,c2,c3,v); break;
            case T.AIR: drawAircraft(ctx,w,h,c1,c2,c3,v); break;
            case T.BOT: drawBoat(ctx,w,h,c1,c2,c3,v); break;
            case T.TRE: drawTree(ctx,w,h,c1,c2,c3,v); break;
            case T.ROC: drawRock(ctx,w,h,c1,c2,c3,v); break;
            case T.WAT: drawWater(ctx,w,h,c1,c2,c3,v); break;
            case T.BLD: drawBuilding(ctx,w,h,c1,c2,c3,v); break;
            case T.PLT: drawPlatform(ctx,w,h,c1,c2,c3,v); break;
            case T.QUD: drawQuadruped(ctx,w,h,c1,c2,c3,v); break;
            case T.BRD: drawBird(ctx,w,h,c1,c2,c3,v); break;
            case T.FIS: drawFish(ctx,w,h,c1,c2,c3,v); break;
            case T.INS: drawInsect(ctx,w,h,c1,c2,c3,v); break;
            case T.CIR: drawCircleItem(ctx,w,h,c1,c2,c3,v); break;
            case T.STR: drawStarItem(ctx,w,h,c1,c2,c3,v); break;
            case T.SML: drawSmallItem(ctx,w,h,c1,c2,c3,v); break;
            case T.FOD: drawFood(ctx,w,h,c1,c2,c3,v); break;
            case T.WPN: drawWeapon(ctx,w,h,c1,c2,c3,v); break;
            case T.PRJ: drawProjectile(ctx,w,h,c1,c2,c3,v); break;
            case T.EFF: drawEffect(ctx,w,h,c1,c2,c3,v); break;
            case T.SHP: drawShape(ctx,w,h,c1,c2,c3,v); break;
            default: {
                ctx.shadowColor = c1; ctx.shadowBlur = 12;
                ctx.fillStyle = c1;
                roundRect(ctx, -w/2, -h/2, w, h, 5); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
    }

    ctx.restore();
    ctx.setTransform(1,0,0,1,0,0);
    if (tmpl !== T.RD) {
        ctx.fillStyle = 'rgba(255,255,255,0.38)';
        ctx.font = '9px Courier New';
        ctx.fillText(name, s.x, s.y - 5);
    }
}

// ── BG templates ────────────────────────────────
function drawBG(ctx, canvas, c1, c2, c3, v) {
    const W = canvas.width, H = canvas.height;
    if (v === 0) { // road
        ctx.fillStyle = c1; ctx.fillRect(0,0,W,H);
        ctx.fillStyle = '#1e3a10';
        ctx.fillRect(0,0,W*0.12,H); ctx.fillRect(W*0.88,0,W*0.12,H);
        ctx.strokeStyle = c2; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(W*0.12,0); ctx.lineTo(W*0.12,H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(W*0.88,0); ctx.lineTo(W*0.88,H); ctx.stroke();
        ctx.strokeStyle = c3; ctx.lineWidth = 2.5; ctx.setLineDash([28,20]);
        ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke(); ctx.setLineDash([]);
        ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5; ctx.setLineDash([18,22]);
        [0.36,0.64].forEach(f=>{ctx.beginPath();ctx.moveTo(W*f,0);ctx.lineTo(W*f,H);ctx.stroke();}); ctx.setLineDash([]);
    } else if (v === 1) { // grass
        const g = ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,c1); g.addColorStop(1,c2);
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=1;
        for(let x=0;x<W;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    } else if (v === 2) { // water
        const g = ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,c1); g.addColorStop(1,c2);
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=2;
        for(let y=10;y<H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.bezierCurveTo(W*0.25,y-4,W*0.75,y+4,W,y);ctx.stroke();}
    } else if (v === 3) { // sand
        const g = ctx.createLinearGradient(0,0,W,H); g.addColorStop(0,c1); g.addColorStop(1,c2);
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1;
        for(let i=0;i<12;i++){ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,2,0,Math.PI*2);ctx.stroke();}
    } else if (v === 4) { // snow
        ctx.fillStyle=c1; ctx.fillRect(0,0,W,H);
        ctx.fillStyle='rgba(255,255,255,0.6)';
        for(let i=0;i<40;i++){const sx=(i*73)%W,sy=(i*57)%H;ctx.beginPath();ctx.arc(sx,sy,1.5,0,Math.PI*2);ctx.fill();}
    } else if (v === 5) { // lava
        const g = ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,c1); g.addColorStop(0.5,c2); g.addColorStop(1,c3);
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        ctx.strokeStyle='rgba(255,200,0,0.2)'; ctx.lineWidth=3;
        for(let y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.bezierCurveTo(W*0.3,y-8,W*0.6,y+8,W,y);ctx.stroke();}
    } else if (v === 6) { // space
        ctx.fillStyle=c1; ctx.fillRect(0,0,W,H);
        ctx.fillStyle='rgba(255,255,255,0.8)';
        for(let i=0;i<80;i++){ctx.beginPath();ctx.arc((i*137)%W,(i*97)%H,((i%3)+0.5)*0.8,0,Math.PI*2);ctx.fill();}
        const nb=ctx.createRadialGradient(W*0.3,H*0.4,0,W*0.3,H*0.4,W*0.4);
        nb.addColorStop(0,'rgba(120,40,200,0.1)'); nb.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=nb; ctx.fillRect(0,0,W,H);
    } else if (v === 7) { // dungeon
        ctx.fillStyle=c1; ctx.fillRect(0,0,W,H);
        ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
        for(let x=0;x<W;x+=32){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
        for(let y=0;y<H;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    } else if (v === 8) { // forest
        const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,c1); g.addColorStop(1,c2);
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        ctx.fillStyle='rgba(0,0,0,0.2)';
        for(let i=0;i<6;i++){const tx=i*(W/5);ctx.beginPath();ctx.moveTo(tx,H);ctx.lineTo(tx+20,H*0.3);ctx.lineTo(tx+40,H);ctx.fill();}
    } else { // sky (v=9)
        const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,c1); g.addColorStop(1,c2);
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        ctx.fillStyle='rgba(255,255,255,0.55)';
        [[80,60,50],[220,50,40],[340,75,45]].forEach(([x,y,r])=>{
            ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
            ctx.beginPath();ctx.arc(x+r*0.6,y+5,r*0.7,0,Math.PI*2);ctx.fill();
        });
    }
}

// ── Humanoid ──────────────────────────────────────
function drawHumanoid(ctx,w,h,c1,c2,c3,v) {
    const ph=h, pw=w;
    // body
    ctx.fillStyle=c1;
    roundRect(ctx,-pw*0.28,-ph*0.1,pw*0.56,ph*0.45,4); ctx.fill();
    // legs
    ctx.fillStyle=c2;
    roundRect(ctx,-pw*0.26,ph*0.3,pw*0.22,ph*0.22,3); ctx.fill();
    roundRect(ctx,pw*0.04,ph*0.3,pw*0.22,ph*0.22,3); ctx.fill();
    // arms
    ctx.fillStyle=c1;
    roundRect(ctx,-pw*0.48,-ph*0.08,pw*0.22,ph*0.32,3); ctx.fill();
    roundRect(ctx,pw*0.26,-ph*0.08,pw*0.22,ph*0.32,3); ctx.fill();
    // head
    ctx.fillStyle=c3;
    ctx.beginPath();ctx.arc(0,-ph*0.28,pw*0.26,0,Math.PI*2);ctx.fill();
    // hat (variant 1)
    if(v===1){ctx.fillStyle=c2;ctx.beginPath();ctx.moveTo(-pw*0.26,-ph*0.42);ctx.lineTo(pw*0.26,-ph*0.42);ctx.lineTo(pw*0.18,-ph*0.62);ctx.lineTo(-pw*0.18,-ph*0.62);ctx.closePath();ctx.fill();}
    // armor (variant 2)
    if(v===2){ctx.fillStyle=c2;ctx.globalAlpha=0.5;roundRect(ctx,-pw*0.3,-ph*0.12,pw*0.6,ph*0.48,4);ctx.fill();ctx.globalAlpha=1;}
    // robe (variant 3) - extend body
    if(v===3){ctx.fillStyle=c2;roundRect(ctx,-pw*0.32,-ph*0.1,pw*0.64,ph*0.6,6);ctx.fill();}
    // eyes
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(-pw*0.09,-ph*0.3,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(pw*0.09,-ph*0.3,2,0,Math.PI*2);ctx.fill();
}

// ── Monster ───────────────────────────────────────
function drawMonster(ctx,w,h,c1,c2,c3,v) {
    ctx.shadowColor=c1; ctx.shadowBlur=14;
    ctx.fillStyle=c1;
    roundRect(ctx,-w*0.38,-h*0.38,w*0.76,h*0.76,6); ctx.fill();
    ctx.shadowBlur=0;
    // horns
    ctx.fillStyle=c2;
    [[-w*0.18,-h*0.38],[w*0.18,-h*0.38]].forEach(([hx,hy])=>{
        ctx.beginPath();ctx.moveTo(hx-5,hy);ctx.lineTo(hx,hy-14);ctx.lineTo(hx+5,hy);ctx.closePath();ctx.fill();
    });
    // ghost variant (v=2) - translucent
    if(v===2){ctx.globalAlpha=0.7;}
    // skeleton variant (v=3) - ribs
    if(v===3){ctx.strokeStyle=c2;ctx.lineWidth=1.5;
        for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(0,-h*0.05+i*h*0.14,w*0.22,0,Math.PI*2);ctx.stroke();}
    }
    // eyes
    ctx.fillStyle=c3; ctx.shadowColor=c3; ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(-w*0.13,-h*0.06,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*0.13,-h*0.06,4,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    ctx.strokeStyle=c3; ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,h*0.1,w*0.16,0.2,Math.PI-0.2);ctx.stroke();
}

// ── Car ───────────────────────────────────────────
function drawCar(ctx,w,h,c1,c2,c3,v) {
    ctx.fillStyle=c1; roundRect(ctx,-w/2,-h/2,w,h,6); ctx.fill();
    ctx.fillStyle='rgba(160,220,255,0.7)';
    roundRect(ctx,-w*0.32,-h*0.42,w*0.64,h*0.28,3); ctx.fill();
    ctx.fillStyle='rgba(160,220,255,0.5)';
    roundRect(ctx,-w*0.28,h*0.16,w*0.56,h*0.2,3); ctx.fill();
    ctx.fillStyle='#111';
    [[-w*0.42,-h*0.34],[w*0.42,-h*0.34],[-w*0.42,h*0.3],[w*0.42,h*0.3]].forEach(([wx,wy])=>{roundRect(ctx,wx-5,wy-7,10,14,3);ctx.fill();});
    ctx.fillStyle='#fffde7'; ctx.shadowColor='#fffde7'; ctx.shadowBlur=8;
    [[-w*0.2,-h*0.47],[w*0.2,-h*0.47]].forEach(([lx,ly])=>{roundRect(ctx,lx-5,ly,10,5,2);ctx.fill();});
    ctx.shadowBlur=0;
    // race stripe (v=3)
    if(v===3){ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fillRect(-w*0.1,-h*0.5,w*0.2,h);}
}

// ── Truck ─────────────────────────────────────────
function drawTruck(ctx,w,h,c1,c2,c3,v) {
    // cab
    ctx.fillStyle=c1; roundRect(ctx,-w/2,-h/2,w*0.55,h,6); ctx.fill();
    // cargo
    ctx.fillStyle=c2; roundRect(ctx,-w/2+w*0.55-2,-h/2,w*0.47,h,4); ctx.fill();
    ctx.fillStyle='rgba(160,220,255,0.7)';
    roundRect(ctx,-w*0.45,-h*0.4,w*0.38,h*0.3,3); ctx.fill();
    ctx.fillStyle='#111';
    [[-w*0.42,-h*0.35],[w*0.02,-h*0.35],[-w*0.42,h*0.3],[w*0.02,h*0.3]].forEach(([wx,wy])=>{roundRect(ctx,wx-4,wy-7,9,14,3);ctx.fill();});
    ctx.fillStyle='#fffde7'; ctx.shadowColor='#fffde7'; ctx.shadowBlur=6;
    roundRect(ctx,-w*0.42,-h*0.47,8,5,2); ctx.fill();
    ctx.shadowBlur=0;
}

// ── Aircraft ──────────────────────────────────────
function drawAircraft(ctx,w,h,c1,c2,c3,v) {
    if(v===3) { // helicopter
        ctx.fillStyle=c1; roundRect(ctx,-w*0.35,-h*0.22,w*0.7,h*0.44,8); ctx.fill();
        ctx.strokeStyle=c2; ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(-w*0.5,-h*0.1);ctx.lineTo(w*0.5,-h*0.1);ctx.stroke();
        ctx.fillStyle=c2; roundRect(ctx,w*0.3,-h*0.08,w*0.2,h*0.3,4); ctx.fill();
        ctx.fillStyle='rgba(160,220,255,0.6)'; roundRect(ctx,-w*0.15,-h*0.18,w*0.3,h*0.2,4); ctx.fill();
    } else if(v===0||v===1||v===2) { // fixed-wing
        ctx.fillStyle=c1;
        ctx.beginPath();ctx.ellipse(0,0,h*0.35,w*0.45,Math.PI/2,0,Math.PI*2);ctx.fill();
        // wings
        ctx.fillStyle=c2;
        ctx.beginPath();ctx.ellipse(0,-h*0.05,w*0.5,h*0.1,0,0,Math.PI*2);ctx.fill();
        // tail
        ctx.beginPath();ctx.moveTo(-w*0.1,h*0.38);ctx.lineTo(w*0.1,h*0.38);ctx.lineTo(0,h*0.2);ctx.closePath();ctx.fill();
        // cockpit
        ctx.fillStyle='rgba(160,220,255,0.7)';ctx.beginPath();ctx.ellipse(0,-h*0.28,w*0.12,h*0.1,0,0,Math.PI*2);ctx.fill();
    } else { // balloon/blimp
        ctx.fillStyle=c1; ctx.beginPath();ctx.ellipse(0,-h*0.15,w*0.45,h*0.38,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2; roundRect(ctx,-w*0.2,h*0.22,w*0.4,h*0.2,4); ctx.fill();
        ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
        [[-w*0.15,h*0.22],[w*0.15,h*0.22]].forEach(([px,py])=>{ctx.beginPath();ctx.moveTo(px,-h*0.1);ctx.lineTo(px,py);ctx.stroke();});
    }
}

// ── Boat ──────────────────────────────────────────
function drawBoat(ctx,w,h,c1,c2,c3,v) {
    // hull
    ctx.fillStyle=c1;
    ctx.beginPath();ctx.moveTo(-w/2,0);ctx.lineTo(w/2,0);ctx.lineTo(w*0.4,h*0.4);ctx.lineTo(-w*0.4,h*0.4);ctx.closePath();ctx.fill();
    ctx.fillStyle=c2; roundRect(ctx,-w*0.3,-h*0.2,w*0.6,h*0.25,4); ctx.fill();
    if(v===1){// sail
        ctx.fillStyle='rgba(240,240,240,0.9)';
        ctx.beginPath();ctx.moveTo(0,-h*0.45);ctx.lineTo(w*0.35,-h*0.05);ctx.lineTo(0,-h*0.05);ctx.closePath();ctx.fill();
        ctx.strokeStyle='#888'; ctx.lineWidth=2; ctx.beginPath();ctx.moveTo(0,-h*0.48);ctx.lineTo(0,h*0.4);ctx.stroke();
    }
    if(v===3){// submarine - different shape
        ctx.fillStyle=c1; ctx.beginPath();ctx.ellipse(0,0,w*0.5,h*0.28,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2; roundRect(ctx,-w*0.08,-h*0.36,w*0.16,h*0.2,3); ctx.fill();
    }
}

// ── Tree ──────────────────────────────────────────
function drawTree(ctx,w,h,c1,c2,c3,v) {
    const trunk=c3;
    if(v===1) { // pine - triangular
        ctx.fillStyle=trunk; roundRect(ctx,-w*0.1,h*0.15,w*0.2,h*0.35,2); ctx.fill();
        [[0,-h*0.48,w*0.32,c1],[0,-h*0.25,w*0.4,c1],[0,-h*0.0,w*0.48,c2]].forEach(([cx2,cy2,r,col])=>{
            ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(cx2-r,cy2+h*0.22);ctx.lineTo(cx2+r,cy2+h*0.22);ctx.closePath();ctx.fill();
        });
    } else if(v===2) { // palm
        ctx.fillStyle=trunk;
        ctx.save();ctx.rotate(0.15);
        roundRect(ctx,-w*0.08,-h*0.4,w*0.16,h*0.7,4); ctx.fill();
        ctx.restore();
        ctx.fillStyle=c1;
        [[-0.3,-h*0.42,1.2],[0.4,-h*0.45,-0.8],[0,-h*0.5,0]].forEach(([ax,ay,rot])=>{
            ctx.save();ctx.translate(ax*w,ay);ctx.rotate(rot);
            ctx.beginPath();ctx.ellipse(w*0.2,0,w*0.35,h*0.08,0,0,Math.PI*2);ctx.fill();ctx.restore();
        });
    } else if(v===3) { // cactus
        ctx.fillStyle=c1;
        roundRect(ctx,-w*0.14,-h*0.4,w*0.28,h*0.7,8); ctx.fill();
        roundRect(ctx,-w*0.42,-h*0.1,w*0.28,h*0.2,6); ctx.fill();
        roundRect(ctx,w*0.14,-h*0.15,w*0.28,h*0.2,6); ctx.fill();
    } else if(v===9||v===10) { // flower/sunflower
        ctx.fillStyle=trunk; roundRect(ctx,-w*0.08,0,w*0.16,h*0.5,3); ctx.fill();
        const petals=v===10?8:6, pr=w*0.28;
        for(let i=0;i<petals;i++){
            ctx.fillStyle=c1; ctx.save();ctx.rotate(i*Math.PI*2/petals);
            ctx.beginPath();ctx.ellipse(0,-pr,w*0.12,w*0.18,0,0,Math.PI*2);ctx.fill();ctx.restore();
        }
        ctx.fillStyle=c2;ctx.beginPath();ctx.arc(0,0,w*0.22,0,Math.PI*2);ctx.fill();
    } else if(v===11) { // mushroom
        ctx.fillStyle=c3; roundRect(ctx,-w*0.12,h*0.08,w*0.24,h*0.42,4); ctx.fill();
        ctx.fillStyle=c1; ctx.beginPath();ctx.arc(0,-h*0.05,w*0.46,Math.PI,0,false);ctx.lineTo(w*0.46,h*0.1);ctx.lineTo(-w*0.46,h*0.1);ctx.closePath();ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.5)';
        [[0,-h*0.2,w*0.1],[-w*0.2,-h*0.05,w*0.07],[w*0.18,-h*0.08,w*0.07]].forEach(([sx,sy,sr])=>{ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();});
    } else { // default round tree
        ctx.fillStyle=trunk; roundRect(ctx,-w*0.12,h*0.1,w*0.24,h*0.4,2); ctx.fill();
        [[0,-h*0.44,w*0.44,c2],[0,-h*0.28,w*0.38,c1],[0,-h*0.1,w*0.46,c1]].forEach(([cx2,cy2,r,col])=>{
            ctx.fillStyle=col;ctx.beginPath();ctx.arc(cx2,cy2,r,0,Math.PI*2);ctx.fill();
        });
    }
}

// ── Rock ──────────────────────────────────────────
function drawRock(ctx,w,h,c1,c2,c3,v) {
    if(v===2) { // crystal
        ctx.fillStyle=c1; ctx.shadowColor=c1; ctx.shadowBlur=10;
        ctx.beginPath();ctx.moveTo(0,-h*0.48);ctx.lineTo(w*0.3,-h*0.1);ctx.lineTo(w*0.2,h*0.45);ctx.lineTo(-w*0.2,h*0.45);ctx.lineTo(-w*0.3,-h*0.1);ctx.closePath();ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.moveTo(0,-h*0.48);ctx.lineTo(w*0.06,-h*0.1);ctx.lineTo(0,h*0.45);ctx.closePath();ctx.fill();
        ctx.shadowBlur=0;
    } else if(v===3) { // ice block
        ctx.fillStyle=c1; ctx.shadowColor='rgba(180,220,255,0.5)'; ctx.shadowBlur=8;
        roundRect(ctx,-w*0.42,-h*0.42,w*0.84,h*0.84,4); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.2)'; roundRect(ctx,-w*0.35,-h*0.35,w*0.3,h*0.28,3); ctx.fill();
        ctx.shadowBlur=0;
    } else {
        ctx.fillStyle=c1;
        ctx.beginPath();
        if(v===1){ctx.arc(0,0,w*0.46,0,Math.PI*2);}
        else{ctx.ellipse(0,h*0.08,w*0.42,h*0.34,0.15,0,Math.PI*2);}
        ctx.fill();
        ctx.fillStyle=c2; ctx.globalAlpha=0.3;
        ctx.beginPath();ctx.ellipse(-w*0.1,-h*0.1,w*0.2,h*0.14,-0.3,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
    }
}

// ── Water tile ────────────────────────────────────
function drawWater(ctx,w,h,c1,c2,c3,v) {
    if(v===2) { // lava
        ctx.fillStyle=c1; roundRect(ctx,-w/2,-h/2,w,h,4); ctx.fill();
        ctx.fillStyle=c2; ctx.globalAlpha=0.5;
        ctx.beginPath();ctx.arc(-w*0.1,h*0.1,w*0.2,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
    } else {
        const g=ctx.createLinearGradient(0,-h/2,0,h/2); g.addColorStop(0,c1); g.addColorStop(1,c2);
        ctx.fillStyle=g; roundRect(ctx,-w/2,-h/2,w,h,4); ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=2;
        [-h*0.18,0,h*0.18].forEach(y=>{ctx.beginPath();ctx.moveTo(-w*0.42,y);ctx.bezierCurveTo(-w*0.1,y-5,w*0.1,y+5,w*0.42,y);ctx.stroke();});
    }
}

// ── Building ──────────────────────────────────────
function drawBuilding(ctx,w,h,c1,c2,c3,v) {
    if(v===1||v===2) { // castle/tower
        ctx.fillStyle=c1; roundRect(ctx,-w*0.4,-h*0.45,w*0.8,h*0.9,3); ctx.fill();
        // battlements
        ctx.fillStyle=c2;
        for(let i=-1;i<=1;i++){ctx.fillRect(i*w*0.22-w*0.08,-h*0.5,w*0.14,h*0.1);}
        // window
        ctx.fillStyle='rgba(200,180,80,0.5)'; ctx.beginPath();ctx.arc(0,-h*0.1,w*0.12,0,Math.PI*2);ctx.fill();
    } else if(v===4) { // temple/church
        ctx.fillStyle=c1; roundRect(ctx,-w*0.38,-h*0.3,w*0.76,h*0.75,3); ctx.fill();
        // pillars
        ctx.fillStyle=c2;
        [[-w*0.3,-w*0.1],[w*0.1,w*0.3]].forEach(([x1,x2])=>{ctx.fillRect(x1,-h*0.3,w*0.12,h*0.75);});
        // roof triangle
        ctx.fillStyle=c2; ctx.beginPath();ctx.moveTo(-w*0.45,-h*0.3);ctx.lineTo(w*0.45,-h*0.3);ctx.lineTo(0,-h*0.5);ctx.closePath();ctx.fill();
    } else if(v===5) { // windmill
        ctx.fillStyle=c1; ctx.beginPath();ctx.moveTo(-w*0.22,h*0.45);ctx.lineTo(w*0.22,h*0.45);ctx.lineTo(w*0.12,-h*0.3);ctx.lineTo(-w*0.12,-h*0.3);ctx.closePath();ctx.fill();
        ctx.fillStyle=c2; ctx.lineWidth=3; ctx.strokeStyle=c2;
        for(let i=0;i<4;i++){ctx.save();ctx.rotate(i*Math.PI/2);ctx.fillRect(-w*0.06,-h*0.44,w*0.12,h*0.22);ctx.restore();}
    } else if(v===10) { // pyramid
        ctx.fillStyle=c1; ctx.beginPath();ctx.moveTo(0,-h*0.48);ctx.lineTo(w*0.48,h*0.42);ctx.lineTo(-w*0.48,h*0.42);ctx.closePath();ctx.fill();
        ctx.fillStyle=c2; ctx.globalAlpha=0.3; ctx.beginPath();ctx.moveTo(0,-h*0.48);ctx.lineTo(w*0.04,-h*0.48);ctx.lineTo(w*0.48,h*0.42);ctx.lineTo(0,h*0.42);ctx.closePath();ctx.fill(); ctx.globalAlpha=1;
    } else { // default house
        ctx.fillStyle=c1; roundRect(ctx,-w*0.42,-h*0.1,w*0.84,h*0.56,4); ctx.fill();
        // roof
        ctx.fillStyle=c2; ctx.beginPath();ctx.moveTo(-w*0.48,-h*0.1);ctx.lineTo(0,-h*0.5);ctx.lineTo(w*0.48,-h*0.1);ctx.closePath();ctx.fill();
        // door
        ctx.fillStyle=c3; roundRect(ctx,-w*0.1,h*0.14,w*0.2,h*0.3,3); ctx.fill();
        // windows
        ctx.fillStyle='rgba(200,230,255,0.7)'; roundRect(ctx,-w*0.36,-h*0.02,w*0.18,w*0.18,2); ctx.fill();
        roundRect(ctx,w*0.18,-h*0.02,w*0.18,w*0.18,2); ctx.fill();
    }
}

// ── Platform / structure item ─────────────────────
function drawPlatform(ctx,w,h,c1,c2,c3,v) {
    if(v===0) { // wall
        ctx.fillStyle=c1; roundRect(ctx,-w/2,-h/2,w,h,3); ctx.fill();
        ctx.strokeStyle=c2; ctx.lineWidth=1;
        for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(-w/2,-h*0.2+i*h*0.25);ctx.lineTo(w/2,-h*0.2+i*h*0.25);ctx.stroke();}
        for(let j=0;j<4;j++){const off=j%2===0?0:w/6;ctx.beginPath();ctx.moveTo(-w/2+off+j*w*0.18,-h/2);ctx.lineTo(-w/2+off+j*w*0.18,h/2);ctx.stroke();}
    } else if(v===3) { // spike
        ctx.fillStyle=c1;
        for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(i*w*0.3+w*0.15,h/2);ctx.lineTo(i*w*0.3-w*0.15,h/2);ctx.lineTo(i*w*0.3,-h/2);ctx.closePath();ctx.fill();}
    } else if(v===6) { // chest
        ctx.fillStyle=c2; roundRect(ctx,-w*0.44,-h*0.44,w*0.88,h*0.88,5); ctx.fill();
        ctx.fillStyle=c1; roundRect(ctx,-w*0.44,-h*0.02,w*0.88,h*0.46,5); ctx.fill();
        ctx.fillStyle=c3; ctx.shadowColor=c3; ctx.shadowBlur=6;
        ctx.beginPath();ctx.arc(0,-h*0.02,w*0.1,0,Math.PI*2);ctx.fill(); ctx.shadowBlur=0;
    } else if(v===10) { // torch
        ctx.fillStyle=c1; roundRect(ctx,-w*0.12,h*0.02,w*0.24,h*0.46,3); ctx.fill();
        ctx.fillStyle='#ff6000'; ctx.shadowColor='#ff8020'; ctx.shadowBlur=12;
        ctx.beginPath();ctx.moveTo(-w*0.18,h*0.02);ctx.lineTo(w*0.18,h*0.02);ctx.lineTo(0,-h*0.38);ctx.closePath();ctx.fill();
        ctx.fillStyle='#f0e040'; ctx.beginPath();ctx.ellipse(0,-h*0.08,w*0.1,h*0.14,0,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
    } else if(v===14) { // portal
        ctx.fillStyle=c1; ctx.shadowColor=c1; ctx.shadowBlur=18;
        ctx.beginPath();ctx.ellipse(0,0,w*0.44,h*0.48,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2; ctx.beginPath();ctx.ellipse(0,0,w*0.32,h*0.36,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.beginPath();ctx.ellipse(0,0,w*0.18,h*0.22,0,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
    } else { // generic platform
        ctx.fillStyle=c1; ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=4;
        roundRect(ctx,-w/2,-h/2,w,h,5); ctx.fill();
        ctx.fillStyle=c2; roundRect(ctx,-w/2,-h/2,w,h*0.25,5); ctx.fill();
        ctx.shadowBlur=0;
    }
}

// ── Quadruped ─────────────────────────────────────
function drawQuadruped(ctx,w,h,c1,c2,c3,v) {
    // body
    ctx.fillStyle=c1; ctx.beginPath();ctx.ellipse(0,0,w*0.42,h*0.3,0,0,Math.PI*2);ctx.fill();
    // head
    ctx.fillStyle=c3||c1; ctx.beginPath();ctx.arc(w*0.35,-h*0.1,h*0.24,0,Math.PI*2);ctx.fill();
    // legs
    ctx.fillStyle=c2||c1;
    [[-w*0.28,h*0.24],[-w*0.08,h*0.28],[w*0.1,h*0.28],[w*0.28,h*0.24]].forEach(([lx,ly])=>{roundRect(ctx,lx-5,ly,9,h*0.2,3);ctx.fill();});
    // tail
    ctx.strokeStyle=c2||c1; ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-w*0.4,h*0.05);ctx.quadraticCurveTo(-w*0.6,-h*0.15,-w*0.5,-h*0.28);ctx.stroke();
    // ears
    ctx.fillStyle=c1;
    ctx.beginPath();ctx.moveTo(w*0.28,-h*0.28);ctx.lineTo(w*0.22,-h*0.48);ctx.lineTo(w*0.38,-h*0.3);ctx.closePath();ctx.fill();
    // eye
    ctx.fillStyle='#222';ctx.beginPath();ctx.arc(w*0.44,-h*0.12,2.5,0,Math.PI*2);ctx.fill();
}

// ── Bird ──────────────────────────────────────────
function drawBird(ctx,w,h,c1,c2,c3,v) {
    if(v===4) { // penguin
        ctx.fillStyle=c1; ctx.beginPath();ctx.ellipse(0,0,w*0.36,h*0.45,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2; ctx.beginPath();ctx.ellipse(-w*0.04,h*0.02,w*0.22,h*0.35,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c3; ctx.beginPath();ctx.arc(0,-h*0.3,h*0.18,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#f0c040'; ctx.beginPath();ctx.moveTo(-w*0.08,-h*0.3);ctx.lineTo(0,-h*0.38);ctx.lineTo(w*0.08,-h*0.3);ctx.closePath();ctx.fill();
    } else {
        // body
        ctx.fillStyle=c1; ctx.beginPath();ctx.ellipse(0,0,w*0.36,h*0.28,0,0,Math.PI*2);ctx.fill();
        // head
        ctx.fillStyle=c2||c1; ctx.beginPath();ctx.arc(w*0.28,-h*0.12,h*0.18,0,Math.PI*2);ctx.fill();
        // wings spread
        ctx.fillStyle=c1; ctx.globalAlpha=0.9;
        ctx.beginPath();ctx.ellipse(-w*0.25,-h*0.05,w*0.3,h*0.12,0.3,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
        // beak
        ctx.fillStyle='#f0c040'; ctx.beginPath();ctx.moveTo(w*0.42,-h*0.12);ctx.lineTo(w*0.55,-h*0.18);ctx.lineTo(w*0.42,-h*0.06);ctx.closePath();ctx.fill();
        // tail
        ctx.fillStyle=c2||c1;
        ctx.beginPath();ctx.moveTo(-w*0.3,0);ctx.lineTo(-w*0.55,-h*0.15);ctx.lineTo(-w*0.55,h*0.15);ctx.closePath();ctx.fill();
        // eye
        ctx.fillStyle='#222';ctx.beginPath();ctx.arc(w*0.34,-h*0.15,2,0,Math.PI*2);ctx.fill();
    }
}

// ── Fish ──────────────────────────────────────────
function drawFish(ctx,w,h,c1,c2,c3,v) {
    if(v===5) { // octopus
        ctx.fillStyle=c1; ctx.beginPath();ctx.arc(0,-h*0.1,w*0.35,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2;
        for(let i=0;i<6;i++){const a=i*Math.PI/3+Math.PI/6,tx=Math.cos(a)*w*0.26,ty=Math.sin(a)*h*0.25+h*0.18;ctx.beginPath();ctx.arc(tx,ty,w*0.09,0,Math.PI*2);ctx.fill();}
        ctx.fillStyle='#fff'; ctx.beginPath();ctx.arc(-w*0.12,-h*0.12,w*0.09,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(w*0.12,-h*0.12,w*0.09,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#222'; ctx.beginPath();ctx.arc(-w*0.12,-h*0.12,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(w*0.12,-h*0.12,5,0,Math.PI*2);ctx.fill();
    } else if(v===6) { // crab
        ctx.fillStyle=c1; ctx.beginPath();ctx.ellipse(0,0,w*0.4,h*0.28,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2;
        [[-w*0.5,-h*0.05],[-w*0.5,h*0.05],[w*0.5,-h*0.05],[w*0.5,h*0.05]].forEach(([lx,ly])=>{roundRect(ctx,lx<0?lx:lx-w*0.22,ly-3,w*0.22,6,2);ctx.fill();});
        ctx.fillStyle=c1; ctx.beginPath();ctx.ellipse(-w*0.5,-h*0.1,w*0.1,h*0.12,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(w*0.5,-h*0.1,w*0.1,h*0.12,0,0,Math.PI*2);ctx.fill();
    } else if(v===9) { // starfish
        ctx.fillStyle=c1;
        for(let i=0;i<5;i++){ctx.save();ctx.rotate(i*Math.PI*2/5-Math.PI/2);ctx.beginPath();ctx.ellipse(0,-h*0.3,w*0.12,h*0.22,0,0,Math.PI*2);ctx.fill();ctx.restore();}
        ctx.beginPath();ctx.arc(0,0,w*0.2,0,Math.PI*2);ctx.fill();
    } else { // default fish
        ctx.fillStyle=c1; ctx.beginPath();ctx.ellipse(0,0,w*0.42,h*0.26,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2; ctx.beginPath();ctx.moveTo(-w*0.35,0);ctx.lineTo(-w*0.55,-h*0.22);ctx.lineTo(-w*0.55,h*0.22);ctx.closePath();ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.beginPath();ctx.ellipse(-w*0.05,-h*0.04,w*0.18,h*0.12,0.4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#222';ctx.beginPath();ctx.arc(w*0.28,-h*0.06,3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.8)';ctx.beginPath();ctx.arc(w*0.3,-h*0.08,1.5,0,Math.PI*2);ctx.fill();
        if(v===1){// shark
            ctx.fillStyle=c1;ctx.beginPath();ctx.moveTo(w*0.05,-h*0.26);ctx.lineTo(w*0.18,-h*0.26);ctx.lineTo(w*0.12,0);ctx.closePath();ctx.fill();
        }
    }
}

// ── Insect ────────────────────────────────────────
function drawInsect(ctx,w,h,c1,c2,c3,v) {
    if(v===0) { // butterfly
        ctx.fillStyle=c1; ctx.globalAlpha=0.85;
        ctx.beginPath();ctx.ellipse(-w*0.25,-h*0.05,w*0.28,h*0.2,0.4,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(w*0.25,-h*0.05,w*0.28,h*0.2,-0.4,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(-w*0.22,h*0.12,w*0.18,h*0.14,0.6,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(w*0.22,h*0.12,w*0.18,h*0.14,-0.6,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1; ctx.fillStyle=c2;ctx.beginPath();ctx.ellipse(0,0,w*0.08,h*0.36,0,0,Math.PI*2);ctx.fill();
    } else if(v===1) { // bee
        ctx.fillStyle=c1; ctx.beginPath();ctx.ellipse(0,0,w*0.3,h*0.36,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2;
        for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(0,-h*0.12+i*h*0.14,w*0.3,0,Math.PI*2);ctx.fillStyle=i%2===0?c2:c1;ctx.fill();}
        ctx.fillStyle='rgba(220,240,255,0.5)'; ctx.globalAlpha=0.7;
        ctx.beginPath();ctx.ellipse(-w*0.25,-h*0.1,w*0.22,h*0.08,-0.3,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(w*0.25,-h*0.1,w*0.22,h*0.08,0.3,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
    } else if(v===2) { // ladybug
        ctx.fillStyle=c1; ctx.beginPath();ctx.arc(0,0,w*0.38,Math.PI,0);ctx.fill();
        ctx.fillStyle=c2; ctx.beginPath();ctx.arc(0,h*0.08,w*0.38,0,Math.PI);ctx.fill();
        ctx.strokeStyle='#111'; ctx.lineWidth=1.5; ctx.beginPath();ctx.moveTo(0,-h*0.38);ctx.lineTo(0,h*0.38);ctx.stroke();
        ctx.fillStyle=c2;
        [[0,-h*0.2,w*0.1],[-w*0.2,-h*0.05,w*0.08],[w*0.2,-h*0.05,w*0.08]].forEach(([dx,dy,dr])=>{ctx.beginPath();ctx.arc(dx,dy,dr,0,Math.PI*2);ctx.fill();});
    } else {
        ctx.fillStyle=c1; ctx.beginPath();ctx.ellipse(0,0,w*0.28,h*0.4,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2; ctx.beginPath();ctx.arc(0,-h*0.32,w*0.22,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(200,230,255,0.5)';
        ctx.beginPath();ctx.ellipse(-w*0.3,-h*0.05,w*0.2,h*0.1,0.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(w*0.3,-h*0.05,w*0.2,h*0.1,-0.5,0,Math.PI*2);ctx.fill();
    }
}

// ── Circle item ───────────────────────────────────
function drawCircleItem(ctx,w,h,c1,c2,c3,v) {
    const r=Math.min(w,h)/2-2;
    ctx.shadowColor=c2; ctx.shadowBlur=12;
    ctx.fillStyle=c1; ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c2; ctx.beginPath();ctx.arc(0,0,r*0.78,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    if(v===4) { // health/power-up - cross or symbol
        ctx.fillStyle='rgba(255,255,255,0.6)';
        ctx.fillRect(-r*0.5,-r*0.15,r,r*0.3); ctx.fillRect(-r*0.15,-r*0.5,r*0.3,r);
    } else if(v===5) { // shield
        ctx.fillStyle=c1; ctx.globalAlpha=0.6;
        ctx.beginPath();ctx.moveTo(0,-r*0.5);ctx.lineTo(r*0.4,-r*0.1);ctx.lineTo(r*0.4,r*0.3);ctx.lineTo(0,r*0.55);ctx.lineTo(-r*0.4,r*0.3);ctx.lineTo(-r*0.4,-r*0.1);ctx.closePath();ctx.fill();
        ctx.globalAlpha=1;
    }
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.ellipse(-r*0.22,-r*0.28,r*0.26,r*0.14,-0.5,0,Math.PI*2);ctx.fill();
}

// ── Star item ─────────────────────────────────────
function drawStarItem(ctx,w,h,c1,c2,c3,v) {
    const r=Math.min(w,h)*0.46;
    ctx.shadowColor=c1; ctx.shadowBlur=10;
    if(v===0||v===1||v===2||v===3) { // star
        ctx.fillStyle=c1; drawStar5(ctx,0,0,r,r*0.42); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.35)'; drawStar5(ctx,0,0,r*0.6,r*0.28); ctx.fill();
    } else if(v===1) { // crown
        ctx.fillStyle=c1;
        ctx.beginPath();ctx.moveTo(-r,-r*0.2);ctx.lineTo(-r,r*0.5);ctx.lineTo(r,r*0.5);ctx.lineTo(r,-r*0.2);ctx.lineTo(r*0.5,r*0.2);ctx.lineTo(0,-r*0.4);ctx.lineTo(-r*0.5,r*0.2);ctx.closePath();ctx.fill();
    } else if(v===2) { // trophy
        ctx.fillStyle=c1;
        roundRect(ctx,-r*0.7,-r*0.8,r*1.4,r*1.1,r*0.2); ctx.fill();
        ctx.fillStyle=c2; roundRect(ctx,-r*0.25,r*0.3,r*0.5,r*0.6,3); ctx.fill();
        roundRect(ctx,-r*0.5,r*0.88,r,r*0.2,3); ctx.fill();
    }
    ctx.shadowBlur=0;
}
function drawStar5(ctx,x,y,outer,inner){
    ctx.beginPath();
    for(let i=0;i<10;i++){const a=i*Math.PI/5-Math.PI/2,r2=i%2===0?outer:inner;ctx.lineTo(x+Math.cos(a)*r2,y+Math.sin(a)*r2);}
    ctx.closePath();
}

// ── Small item ────────────────────────────────────
function drawSmallItem(ctx,w,h,c1,c2,c3,v) {
    if(v===0) { // key
        ctx.fillStyle=c1; ctx.shadowColor=c1; ctx.shadowBlur=6;
        ctx.beginPath();ctx.arc(0,-h*0.2,h*0.22,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2; ctx.beginPath();ctx.arc(0,-h*0.2,h*0.12,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c1; roundRect(ctx,-w*0.07,-h*0.02,w*0.14,h*0.42,3); ctx.fill();
        [h*0.16,h*0.28].forEach(ky=>{roundRect(ctx,w*0.07,ky,w*0.14,h*0.1,2);ctx.fill();});
        ctx.shadowBlur=0;
    } else if(v===1||v===2||v===3||v===4) { // potion
        ctx.fillStyle=c2; roundRect(ctx,-w*0.2,-h*0.38,w*0.4,h*0.14,3); ctx.fill();
        ctx.fillStyle=c1; ctx.shadowColor=c1; ctx.shadowBlur=8;
        ctx.beginPath();ctx.arc(0,h*0.05,w*0.36,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
        ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.beginPath();ctx.ellipse(-w*0.1,-h*0.1,w*0.1,h*0.12,0.4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.beginPath();ctx.arc(0,h*0.05,w*0.36,0,Math.PI*2);ctx.stroke();
    } else if(v===7) { // bomb
        ctx.fillStyle=c1; ctx.shadowColor='#ff2000'; ctx.shadowBlur=8;
        ctx.beginPath();ctx.arc(0,h*0.06,w*0.36,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0; ctx.strokeStyle=c2; ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(w*0.2,-h*0.2);ctx.quadraticCurveTo(w*0.3,-h*0.45,w*0.14,-h*0.42);ctx.stroke();
        ctx.fillStyle='#f0c000'; ctx.beginPath();ctx.arc(w*0.14,-h*0.42,4,0,Math.PI*2);ctx.fill();
    } else if(v===14) { // portal item/crystal ball
        ctx.fillStyle=c1; ctx.shadowColor=c1; ctx.shadowBlur=16;
        ctx.beginPath();ctx.arc(0,0,w*0.4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2; ctx.beginPath();ctx.arc(0,0,w*0.3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.beginPath();ctx.ellipse(-w*0.12,-w*0.14,w*0.1,w*0.07,-0.5,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
    } else {
        ctx.fillStyle=c1; ctx.shadowColor=c1; ctx.shadowBlur=6;
        roundRect(ctx,-w*0.38,-h*0.38,w*0.76,h*0.76,5); ctx.fill(); ctx.shadowBlur=0;
        ctx.fillStyle=c2; roundRect(ctx,-w*0.26,-h*0.26,w*0.52,h*0.52,4); ctx.fill();
    }
}

// ── Food ──────────────────────────────────────────
function drawFood(ctx,w,h,c1,c2,c3,v) {
    if(v===0) { // apple
        ctx.fillStyle=c1; ctx.beginPath();ctx.arc(0,h*0.05,w*0.4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.beginPath();ctx.ellipse(-w*0.12,-h*0.12,w*0.12,h*0.18,0.4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2; roundRect(ctx,-w*0.06,-h*0.48,w*0.1,h*0.2,3); ctx.fill();
        ctx.fillStyle=c3; ctx.beginPath();ctx.arc(w*0.2,-h*0.36,w*0.12,0,Math.PI*2);ctx.fill();
    } else if(v===1) { // banana
        ctx.fillStyle=c1; ctx.strokeStyle=c1; ctx.lineWidth=h*0.22;
        ctx.beginPath();ctx.arc(0,-h*0.06,w*0.36,Math.PI*0.1,Math.PI*0.9);ctx.stroke();
        ctx.fillStyle=c2; ctx.beginPath();ctx.arc(w*0.28,-h*0.35,w*0.07,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(-w*0.22,h*0.22,w*0.07,0,Math.PI*2);ctx.fill();
    } else if(v===10) { // pizza slice
        ctx.fillStyle=c1; ctx.beginPath();ctx.moveTo(0,-h*0.46);ctx.lineTo(w*0.4,h*0.4);ctx.lineTo(-w*0.4,h*0.4);ctx.closePath();ctx.fill();
        ctx.fillStyle=c2; ctx.strokeStyle=c2; ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(-w*0.1,h*0.1,w*0.1,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(w*0.15,-h*0.05,w*0.08,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#a00000'; ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(-w*0.4,h*0.4);ctx.lineTo(w*0.4,h*0.4);ctx.stroke();
    } else if(v===15) { // cake
        ctx.fillStyle=c1; roundRect(ctx,-w*0.44,-h*0.1,w*0.88,h*0.56,4); ctx.fill();
        ctx.fillStyle=c2; roundRect(ctx,-w*0.44,-h*0.1,w*0.88,h*0.2,4); ctx.fill();
        ctx.fillStyle='#f0f0f0'; roundRect(ctx,-w*0.44,-h*0.3,w*0.88,h*0.22,4); ctx.fill();
        // candle
        ctx.fillStyle='#f0e0a0'; roundRect(ctx,-w*0.06,-h*0.52,w*0.12,h*0.24,3); ctx.fill();
        ctx.fillStyle='#ff8020'; ctx.shadowColor='#ff8020'; ctx.shadowBlur=8;
        ctx.beginPath();ctx.arc(0,-h*0.52,5,0,Math.PI*2);ctx.fill(); ctx.shadowBlur=0;
    } else if(v===17) { // donut
        ctx.fillStyle=c1; ctx.beginPath();ctx.arc(0,0,w*0.42,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2; ctx.beginPath();ctx.arc(0,0,w*0.42,0,Math.PI);ctx.fill();
        ctx.fillStyle='rgba(0,0,0,0)'; ctx.globalCompositeOperation='destination-out';
        ctx.beginPath();ctx.arc(0,0,w*0.18,0,Math.PI*2);ctx.fill();
        ctx.globalCompositeOperation='source-over';
    } else { // generic round food
        ctx.fillStyle=c1; ctx.shadowColor=c1; ctx.shadowBlur=4;
        ctx.beginPath();ctx.arc(0,0,w*0.4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.beginPath();ctx.ellipse(-w*0.12,-w*0.14,w*0.12,w*0.1,-0.4,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
    }
}

// ── Weapon ────────────────────────────────────────
function drawWeapon(ctx,w,h,c1,c2,c3,v) {
    ctx.shadowColor=c2; ctx.shadowBlur=6;
    if(v===0||v===1) { // sword/dagger
        ctx.fillStyle=c1; roundRect(ctx,-w*0.08,-h*0.48,w*0.16,h*0.72,2); ctx.fill();
        ctx.fillStyle=c3; roundRect(ctx,-w*0.08,h*0.22,w*0.16,h*0.18,3); ctx.fill();
        ctx.fillStyle=c2; roundRect(ctx,-w*0.28,h*0.18,w*0.56,h*0.08,3); ctx.fill();
    } else if(v===2) { // axe
        ctx.fillStyle=c2; roundRect(ctx,-w*0.08,-h*0.48,w*0.14,h*0.96,3); ctx.fill();
        ctx.fillStyle=c1; ctx.beginPath();ctx.moveTo(w*0.06,-h*0.44);ctx.lineTo(w*0.42,-h*0.28);ctx.lineTo(w*0.42,h*0.08);ctx.lineTo(w*0.06,h*0.12);ctx.closePath();ctx.fill();
    } else if(v===5) { // bow
        ctx.strokeStyle=c1; ctx.lineWidth=4;
        ctx.beginPath();ctx.arc(w*0.08,0,h*0.44,-Math.PI*0.7,Math.PI*0.7);ctx.stroke();
        ctx.strokeStyle=c2; ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(w*0.08,-h*0.4);ctx.lineTo(w*0.08,h*0.4);ctx.stroke();
    } else if(v===8) { // shield
        ctx.fillStyle=c1; ctx.beginPath();ctx.moveTo(0,-h*0.46);ctx.lineTo(w*0.4,-h*0.2);ctx.lineTo(w*0.4,h*0.2);ctx.lineTo(0,h*0.46);ctx.lineTo(-w*0.4,h*0.2);ctx.lineTo(-w*0.4,-h*0.2);ctx.closePath();ctx.fill();
        ctx.fillStyle=c2; ctx.beginPath();ctx.moveTo(0,-h*0.3);ctx.lineTo(w*0.26,-h*0.12);ctx.lineTo(w*0.26,h*0.12);ctx.lineTo(0,h*0.3);ctx.lineTo(-w*0.26,h*0.12);ctx.lineTo(-w*0.26,-h*0.12);ctx.closePath();ctx.fill();
        ctx.fillStyle=c3; ctx.beginPath();ctx.arc(0,0,w*0.12,0,Math.PI*2);ctx.fill();
    } else {
        ctx.fillStyle=c1; roundRect(ctx,-w*0.1,-h*0.46,w*0.2,h*0.92,3); ctx.fill();
        ctx.fillStyle=c2; roundRect(ctx,-w*0.3,h*0.16,w*0.6,h*0.1,3); ctx.fill();
    }
    ctx.shadowBlur=0;
}

// ── Shape ────────────────────────────────────────
function drawShape(ctx,w,h,c1,c2,c3,v) {
    ctx.fillStyle=c1; ctx.strokeStyle=c2; ctx.lineWidth=2;
    const r=Math.min(w,h)*0.44;
    if(v===0) { // circle
        ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.stroke();
    } else if(v===1) { // square
        const s=r*1.3;ctx.beginPath();ctx.rect(-s/2,-s/2,s,s);ctx.fill();ctx.stroke();
    } else if(v===2) { // triangle
        ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*0.87,r*0.5);ctx.lineTo(-r*0.87,r*0.5);ctx.closePath();ctx.fill();ctx.stroke();
    } else if(v===3) { // rectangle
        ctx.beginPath();ctx.rect(-r*1.3,-r*0.7,r*2.6,r*1.4);ctx.fill();ctx.stroke();
    } else if(v===4) { // diamond
        ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*0.7,0);ctx.lineTo(0,r);ctx.lineTo(-r*0.7,0);ctx.closePath();ctx.fill();ctx.stroke();
    } else if(v===5) { // pentagon
        ctx.beginPath();for(let i=0;i<5;i++){const a=-Math.PI/2+i*Math.PI*2/5;ctx.lineTo(r*Math.cos(a),r*Math.sin(a));}ctx.closePath();ctx.fill();ctx.stroke();
    } else if(v===6) { // hexagon
        ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.lineTo(r*Math.cos(a),r*Math.sin(a));}ctx.closePath();ctx.fill();ctx.stroke();
    } else if(v===7) { // octagon
        ctx.beginPath();for(let i=0;i<8;i++){const a=i*Math.PI/4;ctx.lineTo(r*Math.cos(a),r*Math.sin(a));}ctx.closePath();ctx.fill();ctx.stroke();
    } else if(v===8) { // star
        drawStar5(ctx,0,0,r,r*0.4);ctx.fillStyle=c1;ctx.fill();ctx.strokeStyle=c2;ctx.stroke();
    } else if(v===9) { // oval
        ctx.beginPath();ctx.ellipse(0,0,r*1.4,r*0.8,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    } else if(v===10) { // arrow right
        ctx.beginPath();ctx.moveTo(-r*0.7,-r*0.3);ctx.lineTo(r*0.1,-r*0.3);ctx.lineTo(r*0.1,-r*0.6);ctx.lineTo(r*0.7,0);ctx.lineTo(r*0.1,r*0.6);ctx.lineTo(r*0.1,r*0.3);ctx.lineTo(-r*0.7,r*0.3);ctx.closePath();ctx.fill();ctx.stroke();
    } else if(v===11) { // arrow left
        ctx.beginPath();ctx.moveTo(r*0.7,-r*0.3);ctx.lineTo(-r*0.1,-r*0.3);ctx.lineTo(-r*0.1,-r*0.6);ctx.lineTo(-r*0.7,0);ctx.lineTo(-r*0.1,r*0.6);ctx.lineTo(-r*0.1,r*0.3);ctx.lineTo(r*0.7,r*0.3);ctx.closePath();ctx.fill();ctx.stroke();
    } else if(v===12) { // arrow up
        ctx.beginPath();ctx.moveTo(-r*0.3,r*0.7);ctx.lineTo(-r*0.3,-r*0.1);ctx.lineTo(-r*0.6,-r*0.1);ctx.lineTo(0,-r*0.7);ctx.lineTo(r*0.6,-r*0.1);ctx.lineTo(r*0.3,-r*0.1);ctx.lineTo(r*0.3,r*0.7);ctx.closePath();ctx.fill();ctx.stroke();
    } else if(v===13) { // arrow down
        ctx.beginPath();ctx.moveTo(-r*0.3,-r*0.7);ctx.lineTo(-r*0.3,r*0.1);ctx.lineTo(-r*0.6,r*0.1);ctx.lineTo(0,r*0.7);ctx.lineTo(r*0.6,r*0.1);ctx.lineTo(r*0.3,r*0.1);ctx.lineTo(r*0.3,-r*0.7);ctx.closePath();ctx.fill();ctx.stroke();
    } else if(v===14) { // cross / plus
        const t=r*0.3;ctx.beginPath();ctx.rect(-t,-r,t*2,r*2);ctx.fill();ctx.stroke();
        ctx.beginPath();ctx.rect(-r,-t,r*2,t*2);ctx.fill();ctx.stroke();
    } else if(v===15) { // ring
        ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();
        ctx.beginPath();ctx.arc(0,0,r*0.62,0,Math.PI*2);ctx.fillStyle='transparent';ctx.stroke();
    } else if(v===16) { // heart
        ctx.beginPath();ctx.moveTo(0,r*0.4);ctx.bezierCurveTo(-r*1.1,r*0.2,-r*1.1,-r*0.5,0,-r*0.1);ctx.bezierCurveTo(r*1.1,-r*0.5,r*1.1,r*0.2,0,r*0.4);ctx.closePath();ctx.fill();ctx.stroke();
    } else if(v===17) { // crescent
        ctx.beginPath();ctx.arc(0,0,r,Math.PI*0.25,Math.PI*1.75);ctx.arc(-r*0.4,0,r*0.78,Math.PI*1.75,Math.PI*0.25,true);ctx.closePath();ctx.fill();ctx.stroke();
    } else if(v===18) { // parallelogram
        ctx.beginPath();ctx.moveTo(-r*0.8,-r*0.5);ctx.lineTo(r*1.1,-r*0.5);ctx.lineTo(r*0.8,r*0.5);ctx.lineTo(-r*1.1,r*0.5);ctx.closePath();ctx.fill();ctx.stroke();
    } else if(v===19) { // trapezoid
        ctx.beginPath();ctx.moveTo(-r*0.6,-r*0.5);ctx.lineTo(r*0.6,-r*0.5);ctx.lineTo(r*1.0,r*0.5);ctx.lineTo(-r*1.0,r*0.5);ctx.closePath();ctx.fill();ctx.stroke();
    } else {
        ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
    }
}

// ── Projectile ────────────────────────────────────
function drawProjectile(ctx,w,h,c1,c2,c3,v) {
    ctx.shadowColor=c1; ctx.shadowBlur=12;
    if(v===0) { // arrow
        ctx.fillStyle=c1; roundRect(ctx,-w*0.06,-h*0.42,w*0.12,h*0.7,2); ctx.fill();
        ctx.fillStyle=c2; ctx.beginPath();ctx.moveTo(0,-h*0.46);ctx.lineTo(w*0.14,-h*0.2);ctx.lineTo(-w*0.14,-h*0.2);ctx.closePath();ctx.fill();
        ctx.fillStyle=c2; ctx.beginPath();ctx.moveTo(-w*0.2,h*0.28);ctx.lineTo(0,h*0.16);ctx.lineTo(w*0.2,h*0.28);ctx.closePath();ctx.fill();
    } else if(v===2) { // fireball
        ctx.fillStyle=c1; ctx.beginPath();ctx.arc(0,0,w*0.32,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2; ctx.beginPath();ctx.arc(-w*0.06,-h*0.06,w*0.18,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff'; ctx.beginPath();ctx.arc(-w*0.1,-h*0.12,w*0.08,0,Math.PI*2);ctx.fill();
    } else if(v===4) { // lightning
        ctx.fillStyle=c1; ctx.lineWidth=4; ctx.strokeStyle=c1;
        ctx.beginPath();ctx.moveTo(w*0.08,-h*0.48);ctx.lineTo(-w*0.1,-h*0.02);ctx.lineTo(w*0.06,-h*0.02);ctx.lineTo(-w*0.1,h*0.48);ctx.stroke();
    } else {
        ctx.fillStyle=c1; ctx.beginPath();ctx.arc(0,0,w*0.36,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;
}

// ── Effect ────────────────────────────────────────
function drawEffect(ctx,w,h,c1,c2,c3,v) {
    ctx.shadowColor=c1; ctx.shadowBlur=16;
    if(v===0) { // explosion
        ctx.fillStyle=c2;
        for(let i=0;i<8;i++){ctx.save();ctx.rotate(i*Math.PI/4);ctx.beginPath();ctx.ellipse(0,-h*0.28,w*0.1,h*0.24,0,0,Math.PI*2);ctx.fill();ctx.restore();}
        ctx.fillStyle=c1; ctx.beginPath();ctx.arc(0,0,w*0.32,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff'; ctx.beginPath();ctx.arc(0,0,w*0.14,0,Math.PI*2);ctx.fill();
    } else if(v===3) { // sparkle
        ctx.fillStyle=c1;
        for(let i=0;i<4;i++){ctx.save();ctx.rotate(i*Math.PI/2);ctx.beginPath();ctx.ellipse(0,-h*0.36,w*0.07,h*0.24,0,0,Math.PI*2);ctx.fill();ctx.restore();}
        ctx.beginPath();ctx.arc(0,0,w*0.16,0,Math.PI*2);ctx.fill();
    } else if(v===7) { // bubble
        ctx.strokeStyle=c1; ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(0,0,w*0.38,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.beginPath();ctx.arc(0,0,w*0.38,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.beginPath();ctx.ellipse(-w*0.15,-h*0.18,w*0.1,h*0.08,-0.5,0,Math.PI*2);ctx.fill();
    } else {
        ctx.fillStyle=c1;
        for(let i=0;i<6;i++){ctx.save();ctx.rotate(i*Math.PI/3);ctx.beginPath();ctx.ellipse(0,-h*0.3,w*0.08,h*0.2,0,0,Math.PI*2);ctx.fill();ctx.restore();}
    }
    ctx.shadowBlur=0;
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
}

function stopGame() {
    setRunning(false);
    const c = document.getElementById('game-canvas');
    c.getContext('2d').clearRect(0, 0, c.width, c.height);
}

function setRunning(on) {
    document.getElementById('p-dot').className = 'p-dot' + (on ? ' on' : '');
    document.getElementById('p-label').textContent = on ? 'running' : 'preview';
}

// ── console ──────────────────────────────────────
function log(msg, type) {
    const out = document.getElementById('console-out');
    const div = document.createElement('div');
    div.className = 'cl' + (type ? ' ' + type : '');
    const prefix = type === 'err' ? '✗ ' : type === 'ok' ? '✓ ' : '  ';
    div.textContent = prefix + msg;
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
}

function clearConsole() {
    document.getElementById('console-out').innerHTML = '';
}

// ── init ─────────────────────────────────────────
loadFiles();
showTerminal();
</script>
