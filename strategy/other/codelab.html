<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeLab</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #0d0f1a;
    --surface: #151721;
    --surface2: #1e2030;
    --border: #252840;
    --text: #cdd6f4;
    --dim: #6c7086;
    --blue: #89b4fa;
    --yellow: #f9e2af;
    --green: #a6e3a1;
    --red: #f38ba8;
    --purple: #cba6f7;
    --cyan: #89dceb;
    --orange: #fab387;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    height: 100vh;
    overflow: hidden;
}

/* ─── TERMINAL ─── */
#screen-terminal {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
}

.terminal-window {
    width: 580px;
    max-width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(137,180,250,0.04), 0 24px 64px rgba(0,0,0,0.6);
}

.t-titlebar {
    background: var(--surface2);
    padding: 11px 16px;
    display: flex;
    align-items: center;
    gap: 7px;
    border-bottom: 1px solid var(--border);
}

.dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.dot-r { background: #f38ba8; }
.dot-y { background: #f9e2af; }
.dot-g { background: #a6e3a1; }
.t-titlebar-label {
    margin-left: auto;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
}

.t-body { padding: 28px 28px 24px; }

.t-logo {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--purple);
    text-shadow: 0 0 24px rgba(203,166,247,0.35);
    margin-bottom: 2px;
}

.t-sub {
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 32px;
}

.files-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 10px;
}

.file-entry {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
}
.file-entry:hover { background: var(--surface2); }
.file-icon { color: var(--purple); font-size: 11px; }
.file-name { color: var(--cyan); font-size: 14px; flex: 1; }
.file-meta { color: var(--dim); font-size: 11px; }

.no-files { color: var(--dim); font-size: 13px; padding: 6px 0 16px; }

.prompt-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 20px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
}
.prompt-sym { color: var(--green); font-size: 15px; }
#t-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 14px;
    caret-color: var(--purple);
}
#t-input::placeholder { color: var(--dim); }
.prompt-hint {
    font-size: 11px;
    color: var(--dim);
    margin-top: 8px;
    padding-left: 2px;
}

/* ─── EDITOR ─── */
#screen-editor {
    display: none;
    height: 100vh;
    flex-direction: column;
}

.e-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 44px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
}

.e-logo { color: var(--purple); font-weight: 900; letter-spacing: 3px; font-size: 13px; }

.e-filename {
    color: var(--text);
    font-size: 13px;
    padding: 3px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
}

.save-status { font-size: 11px; color: var(--dim); transition: color 0.3s; min-width: 70px; }
.save-status.saved  { color: var(--green); }
.save-status.saving { color: var(--yellow); }

.h-spacer { flex: 1; }

.run-btn {
    background: var(--green);
    color: #1e1e2e;
    border: none;
    padding: 6px 18px;
    border-radius: 5px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
}
.run-btn:hover { opacity: 0.85; }
.run-btn:active { transform: scale(0.97); }

.exit-btn {
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 5px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
}
.exit-btn:hover { color: var(--red); border-color: var(--red); }

/* editor main */
.e-main {
    flex: 1;
    display: flex;
    overflow: hidden;
}

/* code side */
.code-panel {
    width: 50%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    min-width: 0;
}

.code-tab-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    height: 34px;
    display: flex;
    align-items: flex-end;
    flex-shrink: 0;
}

.code-tab {
    padding: 5px 14px 6px;
    font-size: 12px;
    color: var(--dim);
    border-radius: 5px 5px 0 0;
    border: 1px solid transparent;
}
.code-tab.active {
    color: var(--text);
    background: var(--bg);
    border-color: var(--border);
    border-bottom-color: var(--bg);
}

.code-wrap {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
}

.line-nums {
    width: 48px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px 10px 16px 0;
    text-align: right;
    font-size: 13px;
    color: var(--dim);
    line-height: 1.65;
    user-select: none;
    overflow: hidden;
    flex-shrink: 0;
}

.textarea-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
}

#code-hl {
    position: absolute;
    inset: 0;
    padding: 16px 16px 16px 12px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-all;
    pointer-events: none;
    overflow-y: scroll;
    overflow-x: hidden;
    scrollbar-width: none;
}
#code-hl::-webkit-scrollbar { display: none; }

#code-input {
    position: absolute;
    inset: 0;
    padding: 16px 16px 16px 12px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.65;
    background: transparent;
    border: none;
    outline: none;
    color: transparent;
    caret-color: var(--purple);
    resize: none;
    overflow-y: scroll;
    overflow-x: hidden;
    white-space: pre-wrap;
    word-break: break-all;
    scrollbar-width: none;
}
#code-input::-webkit-scrollbar { display: none; }

/* preview side */
.preview-panel {
    width: 50%;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    min-width: 0;
}

.preview-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    height: 34px;
    padding: 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--dim);
    flex-shrink: 0;
}

.p-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s;
}
.p-dot.on { background: var(--green); animation: blink 1.2s ease-in-out infinite; }

@keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.35; }
}

.canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
}

#game-canvas {
    background: #080a12;
    border: 1px solid var(--border);
    border-radius: 6px;
    max-width: 100%;
    max-height: 100%;
    display: block;
}

.console-panel {
    height: 130px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
}

.console-bar {
    padding: 5px 14px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}

.console-out {
    flex: 1;
    padding: 8px 14px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.7;
}
.cl { }
.cl.err  { color: var(--red); }
.cl.ok   { color: var(--green); }
.cl.info { color: var(--cyan); }

/* ─── AUTOCOMPLETE ─── */
#autocomplete {
    position: absolute;
    z-index: 100;
    background: #1a1c2e;
    border: 1px solid var(--purple);
    border-radius: 7px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 16px rgba(203,166,247,0.1);
    display: none;
    min-width: 180px;
}
.ac-item {
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.1s;
}
.ac-item:hover, .ac-item.selected {
    background: rgba(203,166,247,0.12);
}
.ac-icon { font-size: 15px; width: 20px; text-align: center; }
.ac-name { color: var(--cyan); }
.ac-desc { color: var(--dim); font-size: 11px; margin-left: auto; }
</style>
</head>
<body>

<!-- TERMINAL -->
<div id="screen-terminal">
  <div class="terminal-window">
    <div class="t-titlebar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <span class="t-titlebar-label">codelab — terminal</span>
    </div>
    <div class="t-body">
      <div class="t-logo">CODELAB</div>
      <div class="t-sub">// your game studio</div>

      <div class="files-label">projects</div>
      <div id="file-list"></div>

      <div class="prompt-row">
        <span class="prompt-sym">›</span>
        <input id="t-input" type="text" placeholder="type a name to open or create..." autocomplete="off" spellcheck="false">
      </div>
      <div class="prompt-hint">press enter · new names create a project</div>
    </div>
  </div>
</div>

<!-- EDITOR -->
<div id="screen-editor">
  <div class="e-header">
    <span class="e-logo">CODELAB</span>
    <span class="e-filename" id="e-filename">untitled.cl</span>
    <span class="save-status saved" id="save-status">✓ saved</span>
    <div class="h-spacer"></div>
    <button class="run-btn" id="run-btn">▶ RUN</button>
    <button class="exit-btn" id="exit-btn">EXIT</button>
  </div>

  <div class="e-main">
    <!-- Code panel -->
    <div class="code-panel">
      <div class="code-tab-bar">
        <div class="code-tab active" id="tab-name">main.cl</div>
      </div>
      <div class="code-wrap">
        <div class="line-nums" id="line-nums">1</div>
        <div class="textarea-wrap">
          <pre id="code-hl"></pre>
          <textarea id="code-input" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
          <div id="autocomplete"></div>
        </div>
      </div>
    </div>

    <!-- Preview panel -->
    <div class="preview-panel">
      <div class="preview-bar">
        <div class="p-dot" id="p-dot"></div>
        <span id="p-label">preview</span>
      </div>
      <div class="canvas-wrap">
        <canvas id="game-canvas" width="400" height="300"></canvas>
      </div>
      <div class="console-panel">
        <div class="console-bar">console</div>
        <div class="console-out" id="console-out"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── state ─────────────────────────────────────────
const STORE = 'codelab_v1';
let files = {};
let current = null;
let saveTimer = null;
let gameState = {};

// ── game types ────────────────────────────────────
const GAME_TYPES = {
    racing: {
        icon: '🏎️', desc: 'speed & tracks',
        draw(ctx, w, h) {
            // sky
            const sky = ctx.createLinearGradient(0, 0, 0, h * 0.45);
            sky.addColorStop(0, '#1a0a00');
            sky.addColorStop(1, '#ff6a00');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, w, h * 0.45);
            // road perspective
            const road = ctx.createLinearGradient(0, h * 0.45, 0, h);
            road.addColorStop(0, '#2a2a2a');
            road.addColorStop(1, '#111');
            ctx.fillStyle = road;
            ctx.fillRect(0, h * 0.45, w, h);
            // horizon glow
            ctx.fillStyle = 'rgba(255,120,0,0.18)';
            ctx.fillRect(0, h * 0.42, w, 14);
            // dashed center line
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.setLineDash([24, 20]);
            ctx.beginPath();
            ctx.moveTo(w / 2, h * 0.5);
            ctx.lineTo(w / 2, h);
            ctx.stroke();
            ctx.setLineDash([]);
            // lane lines
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 1.5;
            [0.3, 0.7].forEach(f => {
                const x0 = w * f, x1 = w * (0.5 + (f - 0.5) * 3);
                ctx.beginPath(); ctx.moveTo(x0, h); ctx.lineTo(x1, h * 0.5); ctx.stroke();
            });
        }
    },
    fighting: {
        icon: '⚔️', desc: 'arena combat',
        draw(ctx, w, h) {
            // dark arena bg
            ctx.fillStyle = '#0d0008';
            ctx.fillRect(0, 0, w, h);
            // floor
            const floor = ctx.createLinearGradient(0, h * 0.7, 0, h);
            floor.addColorStop(0, '#1a0020');
            floor.addColorStop(1, '#0d0008');
            ctx.fillStyle = floor;
            ctx.fillRect(0, h * 0.7, w, h);
            // floor line
            ctx.strokeStyle = 'rgba(200,0,255,0.35)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, h * 0.72); ctx.lineTo(w, h * 0.72); ctx.stroke();
            // left spotlight
            ctx.save();
            const ls = ctx.createRadialGradient(0, 0, 0, 0, 0, w * 0.7);
            ls.addColorStop(0, 'rgba(180,0,255,0.18)');
            ls.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = ls;
            ctx.fillRect(0, 0, w, h);
            ctx.restore();
            // right spotlight
            ctx.save();
            const rs = ctx.createRadialGradient(w, 0, 0, w, 0, w * 0.7);
            rs.addColorStop(0, 'rgba(255,0,80,0.15)');
            rs.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = rs;
            ctx.fillRect(0, 0, w, h);
            ctx.restore();
            // center vignette
            ctx.save();
            const vig = ctx.createRadialGradient(w/2, h/2, h*0.1, w/2, h/2, w*0.7);
            vig.addColorStop(0, 'rgba(0,0,0,0)');
            vig.addColorStop(1, 'rgba(0,0,0,0.5)');
            ctx.fillStyle = vig;
            ctx.fillRect(0, 0, w, h);
            ctx.restore();
        }
    },
    platformer: {
        icon: '🍄', desc: 'jump & run',
        draw(ctx, w, h) {
            // sky
            const sky = ctx.createLinearGradient(0, 0, 0, h * 0.75);
            sky.addColorStop(0, '#1a3a6e');
            sky.addColorStop(1, '#4a90d9');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, w, h * 0.75);
            // clouds
            ctx.fillStyle = 'rgba(255,255,255,0.55)';
            [[80,60,50],[200,45,35],[310,70,45]].forEach(([cx,cy,r]) => {
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx+r*0.6, cy+5, r*0.7, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx-r*0.5, cy+8, r*0.6, 0, Math.PI*2); ctx.fill();
            });
            // ground
            ctx.fillStyle = '#2d5a1b';
            ctx.fillRect(0, h * 0.75, w, h * 0.08);
            ctx.fillStyle = '#4a8a2a';
            ctx.fillRect(0, h * 0.75, w, 6);
            // dirt
            ctx.fillStyle = '#5c3d1a';
            ctx.fillRect(0, h * 0.75 + h * 0.08, w, h);
        }
    },
    creating: {
        icon: '🔧', desc: 'build & design',
        draw(ctx, w, h) {
            // blueprint bg
            ctx.fillStyle = '#0a1628';
            ctx.fillRect(0, 0, w, h);
            // grid
            ctx.strokeStyle = 'rgba(80,160,255,0.15)';
            ctx.lineWidth = 1;
            const gs = 20;
            for (let x = 0; x <= w; x += gs) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
            }
            for (let y = 0; y <= h; y += gs) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
            }
            // major grid lines
            ctx.strokeStyle = 'rgba(80,160,255,0.3)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= w; x += gs * 5) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
            }
            for (let y = 0; y <= h; y += gs * 5) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
            }
            // corner marks
            ctx.strokeStyle = 'rgba(80,160,255,0.5)';
            ctx.lineWidth = 1.5;
            [[10,10],[w-10,10],[10,h-10],[w-10,h-10]].forEach(([x,y]) => {
                ctx.beginPath(); ctx.moveTo(x-6,y); ctx.lineTo(x+6,y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x,y-6); ctx.lineTo(x,y+6); ctx.stroke();
            });
        }
    },
    exploration: {
        icon: '🧭', desc: 'open world',
        draw(ctx, w, h) {
            // sky with fog
            const sky = ctx.createLinearGradient(0, 0, 0, h * 0.5);
            sky.addColorStop(0, '#1a2e1a');
            sky.addColorStop(1, '#4a7a3a');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, w, h * 0.5);
            // distant hills
            ctx.fillStyle = '#2a4a20';
            ctx.beginPath();
            ctx.moveTo(0, h * 0.52);
            [0,0.15,0.28,0.4,0.55,0.68,0.8,0.9,1].forEach((fx, i, arr) => {
                const fy = i % 2 === 0 ? 0.38 : 0.48;
                ctx.lineTo(fx * w, fy * h);
            });
            ctx.lineTo(w, h * 0.52); ctx.closePath(); ctx.fill();
            // ground
            const ground = ctx.createLinearGradient(0, h * 0.5, 0, h);
            ground.addColorStop(0, '#3a6a28');
            ground.addColorStop(1, '#1e3a10');
            ctx.fillStyle = ground;
            ctx.fillRect(0, h * 0.5, w, h);
            // fog layer
            const fog = ctx.createLinearGradient(0, h * 0.44, 0, h * 0.58);
            fog.addColorStop(0, 'rgba(180,220,160,0)');
            fog.addColorStop(0.5, 'rgba(180,220,160,0.12)');
            fog.addColorStop(1, 'rgba(180,220,160,0)');
            ctx.fillStyle = fog; ctx.fillRect(0, h * 0.44, w, h * 0.14);
            // trees
            [[50,h*0.5],[130,h*0.48],[250,h*0.5],[340,h*0.47],[380,h*0.5]].forEach(([tx,ty]) => {
                ctx.fillStyle = '#1a3a10';
                ctx.beginPath();
                ctx.moveTo(tx, ty - 40);
                ctx.lineTo(tx - 16, ty);
                ctx.lineTo(tx + 16, ty);
                ctx.closePath(); ctx.fill();
                ctx.beginPath();
                ctx.moveTo(tx, ty - 60);
                ctx.lineTo(tx - 12, ty - 24);
                ctx.lineTo(tx + 12, ty - 24);
                ctx.closePath(); ctx.fill();
            });
        }
    }
};

// ── autocomplete ──────────────────────────────────
const AC_TRIGGER = null; // will be defined when new autocomplete triggers are added
let acIndex = 0;
let acVisible = false;
let acMatches = [];

function checkAutocomplete() {
    hideAC();
}

function showAC(lineIdx) {
    const el = document.getElementById('autocomplete');
    const lineH = 13 * 1.65;
    const top = 16 + (lineIdx + 1) * lineH - codeInput.scrollTop;
    const left = 12;
    el.style.top = top + 'px';
    el.style.left = (48 + left) + 'px';
    el.innerHTML = acMatches.map((t, i) => {
        const g = GAME_TYPES[t];
        return `<div class="ac-item${i === acIndex ? ' selected' : ''}" data-i="${i}" onmousedown="acPick(${i})">
            <span class="ac-icon">${g.icon}</span>
            <span class="ac-name">${t}</span>
            <span class="ac-desc">${g.desc}</span>
        </div>`;
    }).join('');
    el.style.display = 'block';
    acVisible = true;
}

function hideAC() {
    document.getElementById('autocomplete').style.display = 'none';
    acVisible = false;
    acMatches = [];
}

function acPick(i) {
    const type = acMatches[i];
    const lines = codeInput.value.split('\n');
    const pos = codeInput.selectionStart;
    let count = 0, lineIdx = 0;
    for (let li = 0; li < lines.length; li++) {
        if (count + lines[li].length >= pos) { lineIdx = li; break; }
        count += lines[li].length + 1;
    }
    // replace current line up through the open paren with completed version
    lines[lineIdx] = lines[lineIdx].replace(AC_TRIGGER, `<dev> import.(${type})`);
    codeInput.value = lines.join('\n');
    // place cursor after closing paren
    const newPos = lines.slice(0, lineIdx).join('\n').length + (lineIdx > 0 ? 1 : 0) + lines[lineIdx].length;
    codeInput.selectionStart = codeInput.selectionEnd = newPos;
    hideAC();
    syncHighlight();
    syncLineNums();
    triggerSave();
}

// ── persistence ──────────────────────────────────
function loadFiles() {
    try { files = JSON.parse(localStorage.getItem(STORE) || '{}'); }
    catch(e) { files = {}; }
}
function saveFiles() {
    localStorage.setItem(STORE, JSON.stringify(files));
}

// ── terminal ─────────────────────────────────────
function renderList() {
    const el = document.getElementById('file-list');
    const names = Object.keys(files);
    if (!names.length) {
        el.innerHTML = '<div class="no-files">no projects yet — type a name to start</div>';
        return;
    }
    el.innerHTML = names.map(n => {
        const lines = (files[n].code || '').split('\n').length;
        return `<div class="file-entry" onclick="openEditor('${n}')">
            <span class="file-icon">◈</span>
            <span class="file-name">${n}.cl</span>
            <span class="file-meta">${lines} line${lines !== 1 ? 's' : ''}</span>
        </div>`;
    }).join('');
}

function showTerminal() {
    document.getElementById('screen-terminal').style.display = 'flex';
    document.getElementById('screen-editor').style.display = 'none';
    stopGame();
    renderList();
    setTimeout(() => document.getElementById('t-input').focus(), 50);
}

document.getElementById('t-input').addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    const name = this.value.trim().replace(/[^a-zA-Z0-9_\-]/g, '');
    if (!name) return;
    this.value = '';
    openEditor(name);
});

// ── editor ───────────────────────────────────────
function openEditor(name) {
    if (!files[name]) files[name] = { code: '', created: Date.now() };
    current = name;

    document.getElementById('screen-terminal').style.display = 'none';
    document.getElementById('screen-editor').style.display = 'flex';

    document.getElementById('e-filename').textContent = name + '.cl';
    document.getElementById('tab-name').textContent = name + '.cl';

    const inp = document.getElementById('code-input');
    inp.value = files[name].code || '';
    syncHighlight();
    syncLineNums();
    setSave('saved');
    clearConsole();

    setTimeout(() => inp.focus(), 50);
}

document.getElementById('exit-btn').addEventListener('click', () => {
    doSave();
    showTerminal();
});

// ── code editing ─────────────────────────────────
const codeInput = document.getElementById('code-input');
const codeHl    = document.getElementById('code-hl');

codeInput.addEventListener('input', () => {
    syncHighlight();
    syncLineNums();
    triggerSave();
    checkAutocomplete();
});

codeInput.addEventListener('scroll', () => {
    codeHl.scrollTop = codeInput.scrollTop;
    document.getElementById('line-nums').scrollTop = codeInput.scrollTop;
});

codeInput.addEventListener('keydown', e => {
    if (acVisible) {
        if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = (acIndex + 1) % acMatches.length; showAC(currentLineIdx()); return; }
        if (e.key === 'ArrowUp')   { e.preventDefault(); acIndex = (acIndex - 1 + acMatches.length) % acMatches.length; showAC(currentLineIdx()); return; }
        if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); acPick(acIndex); return; }
        if (e.key === 'Escape') { hideAC(); return; }
    }
    if (e.key === 'Tab') {
        e.preventDefault();
        const s = codeInput.selectionStart, end = codeInput.selectionEnd;
        codeInput.value = codeInput.value.slice(0, s) + '  ' + codeInput.value.slice(end);
        codeInput.selectionStart = codeInput.selectionEnd = s + 2;
        syncHighlight();
        triggerSave();
    }
});

function currentLineIdx() {
    const lines = codeInput.value.split('\n');
    const pos = codeInput.selectionStart;
    let count = 0;
    for (let i = 0; i < lines.length; i++) {
        if (count + lines[i].length >= pos) return i;
        count += lines[i].length + 1;
    }
    return lines.length - 1;
}

function syncLineNums() {
    const count = Math.max(codeInput.value.split('\n').length, 1);
    document.getElementById('line-nums').innerHTML =
        Array.from({length: count}, (_, i) => i + 1).join('<br>');
}

function syncHighlight() {
    codeHl.innerHTML = codeInput.value.split('\n').map(hl).join('\n') + '\n';
}

function hl(line) {
    if (!line.trim()) return escHtml(line);

    // comment
    if (line.trim().startsWith('//')) {
        return `<span style="color:#6c7086;font-style:italic">${escHtml(line)}</span>`;
    }

    // set.create newvariable ("name")
    const createM = line.match(/^(\s*)set\.create\s+newvariable\s*\(\s*"([^"]*)"\s*\)$/);
    if (createM) {
        const [, indent, name] = createM;
        return escHtml(indent)
            + `<span style="color:#89b4fa">set</span>`
            + `<span style="color:#6c7086">.</span>`
            + `<span style="color:#f9e2af">create</span>`
            + ` <span style="color:#cba6f7">newvariable</span>`
            + `<span style="color:#cba6f7"> (</span>`
            + `<span style="color:#fab387">"${escHtml(name)}"</span>`
            + `<span style="color:#cba6f7">)</span>`;
    }

    // import.spawnsprite. spawnsprite() activate:
    if (line.trim().match(/^import\.spawnsprite\.\s+spawnsprite\(\)\s+activate:$/)) {
        return escHtml(line.match(/^(\s*)/)[1])
            + `<span style="color:#cba6f7;font-weight:bold">import</span>`
            + `<span style="color:#6c7086">.</span>`
            + `<span style="color:#f9e2af">spawnsprite</span>`
            + `<span style="color:#6c7086">.</span>`
            + ` <span style="color:#f9e2af">spawnsprite</span>`
            + `<span style="color:#cba6f7">()</span>`
            + ` <span style="color:#a6e3a1;font-weight:bold">activate</span>`
            + `<span style="color:#6c7086">:</span>`;
    }

    // activate:
    if (line.trim() === 'activate:') {
        return escHtml(line.match(/^(\s*)/)[1])
            + `<span style="color:#a6e3a1;font-weight:bold">activate</span>`
            + `<span style="color:#6c7086">:</span>`;
    }

    // spawnsprite(name), name()
    const spawnM = line.match(/^(\s*)spawnsprite\s*\(\s*(\w+)\s*\)\s*,\s*(\w+)\s*\(\)$/);
    if (spawnM) {
        const [, indent, spriteName, typeName] = spawnM;
        return escHtml(indent)
            + `<span style="color:#f9e2af">spawnsprite</span>`
            + `<span style="color:#cba6f7">(</span>`
            + `<span style="color:#89dceb">${escHtml(spriteName)}</span>`
            + `<span style="color:#cba6f7">)</span>`
            + `<span style="color:#6c7086">, </span>`
            + `<span style="color:#89dceb">${escHtml(typeName)}</span>`
            + `<span style="color:#cba6f7">()</span>`;
    }

    // on <event> block header
    const onM = line.match(/^(\s*)(on)\s+(\w+)\s*$/);
    if (onM) {
        const [, indent, kw, event] = onM;
        return escHtml(indent)
            + `<span style="color:#cba6f7;font-weight:bold">${kw}</span>`
            + ` <span style="color:#f9e2af">${escHtml(event)}</span>`;
    }

    // object.method(args)
    const m = line.match(/^(\s*)(\w+)(\.(\w+))?\(([^)]*)\)\s*$/);
    if (m) {
        const [, indent, obj,, method, argsRaw] = m;
        const i  = escHtml(indent);
        const o  = `<span style="color:#89b4fa">${escHtml(obj)}</span>`;
        const d  = method ? `<span style="color:#6c7086">.</span>` : '';
        const fn = method ? `<span style="color:#f9e2af">${escHtml(method)}</span>` : '';
        const lp = `<span style="color:#cba6f7">(</span>`;
        const rp = `<span style="color:#cba6f7">)</span>`;
        const a  = colorArgs(argsRaw);
        return i + o + d + fn + lp + a + rp;
    }

    return `<span style="color:#cdd6f4">${escHtml(line)}</span>`;
}

function colorArgs(raw) {
    if (!raw.trim()) return '';
    return raw.split(',').map((a, i, arr) => {
        const t = a.trim();
        let colored;
        if ((t.startsWith('"') && t.endsWith('"')) || (t.startsWith("'") && t.endsWith("'"))) {
            colored = `<span style="color:#fab387">${escHtml(t)}</span>`;
        } else if (t !== '' && !isNaN(t)) {
            colored = `<span style="color:#a6e3a1">${escHtml(t)}</span>`;
        } else {
            colored = `<span style="color:#89dceb">${escHtml(t)}</span>`;
        }
        return colored + (i < arr.length - 1 ? '<span style="color:#6c7086">, </span>' : '');
    }).join('');
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── auto-save ────────────────────────────────────
function triggerSave() {
    setSave('saving');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => { doSave(); setSave('saved'); }, 900);
}

function doSave() {
    if (!current) return;
    files[current] = files[current] || {};
    files[current].code = codeInput.value;
    files[current].updated = Date.now();
    saveFiles();
}

function setSave(state) {
    const el = document.getElementById('save-status');
    el.className = 'save-status ' + state;
    el.textContent = state === 'saved' ? '✓ saved' : '● saving...';
}

// ── run / interpreter ────────────────────────────
document.getElementById('run-btn').addEventListener('click', runCode);

function runCode() {
    stopGame();
    clearConsole();

    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    gameState = {
        canvas, ctx,
        sprites: {},
        variables: {},
        type: null
    };

    log('Running...', 'info');

    const rawLines = codeInput.value.split('\n');
    let ok = true;
    let i = 0;

    while (i < rawLines.length && ok) {
        const raw = rawLines[i];
        const t = raw.trim();
        const n = i + 1;
        i++;

        if (!t || t.startsWith('//')) continue;

        // skip on start / on <event> headers (not used in new system)
        if (t.match(/^on\s+\w+$/)) continue;

        // set.create newvariable ("name") or set.create newvariable (name)
        const createM = t.match(/^set\.create\s+newvariable\s*\(\s*"?([^")\s]+)"?\s*\)$/);
        if (createM) {
            gameState.variables[createM[1]] = true;
            log(`variable "${createM[1]}" declared`, 'info');
            continue;
        }

        // activate: or import.spawnsprite. spawnsprite() activate:
        const isActivate = t === 'activate:' || t.match(/^import\.spawnsprite\.\s+spawnsprite\(\)\s+activate:$/);
        if (isActivate) {
            while (i < rawLines.length) {
                const braw = rawLines[i];
                const bt = braw.trim();
                if (!bt || bt.startsWith('//')) { i++; continue; }
                // stop at next top-level statement
                if (bt.match(/^set\./) || bt.match(/^on\s+\w+$/) || bt === 'activate:' || bt.match(/^import\./)) break;
                i++;
                if (!execActivateLine(bt, i)) { ok = false; break; }
            }
            continue;
        }

        log(`line ${n}: unexpected — "${t}"`, 'err');
        ok = false;
    }

    if (ok) {
        renderGame();
        log('Done.', 'ok');
        setRunning(true);
    } else {
        setRunning(false);
    }
}

function execActivateLine(line, n) {
    // spawnsprite(name), name()
    const m = line.match(/^spawnsprite\s*\(\s*(\w+)\s*\)\s*,\s*(\w+)\s*\(\)$/);
    if (m) {
        const [, spriteName, typeName] = m;
        const cv = gameState.canvas;
        const defaults = {
            road:   { x:0, y:0, w:cv.width, h:cv.height },
            car:    { x:cv.width/2-18, y:cv.height/2-30, w:36, h:60 },
            player: { x:cv.width/2-18, y:cv.height/2-24, w:36, h:52 },
            enemy:  { x:cv.width/2-22, y:cv.height/2-22, w:44, h:44 },
            tree:   { x:cv.width/2-22, y:cv.height/2-28, w:44, h:56 },
            coin:   { x:cv.width/2-14, y:cv.height/2-14, w:28, h:28 },
        };
        const d = defaults[typeName] || { x:cv.width/2-20, y:cv.height/2-20, w:40, h:40 };
        gameState.sprites[spriteName] = {
            ...d,
            color: spriteColor(typeName),
            typeName,
            visible: true
        };
        log(`spawned "${spriteName}"`, 'info');
        return true;
    }
    log(`line ${n}: unrecognized — "${line}"`, 'err');
    return false;
}

function spriteColor(typeName) {
    const palette = {
        road: '#888a8c', car: '#f5a623', player: '#89b4fa',
        enemy: '#f38ba8', tree: '#4a8a2a', coin: '#f9e2af'
    };
    return palette[typeName] || '#cba6f7';
}

function renderGame() {
    const { ctx, canvas, sprites, type } = gameState;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // draw themed background or default grid
    const theme = type && GAME_TYPES[type];
    if (theme) {
        theme.draw(ctx, canvas.width, canvas.height);
    } else {
        ctx.strokeStyle = 'rgba(255,255,255,0.025)';
        ctx.lineWidth = 1;
        for (let x = 0; x <= canvas.width; x += 20) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += 20) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
    }

    // draw background sprites first, then foreground
    const bgTypes = ['road'];
    const sorted = Object.entries(sprites).sort(([,a],[,b]) =>
        (bgTypes.includes(a.typeName)?0:1) - (bgTypes.includes(b.typeName)?0:1));

    sorted.forEach(([name, s]) => {
        if (!s.visible) return;
        ctx.save();
        drawSprite(ctx, canvas, name, s);
        ctx.restore();
    });
}

function drawSprite(ctx, canvas, name, s) {
    const cx = s.x + s.w / 2, cy = s.y + s.h / 2;

    switch (s.typeName) {
        case 'road': {
            // full-canvas road
            ctx.fillStyle = '#2a2a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // shoulders
            ctx.fillStyle = '#1e3a10';
            ctx.fillRect(0, 0, canvas.width * 0.12, canvas.height);
            ctx.fillRect(canvas.width * 0.88, 0, canvas.width * 0.12, canvas.height);
            // edge lines
            ctx.strokeStyle = '#e8d44d';
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(canvas.width*0.12,0); ctx.lineTo(canvas.width*0.12,canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(canvas.width*0.88,0); ctx.lineTo(canvas.width*0.88,canvas.height); ctx.stroke();
            // center dashes
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2.5;
            ctx.setLineDash([28, 20]);
            ctx.beginPath(); ctx.moveTo(canvas.width/2,0); ctx.lineTo(canvas.width/2,canvas.height); ctx.stroke();
            ctx.setLineDash([]);
            // lane dashes
            ctx.strokeStyle = 'rgba(255,255,255,0.35)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([20, 24]);
            [0.36, 0.64].forEach(f => {
                ctx.beginPath(); ctx.moveTo(canvas.width*f,0); ctx.lineTo(canvas.width*f,canvas.height); ctx.stroke();
            });
            ctx.setLineDash([]);
            break;
        }
        case 'car': {
            const w = s.w, h = s.h;
            ctx.translate(cx, cy);
            // shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath(); ctx.ellipse(2, 4, w*0.42, h*0.22, 0, 0, Math.PI*2); ctx.fill();
            // body
            ctx.fillStyle = s.color || '#e84040';
            roundRect(ctx, -w/2, -h/2, w, h, 6); ctx.fill();
            // windshield
            ctx.fillStyle = 'rgba(160,220,255,0.7)';
            roundRect(ctx, -w*0.32, -h*0.42, w*0.64, h*0.28, 3); ctx.fill();
            // rear window
            ctx.fillStyle = 'rgba(160,220,255,0.5)';
            roundRect(ctx, -w*0.28, h*0.16, w*0.56, h*0.2, 3); ctx.fill();
            // wheels
            ctx.fillStyle = '#111';
            [[-w*0.44,-h*0.34],[w*0.44,-h*0.34],[-w*0.44,h*0.3],[w*0.44,h*0.3]].forEach(([wx,wy]) => {
                roundRect(ctx, wx-5, wy-7, 10, 14, 3); ctx.fill();
            });
            // headlights
            ctx.fillStyle = '#fffde7';
            ctx.shadowColor = '#fffde7'; ctx.shadowBlur = 8;
            [[-w*0.22,-h*0.47],[w*0.22,-h*0.47]].forEach(([lx,ly]) => {
                roundRect(ctx, lx-6, ly, 12, 5, 2); ctx.fill();
            });
            ctx.shadowBlur = 0;
            break;
        }
        case 'player': {
            ctx.translate(cx, cy);
            const pw = s.w, ph = s.h;
            // shadow
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.beginPath(); ctx.ellipse(1, ph*0.48, pw*0.28, 5, 0, 0, Math.PI*2); ctx.fill();
            // body
            ctx.fillStyle = '#4a90d9';
            roundRect(ctx, -pw*0.28, -ph*0.1, pw*0.56, ph*0.45, 4); ctx.fill();
            // legs
            ctx.fillStyle = '#2a5080';
            roundRect(ctx, -pw*0.26, ph*0.3, pw*0.22, ph*0.22, 3); ctx.fill();
            roundRect(ctx, pw*0.04, ph*0.3, pw*0.22, ph*0.22, 3); ctx.fill();
            // arms
            ctx.fillStyle = '#4a90d9';
            roundRect(ctx, -pw*0.48, -ph*0.08, pw*0.22, ph*0.32, 3); ctx.fill();
            roundRect(ctx, pw*0.26, -ph*0.08, pw*0.22, ph*0.32, 3); ctx.fill();
            // head
            ctx.fillStyle = '#f5c5a0';
            ctx.beginPath(); ctx.arc(0, -ph*0.28, pw*0.26, 0, Math.PI*2); ctx.fill();
            // eyes
            ctx.fillStyle = '#222';
            ctx.beginPath(); ctx.arc(-pw*0.09, -ph*0.3, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(pw*0.09, -ph*0.3, 2.5, 0, Math.PI*2); ctx.fill();
            break;
        }
        case 'enemy': {
            ctx.translate(cx, cy);
            const ew = s.w, eh = s.h;
            // glow
            ctx.shadowColor = '#ff2040'; ctx.shadowBlur = 16;
            // body
            ctx.fillStyle = '#c0102a';
            roundRect(ctx, -ew*0.38, -eh*0.38, ew*0.76, eh*0.76, 5); ctx.fill();
            ctx.shadowBlur = 0;
            // horns
            ctx.fillStyle = '#880020';
            [[-ew*0.2,-eh*0.38],[ew*0.2,-eh*0.38]].forEach(([hx,hy]) => {
                ctx.beginPath(); ctx.moveTo(hx-6,hy); ctx.lineTo(hx,hy-14); ctx.lineTo(hx+6,hy); ctx.closePath(); ctx.fill();
            });
            // eyes
            ctx.fillStyle = '#ff4060';
            ctx.shadowColor = '#ff4060'; ctx.shadowBlur = 6;
            ctx.beginPath(); ctx.arc(-ew*0.13,-eh*0.06,4,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(ew*0.13,-eh*0.06,4,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            // mouth
            ctx.strokeStyle = '#ff2040'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, eh*0.1, ew*0.16, 0.2, Math.PI-0.2); ctx.stroke();
            break;
        }
        case 'tree': {
            ctx.translate(cx, cy);
            const tw = s.w, th = s.h;
            // trunk
            ctx.fillStyle = '#5c3d1a';
            roundRect(ctx, -tw*0.12, th*0.1, tw*0.24, th*0.4, 2); ctx.fill();
            // canopy layers
            [[0,-th*0.46,tw*0.46,'#2d6e1a'],[0,-th*0.28,tw*0.4,'#3a8a22'],[0,-th*0.1,tw*0.5,'#4aa82a']].forEach(([cx2,cy2,r,col]) => {
                ctx.fillStyle = col;
                ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 4;
                ctx.beginPath(); ctx.arc(cx2, cy2, r, 0, Math.PI*2); ctx.fill();
            });
            ctx.shadowBlur = 0;
            break;
        }
        case 'coin': {
            ctx.translate(cx, cy);
            const r = Math.min(s.w, s.h) / 2 - 2;
            // glow
            ctx.shadowColor = '#f9c820'; ctx.shadowBlur = 14;
            // outer ring
            ctx.fillStyle = '#c8860a';
            ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
            // face
            ctx.fillStyle = '#f9c820';
            ctx.beginPath(); ctx.arc(0, 0, r*0.82, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            // shine
            ctx.fillStyle = 'rgba(255,255,255,0.45)';
            ctx.beginPath(); ctx.ellipse(-r*0.22, -r*0.3, r*0.28, r*0.16, -0.5, 0, Math.PI*2); ctx.fill();
            break;
        }
        default: {
            ctx.translate(cx, cy);
            ctx.shadowColor = s.color; ctx.shadowBlur = 12;
            ctx.fillStyle = s.color;
            roundRect(ctx, -s.w/2, -s.h/2, s.w, s.h, 5); ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    // name label (no transform active)
    ctx.setTransform(1,0,0,1,0,0);
    if (s.typeName !== 'road') {
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = '9px Courier New';
        ctx.fillText(name, s.x, s.y - 5);
    }
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
}

function stopGame() {
    setRunning(false);
    const c = document.getElementById('game-canvas');
    c.getContext('2d').clearRect(0, 0, c.width, c.height);
}

function setRunning(on) {
    document.getElementById('p-dot').className = 'p-dot' + (on ? ' on' : '');
    document.getElementById('p-label').textContent = on ? 'running' : 'preview';
}

// ── console ──────────────────────────────────────
function log(msg, type) {
    const out = document.getElementById('console-out');
    const div = document.createElement('div');
    div.className = 'cl' + (type ? ' ' + type : '');
    const prefix = type === 'err' ? '✗ ' : type === 'ok' ? '✓ ' : '  ';
    div.textContent = prefix + msg;
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
}

function clearConsole() {
    document.getElementById('console-out').innerHTML = '';
}

// ── init ─────────────────────────────────────────
loadFiles();
showTerminal();
</script>
