<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monster Escape</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8f0f8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    overflow: hidden;
  }
  #game-container { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #title {
    font-size: 2.2rem; color: #fff;
    text-shadow: 3px 3px 0 #2a6030, 0 0 20px rgba(80,200,80,0.4);
    letter-spacing: 3px;
  }
  #hud {
    display: flex; gap: 0;
    background: rgba(255,255,255,0.9); border-radius: 40px; padding: 0;
    font-size: 1rem; color: #3a5a3a; font-weight: bold;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
    border: 2px solid rgba(255,255,255,0.6); overflow: hidden;
  }
  .hud-item { display: flex; flex-direction: column; align-items: center; padding: 8px 22px; gap: 2px; }
  .hud-item + .hud-item { border-left: 1px solid #ddd; }
  .hud-label { font-size: 0.65rem; color: #999; text-transform: uppercase; letter-spacing: 1.5px; }
  .hud-value { font-size: 1.15rem; color: #2a5a2a; }
  #wrapper {
    position: relative; border-radius: 12px; overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 3px #3a7a3a, 0 0 0 6px rgba(255,255,255,0.5), 0 0 0 8px #3a7a3a;
  }
  #canvas { display: block; }
  #overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(230,248,230,0.93); backdrop-filter: blur(3px);
  }
  .overlay-title { font-size: 2.8rem; color: #2a6030; text-shadow: 3px 3px 0 #a0d0a0; margin-bottom: 4px; }
  .overlay-sub { font-size: 1rem; color: #5a8a5a; margin-bottom: 16px; }
  .overlay-box {
    background: rgba(255,255,255,0.75); border-radius: 14px; padding: 14px 26px;
    margin-bottom: 22px; color: #4a6a4a; line-height: 1.9; font-size: 0.92rem;
    text-align: center; border: 1px solid rgba(100,180,100,0.3);
  }
  button {
    background: linear-gradient(160deg, #4a9a4a, #2a6a2a); color: white; border: none;
    padding: 13px 42px; font-size: 1.15rem; border-radius: 40px; cursor: pointer;
    font-family: inherit; font-weight: bold; letter-spacing: 1px;
    box-shadow: 0 5px 0 #1a4a1a, 0 6px 16px rgba(0,0,0,0.25); transition: all 0.12s;
  }
  button:hover { background: linear-gradient(160deg,#5aaa5a,#3a7a3a); transform: translateY(-2px); }
  button:active { transform: translateY(2px); box-shadow: 0 3px 0 #1a4a1a, 0 4px 10px rgba(0,0,0,0.2); }
</style>
</head>
<body>
<div id="game-container">
  <div id="title">Monster Escape</div>
  <div id="hud">
    <div class="hud-item"><span class="hud-label">Score</span><span class="hud-value" id="score">0</span></div>
    <div class="hud-item"><span class="hud-label">Best</span><span class="hud-value" id="highscore">0</span></div>
    <div class="hud-item"><span class="hud-label">Lives</span><span class="hud-value" id="lives">3</span></div>
    <div class="hud-item"><span class="hud-label">Level</span><span class="hud-value" id="level">1</span></div>
  </div>
  <div id="wrapper">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div class="overlay-title">Monster Escape</div>
      <div class="overlay-sub">Collect every dot to advance!</div>
      <div class="overlay-box">
        <b>Arrow Keys</b> or <b>WASD</b> to move<br>
        Orange pellet — monsters get scared<br>
        Purple diamond — speed boost<br>
        Snowflake — freeze all monsters
      </div>
      <button id="startBtn">Play</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const highscoreEl = document.getElementById('highscore');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');
const startBtn = document.getElementById('startBtn');

let highScore = parseInt(localStorage.getItem('monsterEscapeHigh') || '0');
highscoreEl.textContent = highScore;

const CELL = 30;
const MAP_COLS = 45, MAP_ROWS = 39;
const VIEW_W = 21 * CELL, VIEW_H = 19 * CELL;
canvas.width = VIEW_W;
canvas.height = VIEW_H;

// 0=open, 1=wall, 2=dot, 3=scared pellet, 4=speed pellet, 5=freeze pellet
const MONSTER_PALETTES = [
  ['#FF6B6B','#C0392B'],
  ['#C06BE8','#8E44AD'],
  ['#FF9B4A','#D35400'],
  ['#26C9B0','#1A8870'],
];

let WALL_MAP = null;

function buildBigMap() {
  const C=MAP_COLS, R=MAP_ROWS;
  const m=Array.from({length:R},()=>Array(C).fill(1));
  const hSet=new Set([2,3,10,11,18,19,26,27,34,35]);
  const vSet=new Set([2,3,10,11,18,19,26,27,34,35,42,43]);
  // Main corridor grid
  for(let r=1;r<R-1;r++) for(let c=1;c<C-1;c++)
    if(hSet.has(r)||vSet.has(c)) m[r][c]=2;
  // Extra connectors through wall blocks
  [
    [4,9,6,7],   [4,9,22,23],  [4,9,38,39],
    [6,7,4,9],   [6,7,20,27],  [6,7,36,43],
    [12,13,6,7], [12,13,38,39],
    [12,17,14,15],[12,17,30,31],
    [14,15,12,17],[14,15,28,33],
    [20,25,6,7], [20,25,38,39],
    [22,23,4,9], [22,23,36,41],
    [28,33,14,15],[28,33,22,23],[28,33,30,31],
    [30,31,12,17],[30,31,20,25],[30,31,28,33],[30,31,36,41],
  ].forEach(([r1,r2,c1,c2])=>{
    for(let r=r1;r<=r2;r++) for(let c=c1;c<=c2;c++) m[r][c]=2;
  });
  // Monster pen (rows 14-20, cols 20-24)
  for(let r=14;r<=20;r++) for(let c=20;c<=24;c++) {
    if(r===14||r===20||c===20||c===24) m[r][c]=1;
    else m[r][c]=0;
  }
  m[14][22]=0;           // pen exit
  m[12][22]=0; m[13][22]=0; // corridor to row 10-11
  // Scared pellets (orange star)
  m[2][2]=3;   m[2][43]=3;
  m[35][2]=3;  m[35][43]=3;
  m[10][10]=3; m[10][35]=3;
  m[26][10]=3; m[26][35]=3;
  // Speed pellets (purple diamond)
  m[2][19]=4;  m[2][27]=4;
  m[35][19]=4; m[35][27]=4;
  // Freeze pellets (snowflake)
  m[10][19]=5; m[10][27]=5;
  m[26][19]=5; m[26][27]=5;
  // Warp tunnels left/right
  m[18][0]=0; m[19][0]=0;
  m[18][C-1]=0; m[19][C-1]=0;
  return m;
}

// Camera
let camX=0, camY=0;
function updateCamera() {
  const tx=player.col*CELL-VIEW_W/2+CELL/2;
  const ty=player.row*CELL-VIEW_H/2+CELL/2;
  const cx=Math.max(0,Math.min(tx,MAP_COLS*CELL-VIEW_W));
  const cy=Math.max(0,Math.min(ty,MAP_ROWS*CELL-VIEW_H));
  if(Math.abs(cx-camX)>VIEW_W/2) camX=cx; else camX+=(cx-camX)*0.15;
  if(Math.abs(cy-camY)>VIEW_H/2) camY=cy; else camY+=(cy-camY)*0.15;
}

let map, player, monsters, score, lives, level, gameActive, animFrame;
let powerTimer=0, speedTimer=0, freezeTimer=0;
let tick=0, particles=[];
let flashTimer=0, flashColor='rgba(255,0,0,0.3)';
const POWER_DURATION=300;

function buildMap() {
  const base=buildBigMap();
  WALL_MAP=base.map(r=>[...r]);
  return base;
}
function countDots(m){return m.reduce((s,r)=>s+r.filter(c=>c===2||c===3||c===4||c===5).length,0);}

function initGame() {
  map=buildMap(); buildOffscreenCaches(); score=0; lives=3; level=1;
  particles=[]; tick=0; flashTimer=0;
  powerTimer=0; speedTimer=0; freezeTimer=0;
  updateHUD(); spawnEntities(); gameActive=true;
  camX=player.col*CELL-VIEW_W/2;
  camY=player.row*CELL-VIEW_H/2;
}

function spawnEntities() {
  player={col:22,row:34,dx:0,dy:0,nextDx:0,nextDy:0,moveTimer:0,mouthAngle:0.05,mouthDir:1};
  monsters=[
    {col:21,row:16,dx:-1,dy:0, moveTimer:0,idx:0,scared:false},
    {col:22,row:16,dx:0, dy:1, moveTimer:0,idx:1,scared:false},
    {col:23,row:16,dx:1, dy:0, moveTimer:0,idx:2,scared:false},
    {col:22,row:17,dx:0, dy:-1,moveTimer:0,idx:3,scared:false},
  ];
}

function playerSpeed(){const b=Math.max(4,7-level);return speedTimer>0?Math.max(2,b-2):b;}
function monsterSpeed(){return Math.max(5,9-level);}

function canMove(col,row){
  if(row<0||row>=MAP_ROWS) return false;
  const c=((col%MAP_COLS)+MAP_COLS)%MAP_COLS;
  return map[row][c]!==1;
}

function updatePlayer(){
  player.moveTimer++;
  if(player.moveTimer<playerSpeed()) return;
  player.moveTimer=0;
  const nc=((player.col+player.nextDx)%MAP_COLS+MAP_COLS)%MAP_COLS, nr=player.row+player.nextDy;
  if(canMove(nc,nr)){player.dx=player.nextDx;player.dy=player.nextDy;}
  const mc=((player.col+player.dx)%MAP_COLS+MAP_COLS)%MAP_COLS, mr=player.row+player.dy;
  if(canMove(mc,mr)){player.col=mc;player.row=mr;}
  const cell=map[player.row][player.col];
  if(cell===2){
    map[player.row][player.col]=0; score+=10; updateHUD();
    clearDotCell(player.col,player.row);
    addParticle(player.col,player.row,'+10','#FFD700');
  } else if(cell===3){
    map[player.row][player.col]=0; score+=50; updateHUD();
    powerTimer=POWER_DURATION; monsters.forEach(m=>m.scared=true);
    flashTimer=20; flashColor='rgba(255,220,0,0.35)';
    addParticle(player.col,player.row,'SCARED!','#FF8C00');
  } else if(cell===4){
    map[player.row][player.col]=0; score+=30; updateHUD();
    speedTimer=240;
    flashTimer=15; flashColor='rgba(160,80,255,0.35)';
    addParticle(player.col,player.row,'FAST!','#B044FF');
  } else if(cell===5){
    map[player.row][player.col]=0; score+=30; updateHUD();
    freezeTimer=240;
    flashTimer=15; flashColor='rgba(80,200,255,0.35)';
    addParticle(player.col,player.row,'FREEZE!','#44CCFF');
  }
}

function updateMonsters(){
  if(powerTimer>0){powerTimer--;if(powerTimer===0)monsters.forEach(m=>m.scared=false);}
  if(speedTimer>0) speedTimer--;
  if(freezeTimer>0) freezeTimer--;
  monsters.forEach(m=>{
    if(freezeTimer>0) return;
    m.moveTimer++;
    const spd=m.scared?monsterSpeed()+3:monsterSpeed();
    if(m.moveTimer<spd) return;
    m.moveTimer=0;
    const dirs=[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
    const opp={dx:-m.dx,dy:-m.dy};
    let opts=dirs.filter(d=>{
      if(d.dx===opp.dx&&d.dy===opp.dy) return false;
      const nc=((m.col+d.dx)%MAP_COLS+MAP_COLS)%MAP_COLS,nr=m.row+d.dy;
      return canMove(nc,nr);
    });
    if(!opts.length) opts=dirs.filter(d=>{
      const nc=((m.col+d.dx)%MAP_COLS+MAP_COLS)%MAP_COLS,nr=m.row+d.dy;
      return canMove(nc,nr);
    });
    let chosen;
    if(m.scared){
      chosen=opts.reduce((b,d)=>{const nc=((m.col+d.dx)%MAP_COLS+MAP_COLS)%MAP_COLS,nr=m.row+d.dy;const dist=Math.abs(nc-player.col)+Math.abs(nr-player.row);return dist>(b.dist??-1)?{d,dist}:b;},{}).d||opts[Math.floor(Math.random()*opts.length)];
    } else if(Math.random()<0.7){
      chosen=opts.reduce((b,d)=>{const nc=((m.col+d.dx)%MAP_COLS+MAP_COLS)%MAP_COLS,nr=m.row+d.dy;const dist=Math.abs(nc-player.col)+Math.abs(nr-player.row);return dist<(b.dist??Infinity)?{d,dist}:b;},{}).d||opts[Math.floor(Math.random()*opts.length)];
    } else {
      chosen=opts[Math.floor(Math.random()*opts.length)];
    }
    if(chosen){m.dx=chosen.dx;m.dy=chosen.dy;m.col=((m.col+chosen.dx)%MAP_COLS+MAP_COLS)%MAP_COLS;m.row=m.row+chosen.dy;}
  });
}

function checkCollisions(){
  monsters.forEach(m=>{
    if(m.col===player.col&&m.row===player.row){
      if(m.scared){
        m.col=22;m.row=16;m.scared=false;score+=200;updateHUD();
        addParticle(player.col,player.row,'+200','#FF6B00');
      } else {
        lives--;updateHUD();flashTimer=30;flashColor='rgba(255,40,40,0.45)';
        if(lives<=0) endGame(false); else spawnEntities();
      }
    }
  });
}

function checkWin(){
  if(countDots(map)===0){
    level++;updateHUD();map=buildMap();buildOffscreenCaches();spawnEntities();
    powerTimer=0;speedTimer=0;freezeTimer=0;
  }
}

function updateHUD(){
  scoreEl.textContent=score;
  livesEl.textContent=lives;
  levelEl.textContent=level;
  if(score>highScore){highScore=score;localStorage.setItem('monsterEscapeHigh',highScore);highscoreEl.textContent=highScore;}
}

function addParticle(col,row,text,color){
  particles.push({x:col*CELL+CELL/2,y:row*CELL+CELL/2,text,color,vy:-1.8,alpha:1,life:60});
}
function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.y+=p.vy;p.alpha=p.life/60;p.life--;});
}

// ---- Drawing ----
function isWall(c,r){
  if(r<0||r>=MAP_ROWS||c<0||c>=MAP_COLS) return true;
  return WALL_MAP&&WALL_MAP[r][c]===1;
}

// Pre-baked grass floor pattern (like tag game)
let floorPattern = null;

// Offscreen caches rebuilt once per level
let bgCanvas = null, dotCanvas = null, dotCtx_ = null;
let animatedPellets = [];

function buildOffscreenCaches() {
  const W = MAP_COLS*CELL, H = MAP_ROWS*CELL;
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = W; bgCanvas.height = H;
  const bctx = bgCanvas.getContext('2d');
  // Floor pattern for bctx
  const pc = document.createElement('canvas');
  pc.width = 60; pc.height = 60;
  const px = pc.getContext('2d');
  px.fillStyle='#7cc87a'; px.fillRect(0,0,60,60);
  px.fillStyle='#72c070'; px.fillRect(0,0,30,30); px.fillRect(30,30,30,30);
  px.fillStyle='rgba(255,255,255,0.06)';
  for(let i=0;i<12;i++){const dx=(i*13+3)%60,dy=(i*19+7)%60;px.fillRect(dx,dy,1,1);}
  px.strokeStyle='rgba(0,0,0,0.04)'; px.lineWidth=0.5;
  for(let i=0;i<60;i+=20){px.beginPath();px.moveTo(i,0);px.lineTo(i,60);px.stroke();px.beginPath();px.moveTo(0,i);px.lineTo(60,i);px.stroke();}
  const pat = bctx.createPattern(pc,'repeat');
  for(let r=0;r<MAP_ROWS;r++) for(let c=0;c<MAP_COLS;c++){
    const x=c*CELL,y=r*CELL;
    if(WALL_MAP[r][c]===1){
      const border=(c===0||r===0||c===MAP_COLS-1||r===MAP_ROWS-1);
      if(!border){bctx.fillStyle='rgba(0,0,0,0.32)';bctx.fillRect(x+3,y+3,CELL,CELL);}
      const wg=bctx.createLinearGradient(x,y,x,y+CELL);
      wg.addColorStop(0,'#c4a97d');wg.addColorStop(0.5,'#b09060');wg.addColorStop(1,'#9a7b50');
      bctx.fillStyle=wg; bctx.fillRect(x,y,CELL,CELL);
      const top=!isWall(c,r-1),bot=!isWall(c,r+1);
      bctx.fillStyle='rgba(0,0,0,0.09)';
      if(top||bot){for(let bx=x+10;bx<x+CELL-4;bx+=20)bctx.fillRect(bx,y,1,CELL);}
      else{for(let by=y+10;by<y+CELL-4;by+=20)bctx.fillRect(x,by,CELL,1);}
      bctx.fillStyle='rgba(255,255,255,0.18)';
      bctx.fillRect(x,y,CELL,2); bctx.fillRect(x,y,2,CELL);
      bctx.fillStyle='rgba(0,0,0,0.28)';
      bctx.fillRect(x,y+CELL-2,CELL,2); bctx.fillRect(x+CELL-2,y,2,CELL);
      if(!border){bctx.strokeStyle='rgba(0,0,0,0.18)';bctx.lineWidth=1;bctx.strokeRect(x+.5,y+.5,CELL-1,CELL-1);}
    } else {
      bctx.fillStyle=pat; bctx.fillRect(x,y,CELL,CELL);
    }
  }
  dotCanvas = document.createElement('canvas');
  dotCanvas.width = W; dotCanvas.height = H;
  dotCtx_ = dotCanvas.getContext('2d');
  animatedPellets = [];
  for(let r=0;r<MAP_ROWS;r++) for(let c=0;c<MAP_COLS;c++){
    const v=map[r][c];
    if(v===2){
      const cx=c*CELL+CELL/2,cy=r*CELL+CELL/2;
      dotCtx_.fillStyle='#FFD700';
      dotCtx_.beginPath(); dotCtx_.arc(cx,cy,4,0,Math.PI*2); dotCtx_.fill();
      dotCtx_.fillStyle='rgba(255,255,255,0.5)';
      dotCtx_.beginPath(); dotCtx_.arc(cx-1,cy-1,1.5,0,Math.PI*2); dotCtx_.fill();
    } else if(v===3||v===4||v===5){
      animatedPellets.push({col:c,row:r,type:v});
    }
  }
}

function clearDotCell(col,row){
  if(dotCtx_) dotCtx_.clearRect(col*CELL,row*CELL,CELL,CELL);
}
function buildFloorPattern() {
  const pc = document.createElement('canvas');
  pc.width = 60; pc.height = 60;
  const px = pc.getContext('2d');
  px.fillStyle = '#7cc87a'; px.fillRect(0,0,60,60);
  px.fillStyle = '#72c070';
  px.fillRect(0,0,30,30); px.fillRect(30,30,30,30);
  px.fillStyle = 'rgba(255,255,255,0.06)';
  for(let i=0;i<12;i++){const dx=(i*13+3)%60,dy=(i*19+7)%60;px.fillRect(dx,dy,1,1);}
  px.strokeStyle='rgba(0,0,0,0.04)'; px.lineWidth=0.5;
  for(let i=0;i<60;i+=20){px.beginPath();px.moveTo(i,0);px.lineTo(i,60);px.stroke();px.beginPath();px.moveTo(0,i);px.lineTo(60,i);px.stroke();}
  floorPattern = ctx.createPattern(pc,'repeat');
}

function drawWall(col,row){
  const x=col*CELL,y=row*CELL;
  // Drop shadow for non-border walls
  const border=(col===0||row===0||col===MAP_COLS-1||row===MAP_ROWS-1);
  if(!border){ctx.fillStyle='rgba(0,0,0,0.32)';ctx.fillRect(x+3,y+3,CELL,CELL);}
  // Wall body gradient
  const wg=ctx.createLinearGradient(x,y,x,y+CELL);
  wg.addColorStop(0,'#c4a97d'); wg.addColorStop(0.5,'#b09060'); wg.addColorStop(1,'#9a7b50');
  ctx.fillStyle=wg; ctx.fillRect(x,y,CELL,CELL);
  // Brick lines
  ctx.fillStyle='rgba(0,0,0,0.09)';
  const top=!isWall(col,row-1),bot=!isWall(col,row+1),lft=!isWall(col-1,row),rgt=!isWall(col+1,row);
  if(top||bot){for(let bx=x+10;bx<x+CELL-4;bx+=20)ctx.fillRect(bx,y,1,CELL);}
  else{for(let by=y+10;by<y+CELL-4;by+=20)ctx.fillRect(x,by,CELL,1);}
  // Top/left highlight
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillRect(x,y,CELL,2); ctx.fillRect(x,y,2,CELL);
  // Bottom/right shadow
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.fillRect(x,y+CELL-2,CELL,2); ctx.fillRect(x+CELL-2,y,2,CELL);
  // Edge outline on interior walls
  if(!border){ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1;ctx.strokeRect(x+0.5,y+0.5,CELL-1,CELL-1);}
}

function drawFloor(col,row){
  if(!floorPattern) buildFloorPattern();
  const x=col*CELL,y=row*CELL;
  ctx.fillStyle=floorPattern;
  ctx.fillRect(x,y,CELL,CELL);
}

function drawDot(col,row){
  const cx=col*CELL+CELL/2,cy=row*CELL+CELL/2;
  ctx.shadowColor='#FFD700'; ctx.shadowBlur=8;
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,4);
  grd.addColorStop(0,'#FFFFFF');grd.addColorStop(0.5,'#FFE840');grd.addColorStop(1,'rgba(255,200,0,0)');
  ctx.fillStyle=grd;
  ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}

function drawPellet(col,row){
  const cx=col*CELL+CELL/2,cy=row*CELL+CELL/2;
  const pulse=8+Math.sin(tick*0.09)*2.5;
  ctx.shadowColor='#FFA500';ctx.shadowBlur=22;
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,pulse+3);
  grd.addColorStop(0,'#FFFFFF');grd.addColorStop(0.3,'#FFE840');grd.addColorStop(0.7,'#FF8C00');grd.addColorStop(1,'rgba(255,140,0,0)');
  ctx.fillStyle=grd;
  ctx.beginPath();ctx.arc(cx,cy,pulse+3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,220,80,0.7)';
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2+tick*0.03,len=pulse+8,wid=1.5;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(a);ctx.fillRect(-wid/2,0,wid,len);ctx.restore();
  }
  ctx.shadowBlur=0;
}

function drawSpeedPellet(col,row){
  const cx=col*CELL+CELL/2,cy=row*CELL+CELL/2;
  const pulse=7+Math.sin(tick*0.12)*2;
  ctx.shadowColor='#AA44FF';ctx.shadowBlur=18;
  ctx.fillStyle='#CC66FF';
  ctx.beginPath();
  ctx.moveTo(cx,cy-pulse);ctx.lineTo(cx+pulse*0.75,cy);
  ctx.lineTo(cx,cy+pulse);ctx.lineTo(cx-pulse*0.75,cy);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath();ctx.moveTo(cx,cy-pulse*0.5);ctx.lineTo(cx+pulse*0.35,cy);ctx.lineTo(cx,cy-pulse*0.1);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
}

function drawFreezePellet(col,row){
  const cx=col*CELL+CELL/2,cy=row*CELL+CELL/2;
  const pulse=7+Math.sin(tick*0.1)*2;
  ctx.shadowColor='#44CCFF';ctx.shadowBlur=18;
  ctx.strokeStyle='#88EEFF';ctx.lineWidth=2.5;ctx.lineCap='round';
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2+tick*0.02;
    const sx=cx+Math.cos(a)*pulse,sy=cy+Math.sin(a)*pulse;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(sx,sy);ctx.stroke();
    const bx=cx+Math.cos(a)*pulse*0.55,by=cy+Math.sin(a)*pulse*0.55;
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(a+Math.PI/2)*pulse*0.3,by+Math.sin(a+Math.PI/2)*pulse*0.3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(a-Math.PI/2)*pulse*0.3,by+Math.sin(a-Math.PI/2)*pulse*0.3);ctx.stroke();
  }
  ctx.fillStyle='#CCF4FF';ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}

function drawPlayer(){
  const x=player.col*CELL+CELL/2,y=player.row*CELL+CELL/2,r=CELL/2-1;
  player.mouthAngle+=0.16*player.mouthDir;
  if(player.mouthAngle>0.38||player.mouthAngle<0.02) player.mouthDir*=-1;
  let ang=0;
  if(player.dx===1) ang=0; else if(player.dx===-1) ang=Math.PI;
  else if(player.dy===1) ang=Math.PI/2; else if(player.dy===-1) ang=-Math.PI/2;
  ctx.shadowColor=speedTimer>0?'rgba(180,0,255,0.9)':'rgba(255,210,0,0.8)';
  ctx.shadowBlur=18;
  const grd=ctx.createRadialGradient(x-r*0.3,y-r*0.35,0,x,y,r);
  grd.addColorStop(0,'#FFFF90');grd.addColorStop(0.45,'#FFD700');grd.addColorStop(1,'#E08000');
  ctx.fillStyle=grd;
  ctx.beginPath();ctx.moveTo(x,y);
  ctx.arc(x,y,r,ang+player.mouthAngle,ang+Math.PI*2-player.mouthAngle);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='#B86000';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x,y);
  ctx.arc(x,y,r,ang+player.mouthAngle,ang+Math.PI*2-player.mouthAngle);
  ctx.closePath();ctx.stroke();
  const ex=x+Math.cos(ang-Math.PI/4)*r*0.5,ey=y+Math.sin(ang-Math.PI/4)*r*0.5;
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(ex,ey,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(ex+0.8,ey-0.8,1.3,0,Math.PI*2);ctx.fill();
  if(speedTimer>0){
    ctx.fillStyle='rgba(180,0,255,0.15)';
    ctx.beginPath();ctx.arc(x-player.dx*CELL*0.4,y-player.dy*CELL*0.4,r*0.7,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x-player.dx*CELL*0.7,y-player.dy*CELL*0.7,r*0.4,0,Math.PI*2);ctx.fill();
  }
}

function drawMonster(m){
  const cx=m.col*CELL+CELL/2,cy=m.row*CELL+CELL/2,hw=CELL/2-2;
  const scared=m.scared,frozen=freezeTimer>0&&!scared;
  const flashing=scared&&powerTimer<100&&Math.floor(powerTimer/10)%2===0;
  let c1,c2;
  if(frozen){c1='#AADDFF';c2='#5599CC';}
  else if(scared){c1=flashing?'#FFFFFF':'#5599FF';c2=flashing?'#AABBFF':'#2255CC';}
  else{[c1,c2]=MONSTER_PALETTES[m.idx];}
  const wobble=frozen?0:Math.sin(tick*0.18+m.idx)*1.5;
  const bx=cx-hw-wobble*0.5,by=cy-hw+wobble*0.5,bw=hw*2+wobble,bh=hw*2-wobble;
  ctx.shadowColor=c1;ctx.shadowBlur=frozen?8:14;
  const grd=ctx.createLinearGradient(bx,by,bx+bw,by+bh);
  grd.addColorStop(0,lighten(c1,55));grd.addColorStop(0.5,c1);grd.addColorStop(1,c2);
  ctx.fillStyle=grd;
  const cr=6;
  ctx.beginPath();
  ctx.moveTo(bx+cr,by);ctx.lineTo(bx+bw-cr,by);ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+cr);
  ctx.lineTo(bx+bw,by+bh-cr);ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-cr,by+bh);
  ctx.lineTo(bx+cr,by+bh);ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-cr);
  ctx.lineTo(bx,by+cr);ctx.quadraticCurveTo(bx,by,bx+cr,by);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;ctx.strokeStyle=c2;ctx.lineWidth=2;ctx.stroke();
  if(frozen){
    ctx.fillStyle='rgba(160,220,255,0.3)';
    ctx.beginPath();
    ctx.moveTo(bx+cr,by);ctx.lineTo(bx+bw-cr,by);ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+cr);
    ctx.lineTo(bx+bw,by+bh-cr);ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-cr,by+bh);
    ctx.lineTo(bx+cr,by+bh);ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-cr);
    ctx.lineTo(bx,by+cr);ctx.quadraticCurveTo(bx,by,bx+cr,by);
    ctx.closePath();ctx.fill();
  }
  const faceY=cy+2;
  if(scared){
    ctx.strokeStyle=flashing?'#8899FF':'#ffffff';ctx.lineWidth=2.5;ctx.lineCap='round';
    [-6,6].forEach(ox=>{
      ctx.beginPath();ctx.moveTo(cx+ox-3,faceY-8);ctx.lineTo(cx+ox+3,faceY-2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+ox+3,faceY-8);ctx.lineTo(cx+ox-3,faceY-2);ctx.stroke();
    });
    ctx.beginPath();ctx.moveTo(cx-7,faceY+5);ctx.lineTo(cx-4,faceY+8);ctx.lineTo(cx-1,faceY+5);ctx.lineTo(cx+2,faceY+8);ctx.lineTo(cx+5,faceY+5);ctx.lineTo(cx+7,faceY+8);ctx.stroke();
  } else {
    [-6,6].forEach(ox=>{
      ctx.fillStyle=frozen?'#DDEEFF':'white';
      ctx.fillRect(cx+ox-4,faceY-9,8,7);
      ctx.strokeStyle=c2;ctx.lineWidth=1;ctx.strokeRect(cx+ox-4,faceY-9,8,7);
      const px=(cx+ox)+(m.dx||0)*1.5,py=(faceY-5.5)+(m.dy||0)*1;
      ctx.fillStyle=frozen?'#336688':'#1a1a1a';
      ctx.fillRect(px-2,py-2,4,4);
    });
    if(!frozen){
      ctx.strokeStyle=c2;ctx.lineWidth=3;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(cx-3,faceY-12);ctx.lineTo(cx-9,faceY-9);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+3,faceY-12);ctx.lineTo(cx+9,faceY-9);ctx.stroke();
      ctx.fillStyle='#1a1a1a';
      ctx.beginPath();ctx.moveTo(cx-7,faceY+3);ctx.lineTo(cx-5,faceY+7);ctx.lineTo(cx-2,faceY+4);ctx.lineTo(cx+1,faceY+7);ctx.lineTo(cx+4,faceY+4);ctx.lineTo(cx+7,faceY+7);ctx.lineTo(cx+7,faceY+3);ctx.closePath();ctx.fill();
      ctx.fillStyle='white';
      ctx.fillRect(cx-5,faceY+3,3,3);ctx.fillRect(cx-1,faceY+3,3,3);ctx.fillRect(cx+3,faceY+3,3,3);
    } else {
      ctx.strokeStyle='#5599CC';ctx.lineWidth=2.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(cx-6,faceY+2);ctx.lineTo(cx+6,faceY+2);ctx.stroke();
      ctx.beginPath();ctx.arc(cx,faceY+5,2.5,0,Math.PI);ctx.stroke();
    }
  }
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;
    ctx.font='bold 13px Arial Rounded MT Bold, Arial';
    ctx.textAlign='center';ctx.fillText(p.text,p.x,p.y);
  });
  ctx.globalAlpha=1;ctx.textAlign='left';
}

function draw(){
  ctx.clearRect(0,0,VIEW_W,VIEW_H);
  ctx.save();
  ctx.translate(-Math.round(camX),-Math.round(camY));
  if(bgCanvas) ctx.drawImage(bgCanvas,0,0);
  if(dotCanvas) ctx.drawImage(dotCanvas,0,0);
  animatedPellets.forEach(p=>{
    if(map[p.row][p.col]===p.type){
      if(p.type===3) drawPellet(p.col,p.row);
      else if(p.type===4) drawSpeedPellet(p.col,p.row);
      else if(p.type===5) drawFreezePellet(p.col,p.row);
    }
  });
  drawPlayer();
  monsters.forEach(drawMonster);
  drawParticles();
  ctx.restore();
  if(flashTimer>0){
    ctx.fillStyle=flashColor.replace(/[\d.]+\)$/,(flashTimer/30).toFixed(2)+')');
    ctx.fillRect(0,0,VIEW_W,VIEW_H);
    flashTimer--;
  }
  // Active powerup timers
  if(speedTimer>0||freezeTimer>0||powerTimer>0){
    ctx.font='bold 11px Arial';ctx.textAlign='left';
    let px=8,py=VIEW_H-10;
    if(speedTimer>0){ctx.fillStyle='#CC00FF';ctx.fillText('FAST '+Math.ceil(speedTimer/60)+'s',px,py);px+=70;}
    if(freezeTimer>0){ctx.fillStyle='#44AAFF';ctx.fillText('FREEZE '+Math.ceil(freezeTimer/60)+'s',px,py);px+=90;}
    if(powerTimer>0){ctx.fillStyle='#FF8800';ctx.fillText('POWER '+Math.ceil(powerTimer/60)+'s',px,py);}
  }
}

function loop(){
  if(!gameActive) return;
  tick++;
  updatePlayer();
  updateMonsters();
  checkCollisions();
  updateParticles();
  updateCamera();
  if(gameActive) checkWin();
  if(gameActive) draw();
  animFrame=requestAnimationFrame(loop);
}

function endGame(won){
  gameActive=false;cancelAnimationFrame(animFrame);
  const newBest=score>=highScore&&score>0;
  overlay.innerHTML=`
    <div class="overlay-title">${won?'You Win!':'Game Over'}</div>
    <div class="overlay-sub">Score: <b>${score}</b>${newBest?' &nbsp;— New Best!':''}</div>
    <div style="font-size:0.9rem;color:#7a9a7a;margin-bottom:20px">Best: ${highScore}</div>
    <button id="restartBtn">Play Again</button>
  `;
  overlay.style.display='flex';
  document.getElementById('restartBtn').addEventListener('click',startGame);
}

function startGame(){
  overlay.style.display='none';
  cancelAnimationFrame(animFrame);
  initGame();loop();
}

startBtn.addEventListener('click',startGame);

document.addEventListener('keydown',e=>{
  if(!gameActive) return;
  switch(e.key){
    case 'ArrowLeft': case 'a': player.nextDx=-1;player.nextDy=0;break;
    case 'ArrowRight':case 'd': player.nextDx=1; player.nextDy=0;break;
    case 'ArrowUp':   case 'w': player.nextDx=0; player.nextDy=-1;break;
    case 'ArrowDown': case 's': player.nextDx=0; player.nextDy=1; break;
  }
  e.preventDefault();
});

function lighten(hex,amount){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amount);g=Math.min(255,g+amount);b=Math.min(255,b+amount);
  return `rgb(${r},${g},${b})`;
}
</script>
