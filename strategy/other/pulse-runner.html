<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Runner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    min-height: 100vh;
    overflow: hidden;
    background: #0b1020;
    color: #eaf6ff;
    font-family: "Segoe UI", Arial, sans-serif;
}

#game {
    display: block;
    width: 100vw;
    height: 100vh;
    background: #0b1020;
}

.hud {
    position: fixed;
    top: 14px;
    left: 14px;
    right: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    pointer-events: none;
    z-index: 5;
}

.hud-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.pill {
    min-width: 78px;
    padding: 7px 10px;
    border: 1px solid rgba(136, 220, 255, 0.28);
    border-radius: 7px;
    background: rgba(8, 18, 36, 0.72);
    color: #dff7ff;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.3px;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.24);
}

.overlay {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: radial-gradient(circle at 50% 35%, rgba(42, 220, 255, 0.16), rgba(7, 10, 22, 0.86) 58%);
    z-index: 10;
}

.panel {
    width: min(760px, calc(100vw - 32px));
    padding: 22px;
    border: 1px solid rgba(124, 226, 255, 0.28);
    border-radius: 8px;
    background: rgba(8, 16, 32, 0.9);
    box-shadow: 0 18px 70px rgba(0, 0, 0, 0.42);
    text-align: center;
}

.panel h1 {
    color: #8deaff;
    font-size: 34px;
    letter-spacing: 0;
    margin-bottom: 8px;
}

.panel p {
    color: #aac7d8;
    font-size: 14px;
    line-height: 1.45;
    margin-bottom: 16px;
}

.primary-btn {
    border: 1px solid rgba(141, 234, 255, 0.65);
    border-radius: 7px;
    background: #20c6ff;
    color: #06101d;
    cursor: pointer;
    font: inherit;
    font-size: 14px;
    font-weight: 800;
    padding: 10px 16px;
}

.primary-btn:hover {
    background: #6ee6ff;
}

.mode-select {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
    margin-top: 14px;
}

.mode-card {
    border: 1px solid rgba(141, 234, 255, 0.28);
    border-radius: 8px;
    background: rgba(12, 28, 52, 0.82);
    color: #eaf6ff;
    cursor: pointer;
    padding: 10px;
    text-align: left;
    font: inherit;
    transition: border-color 0.2s, transform 0.2s, background 0.2s;
}

.mode-card:hover,
.mode-card.selected {
    border-color: #8deaff;
    background: rgba(32, 198, 255, 0.15);
    transform: translateY(-2px);
}

.mode-card.preview {
    cursor: default;
    opacity: 0.82;
}

.mode-card.preview:hover {
    border-color: rgba(141, 234, 255, 0.28);
    background: rgba(12, 28, 52, 0.82);
    transform: none;
}

.mode-art {
    position: relative;
    height: 150px;
    overflow: hidden;
    border-radius: 7px;
    background: linear-gradient(#162a50, #07101f);
    margin-bottom: 10px;
}

.art-label {
    position: absolute;
    left: 10px;
    top: 10px;
    z-index: 2;
    padding: 4px 7px;
    border: 1px solid rgba(141, 234, 255, 0.42);
    border-radius: 5px;
    background: rgba(6, 16, 29, 0.78);
    color: #eaf6ff;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.8px;
}

.mode-art::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 18px;
    height: 18px;
    background: #19365e;
    border-top: 4px solid #42d8ff;
}

.art-player {
    position: absolute;
    left: 78px;
    top: 54px;
    width: 24px;
    height: 34px;
    border-radius: 7px;
    background: #8deaff;
    box-shadow: 0 0 14px rgba(141, 234, 255, 0.7);
}

.art-player::before,
.art-enemy::before {
    content: "";
    position: absolute;
    top: 9px;
    left: 6px;
    width: 4px;
    height: 4px;
    background: #09213a;
    box-shadow: 9px 0 0 #09213a;
}

.art-enemy {
    position: absolute;
    right: 58px;
    bottom: 36px;
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: #b64cff;
    box-shadow: 0 0 14px rgba(182, 76, 255, 0.72);
}

.art-dragon {
    position: absolute;
    right: 14px;
    top: 28px;
    z-index: 2;
    width: 126px;
    height: 78px;
    background: none;
    filter: drop-shadow(0 0 12px rgba(58, 255, 169, 0.28));
}

.art-dragon span {
    position: absolute;
    display: block;
}

.dragon-body {
    right: 10px;
    top: 32px;
    width: 68px;
    height: 34px;
    border-radius: 60% 42% 48% 54%;
    background:
        radial-gradient(circle at 28% 22%, rgba(224, 255, 206, 0.8) 0 4px, transparent 5px),
        repeating-linear-gradient(120deg, transparent 0 8px, rgba(7, 49, 37, 0.3) 9px 11px),
        linear-gradient(135deg, #5fe07d, #196c4a 52%, #0c342d);
    box-shadow:
        inset -8px -9px 12px rgba(1, 20, 18, 0.55),
        inset 8px 5px 10px rgba(198, 255, 136, 0.28),
        0 4px 0 rgba(0, 0, 0, 0.2);
}

.dragon-wing {
    right: 34px;
    top: 2px;
    width: 58px;
    height: 44px;
    clip-path: polygon(4% 94%, 32% 6%, 54% 54%, 86% 14%, 70% 96%);
    background:
        linear-gradient(140deg, rgba(244, 255, 190, 0.72), rgba(53, 167, 92, 0.92) 42%, rgba(13, 66, 48, 0.98));
    border: 1px solid rgba(177, 255, 152, 0.28);
    transform: rotate(-7deg);
    transform-origin: 70% 95%;
}

.dragon-neck {
    left: 34px;
    top: 32px;
    width: 38px;
    height: 18px;
    border-radius: 18px 4px 10px 18px;
    background: linear-gradient(180deg, #69d56f, #15543f);
    transform: rotate(-15deg);
}

.dragon-head {
    left: 4px;
    top: 22px;
    width: 40px;
    height: 28px;
    border-radius: 56% 22% 32% 46%;
    background:
        radial-gradient(circle at 78% 28%, rgba(255, 235, 145, 0.95) 0 2px, transparent 3px),
        linear-gradient(145deg, #85ef83, #245d44 58%, #0b2d28);
    box-shadow: inset -7px -6px 8px rgba(0, 18, 16, 0.55);
}

.dragon-head::before {
    content: "";
    position: absolute;
    left: -13px;
    top: 12px;
    width: 24px;
    height: 10px;
    border-radius: 12px 2px 8px 10px;
    background: linear-gradient(180deg, #74df74, #123b32);
}

.dragon-eye {
    right: 10px;
    top: 8px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #fff0a6;
    box-shadow: 0 0 5px #ffe36a, inset 2px 0 0 #04120f;
}

.dragon-horn {
    left: 8px;
    top: -8px;
    width: 24px;
    height: 12px;
    clip-path: polygon(0 100%, 32% 0, 50% 100%, 78% 5%, 100% 100%);
    background: linear-gradient(90deg, #f8ffd2, #b9c377);
}

.dragon-tail {
    right: 68px;
    top: 45px;
    width: 50px;
    height: 18px;
    border-radius: 50% 12% 12% 50%;
    background: linear-gradient(90deg, transparent 0 6px, #195b3f 7px, #5edc78);
    transform: rotate(15deg);
}

.dragon-leg {
    top: 60px;
    width: 10px;
    height: 19px;
    border-radius: 6px 6px 2px 2px;
    background: linear-gradient(#215f43, #08261f);
}

.dragon-leg-front {
    right: 24px;
    transform: rotate(-12deg);
}

.dragon-leg-back {
    right: 55px;
    transform: rotate(14deg);
}

.art-fire {
    position: absolute;
    right: 116px;
    top: 55px;
    z-index: 1;
    width: 132px;
    height: 38px;
    clip-path: polygon(0 52%, 15% 28%, 32% 42%, 45% 14%, 58% 38%, 75% 24%, 100% 50%, 76% 76%, 58% 64%, 43% 88%, 29% 60%, 13% 76%);
    background:
        radial-gradient(circle at 68% 50%, #fff7ba 0 12%, transparent 22%),
        linear-gradient(90deg, rgba(151, 24, 0, 0.08), #ff4718 34%, #ff9d18 62%, #fff4a3);
    box-shadow: 0 0 20px #ff7418, 0 0 34px rgba(255, 42, 12, 0.5);
    transform: rotate(-2deg);
}

.mode-name {
    display: block;
    color: #8deaff;
    font-weight: 800;
    margin-bottom: 3px;
}

.mode-desc {
    color: #aac7d8;
    font-size: 12px;
    line-height: 1.35;
}

.touch-controls {
    position: fixed;
    left: 16px;
    right: 16px;
    bottom: 16px;
    display: none;
    justify-content: space-between;
    pointer-events: none;
    z-index: 6;
}

.touch-cluster {
    display: flex;
    gap: 10px;
}

.touch-btn {
    width: 54px;
    height: 54px;
    border: 1px solid rgba(141, 234, 255, 0.32);
    border-radius: 8px;
    background: rgba(8, 18, 36, 0.72);
    color: #dff7ff;
    font-size: 20px;
    font-weight: 800;
    pointer-events: auto;
    touch-action: none;
}

@media (max-width: 760px), (pointer: coarse) {
    .touch-controls { display: flex; }
    .pill { min-width: 64px; font-size: 11px; }
    .mode-select { grid-template-columns: 1fr; }
    .mode-art { height: 120px; }
}
</style>
</head>
<body>
<canvas id="game" tabindex="0"></canvas>

<div class="hud">
    <div class="hud-group">
        <div class="pill" id="level">Level 1</div>
        <div class="pill" id="coins">Coins 0/0</div>

    </div>
    <div class="pill" id="time">Time 0.0</div>
</div>

<div class="overlay" id="overlay">
    <div class="panel">
        <h1>Pulse Runner</h1>
        <p>Pick Normal for the original run, or Ultimate for 20 levels of dragons, gears, caves, and trapdoors.</p>
        <div class="mode-select" id="mode-select">
            <button class="mode-card selected" data-mode="normal">
                <div class="mode-art" aria-hidden="true">
                    <span class="art-label">NORMAL</span>
                    <span class="art-player"></span>
                    <span class="art-enemy"></span>
                </div>
                <span class="mode-name">Normal</span>
                <span class="mode-desc">The current 10-level platformer with enemies, hazards, buttons, and portals.</span>
            </button>
            <button class="mode-card" data-mode="ultimate" aria-label="Ultimate mode">
                <div class="mode-art" aria-hidden="true">
                    <span class="art-label">ULTIMATE</span>
                    <span class="art-fire"></span>
                    <span class="art-player"></span>
                    <span class="art-dragon">
                        <span class="dragon-tail"></span>
                        <span class="dragon-wing"></span>
                        <span class="dragon-body"></span>
                        <span class="dragon-neck"></span>
                        <span class="dragon-head">
                            <span class="dragon-horn"></span>
                            <span class="dragon-eye"></span>
                        </span>
                        <span class="dragon-leg dragon-leg-back"></span>
                        <span class="dragon-leg dragon-leg-front"></span>
                    </span>
                </div>
                <span class="mode-name">Ultimate</span>
                <span class="mode-desc">A 20-level version with flying dragons, lava eruptions, gears, caves, trapdoors, and powerups.</span>
            </button>
        </div>
        <button class="primary-btn" id="start-btn">Start Normal</button>
    </div>
</div>

<div class="touch-controls" aria-hidden="true">
    <div class="touch-cluster">
        <button class="touch-btn" data-key="left">L</button>
        <button class="touch-btn" data-key="right">R</button>
    </div>
    <button class="touch-btn" data-key="jump">J</button>
</div>

function cloneLevel(level) {
    return {
        name: level.name,
        width: level.width,
        start: { ...level.start },
        goal: { ...level.goal },
        platforms: level.platforms.map(item => ({ ...item })),
        hazards: level.hazards.map(item => ({ ...item })),
        lavaPools: (level.lavaPools || []).map(item => ({ ...item })),
        waterPools: (level.waterPools || []).map(item => ({ ...item })),
        enemies: level.enemies.map(item => ({ ...item })),
        drones: (level.drones || []).map(item => ({ ...item })),
        coins: level.coins.map(item => ({ ...item })),
        portals: (level.portals || []).map(item => ({ ...item })),
        trampolines: (level.trampolines || []).map(item => ({ ...item })),
        buttons: (level.buttons || []).map(item => ({ ...item })),
        flyingDragons: (level.flyingDragons || []).map(item => ({ ...item })),
        gears: (level.gears || []).map(item => ({ ...item })),
        caves: (level.caves || []).map(item => ({ ...item })),
        trapdoors: (level.trapdoors || []).map(item => ({ ...item })),
        fallingRocks: (level.fallingRocks || []).map(item => ({ ...item })),
        lavaEruptions: (level.lavaEruptions || []).map(item => ({ ...item })),
        powerups: (level.powerups || []).map(item => ({ ...item }))
    };
}

function createTrampoline(platform, offset = 0.5) {
    const w = Math.round(Math.min(58, Math.max(42, platform.w * 0.32)));
    return {
        x: Math.round(platform.x + platform.w * offset - w / 2),
        y: platform.y - 14,
        w,
        h: 14,
        power: 23
    };
}

function createLavaPool(hazard, tier = 0) {
    return {
        x: hazard.x,
        y: Math.max(638, hazard.y - 14),
        w: hazard.w,
        h: 52 + Math.min(18, tier * 2)
    };
}

function createWaterPool(hazard) {
    return {
        x: hazard.x,
        y: Math.max(636, hazard.y - 18),
        w: hazard.w,
        h: 48
    };
}

function createDrone(platform, delay = 1.2) {
    return {
        x: Math.round(platform.x + platform.w / 2),
        y: Math.max(80, platform.y - 115),
        r: 18,
        delay,
        nextShot: 0
    };
}

function createButton(platform, target) {
    const w = 44;
    return {
        x: Math.round(platform.x + platform.w / 2 - w / 2),
        y: platform.y - 12,
        w,
        h: 12,
        target,
        pressed: false
    };
}

function createTrapdoor(platform, offset = 0.5, tier = 0) {
    const w = Math.round(Math.min(150, Math.max(92, platform.w * 0.45)));
    return {
        x: Math.round(platform.x + platform.w * offset - w / 2),
        y: platform.y - 72,
        w,
        h: 14,
        timer: 0,
        reset: 0,
        open: false,
        fuse: Math.max(0.45, 0.8 - tier * 0.018)
    };
}

function createGateTrapdoor(platform, tier = 0) {
    const w = Math.min(150, Math.max(96, platform.w * 0.36));
    return {
        x: Math.round(platform.x + Math.max(28, platform.w * 0.18)),
        y: platform.y - 72,
        w,
        h: 14,
        timer: 0,
        reset: 0,
        open: false,
        fuse: Math.max(0.28, 0.52 - tier * 0.012),
        gateTrap: true
    };
}

function createGear(platform, offset = 0.5, tier = 0) {
    const r = Math.min(28, 18 + Math.floor(tier / 4));
    const patrol = Math.max(0, Math.min(90 + tier * 4, platform.w / 2 - r - 18));
    const x = Math.round(platform.x + platform.w * offset);
    return {
        x,
        y: platform.y - r - 8,
        r,
        min: Math.round(Math.max(platform.x + r + 12, x - patrol)),
        max: Math.round(Math.min(platform.x + platform.w - r - 12, x + patrol)),
        speed: 0.9 + tier * 0.05,
        angle: 0,
        active: true
    };
}

function createCave(platform, offset = 0.5, tier = 0) {
    const w = 74;
    return {
        x: Math.round(platform.x + platform.w * offset - w / 2),
        y: platform.y - 58,
        w,
        h: 58,
        interval: Math.max(1.4, 2.9 - tier * 0.05),
        nextRock: 0,
        active: true
    };
}

function createFlyingDragon(leftPlatform, rightPlatform, tier = 0, offset = 0) {
    const gapStart = leftPlatform.x + leftPlatform.w;
    const gapEnd = rightPlatform.x;
    const centerX = Math.round(gapStart + (gapEnd - gapStart) / 2);
    const ledgeY = Math.min(leftPlatform.y, rightPlatform.y);
    return {
        x: centerX,
        y: Math.max(96, ledgeY - 118),
        baseY: Math.max(96, ledgeY - 118),
        min: Math.max(gapStart - 70, centerX - 150),
        max: Math.min(gapEnd + 70, centerX + 150),
        speed: 0.75 + tier * 0.025,
        phase: offset,
        cycle: Math.max(2.0, 3.15 - tier * 0.035),
        warning: 0.72,
        blast: 0.52,
        facing: -1,
        active: true
    };
}

function createPowerup(platform, type, offset = 0.5) {
    return {
        type,
        x: Math.round(platform.x + platform.w * offset),
        y: Math.max(70, platform.y - 74),
        r: 15,
        taken: false
    };
}

function createLavaEruption(leftPlatform, rightPlatform, tier = 0, offset = 0) {
    const gapStart = leftPlatform.x + leftPlatform.w;
    const gapEnd = rightPlatform.x;
    const gap = Math.max(90, gapEnd - gapStart);
    const w = Math.min(86, Math.max(42, gap * 0.48));
    return {
        x: Math.round(gapStart + gap / 2 - w / 2),
        y: Math.min(668, Math.max(leftPlatform.y, rightPlatform.y) + 28),
        w,
        pitW: Math.round(Math.min(gap - 18, w + 42)),
        pitH: 30,
        height: Math.min(310, 178 + tier * 8),
        phase: offset,
        cycle: Math.max(1.85, 2.75 - tier * 0.035),
        warning: 0.54,
        blast: Math.min(0.92, 0.58 + tier * 0.012)
    };
}

function createPortalPair(platformA, platformB, colorA, colorB) {
    const w = 42;
    const h = 58;
    const a = {
        x: Math.round(platformA.x + platformA.w / 2 - w / 2),
        y: platformA.y - h,
        w,
        h,
        color: colorA,
        target: 1
    };
    const b = {
        x: Math.round(platformB.x + platformB.w / 2 - w / 2),
        y: platformB.y - h,
        w,
        h,
        color: colorB,
        target: 0
    };
    return [a, b];
}

function tunePlatformSizes(platforms, tier) {
    const airScale = Math.max(0.64, 0.9 - tier * 0.025);
    const groundScale = Math.max(0.62, 0.86 - tier * 0.02);
    const endScale = Math.max(0.74, 0.94 - tier * 0.018);
    return platforms.map((platform, platformIndex, allPlatforms) => {
        const isGroundChunk = platform.h >= 60;
        const isStartOrGoal = platformIndex === 0 || platformIndex === allPlatforms.length - 1;
        if (isGroundChunk && isStartOrGoal) {
            return { ...platform, w: Math.max(290, Math.round(platform.w * endScale)) };
        }
        if (isGroundChunk) {
            return { ...platform, w: Math.max(220, Math.round(platform.w * groundScale)) };
        }
        return { ...platform, w: Math.max(145, Math.round(platform.w * airScale)) };
    });
}

function makeGapsReachable(platforms, tier) {
    const maxGap = Math.max(220, 250 - tier * 3);
    const sorted = [...platforms].sort((a, b) => a.x - b.x);
    for (let i = 0; i < sorted.length - 1; i++) {
        const current = sorted[i];
        const next = sorted[i + 1];
        const gap = next.x - (current.x + current.w);
        if (gap <= maxGap) continue;
        current.w += gap - maxGap;
    }
    return platforms;
}

function widenLaterLevelPlatforms(platforms, levelNumber) {
    if (levelNumber < 4) return platforms;
    return platforms.map(platform => ({
        ...platform,
        w: Math.round(platform.w * 1.18)
    }));
}

function buildCampaignLevels(count) {
    const campaign = [];
    for (let i = 0; i < count; i++) {
        const base = cloneLevel(baseLevelThemes[i % baseLevelThemes.length]);
        const levelNumber = i + 1;
        const tier = levelNumber - 1;
        const speedBoost = tier * 0.06;
        const originalHazards = base.hazards.map(hazard => ({ ...hazard }));
        const groundHazards = originalHazards.filter(hazard => hazard.y >= 660);
        base.name = `${levelNumber}. ${levelNames[i]}`;

        base.platforms = makeGapsReachable(widenLaterLevelPlatforms(tunePlatformSizes(base.platforms, tier), levelNumber), tier);

        base.portals = [];
        base.lavaPools = [];
        base.waterPools = [];
        base.trampolines = [];
        base.drones = [];
        base.hazards = levelNumber >= 4 ? originalHazards : [];

        if (levelNumber >= 2) {
            const waterHazard = groundHazards[(i + 1) % Math.max(1, groundHazards.length)];
            if (waterHazard) base.waterPools.push(createWaterPool(waterHazard));
        }

        if (levelNumber >= 3) {
            const springPlatform = base.platforms[Math.min(base.platforms.length - 2, 1 + (i % Math.max(1, base.platforms.length - 2)))];
            base.trampolines.push(createTrampoline(springPlatform, 0.5));
        }

        if (levelNumber >= 5) {
            const lavaCount = Math.min(3, 1 + Math.floor((levelNumber - 5) / 2));
            base.lavaPools = groundHazards
                .filter((hazard, hazardIndex) => hazardIndex % 2 === i % 2)
                .slice(0, lavaCount)
                .map(hazard => createLavaPool(hazard, tier));
            if (base.lavaPools.length === 0 && groundHazards.length > 0) {
                base.lavaPools.push(createLavaPool(groundHazards[0], tier));
            }
        }

        if (levelNumber >= 6) {
            const portalStart = base.platforms[Math.min(2, base.platforms.length - 2)];
            const portalEnd = base.platforms[Math.max(1, base.platforms.length - 3)];
            base.portals = createPortalPair(portalStart, portalEnd, "#35d7ff", "#ff66f7");
            const openWaterHazard = groundHazards.find(hazard => !base.lavaPools.some(lava => lava.x === hazard.x));
            if (openWaterHazard && !base.waterPools.some(water => water.x === openWaterHazard.x)) {
                base.waterPools.push(createWaterPool(openWaterHazard));
            }
        }

        if (levelNumber >= 7) {
            const dronePlatform = base.platforms[Math.min(base.platforms.length - 2, 2 + (i % Math.max(1, base.platforms.length - 3)))];
            base.drones.push(createDrone(dronePlatform, 1.1 + (i % 3) * 0.35));
        }

        if (levelNumber >= 8) {
            const secondSpring = base.platforms[Math.min(base.platforms.length - 2, 3 + (i % Math.max(1, base.platforms.length - 4)))];
            base.trampolines.push(createTrampoline(secondSpring, 0.68));
        }

        if (levelNumber >= 10) {
            const secondDronePlatform = base.platforms[Math.min(base.platforms.length - 2, 4 + (i % Math.max(1, base.platforms.length - 5)))];
            base.drones.push(createDrone(secondDronePlatform, 2.0));
        }

        base.enemies = base.enemies.map((enemy, enemyIndex) => ({
            ...enemy,
            speed: enemy.speed + speedBoost + (enemyIndex % 2) * 0.05
        }));

        if (levelNumber === 1) {
            base.enemies = [];
        } else if (levelNumber <= 3) {
            base.enemies = base.enemies.slice(0, 1);
        }

        if (levelNumber >= 6) {
            const platform = base.platforms.find(p => p.w >= 260 && p.y < 630);
            if (platform) {
                base.enemies.push({
                    x: platform.x + 38,
                    y: platform.y - 38,
                    w: 30,
                    h: 30,
                    min: platform.x + 20,
                    max: platform.x + platform.w - 50,
                    speed: 1.1 + tier * 0.22
                });
            }
        }

        if (levelNumber >= 8) {
            const anchor = base.platforms[Math.min(base.platforms.length - 2, 2 + (i % Math.max(1, base.platforms.length - 3)))];
            if (anchor && anchor.w > 180) {
                base.hazards.push({
                    x: anchor.x + Math.min(54, anchor.w / 3),
                    y: anchor.y - 10,
                    w: Math.min(120 + tier * 8, anchor.w - 80),
                    h: 12
                });
            }
        }

        const buttonPlatform = base.platforms[Math.min(base.platforms.length - 2, 1 + ((i + 2) % Math.max(1, base.platforms.length - 2)))];
        let buttonTarget = null;
        if (base.drones.length > 0) buttonTarget = "drones";
        else if (base.lavaPools.length > 0) buttonTarget = "lava";
        else if (levelNumber >= 4) buttonTarget = "pulse";
        base.buttons = buttonTarget ? [createButton(buttonPlatform, buttonTarget)] : [];

        if (levelNumber >= 9) {
            const bonusPlatform = base.platforms[Math.min(base.platforms.length - 1, 3 + (i % Math.max(1, base.platforms.length - 4)))];
            if (bonusPlatform) {
                base.coins.push({
                    x: bonusPlatform.x + bonusPlatform.w / 2,
                    y: Math.max(80, bonusPlatform.y - 105)
                });
            }
        }

        campaign.push(base);
    }
    return campaign;
}

function buildUltimateLevels(count) {
    const campaign = [];
    for (let i = 0; i < count; i++) {
        const base = cloneLevel(baseLevelThemes[i % baseLevelThemes.length]);
        const levelNumber = i + 1;
        const tier = levelNumber - 1;
        base.name = `${levelNumber}. ${ultimateLevelNames[i]}`;
        base.platforms = makeGapsReachable(widenLaterLevelPlatforms(tunePlatformSizes(base.platforms, Math.floor(tier * 0.7)), levelNumber), Math.floor(tier * 0.45));

        base.hazards = [];
        base.lavaPools = [];
        base.waterPools = [];
        base.enemies = [];
        base.drones = [];
        base.gears = [];
        base.flyingDragons = [];
        base.caves = [];
        base.trapdoors = [];
        base.fallingRocks = [];
        base.lavaEruptions = [];
        base.powerups = [];
        base.buttons = [];
        base.portals = [];
        base.trampolines = [];

        const mids = base.platforms.slice(1, -1).filter(platform => platform.w >= 160);
        const pick = offset => mids[Math.min(mids.length - 1, Math.max(0, offset % Math.max(1, mids.length)))];
        const platformGaps = [...base.platforms]
            .sort((a, b) => a.x - b.x)
            .map((platform, platformIndex, sorted) => ({
                left: platform,
                right: sorted[platformIndex + 1],
                gap: sorted[platformIndex + 1] ? sorted[platformIndex + 1].x - (platform.x + platform.w) : 0
            }))
            .filter(gap => gap.right && gap.gap >= 96 && gap.left.h < 70 && gap.right.h < 70);
        const pickGap = offset => platformGaps[Math.min(platformGaps.length - 1, Math.max(0, offset % Math.max(1, platformGaps.length)))];

        if (levelNumber >= 1) {
            const platform = pick(i + 1);
            if (platform) base.trapdoors.push(createTrapdoor(platform, 0.5, tier));
        }

        if (levelNumber >= 2) {
            const platform = pick(i + 2);
            if (platform) base.gears.push(createGear(platform, 0.55, tier));
        }

        if (levelNumber >= 2) {
            const gap = pickGap(i + 2);
            if (gap) base.flyingDragons.push(createFlyingDragon(gap.left, gap.right, tier, 0.2));
        }

        if (levelNumber >= 4) {
            const platform = pick(i + 4);
            if (platform) base.caves.push(createCave(platform, 0.5, tier));
        }

        if (levelNumber >= 1) {
            const gap = pickGap(i + 1);
            if (gap) base.lavaEruptions.push(createLavaEruption(gap.left, gap.right, tier, 0.25));
        }

        if (levelNumber >= 5) {
            const platform = pick(i + 5);
            if (platform) base.trapdoors.push(createTrapdoor(platform, 0.62, tier));
        }

        if (levelNumber >= 6) {
            const platform = pick(i + 6);
            if (platform) base.trampolines.push(createTrampoline(platform, 0.34));
        }

        if (levelNumber >= 7) {
            const platform = pick(i + 7);
            if (platform) base.gears.push(createGear(platform, 0.35, tier));
        }

        if (levelNumber >= 8) {
            const platform = pick(i + 8);
            if (platform) base.caves.push(createCave(platform, 0.62, tier));
        }

        if (levelNumber >= 10) {
            const platformA = base.platforms[Math.min(2, base.platforms.length - 2)];
            const platformB = base.platforms[Math.max(1, base.platforms.length - 3)];
            base.portals = createPortalPair(platformA, platformB, "#6dff8c", "#ff884d");
        }

        if (levelNumber >= 11) {
            const gap = pickGap(i + 3);
            if (gap) base.lavaEruptions.push(createLavaEruption(gap.left, gap.right, tier, 1.1));
            const dragonGap = pickGap(i + 4);
            if (dragonGap) base.flyingDragons.push(createFlyingDragon(dragonGap.left, dragonGap.right, tier, 1.35));
        }

        if (levelNumber >= 13) {
            const platform = pick(i + 10);
            if (platform) base.gears.push(createGear(platform, 0.7, tier));
        }

        if (levelNumber >= 15) {
            const platform = pick(i + 11);
            if (platform) base.trapdoors.push(createTrapdoor(platform, 0.38, tier));
            const gatePlatform = base.platforms[base.platforms.length - 1];
            if (gatePlatform) base.trapdoors.push(createGateTrapdoor(gatePlatform, tier));
        }

        if (levelNumber >= 16) {
            const platform = pick(i + 12);
            if (platform) base.trampolines.push(createTrampoline(platform, 0.72));
        }

        if (levelNumber >= 18) {
            const platform = pick(i + 13);
            if (platform) base.caves.push(createCave(platform, 0.32, tier));
            const gap = pickGap(i + 5);
            if (gap) base.lavaEruptions.push(createLavaEruption(gap.left, gap.right, tier, 1.7));
            const dragonGap = pickGap(i + 6);
            if (dragonGap) base.flyingDragons.push(createFlyingDragon(dragonGap.left, dragonGap.right, tier, 2.1));
        }

        const buttonPlatform = pick(i + 2);
        if (buttonPlatform && levelNumber >= 9) {
            const targets = ["gears", "flyingDragons", "trapdoors"];
            base.buttons = [createButton(buttonPlatform, targets[i % targets.length])];
        }

        const powerupTypes = ["shield", "speed", "jump", "slow"];
        const firstPowerPlatform = pick(i + 1);
        if (firstPowerPlatform) {
            base.powerups.push(createPowerup(firstPowerPlatform, powerupTypes[i % powerupTypes.length], 0.28));
        }
        if (levelNumber >= 8) {
            const secondPowerPlatform = pick(i + 5);
            if (secondPowerPlatform) base.powerups.push(createPowerup(secondPowerPlatform, powerupTypes[(i + 2) % powerupTypes.length], 0.72));
        }
        if (levelNumber >= 15) {
            const thirdPowerPlatform = pick(i + 9);
            if (thirdPowerPlatform) base.powerups.push(createPowerup(thirdPowerPlatform, powerupTypes[(i + 1) % powerupTypes.length], 0.5));
        }

        base.coins = base.coins.map((coin, coinIndex) => ({
            ...coin,
            y: coin.y - (coinIndex % 2 === 0 ? 10 : 0)
        }));

        campaign.push(base);
    }
    return campaign;
}

const normalLevels = buildCampaignLevels(10);
const ultimateLevels = buildUltimateLevels(20);
let levels = normalLevels;

function resize() {
    const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 1.25));
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    menuDrawn = false;
}

function loadLevel(index) {
    const level = levels[index];
    world.width = level.width;
    start = { ...level.start };
    goal = { ...level.goal };
    platforms = level.platforms.map(item => ({ ...item }));
    hazards = level.hazards.map(item => ({ ...item, active: true }));
    lavaPools = level.lavaPools.map(item => ({ ...item, active: true }));
    waterPools = level.waterPools.map(item => ({ ...item }));
    enemies = level.enemies.map(item => ({ ...item }));
    drones = level.drones.map(item => ({ ...item, nextShot: elapsed + item.delay, active: true }));
    droneShots = [];
    coins = level.coins.map(item => ({ ...item, r: 11, taken: false }));
    portals = level.portals.map(item => ({ ...item }));
    trampolines = level.trampolines.map(item => ({ ...item }));
    buttons = level.buttons.map(item => ({ ...item, pressed: false }));
    flyingDragons = (level.flyingDragons || []).map(item => ({ ...item, active: true }));
    gears = (level.gears || []).map(item => ({ ...item, active: true }));
    caves = (level.caves || []).map(item => ({ ...item, nextRock: item.interval, active: true }));
    trapdoors = (level.trapdoors || []).map(item => ({ ...item, timer: 0, reset: 0, open: false, locked: false }));
    fallingRocks = [];
    lavaEruptions = (level.lavaEruptions || []).map(item => ({ ...item, active: true }));
    powerups = (level.powerups || []).map(item => ({ ...item, taken: false }));
    activePowerups = { shield: 0, speed: 0, jump: 0, slow: 0 };
    player.x = start.x;
    player.y = start.y;
    player.vx = 0;
    player.vy = 0;
    player.grounded = false;
    player.invuln = 0;
    portalCooldown = 0;
    trampolineCooldown = 0;
    cameraX = 0;
}

function resetGame() {
    levels = currentMode === "ultimate" ? ultimateLevels : normalLevels;
    levelIndex = 0;
    totalCoins = 0;
    player.lives = 15;
    elapsed = 0;
    finished = false;
    loadLevel(levelIndex);
}

function selectMode(mode) {
    selectedMode = mode === "ultimate" ? "ultimate" : "normal";
    modeCards.forEach(card => card.classList.toggle("selected", card.dataset.mode === selectedMode));
    startBtn.textContent = selectedMode === "ultimate" ? "Start Ultimate" : "Start Normal";
}

function showOverlay(title, copy, button) {
    overlay.querySelector("h1").textContent = title;
    overlay.querySelector("p").textContent = copy;
    startBtn.textContent = button;
    overlay.style.display = "grid";
    menuDrawn = false;
}

function begin(mode = selectedMode) {
    currentMode = mode === "ultimate" ? "ultimate" : "normal";
    selectMode(currentMode);
    resetGame();
    started = true;
    menuDrawn = false;
    overlay.style.display = "none";
    canvas.focus();
}

function startFromKeyboard(code) {
    if (overlay.style.display === "none") return false;
    if (code === "ArrowLeft") {
        selectMode("normal");
        return true;
    }
    if (code === "ArrowRight") {
        selectMode("ultimate");
        return true;
    }
    if (!["ArrowUp", "Enter", "Space"].includes(code)) return false;
    begin();
    return true;
}

function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function circleRectOverlap(circle, rect) {
    const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
    const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
    const dx = circle.x - closestX;
    const dy = circle.y - closestY;
    return dx * dx + dy * dy <= circle.r * circle.r;
}

function blockedByUltimateHazard(rect) {
    const blockedByGear = gears.some(gear => gear.active && circleRectOverlap(gear, rect));
    const blockedByCave = caves.some(cave => cave.active && rectsOverlap(rect, cave));
    const blockedByEruption = lavaEruptions.some(eruption => lavaEruptionHitbox(eruption) && rectsOverlap(rect, lavaEruptionHitbox(eruption)));
    const blockedByFlyingDragon = flyingDragons.some(dragon => {
        const flame = flyingDragonFlameHitbox(dragon);
        return flame && rectsOverlap(rect, flame);
    });
    return blockedByGear || blockedByCave || blockedByEruption || blockedByFlyingDragon;
}

function lavaEruptionPhase(eruption) {
    return eruption.phase % eruption.cycle;
}

function lavaEruptionPower(eruption) {
    const phase = lavaEruptionPhase(eruption);
    if (phase < eruption.warning) return 0;
    if (phase > eruption.warning + eruption.blast) return 0;
    const t = (phase - eruption.warning) / eruption.blast;
    return Math.sin(t * Math.PI);
}

function lavaEruptionHitbox(eruption) {
    const power = lavaEruptionPower(eruption);
    if (power <= 0.2) return null;
    const h = eruption.height * (0.35 + power * 0.65);
    return {
        x: eruption.x + eruption.w * 0.16,
        y: eruption.y - h,
        w: eruption.w * 0.68,
        h
    };
}

function lavaPitHitbox(eruption) {
    return {
        x: eruption.x + eruption.w / 2 - eruption.pitW / 2,
        y: eruption.y - 6,
        w: eruption.pitW,
        h: eruption.pitH + 34
    };
}

function flyingDragonPhase(dragon) {
    return dragon.phase % dragon.cycle;
}

function flyingDragonBurstPower(dragon) {
    const phase = flyingDragonPhase(dragon);
    if (phase < dragon.warning) return 0;
    if (phase > dragon.warning + dragon.blast) return 0;
    const t = (phase - dragon.warning) / dragon.blast;
    return Math.sin(t * Math.PI);
}

function flyingDragonFlameHitbox(dragon) {
    const power = flyingDragonBurstPower(dragon);
    if (power <= 0.18) return null;
    const length = 150 + power * 80;
    const h = 30 + power * 18;
    return {
        x: dragon.facing < 0 ? dragon.x - length - 36 : dragon.x + 28,
        y: dragon.y + 10 - h / 2,
        w: length,
        h
    };
}

function respawnOnNearestPlatform() {
    const centerX = player.x + player.w / 2;
    const centerY = player.y + player.h / 2;
    let bestPlatform = null;
    let bestX = start.x;
    let bestScore = Infinity;

    platforms.forEach(platform => {
        const spawnX = Math.max(platform.x + 8, Math.min(centerX - player.w / 2, platform.x + platform.w - player.w - 8));
        const spawn = {
            x: spawnX,
            y: platform.y - player.h - 4,
            w: player.w,
            h: player.h
        };
        const blockedByHazard = hazards.some(hazard => hazard.active && rectsOverlap(spawn, hazard));
        const blockedByLava = lavaPools.some(lava => lava.active && rectsOverlap(spawn, lava));
        if (blockedByHazard || blockedByLava || blockedByUltimateHazard(spawn)) return;

        const closestX = Math.max(platform.x, Math.min(centerX, platform.x + platform.w));
        const closestY = Math.max(platform.y, Math.min(centerY, platform.y + platform.h));
        const dx = centerX - closestX;
        const dy = centerY - closestY;
        const score = dx * dx + dy * dy;
        if (score < bestScore) {
            bestScore = score;
            bestPlatform = platform;
            bestX = spawnX;
        }
    });

    if (!bestPlatform) {
        player.x = start.x;
        player.y = start.y;
        return;
    }

    player.x = bestX;
    player.y = bestPlatform.y - player.h - 4;
}

function hurt() {
    if (player.invuln > 0 || finished) return;
    if (activePowerups.shield > 0) {
        activePowerups.shield = 0;
        player.invuln = 60;
        return;
    }
    player.lives -= 1;
    player.invuln = 90;
    if (player.lives <= 0) {
        finished = true;
        started = false;
        showOverlay("Run Failed", `You reached level ${levelIndex + 1} and collected ${totalCoins} coins. Try again.`, "Retry");
        return;
    }
    respawnOnNearestPlatform();
    player.vx = 0;
    player.vy = 0;
    player.grounded = false;
}

function checkPortals() {
    if (portalCooldown > 0) return;
    for (const portal of portals) {
        const portalZone = {
            x: portal.x - 6,
            y: portal.y - 6,
            w: portal.w + 12,
            h: portal.h + 12
        };
        if (!rectsOverlap(player, portalZone)) continue;
        const target = portals[portal.target];
        if (!target) return;
        player.x = target.x + target.w / 2 - player.w / 2;
        player.y = target.y + target.h - player.h;
        player.vx = player.vx >= 0 ? 4.5 : -4.5;
        player.vy = -5;
        player.grounded = false;
        portalCooldown = 45;
        return;
    }
}

function checkTrampolines() {
    if (trampolineCooldown > 0) return;
    const centerX = player.x + player.w / 2;
    const feetY = player.y + player.h;
    for (const trampoline of trampolines) {
        const onPad = centerX >= trampoline.x &&
            centerX <= trampoline.x + trampoline.w &&
            feetY >= trampoline.y &&
            feetY <= trampoline.y + trampoline.h + 8;
        if (!onPad || !player.grounded) continue;
        player.vy = -trampoline.power;
        player.grounded = false;
        trampolineCooldown = 12;
        return;
    }
}

function activateButton(button) {
    button.pressed = true;
    if (button.target === "lava") lavaPools.forEach(lava => lava.active = false);
    if (button.target === "pulse") hazards.forEach(hazard => hazard.active = false);
    if (button.target === "drones") {
        drones.forEach(drone => drone.active = false);
        droneShots = [];
    }
    if (button.target === "gears") gears.forEach(gear => gear.active = false);
    if (button.target === "flyingDragons") flyingDragons.forEach(dragon => dragon.active = false);
    if (button.target === "trapdoors") trapdoors.forEach(trapdoor => {
        trapdoor.locked = true;
        trapdoor.open = false;
        trapdoor.timer = 0;
    });
}

function checkButtons() {
    for (const button of buttons) {
        const buttonZone = {
            x: button.x - 10,
            y: button.y - 12,
            w: button.w + 20,
            h: button.h + 22
        };
        if (button.pressed || !rectsOverlap(player, buttonZone)) continue;
        activateButton(button);
    }
}

function collectPowerup(powerup) {
    powerup.taken = true;
    if (powerup.type === "shield") activePowerups.shield = 9;
    if (powerup.type === "speed") activePowerups.speed = 7;
    if (powerup.type === "jump") activePowerups.jump = 8;
    if (powerup.type === "slow") activePowerups.slow = 7;
}

function updatePowerups(dt) {
    activePowerups.shield = Math.max(0, activePowerups.shield - dt);
    activePowerups.speed = Math.max(0, activePowerups.speed - dt);
    activePowerups.jump = Math.max(0, activePowerups.jump - dt);
    activePowerups.slow = Math.max(0, activePowerups.slow - dt);

    powerups.forEach(powerup => {
        if (powerup.taken) return;
        const dx = player.x + player.w / 2 - powerup.x;
        const dy = player.y + player.h / 2 - powerup.y;
        if (Math.hypot(dx, dy) < powerup.r + 24) collectPowerup(powerup);
    });
}

function fireDroneShot(drone) {
    const targetX = player.x + player.w / 2;
    const targetY = player.y + player.h / 2;
    const dx = targetX - drone.x;
    const dy = targetY - drone.y;
    const distance = Math.hypot(dx, dy) || 1;
    const speed = 6.2;
    droneShots.push({
        x: drone.x,
        y: drone.y,
        vx: dx / distance * speed,
        vy: dy / distance * speed,
        r: 6
    });
}

function updateUltimateHazards(dt) {
    if (currentMode !== "ultimate") return;

    gears.forEach(gear => {
        if (!gear.active) return;
        gear.angle += dt * 5;
        if (gear.max > gear.min) {
            gear.x += gear.speed * dt * 60;
            if (gear.x < gear.min || gear.x > gear.max) {
                gear.speed *= -1;
                gear.x = Math.max(gear.min, Math.min(gear.max, gear.x));
            }
        }
    });

    lavaEruptions.forEach(eruption => {
        if (!eruption.active) return;
        eruption.phase = (eruption.phase + dt) % eruption.cycle;
    });

    flyingDragons.forEach(dragon => {
        if (!dragon.active) return;
        dragon.phase = (dragon.phase + dt) % dragon.cycle;
        dragon.y = dragon.baseY + Math.sin(elapsed * 3 + dragon.x * 0.01) * 12;
        if (flyingDragonBurstPower(dragon) <= 0) {
            dragon.facing = player.x + player.w / 2 < dragon.x ? -1 : 1;
        }
        dragon.x += dragon.speed * dragon.facing * dt * 60;
        if (dragon.x < dragon.min || dragon.x > dragon.max) {
            dragon.facing *= -1;
            dragon.x = Math.max(dragon.min, Math.min(dragon.max, dragon.x));
        }
    });

    trapdoors.forEach(trapdoor => {
        if (trapdoor.locked) return;
        const standZone = {
            x: trapdoor.x,
            y: trapdoor.y - 8,
            w: trapdoor.w,
            h: trapdoor.h + 18
        };
        if (!trapdoor.open && rectsOverlap(player, standZone)) {
            trapdoor.timer += dt;
            if (trapdoor.timer >= trapdoor.fuse) {
                trapdoor.open = true;
                trapdoor.reset = 2.1;
                trapdoor.timer = 0;
            }
        } else if (!trapdoor.open) {
            trapdoor.timer = Math.max(0, trapdoor.timer - dt * 0.8);
        }
        if (trapdoor.open) {
            trapdoor.reset -= dt;
            if (trapdoor.reset <= 0 && !rectsOverlap(player, standZone)) {
                trapdoor.open = false;
            }
        }
    });

    caves.forEach(cave => {
        if (!cave.active) return;
        cave.nextRock -= dt;
        if (cave.nextRock > 0) return;
        fallingRocks.push({
            x: cave.x + cave.w / 2,
            y: cave.y + cave.h - 6,
            vy: 2.1,
            r: 13
        });
        cave.nextRock = cave.interval;
    });

    fallingRocks.forEach(rock => {
        rock.vy += 0.18;
        rock.y += rock.vy * dt * 60;
    });
    fallingRocks = fallingRocks.filter(rock => rock.y < world.height + 120);
}

function completeLevel() {
    const collected = coins.filter(c => c.taken).length;
    totalCoins += collected;
    if (levelIndex >= levels.length - 1) {
        finished = true;
        started = false;
        showOverlay("Game Complete", `You cleared all ${levels.length} levels with ${totalCoins} coins in ${elapsed.toFixed(1)} seconds.`, "Run Again");
        return;
    }
    levelIndex += 1;
    loadLevel(levelIndex);
    player.invuln = 75;
}

function moveAndCollide() {
    const inWater = waterPools.some(water => rectsOverlap(player, water));
    const speedBoost = activePowerups.speed > 0 ? 1.28 : 1;
    const jumpBoost = activePowerups.jump > 0 ? 1.2 : 1;
    const speed = (player.grounded ? 1.0 : 0.7) * (inWater ? 0.68 : 1) * speedBoost;
    if (keys.left) player.vx -= speed;
    if (keys.right) player.vx += speed;
    if (!keys.left && !keys.right) player.vx *= player.grounded ? 0.82 : 0.96;
    const maxSpeed = (inWater ? 4.7 : 9.2) * speedBoost;
    player.vx = Math.max(-maxSpeed, Math.min(maxSpeed, player.vx));

    if (keys.jump && player.grounded) {
        player.vy = (inWater ? -14 : -18) * jumpBoost;
        player.grounded = false;
    }

    player.vy += inWater ? world.gravity * 0.38 : world.gravity;
    if (keys.down && !player.grounded && !inWater) player.vy += world.gravity * 0.7;
    player.vy = Math.min(player.vy, inWater ? 5.5 : 18);

    player.x += player.vx;
    for (const p of platforms) {
        if (!rectsOverlap(player, p)) continue;
        if (player.vx > 0) player.x = p.x - player.w;
        if (player.vx < 0) player.x = p.x + p.w;
        player.vx = 0;
    }
    if (currentMode === "ultimate") {
        for (const p of trapdoors) {
            if (p.open || !rectsOverlap(player, p)) continue;
            if (player.vx > 0) player.x = p.x - player.w;
            if (player.vx < 0) player.x = p.x + p.w;
            player.vx = 0;
        }
    }

    player.y += player.vy;
    player.grounded = false;
    for (const p of platforms) {
        if (!rectsOverlap(player, p)) continue;
        if (player.vy > 0) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.grounded = true;
        } else if (player.vy < 0) {
            player.y = p.y + p.h;
            player.vy = 0;
        }
    }
    if (currentMode === "ultimate") {
        for (const p of trapdoors) {
            if (p.open || !rectsOverlap(player, p)) continue;
            if (player.vy > 0) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.grounded = true;
            } else if (player.vy < 0) {
                player.y = p.y + p.h;
                player.vy = 0;
            }
        }
    }

    player.x = Math.max(0, Math.min(world.width - player.w, player.x));
    if (player.y > world.height + 160) hurt();
}

function update(dt) {
    if (!started || finished) return;
    elapsed += dt;
    if (player.invuln > 0) player.invuln -= 1;
    if (portalCooldown > 0) portalCooldown -= 1;
    if (trampolineCooldown > 0) trampolineCooldown -= 1;

    enemies.forEach(enemy => {
        enemy.x += enemy.speed;
        if (enemy.x < enemy.min || enemy.x > enemy.max) {
            enemy.speed *= -1;
            enemy.x = Math.max(enemy.min, Math.min(enemy.max, enemy.x));
        }
    });

    drones.forEach(drone => {
        if (!drone.active) return;
        if (elapsed >= drone.nextShot) {
            fireDroneShot(drone);
            drone.nextShot = elapsed + 3;
        }
    });

    if (currentMode === "ultimate") {
        updatePowerups(dt);
        const dangerDt = activePowerups.slow > 0 ? dt * 0.45 : dt;
        updateUltimateHazards(dangerDt);
    }

    droneShots.forEach(shot => {
        shot.x += shot.vx * dt * 60;
        shot.y += shot.vy * dt * 60;
    });
    droneShots = droneShots.filter(shot =>
        shot.x > -80 &&
        shot.x < world.width + 80 &&
        shot.y > -120 &&
        shot.y < world.height + 180
    );

    moveAndCollide();
    checkTrampolines();
    checkPortals();
    checkButtons();

    hazards.forEach(hazard => {
        if (!hazard.active) return;
        if (rectsOverlap(player, hazard)) hurt();
    });

    lavaPools.forEach(lava => {
        if (!lava.active) return;
        if (rectsOverlap(player, lava)) hurt();
    });

    enemies.forEach(enemy => {
        if (rectsOverlap(player, enemy)) hurt();
    });

    droneShots.forEach(shot => {
        const hitbox = { x: shot.x - shot.r, y: shot.y - shot.r, w: shot.r * 2, h: shot.r * 2 };
        if (rectsOverlap(player, hitbox)) hurt();
    });

    gears.forEach(gear => {
        if (gear.active && circleRectOverlap(gear, player)) hurt();
    });

    caves.forEach(cave => {
        if (cave.active && rectsOverlap(player, cave)) hurt();
    });

    fallingRocks.forEach(rock => {
        const hitbox = { x: rock.x - rock.r, y: rock.y - rock.r, w: rock.r * 2, h: rock.r * 2 };
        if (rectsOverlap(player, hitbox)) hurt();
    });

    lavaEruptions.forEach(eruption => {
        if (!eruption.active) return;
        if (rectsOverlap(player, lavaPitHitbox(eruption))) hurt();
        const blast = lavaEruptionHitbox(eruption);
        if (blast && rectsOverlap(player, blast)) hurt();
    });

    flyingDragons.forEach(dragon => {
        if (!dragon.active) return;
        if (circleRectOverlap({ x: dragon.x, y: dragon.y + 12, r: 24 }, player)) hurt();
        const flame = flyingDragonFlameHitbox(dragon);
        if (flame && rectsOverlap(player, flame)) hurt();
    });

    coins.forEach(coin => {
        if (!coin.taken) {
            const dx = player.x + player.w / 2 - coin.x;
            const dy = player.y + player.h / 2 - coin.y;
            if (Math.hypot(dx, dy) < 34) coin.taken = true;
        }
    });

    if (rectsOverlap(player, goal)) {
        completeLevel();
    }

    cameraX = player.x - window.innerWidth * 0.38;
    cameraX = Math.max(0, Math.min(world.width - window.innerWidth, cameraX));
}

function drawBackground() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const sky = ctx.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, "#0b1020");
    sky.addColorStop(0.58, "#112446");
    sky.addColorStop(1, "#07101f");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    ctx.translate(-cameraX * 0.18, 0);
    for (let i = 0; i < 32; i++) {
        const x = i * 170 + 40;
        const y = 44 + (i * 53) % 180;
        ctx.fillStyle = i % 3 === 0 ? "#8deaff" : "#577da6";
        ctx.globalAlpha = 0.45;
        ctx.fillRect(x, y, 2, 2);
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    ctx.save();
    ctx.translate(-cameraX * 0.38, 0);
    for (let i = 0; i < 12; i++) {
        const x = i * 440 - 80;
        const base = h - 90 - (i % 3) * 28;
        ctx.fillStyle = i % 2 ? "#152d55" : "#102849";
        ctx.beginPath();
        ctx.moveTo(x, h);
        ctx.lineTo(x + 180, base);
        ctx.lineTo(x + 360, h);
        ctx.closePath();
        ctx.fill();
    }
    ctx.restore();
}

function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.fill();
}

function isVisibleX(x, w, margin = 120) {
    return x + w >= cameraX - margin && x <= cameraX + window.innerWidth + margin;
}

function drawFlyingDragon(dragon) {
    const power = flyingDragonBurstPower(dragon);
    const phase = flyingDragonPhase(dragon);
    const warning = power === 0 && phase < dragon.warning;
    const dir = dragon.facing;

    ctx.save();
    ctx.translate(dragon.x, dragon.y);
    ctx.scale(dir, 1);
    ctx.globalAlpha = dragon.active ? 1 : 0.24;

    if (warning) {
        ctx.save();
        ctx.globalAlpha = 0.38 + Math.sin(elapsed * 22) * 0.18;
        ctx.strokeStyle = "#ffda6d";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(-40, 12);
        ctx.lineTo(-190, 12);
        ctx.stroke();
        ctx.restore();
    }

    if (power > 0) {
        const length = 150 + power * 80;
        const h = 30 + power * 18;
        ctx.save();
        ctx.globalAlpha = 0.94;
        ctx.shadowColor = "#ff7418";
        ctx.shadowBlur = 18 + power * 14;
        const flame = ctx.createLinearGradient(-44 - length, 0, -44, 0);
        flame.addColorStop(0, "rgba(255, 62, 10, 0.15)");
        flame.addColorStop(0.35, "#ff4516");
        flame.addColorStop(0.68, "#ff9d18");
        flame.addColorStop(1, "#fff4a3");
        ctx.fillStyle = flame;
        ctx.beginPath();
        ctx.moveTo(-42, 12 - h / 2);
        ctx.lineTo(-44 - length, 12);
        ctx.lineTo(-42, 12 + h / 2);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }

    ctx.fillStyle = "#256844";
    ctx.beginPath();
    ctx.ellipse(0, 18, 28, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#3faa63";
    ctx.beginPath();
    ctx.moveTo(16, 8);
    ctx.lineTo(4, -28);
    ctx.lineTo(-30, 4);
    ctx.lineTo(-50, -18);
    ctx.lineTo(-42, 22);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#72e580";
    ctx.beginPath();
    ctx.ellipse(-28, 12, 20, 12, -0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#4fbd64";
    ctx.beginPath();
    ctx.moveTo(22, 23);
    ctx.quadraticCurveTo(58, 34, 76, 15);
    ctx.quadraticCurveTo(46, 20, 22, 13);
    ctx.fill();
    ctx.fillStyle = "#fff3aa";
    ctx.beginPath();
    ctx.moveTo(-44, 0);
    ctx.lineTo(-34, -13);
    ctx.lineTo(-31, 3);
    ctx.fill();
    ctx.fillStyle = "#fff0a6";
    ctx.beginPath();
    ctx.arc(-42, 9, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#08140f";
    ctx.fillRect(-43, 8, 2, 4);
    ctx.restore();
}

function drawUltimateHazards() {
    if (currentMode !== "ultimate") return;
    lavaEruptions.forEach(eruption => {
        if (!isVisibleX(eruption.x - eruption.pitW / 2, eruption.pitW + eruption.w)) return;
        const pit = lavaPitHitbox(eruption);
        const power = lavaEruptionPower(eruption);
        const warning = power === 0 && lavaEruptionPhase(eruption) < eruption.warning;
        const warningGlow = warning ? 0.35 + Math.sin(elapsed * 18) * 0.18 : 0;

        ctx.save();
        ctx.shadowColor = "#ff6a00";
        ctx.shadowBlur = 12 + warningGlow * 18;
        const pitGradient = ctx.createLinearGradient(0, pit.y, 0, pit.y + pit.h);
        pitGradient.addColorStop(0, "#ffd166");
        pitGradient.addColorStop(0.35, "#ff5b14");
        pitGradient.addColorStop(1, "#5f0800");
        ctx.fillStyle = pitGradient;
        roundRect(pit.x, pit.y, pit.w, pit.h, 8);
        ctx.fillStyle = `rgba(255, 240, 142, ${0.55 + warningGlow})`;
        for (let x = pit.x + 10; x < pit.x + pit.w; x += 18) {
            ctx.beginPath();
            ctx.arc(x, pit.y + 10 + Math.sin(elapsed * 9 + x) * 4, 4, 0, Math.PI * 2);
            ctx.fill();
        }

        if (warning) {
            ctx.globalAlpha = 0.7 + warningGlow;
            ctx.fillStyle = "#ffcc55";
            ctx.fillRect(eruption.x + eruption.w * 0.2, pit.y - 12, eruption.w * 0.6, 5);
        }

        if (power > 0) {
            const blastHeight = eruption.height * (0.35 + power * 0.65);
            const flame = ctx.createLinearGradient(0, eruption.y - blastHeight, 0, eruption.y);
            flame.addColorStop(0, "rgba(255, 244, 166, 0.18)");
            flame.addColorStop(0.2, "#fff0a4");
            flame.addColorStop(0.52, "#ff7a18");
            flame.addColorStop(1, "#8f1200");
            ctx.globalAlpha = 0.96;
            ctx.shadowBlur = 22 + power * 18;
            ctx.fillStyle = flame;
            ctx.beginPath();
            ctx.moveTo(eruption.x + eruption.w * 0.12, eruption.y);
            ctx.bezierCurveTo(
                eruption.x - eruption.w * 0.32,
                eruption.y - blastHeight * 0.38,
                eruption.x + eruption.w * 0.22,
                eruption.y - blastHeight * 0.78,
                eruption.x + eruption.w * 0.5,
                eruption.y - blastHeight
            );
            ctx.bezierCurveTo(
                eruption.x + eruption.w * 0.94,
                eruption.y - blastHeight * 0.76,
                eruption.x + eruption.w * 1.3,
                eruption.y - blastHeight * 0.35,
                eruption.x + eruption.w * 0.88,
                eruption.y
            );
            ctx.closePath();
            ctx.fill();

            ctx.globalAlpha = 0.72;
            ctx.fillStyle = "#fff6b8";
            ctx.beginPath();
            ctx.ellipse(eruption.x + eruption.w / 2, eruption.y - blastHeight * 0.42, eruption.w * 0.18, blastHeight * 0.32, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    });

    trapdoors.forEach(trapdoor => {
        if (!isVisibleX(trapdoor.x, trapdoor.w)) return;
        ctx.save();
        ctx.globalAlpha = trapdoor.open ? 0.28 : 1;
        ctx.fillStyle = trapdoor.locked ? "#41685f" : trapdoor.gateTrap ? "#2a9f72" : "#8c5a35";
        roundRect(trapdoor.x, trapdoor.y, trapdoor.w, trapdoor.h, 4);
        ctx.strokeStyle = trapdoor.locked ? "#9de8cf" : trapdoor.gateTrap ? "#9dffd7" : "#f2bd73";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(trapdoor.x + trapdoor.w / 2, trapdoor.y + 2);
        ctx.lineTo(trapdoor.x + trapdoor.w / 2, trapdoor.y + trapdoor.h - 2);
        ctx.stroke();
        if (trapdoor.gateTrap && !trapdoor.open) {
            ctx.fillStyle = "rgba(225, 255, 242, 0.85)";
            ctx.font = "900 9px Segoe UI, Arial, sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("GATE", trapdoor.x + trapdoor.w / 2, trapdoor.y - 6);
            ctx.textAlign = "left";
        }
        if (trapdoor.timer > 0 && !trapdoor.open) {
            ctx.fillStyle = "#ffdd77";
            ctx.fillRect(trapdoor.x, trapdoor.y - 5, trapdoor.w * Math.min(1, trapdoor.timer / trapdoor.fuse), 3);
        }
        ctx.restore();
    });

    gears.forEach(gear => {
        if (!isVisibleX(gear.x - gear.r - 12, gear.r * 2 + 24)) return;
        ctx.save();
        ctx.globalAlpha = gear.active ? 1 : 0.2;
        ctx.translate(gear.x, gear.y);
        ctx.rotate(gear.angle);
        ctx.fillStyle = "#cbd6df";
        for (let i = 0; i < 10; i++) {
            ctx.rotate(Math.PI / 5);
            ctx.fillRect(-4, -gear.r - 8, 8, 12);
        }
        ctx.beginPath();
        ctx.arc(0, 0, gear.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#65717d";
        ctx.beginPath();
        ctx.arc(0, 0, gear.r * 0.42, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    });

    caves.forEach(cave => {
        if (!isVisibleX(cave.x, cave.w)) return;
        ctx.save();
        ctx.globalAlpha = cave.active ? 1 : 0.24;
        ctx.fillStyle = "#2a2630";
        roundRect(cave.x, cave.y, cave.w, cave.h, 18);
        ctx.fillStyle = "#05070c";
        roundRect(cave.x + 12, cave.y + 13, cave.w - 24, cave.h - 8, 16);
        ctx.fillStyle = "#c4d0db";
        for (let x = cave.x + 13; x < cave.x + cave.w - 12; x += 18) {
            ctx.beginPath();
            ctx.moveTo(x, cave.y + 2);
            ctx.lineTo(x + 8, cave.y + 24);
            ctx.lineTo(x + 15, cave.y + 2);
            ctx.fill();
        }
        ctx.restore();
    });

    fallingRocks.forEach(rock => {
        if (!isVisibleX(rock.x - rock.r, rock.r * 2)) return;
        ctx.save();
        ctx.fillStyle = "#80706b";
        ctx.beginPath();
        ctx.arc(rock.x, rock.y, rock.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.18)";
        ctx.beginPath();
        ctx.arc(rock.x - 4, rock.y - 5, rock.r * 0.34, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    });

    flyingDragons.forEach(dragon => {
        if (isVisibleX(dragon.x - 240, 320)) drawFlyingDragon(dragon);
    });
}

function powerupStyle(type) {
    if (type === "shield") return { fill: "#6dffcf", stroke: "#e4fff8", label: "S" };
    if (type === "speed") return { fill: "#ffd35a", stroke: "#fff3b8", label: ">>" };
    if (type === "jump") return { fill: "#8ee7ff", stroke: "#e8fbff", label: "J" };
    return { fill: "#c597ff", stroke: "#f3e8ff", label: "T" };
}

function drawPowerups() {
    if (currentMode !== "ultimate") return;
    powerups.forEach(powerup => {
        if (powerup.taken) return;
        if (!isVisibleX(powerup.x - powerup.r, powerup.r * 2)) return;
        const style = powerupStyle(powerup.type);
        const bob = Math.sin(elapsed * 4 + powerup.x * 0.01) * 4;
        ctx.save();
        ctx.translate(powerup.x, powerup.y + bob);
        ctx.shadowColor = style.fill;
        ctx.shadowBlur = 12;
        ctx.fillStyle = style.fill;
        ctx.beginPath();
        ctx.arc(0, 0, powerup.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = style.stroke;
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#07101f";
        ctx.font = "900 11px Segoe UI, Arial, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(style.label, 0, 1);
        ctx.restore();
    });
    ctx.textAlign = "left";
    ctx.textBaseline = "alphabetic";
}

function activePowerupText() {
    const labels = [];
    if (activePowerups.shield > 0) labels.push(`Shield ${Math.ceil(activePowerups.shield)}`);
    if (activePowerups.speed > 0) labels.push(`Speed ${Math.ceil(activePowerups.speed)}`);
    if (activePowerups.jump > 0) labels.push(`Jump ${Math.ceil(activePowerups.jump)}`);
    if (activePowerups.slow > 0) labels.push(`Slow ${Math.ceil(activePowerups.slow)}`);
    return labels.join(" | ");
}

function drawWorld() {
    ctx.save();
    ctx.translate(-cameraX, 0);

    ctx.fillStyle = "rgba(141, 234, 255, 0.16)";
    ctx.font = "800 56px Segoe UI, Arial, sans-serif";
    ctx.fillText(levels[levelIndex].name, cameraX + 42, 112);

    platforms.forEach(p => {
        if (!isVisibleX(p.x, p.w)) return;
        ctx.fillStyle = "#19365e";
        roundRect(p.x, p.y, p.w, p.h, 8);
        ctx.fillStyle = "#42d8ff";
        ctx.fillRect(p.x + 8, p.y + 4, p.w - 16, 4);
    });

    drawUltimateHazards();

    trampolines.forEach(trampoline => {
        if (!isVisibleX(trampoline.x, trampoline.w)) return;
        ctx.save();
        ctx.shadowColor = "#7dff6a";
        ctx.shadowBlur = 5;
        ctx.fillStyle = "#7dff6a";
        roundRect(trampoline.x, trampoline.y, trampoline.w, trampoline.h, 6);
        ctx.fillStyle = "#113d20";
        ctx.fillRect(trampoline.x + 7, trampoline.y + 4, trampoline.w - 14, 3);
        ctx.fillStyle = "#d9ffd1";
        ctx.beginPath();
        ctx.moveTo(trampoline.x + trampoline.w / 2, trampoline.y - 12);
        ctx.lineTo(trampoline.x + trampoline.w / 2 + 8, trampoline.y - 1);
        ctx.lineTo(trampoline.x + trampoline.w / 2 - 8, trampoline.y - 1);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    });

    buttons.forEach(button => {
        if (!isVisibleX(button.x, button.w)) return;
        ctx.save();
        ctx.shadowColor = button.pressed ? "#65ff8a" : "#ffe66d";
        ctx.shadowBlur = button.pressed ? 3 : 5;
        ctx.fillStyle = button.pressed ? "#2f8f4e" : "#ffe66d";
        roundRect(button.x, button.y + (button.pressed ? 5 : 0), button.w, button.h - (button.pressed ? 5 : 0), 5);
        ctx.fillStyle = button.pressed ? "#baffc8" : "#2f2300";
        ctx.font = "800 10px Segoe UI, Arial, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(button.target.toUpperCase(), button.x + button.w / 2, button.y - 5);
        ctx.textAlign = "left";
        ctx.restore();
    });

    lavaPools.forEach(lava => {
        if (!isVisibleX(lava.x, lava.w)) return;
        const wave = Math.sin(elapsed * 5 + lava.x * 0.01) * 3;
        ctx.save();
        ctx.globalAlpha = lava.active ? 1 : 0.22;
        ctx.shadowColor = "#ff6a00";
        ctx.shadowBlur = 5;
        const lavaGradient = ctx.createLinearGradient(0, lava.y, 0, lava.y + lava.h);
        lavaGradient.addColorStop(0, "#ffd166");
        lavaGradient.addColorStop(0.32, "#ff7a18");
        lavaGradient.addColorStop(1, "#9d1b00");
        ctx.fillStyle = lavaGradient;
        roundRect(lava.x, lava.y + wave, lava.w, lava.h, 8);
        ctx.fillStyle = "rgba(255, 245, 170, 0.82)";
        for (let x = lava.x + 14; x < lava.x + lava.w; x += 46) {
            ctx.beginPath();
            ctx.arc(x, lava.y + 12 + Math.sin(elapsed * 6 + x) * 4, 5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    });

    waterPools.forEach(water => {
        if (!isVisibleX(water.x, water.w)) return;
        const wave = Math.sin(elapsed * 4 + water.x * 0.012) * 3;
        ctx.save();
        ctx.shadowColor = "#2bd9ff";
        ctx.shadowBlur = 4;
        const waterGradient = ctx.createLinearGradient(0, water.y, 0, water.y + water.h);
        waterGradient.addColorStop(0, "rgba(143, 238, 255, 0.9)");
        waterGradient.addColorStop(0.45, "rgba(43, 158, 255, 0.72)");
        waterGradient.addColorStop(1, "rgba(10, 52, 128, 0.88)");
        ctx.fillStyle = waterGradient;
        roundRect(water.x, water.y + wave, water.w, water.h, 8);
        ctx.strokeStyle = "rgba(219, 250, 255, 0.82)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let x = water.x + 8; x <= water.x + water.w - 8; x += 14) {
            const y = water.y + 9 + Math.sin(elapsed * 5 + x * 0.05) * 4;
            if (x === water.x + 8) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.restore();
    });

    hazards.forEach(h => {
        if (!isVisibleX(h.x, h.w)) return;
        ctx.globalAlpha = h.active ? 0.8 : 0.18;
        ctx.fillStyle = "#ff315d";
        roundRect(h.x, h.y, h.w, h.h, 6);
        ctx.globalAlpha = h.active ? 1 : 0.25;
        for (let x = h.x + 12; x < h.x + h.w; x += 32) {
            ctx.fillStyle = "#ffd2dc";
            ctx.beginPath();
            ctx.moveTo(x, h.y + 3);
            ctx.lineTo(x + 12, h.y + h.h - 4);
            ctx.lineTo(x - 12, h.y + h.h - 4);
            ctx.closePath();
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    });

    portals.forEach(portal => {
        if (!isVisibleX(portal.x, portal.w)) return;
        const cx = portal.x + portal.w / 2;
        const cy = portal.y + portal.h / 2;
        ctx.save();
        ctx.shadowColor = portal.color;
        ctx.shadowBlur = 6;
        ctx.strokeStyle = portal.color;
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.ellipse(cx, cy, portal.w / 2, portal.h / 2, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 0.22;
        ctx.fillStyle = portal.color;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#e9fbff";
        ctx.beginPath();
        ctx.ellipse(cx, cy, portal.w / 3, portal.h / 3, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
    });

    coins.forEach(coin => {
        if (coin.taken) return;
        if (!isVisibleX(coin.x - coin.r, coin.r * 2)) return;
        ctx.fillStyle = "#ffe86b";
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, coin.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#fff8b8";
        ctx.lineWidth = 3;
        ctx.stroke();
    });

    drawPowerups();

    enemies.forEach(enemy => {
        if (!isVisibleX(enemy.x, enemy.w)) return;
        ctx.fillStyle = "#b64cff";
        roundRect(enemy.x, enemy.y, enemy.w, enemy.h, 7);
        ctx.fillStyle = "#f4d7ff";
        ctx.fillRect(enemy.x + 7, enemy.y + 9, 5, 5);
        ctx.fillRect(enemy.x + 18, enemy.y + 9, 5, 5);
    });

    drones.forEach(drone => {
        if (!isVisibleX(drone.x - drone.r, drone.r * 2)) return;
        if (!drone.active) {
            ctx.save();
            ctx.globalAlpha = 0.22;
            ctx.fillStyle = "#6b5278";
            ctx.beginPath();
            ctx.arc(drone.x, drone.y, drone.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#a88cb7";
            ctx.stroke();
            ctx.restore();
            return;
        }
        const angle = Math.atan2(player.y + player.h / 2 - drone.y, player.x + player.w / 2 - drone.x);
        ctx.save();
        ctx.shadowColor = "#ff4fd8";
        ctx.shadowBlur = 5;
        ctx.fillStyle = "#2a163f";
        ctx.beginPath();
        ctx.arc(drone.x, drone.y, drone.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#ff4fd8";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = "#ffd9f7";
        ctx.beginPath();
        ctx.arc(drone.x + Math.cos(angle) * 6, drone.y + Math.sin(angle) * 6, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 79, 216, 0.45)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(drone.x, drone.y);
        ctx.lineTo(drone.x + Math.cos(angle) * 34, drone.y + Math.sin(angle) * 34);
        ctx.stroke();
        ctx.restore();
    });

    droneShots.forEach(shot => {
        if (!isVisibleX(shot.x - shot.r, shot.r * 2)) return;
        ctx.save();
        ctx.shadowColor = "#ff4fd8";
        ctx.shadowBlur = 4;
        ctx.fillStyle = "#ff4fd8";
        ctx.beginPath();
        ctx.arc(shot.x, shot.y, shot.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#fff2fb";
        ctx.beginPath();
        ctx.arc(shot.x - shot.vx * 0.35, shot.y - shot.vy * 0.35, shot.r * 0.45, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    });

    ctx.fillStyle = "#49ffa8";
    roundRect(goal.x, goal.y, goal.w, goal.h, 10);
    ctx.fillStyle = "#08182b";
    roundRect(goal.x + 12, goal.y + 16, goal.w - 24, goal.h - 32, 8);
    ctx.strokeStyle = "#a3ffd4";
    ctx.lineWidth = 4;
    ctx.strokeRect(goal.x + 13, goal.y + 17, goal.w - 26, goal.h - 34);

    if (player.invuln <= 0 || Math.floor(player.invuln / 5) % 2 === 0) {
        if (activePowerups.shield > 0) {
            ctx.save();
            ctx.globalAlpha = 0.44 + Math.sin(elapsed * 10) * 0.08;
            ctx.strokeStyle = "#6dffcf";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.ellipse(player.x + player.w / 2, player.y + player.h / 2, player.w * 0.78, player.h * 0.7, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }
        ctx.fillStyle = "#8deaff";
        roundRect(player.x, player.y, player.w, player.h, 8);
        ctx.fillStyle = "#09213a";
        ctx.fillRect(player.x + 8, player.y + 14, 6, 6);
        ctx.fillRect(player.x + 21, player.y + 14, 6, 6);
        ctx.fillStyle = "#dffbff";
        ctx.fillRect(player.x + 8, player.y + player.h - 8, 18, 4);
    }

    ctx.restore();
}

function draw() {
    if (!started && overlay.style.display !== "none" && menuDrawn) return;
    drawBackground();
    if (!started && overlay.style.display !== "none") {
        menuDrawn = true;
        return;
    }
    drawWorld();
    const collected = coins.filter(c => c.taken).length;
    levelEl.textContent = `Level ${levelIndex + 1}/${levels.length}`;
    coinsEl.textContent = `Coins ${collected}/${coins.length}`;
    livesEl.textContent = `Lives ${player.lives}`;
    const powerText = activePowerupText();
    timeEl.textContent = powerText ? `${powerText} | Time ${elapsed.toFixed(1)}` : `Time ${elapsed.toFixed(1)}`;
}

function loop(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000 || 0);
    lastTime = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
}

function setKey(code, down) {
    if (code === "ArrowLeft" || code === "KeyA") keys.left = down;
    if (code === "ArrowRight" || code === "KeyD") keys.right = down;
    if (code === "ArrowUp" || code === "Space" || code === "KeyW") keys.jump = down;
    if (code === "ArrowDown" || code === "KeyS") keys.down = down;
}

window.addEventListener("keydown", event => {
    if (startFromKeyboard(event.code)) {
        event.preventDefault();
        return;
    }
    setKey(event.code, true);
    if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space"].includes(event.code)) event.preventDefault();
});

window.addEventListener("keyup", event => setKey(event.code, false));
window.addEventListener("message", event => {
    if (event.data?.type !== "game-key") return;
    if (event.data.down && startFromKeyboard(event.data.code)) return;
    setKey(event.data.code, event.data.down);
});
window.addEventListener("resize", resize);
startBtn.addEventListener("click", () => begin());
modeCards.forEach(card => {
    card.addEventListener("click", () => selectMode(card.dataset.mode));
});

document.querySelectorAll(".touch-btn").forEach(button => {
    const key = button.dataset.key;
    const down = event => {
        event.preventDefault();
        keys[key] = true;
    };
    const up = event => {
        event.preventDefault();
        keys[key] = false;
    };
    button.addEventListener("pointerdown", down);
    button.addEventListener("pointerup", up);
    button.addEventListener("pointercancel", up);
    button.addEventListener("pointerleave", up);
});

resize();
resetGame();
requestAnimationFrame(loop);
</script>
