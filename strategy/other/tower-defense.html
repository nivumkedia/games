<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grove Guard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: linear-gradient(180deg, #87CEEB 0%, #B0E0FF 40%, #E8F5E9 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
canvas {
    border: 3px solid #8B7355;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2), 0 0 40px rgba(139,115,85,0.15);
    cursor: crosshair;
}
</style>
</head>
<body>
<canvas id="gameCanvas" width="900" height="600"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GRID_SIZE = 50;
const COLS = canvas.width / GRID_SIZE;   // 18
const ROWS = canvas.height / GRID_SIZE;  // 12

const PATH = [
    {x: -1, y: 6},
    {x: 3,  y: 6},
    {x: 3,  y: 2},
    {x: 7,  y: 2},
    {x: 7,  y: 9},
    {x: 11, y: 9},
    {x: 11, y: 4},
    {x: 15, y: 4},
    {x: 15, y: 7},
    {x: 19, y: 7}
];

// Build path cell set
const pathCells = new Set();
for (let i = 0; i < PATH.length - 1; i++) {
    const start = PATH[i], end = PATH[i + 1];
    if (start.y === end.y) {
        const minX = Math.min(start.x, end.x), maxX = Math.max(start.x, end.x);
        for (let x = minX; x <= maxX; x++) {
            if (x >= 0 && x < COLS) pathCells.add(`${x},${start.y}`);
        }
    } else {
        const minY = Math.min(start.y, end.y), maxY = Math.max(start.y, end.y);
        for (let y = minY; y <= maxY; y++) {
            if (start.x >= 0 && start.x < COLS) pathCells.add(`${start.x},${y}`);
        }
    }
}

// Seeded random for decorations
let seed = 42;
function seededRandom() {
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
}

const decorations = [];
for (let i = 0; i < 120; i++) {
    decorations.push({
        x: seededRandom() * 900,
        y: seededRandom() * 600,
        type: seededRandom() < 0.4 ? 'flower' : seededRandom() < 0.6 ? 'stone' : 'grass',
        color: seededRandom() < 0.3 ? '#E8F5E9' : seededRandom() < 0.5 ? '#FFEB3B' : '#FF7043',
        size: 2 + seededRandom() * 4,
    });
}

function drawBackground() {
    // Base grass gradient
    const grassGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grassGrad.addColorStop(0, '#6ABF69');
    grassGrad.addColorStop(0.5, '#5CB85C');
    grassGrad.addColorStop(1, '#4CAF50');
    ctx.fillStyle = grassGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Sunlight patch
    const sunGrad = ctx.createRadialGradient(canvas.width * 0.3, canvas.height * 0.2, 0, canvas.width * 0.3, canvas.height * 0.2, 250);
    sunGrad.addColorStop(0, 'rgba(255,255,200,0.15)');
    sunGrad.addColorStop(1, 'rgba(255,255,200,0)');
    ctx.fillStyle = sunGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grass variation patches
    const grassColors = ['#66BB6A', '#5CB85C', '#72C572', '#60B760', '#54A854'];
    for (let i = 0; i < 40; i++) {
        const gx = (i * 137 + 43) % canvas.width;
        const gy = (i * 89 + 17) % canvas.height;
        const gr = 20 + (i * 7) % 30;
        ctx.fillStyle = grassColors[i % grassColors.length];
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.arc(gx, gy, gr, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Decorations (skip path cells)
    for (const d of decorations) {
        const dgx = Math.floor(d.x / GRID_SIZE);
        const dgy = Math.floor(d.y / GRID_SIZE);
        if (pathCells.has(`${dgx},${dgy}`)) continue;

        if (d.type === 'flower') {
            ctx.fillStyle = d.color;
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF9C4';
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.size * 0.4, 0, Math.PI * 2);
            ctx.fill();
        } else if (d.type === 'stone') {
            ctx.fillStyle = '#78909C';
            ctx.globalAlpha = 0.4;
            ctx.beginPath();
            ctx.ellipse(d.x, d.y, d.size * 1.2, d.size * 0.8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        } else {
            ctx.strokeStyle = '#66BB6A';
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.5;
            for (let j = 0; j < 3; j++) {
                ctx.beginPath();
                ctx.moveTo(d.x + j * 2 - 2, d.y + 3);
                ctx.quadraticCurveTo(d.x + j * 2 - 2 + (j - 1) * 2, d.y - d.size * 2, d.x + j * 2 - 2 + (j - 1) * 3, d.y - d.size * 3);
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
        }
    }

    // Subtle grid
    ctx.strokeStyle = 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= canvas.width; x += GRID_SIZE) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= canvas.height; y += GRID_SIZE) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }
}

function drawPath() {
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    const pts = PATH.map(p => [p.x * GRID_SIZE + GRID_SIZE / 2, p.y * GRID_SIZE + GRID_SIZE / 2]);

    function strokePath(style, width) {
        ctx.strokeStyle = style;
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
        ctx.stroke();
    }

    strokePath('#6D4C41', GRID_SIZE + 4);
    strokePath('#A1887F', GRID_SIZE);
    strokePath('#BCAAA4', GRID_SIZE - 12);
    strokePath('rgba(215,189,166,0.3)', GRID_SIZE - 30);

    // Cobblestone pattern
    ctx.fillStyle = 'rgba(93,64,55,0.12)';
    for (const cellKey of pathCells) {
        const [cx, cy] = cellKey.split(',').map(Number);
        const px = cx * GRID_SIZE, py = cy * GRID_SIZE;
        for (let si = 0; si < 3; si++) {
            const sx = px + 8 + ((cx * 7 + si * 17) % (GRID_SIZE - 16));
            const sy = py + 8 + ((cy * 11 + si * 13) % (GRID_SIZE - 16));
            ctx.beginPath();
            ctx.arc(sx, sy, 3 + (si % 2) * 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Entry arrow
    const [sx, sy] = pts[0];
    ctx.fillStyle = '#4CAF50';
    ctx.beginPath();
    ctx.moveTo(sx + 15, sy);
    ctx.lineTo(sx, sy - 10);
    ctx.lineTo(sx, sy + 10);
    ctx.closePath();
    ctx.fill();

    // Exit marker
    const [ex, ey] = pts[pts.length - 1];
    ctx.fillStyle = '#F44336';
    ctx.beginPath();
    ctx.arc(ex, ey, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('X', ex, ey);
}

drawBackground();
drawPath();
</script>
</body>
</html>
