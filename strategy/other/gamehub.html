<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playmerth 2.0</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #e8f4fd;
    --sidebar-bg: #ffffff;
    --border: #c8dff0;
    --text: #1a2a3a;
    --dim: #7a9ab8;
    --accent: #2a7fd4;
    --surface: #f0f7ff;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
    width: 220px;
    min-width: 220px;
    height: 100vh;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.sidebar-title {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}

.sidebar-title h1 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--accent);
}

.sidebar-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
    padding: 16px 20px 8px;
    flex-shrink: 0;
}

.sidebar-categories {
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    flex-shrink: 0;
}

.sidebar-games {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 12px;
}

.sidebar-games::-webkit-scrollbar { width: 4px; }
.sidebar-games::-webkit-scrollbar-track { background: transparent; }
.sidebar-games::-webkit-scrollbar-thumb { background: #b0cfe8; border-radius: 2px; }

.category-item, .game-item {
    display: flex;
    align-items: center;
    padding: 7px 20px;
    font-size: 13px;
    color: var(--dim);
    cursor: pointer;
    border-radius: 0;
    transition: background 0.15s, color 0.15s;
    user-select: none;
    gap: 9px;
}

.category-item:hover, .game-item:hover {
    background: var(--surface);
    color: var(--text);
}

.category-item.active, .game-item.active {
    color: var(--accent);
    background: var(--surface);
}

/* ── Main area ── */
.main {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    overflow: hidden;
}

.game-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
}

#screensaver {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
}
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-title">
        <h1>PLAYMERTH 2.0</h1>
    </div>

    <div class="sidebar-categories">
        <div class="sidebar-section-label">Categories</div>
        <!-- categories go here -->
    </div>

    <div class="sidebar-games">
        <div class="sidebar-section-label">Games</div>
        <!-- games go here -->
    </div>
</div>

<div class="main">
    <iframe class="game-frame" id="game-frame"></iframe>
    <canvas id="screensaver"></canvas>
</div>

<script>
function loadGame(src) {
    const frame = document.getElementById('game-frame');
    const canvas = document.getElementById('screensaver');
    frame.src = src;
    frame.style.display = 'block';
    canvas.style.display = 'none';
}

// Screensaver
(function() {
    const canvas = document.getElementById('screensaver');
    const ctx = canvas.getContext('2d');

    let clouds = [], birds = [], t = 0;

    function resize() {
        canvas.width = canvas.offsetWidth || canvas.parentElement.clientWidth;
        canvas.height = canvas.offsetHeight || canvas.parentElement.clientHeight;
        init();
    }

    function init() {
        const w = canvas.width, h = canvas.height;

        clouds = [];
        // Far layer — small, slow, high up
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * (w + 600) - 300,
                y: h * 0.05 + Math.random() * h * 0.15,
                scale: 0.3 + Math.random() * 0.25,
                speed: 0.08 + Math.random() * 0.1,
                layer: 0
            });
        }
        // Mid layer
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * (w + 600) - 300,
                y: h * 0.15 + Math.random() * h * 0.2,
                scale: 0.55 + Math.random() * 0.3,
                speed: 0.18 + Math.random() * 0.15,
                layer: 1
            });
        }
        // Near layer — large, faster
        for (let i = 0; i < 4; i++) {
            clouds.push({
                x: Math.random() * (w + 600) - 300,
                y: h * 0.25 + Math.random() * h * 0.18,
                scale: 0.9 + Math.random() * 0.5,
                speed: 0.3 + Math.random() * 0.2,
                layer: 2
            });
        }

        birds = [];
        // Flocks at different depths
        for (let i = 0; i < 12; i++) {
            const flock = Math.floor(i / 4);
            birds.push({
                x: Math.random() * w,
                y: h * (0.08 + flock * 0.07) + Math.random() * 30,
                baseY: h * (0.08 + flock * 0.07) + Math.random() * 30,
                speed: (0.5 + Math.random() * 0.4) * (1 - flock * 0.15),
                flap: Math.random() * Math.PI * 2,
                flapSpeed: 0.06 + Math.random() * 0.05,
                size: (8 - flock * 2) * (0.8 + Math.random() * 0.4),
                offsetX: (Math.random() - 0.5) * 60,
                offsetY: (Math.random() - 0.5) * 20,
                flock
            });
        }
    }

    // Draw a realistic cumulus cloud at (cx, cy) with given scale
    function drawCloud(cx, cy, scale) {
        const r = 52 * scale;
        const puffs = [
            { dx: 0,          dy: 0,         rx: r,        ry: r * 0.68 },
            { dx: -r * 0.72,  dy: r * 0.18,  rx: r * 0.58, ry: r * 0.46 },
            { dx:  r * 0.72,  dy: r * 0.18,  rx: r * 0.58, ry: r * 0.46 },
            { dx: -r * 0.36,  dy: -r * 0.28, rx: r * 0.5,  ry: r * 0.44 },
            { dx:  r * 0.36,  dy: -r * 0.28, rx: r * 0.5,  ry: r * 0.44 },
            { dx:  r * 0.0,   dy: -r * 0.46, rx: r * 0.4,  ry: r * 0.36 },
        ];

        ctx.save();
        ctx.translate(cx, cy);

        // Shadow underside
        puffs.forEach(p => {
            const ug = ctx.createRadialGradient(p.dx, p.dy + p.ry * 0.3, 0, p.dx, p.dy, p.rx);
            ug.addColorStop(0, 'rgba(180,195,215,0.18)');
            ug.addColorStop(1, 'transparent');
            ctx.fillStyle = ug;
            ctx.beginPath();
            ctx.ellipse(p.dx, p.dy, p.rx, p.ry, 0, 0, Math.PI * 2);
            ctx.fill();
        });

        // White body
        puffs.forEach(p => {
            const g = ctx.createRadialGradient(p.dx - p.rx * 0.25, p.dy - p.ry * 0.3, 0, p.dx, p.dy, p.rx * 1.1);
            g.addColorStop(0, 'rgba(255,255,255,0.98)');
            g.addColorStop(0.6, 'rgba(245,248,255,0.88)');
            g.addColorStop(1, 'rgba(220,232,248,0)');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.ellipse(p.dx, p.dy, p.rx, p.ry, 0, 0, Math.PI * 2);
            ctx.fill();
        });

        // Bright top highlight on tallest puff
        const hg = ctx.createRadialGradient(-r * 0.1, -r * 0.5, 0, 0, -r * 0.2, r * 0.5);
        hg.addColorStop(0, 'rgba(255,255,255,0.55)');
        hg.addColorStop(1, 'transparent');
        ctx.fillStyle = hg;
        ctx.beginPath();
        ctx.ellipse(0, -r * 0.46, r * 0.4, r * 0.36, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    function drawBird(b) {
        const wingAmp = b.size * 0.9;
        const wingY = Math.sin(b.flap) * wingAmp;
        const bodyLen = b.size * 0.55;
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.strokeStyle = `rgba(30,55,100,${0.55 - b.flock * 0.12})`;
        ctx.lineWidth = Math.max(0.8, b.size * 0.14);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        // Left wing
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-b.size * 0.5, -wingY * 0.6, -b.size, -wingY);
        ctx.stroke();
        // Right wing
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(b.size * 0.5, -wingY * 0.6, b.size, -wingY);
        ctx.stroke();
        // Body
        ctx.beginPath();
        ctx.moveTo(-bodyLen * 0.4, 0);
        ctx.lineTo(bodyLen, 0);
        ctx.stroke();
        ctx.restore();
    }

    function draw() {
        const w = canvas.width, h = canvas.height;
        t += 0.009;

        // Realistic sky gradient — deep cerulean at top, pale near horizon
        const sky = ctx.createLinearGradient(0, 0, 0, h);
        sky.addColorStop(0,    '#1a82c4');
        sky.addColorStop(0.35, '#3ea8e0');
        sky.addColorStop(0.7,  '#89cff0');
        sky.addColorStop(0.88, '#c8e8f8');
        sky.addColorStop(1,    '#dff2fb');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, w, h);

        // Sun — upper right, bright corona + disc
        const sunX = w * 0.80, sunY = h * 0.11;
        // Wide outer halo
        const halo = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, w * 0.28);
        halo.addColorStop(0,    'rgba(255,250,210,0.22)');
        halo.addColorStop(0.3,  'rgba(255,230,130,0.09)');
        halo.addColorStop(0.7,  'rgba(255,200,80,0.03)');
        halo.addColorStop(1,    'transparent');
        ctx.fillStyle = halo;
        ctx.fillRect(0, 0, w, h);
        // Inner corona
        const corona = ctx.createRadialGradient(sunX, sunY, 18, sunX, sunY, 90);
        corona.addColorStop(0,   'rgba(255,255,220,0.85)');
        corona.addColorStop(0.4, 'rgba(255,240,150,0.25)');
        corona.addColorStop(1,   'transparent');
        ctx.fillStyle = corona;
        ctx.fillRect(0, 0, w, h);
        // Disc
        ctx.beginPath();
        ctx.arc(sunX, sunY, 22, 0, Math.PI * 2);
        const disc = ctx.createRadialGradient(sunX - 6, sunY - 6, 0, sunX, sunY, 22);
        disc.addColorStop(0, '#fffde8');
        disc.addColorStop(0.6, '#ffe980');
        disc.addColorStop(1, '#ffd040');
        ctx.fillStyle = disc;
        ctx.fill();

        // Atmospheric horizon glow
        const hGlow = ctx.createLinearGradient(0, h * 0.65, 0, h);
        hGlow.addColorStop(0, 'transparent');
        hGlow.addColorStop(1, 'rgba(255,245,220,0.18)');
        ctx.fillStyle = hGlow;
        ctx.fillRect(0, 0, w, h);

        // Rolling hills
        const hillColors = [
            { yBase: h * 0.82, amp: h * 0.06, period: w * 1.3, phase: 0,    color: '#7ec87e', dark: '#5aaa5a' },
            { yBase: h * 0.87, amp: h * 0.05, period: w * 0.9, phase: 1.2,  color: '#8fd48f', dark: '#6abf6a' },
            { yBase: h * 0.91, amp: h * 0.04, period: w * 0.7, phase: 2.6,  color: '#a5dda5', dark: '#7ec87e' },
        ];
        hillColors.forEach(hill => {
            ctx.beginPath();
            ctx.moveTo(0, h);
            for (let x = 0; x <= w; x += 4) {
                const y = hill.yBase + Math.sin((x / hill.period) * Math.PI * 2 + hill.phase) * hill.amp
                                     + Math.sin((x / hill.period * 1.7) * Math.PI * 2 + hill.phase * 0.5) * hill.amp * 0.35;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(w, h);
            ctx.closePath();
            const hg = ctx.createLinearGradient(0, hill.yBase - hill.amp, 0, h);
            hg.addColorStop(0, hill.color);
            hg.addColorStop(1, hill.dark);
            ctx.fillStyle = hg;
            ctx.fill();
        });

        // Far clouds (layer 0)
        clouds.filter(c => c.layer === 0).forEach(c => {
            c.x += c.speed;
            if (c.x - 200 * c.scale > w) c.x = -200 * c.scale;
            ctx.save();
            ctx.globalAlpha = 0.55;
            drawCloud(c.x, c.y, c.scale);
            ctx.restore();
        });

        // Mid clouds (layer 1)
        clouds.filter(c => c.layer === 1).forEach(c => {
            c.x += c.speed;
            if (c.x - 200 * c.scale > w) c.x = -200 * c.scale;
            ctx.save();
            ctx.globalAlpha = 0.78;
            drawCloud(c.x, c.y, c.scale);
            ctx.restore();
        });

        // Birds
        birds.forEach(b => {
            b.x += b.speed;
            b.flap += b.flapSpeed;
            b.y = b.baseY + Math.sin(t * 0.6 + b.offsetX * 0.05) * 4;
            if (b.x > w + 40) b.x = -40;
            drawBird(b);
        });

        // Near clouds (layer 2) — drawn over birds for depth
        clouds.filter(c => c.layer === 2).forEach(c => {
            c.x += c.speed;
            if (c.x - 200 * c.scale > w) c.x = -200 * c.scale;
            ctx.save();
            ctx.globalAlpha = 0.92;
            drawCloud(c.x, c.y, c.scale);
            ctx.restore();
        });

        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
})();
</script>
</body>
</html>
