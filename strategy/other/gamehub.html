<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playmerth 2.0</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #e8f4fd;
    --sidebar-bg: #ffffff;
    --border: #c8dff0;
    --text: #1a2a3a;
    --dim: #7a9ab8;
    --accent: #2a7fd4;
    --surface: #f0f7ff;
}

body.dark {
    --bg: #0e1621;
    --sidebar-bg: #131d2b;
    --border: #1e3048;
    --text: #c8ddf0;
    --dim: #4a6a88;
    --accent: #4a9fe4;
    --surface: #192840;
}

*, *::before, *::after {
    transition: background 0.4s, background-color 0.4s, border-color 0.4s, color 0.4s;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
    width: 220px;
    min-width: 220px;
    height: 100vh;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.sidebar-title {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}

.sidebar-title h1 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--accent);
}

.theme-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s, transform 0.3s;
}

.theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: rotate(20deg);
}

.home-btn {
    margin-top: 10px;
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    width: 100%;
    padding: 5px 0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
}

.home-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--surface);
}

.sidebar-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
    padding: 16px 20px 8px;
    flex-shrink: 0;
}


.sidebar-games {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 12px;
}

.sidebar-games::-webkit-scrollbar { width: 4px; }
.sidebar-games::-webkit-scrollbar-track { background: transparent; }
.sidebar-games::-webkit-scrollbar-thumb { background: #b0cfe8; border-radius: 2px; }

.category-item, .game-item {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 8px 20px;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.15s;
    user-select: none;
}

.game-item-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
}

.game-item-desc {
    font-size: 11px;
    color: var(--dim);
    margin-top: 2px;
}

.category-item:hover, .game-item:hover {
    background: var(--surface);
}

.category-item.active, .game-item.active {
    background: var(--surface);
}

/* ── Main area ── */
.main {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    overflow: hidden;
}

.game-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
}

#screensaver {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
}
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-title">
        <div style="display:flex;align-items:center;justify-content:space-between">
            <h1>PLAYMERTH 2.0</h1>
            <div style="display:flex;gap:5px">
                <button class="theme-toggle" id="scene-toggle" title="Toggle day/night scene">☀</button>
                <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark colors">○</button>
            </div>
        </div>
        <button class="home-btn" id="home-btn" title="Home">⌂ Home</button>
    </div>

    <div class="sidebar-games">
        <div class="sidebar-section-label">Games</div>
        <div class="game-item" onclick="loadGame('codelab.html')">
            <span class="game-item-name">CodeLab</span>
            <span class="game-item-desc">Build games with a visual scripting language</span>
        </div>
    </div>
</div>

<div class="main">
    <iframe class="game-frame" id="game-frame"></iframe>
    <canvas id="screensaver"></canvas>
</div>

<script>
function loadGame(src) {
    const frame = document.getElementById('game-frame');
    const canvas = document.getElementById('screensaver');
    frame.src = src;
    frame.style.display = 'block';
    canvas.style.display = 'none';
}

function goHome() {
    const frame = document.getElementById('game-frame');
    const canvas = document.getElementById('screensaver');
    frame.style.display = 'none';
    frame.src = '';
    canvas.style.display = 'block';
}

document.getElementById('home-btn').addEventListener('click', goHome);

// Light/dark toggle
let isDark = false;
document.getElementById('theme-toggle').addEventListener('click', () => {
    isDark = document.body.classList.toggle('dark');
    document.getElementById('theme-toggle').textContent = isDark ? '●' : '○';
});

// Day/night scene toggle
let isNight = false;
document.getElementById('scene-toggle').addEventListener('click', () => {
    isNight = !isNight;
    document.getElementById('scene-toggle').textContent = isNight ? '☽' : '☀';
});

// Screensaver
(function() {
    const canvas = document.getElementById('screensaver');
    const ctx = canvas.getContext('2d');

    let clouds = [], birds = [], stars = [], shootingStars = [], t = 0;

    function resize() {
        canvas.width = canvas.offsetWidth || canvas.parentElement.clientWidth;
        canvas.height = canvas.offsetHeight || canvas.parentElement.clientHeight;
        init();
    }

    function init() {
        const w = canvas.width, h = canvas.height;

        clouds = [];
        // Far layer — small, slow, high up
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * (w + 600) - 300,
                y: h * 0.05 + Math.random() * h * 0.15,
                scale: 0.3 + Math.random() * 0.25,
                speed: 0.08 + Math.random() * 0.1,
                layer: 0
            });
        }
        // Mid layer
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * (w + 600) - 300,
                y: h * 0.15 + Math.random() * h * 0.2,
                scale: 0.55 + Math.random() * 0.3,
                speed: 0.18 + Math.random() * 0.15,
                layer: 1
            });
        }
        // Near layer — large, faster
        for (let i = 0; i < 4; i++) {
            clouds.push({
                x: Math.random() * (w + 600) - 300,
                y: h * 0.25 + Math.random() * h * 0.18,
                scale: 0.9 + Math.random() * 0.5,
                speed: 0.3 + Math.random() * 0.2,
                layer: 2
            });
        }

        birds = [];
        // Flocks at different depths
        for (let i = 0; i < 12; i++) {
            const flock = Math.floor(i / 4);
            birds.push({
                x: Math.random() * w,
                y: h * (0.08 + flock * 0.07) + Math.random() * 30,
                baseY: h * (0.08 + flock * 0.07) + Math.random() * 30,
                speed: (0.5 + Math.random() * 0.4) * (1 - flock * 0.15),
                flap: Math.random() * Math.PI * 2,
                flapSpeed: 0.06 + Math.random() * 0.05,
                size: (8 - flock * 2) * (0.8 + Math.random() * 0.4),
                offsetX: (Math.random() - 0.5) * 60,
                offsetY: (Math.random() - 0.5) * 20,
                flock
            });
        }

        stars = [];
        shootingStars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * w,
                y: Math.random() * h * 0.72,
                size: Math.random() * 2.5 + 0.5,
                speed: Math.random() * 0.3 + 0.05,
                opacity: Math.random(),
                twinkleSpeed: Math.random() * 0.02 + 0.005,
                twinkleDir: Math.random() > 0.5 ? 1 : -1
            });
        }
    }

    // Draw a cloud as merged solid circles with a clipped gradient underside
    function drawCloud(cx, cy, scale, pal) {
        const r = 46 * scale;
        const puffs = [
            [  0,        0,       r       ],
            [ -r*0.65,   r*0.22,  r*0.60  ],
            [  r*0.65,   r*0.22,  r*0.60  ],
            [ -r*0.32,  -r*0.30,  r*0.50  ],
            [  r*0.32,  -r*0.30,  r*0.50  ],
            [  0,       -r*0.48,  r*0.40  ],
            [ -r*0.90,   r*0.38,  r*0.38  ],
            [  r*0.90,   r*0.38,  r*0.38  ],
        ];

        ctx.save();
        ctx.translate(cx, cy);

        const topY = -r * 0.48 - r * 0.40;
        const botY =  r * 0.22 + r * 0.60;

        ctx.shadowColor = pal.cloudShadow;
        ctx.shadowBlur  = 10 * scale;
        ctx.fillStyle   = pal.cloud;
        puffs.forEach(([dx, dy, pr]) => {
            ctx.beginPath();
            ctx.arc(dx, dy, pr, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.shadowBlur = 0;

        ctx.save();
        ctx.beginPath();
        puffs.forEach(([dx, dy, pr]) => {
            ctx.moveTo(dx + pr, dy);
            ctx.arc(dx, dy, pr, 0, Math.PI * 2);
        });
        ctx.clip();
        const shade = ctx.createLinearGradient(0, topY, 0, botY);
        shade.addColorStop(0,    pal.cloudShadeTop);
        shade.addColorStop(0.50, pal.cloudShadeMid);
        shade.addColorStop(1,    pal.cloudShadeBot);
        ctx.fillStyle = shade;
        ctx.fillRect(-r * 1.5, topY, r * 3, botY - topY);
        ctx.restore();

        ctx.restore();
    }

    function drawBird(b, pal) {
        const wingAmp = b.size * 0.9;
        const wingY = Math.sin(b.flap) * wingAmp;
        const bodyLen = b.size * 0.55;
        ctx.save();
        ctx.translate(b.x, b.y);
        const [br, bg, bb] = pal.birdRGB;
        ctx.strokeStyle = `rgba(${br},${bg},${bb},${0.55 - b.flock * 0.12})`;
        ctx.lineWidth = Math.max(0.8, b.size * 0.14);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        // Left wing
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-b.size * 0.5, -wingY * 0.6, -b.size, -wingY);
        ctx.stroke();
        // Right wing
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(b.size * 0.5, -wingY * 0.6, b.size, -wingY);
        ctx.stroke();
        // Body
        ctx.beginPath();
        ctx.moveTo(-bodyLen * 0.4, 0);
        ctx.lineTo(bodyLen, 0);
        ctx.stroke();
        ctx.restore();
    }

    const nightScenePal = {
        sky:          ['#020408', '#03060e', '#040914', '#060b18', '#080d1c'],
        hills:        [['#0a1a0c', '#050d06'], ['#0c1e0e', '#061008'], ['#0e220f', '#071209']],
        cloud:        '#18263a', cloudShadow: 'rgba(0,5,20,0.65)',
        cloudShadeTop:'rgba(4,8,20,0.00)', cloudShadeMid:'rgba(4,8,18,0.12)', cloudShadeBot:'rgba(2,5,14,0.55)',
        birdRGB:      [80, 110, 160],
    };

    const palettes = {
        light: {
            sky:          ['#1a82c4', '#3ea8e0', '#89cff0', '#c8e8f8', '#dff2fb'],
            haloC:        'rgba(255,250,210,0.22)', haloM: 'rgba(255,230,130,0.09)', haloF: 'rgba(255,200,80,0.03)',
            corona0:      'rgba(255,255,220,0.85)', corona1: 'rgba(255,240,150,0.25)',
            disc0:        '#fffde8', disc1: '#ffe980', disc2: '#ffd040',
            horizGlow:    'rgba(255,245,220,0.18)',
            hills:        [['#7ec87e','#5aaa5a'], ['#8fd48f','#6abf6a'], ['#a5dda5','#7ec87e']],
            cloud:        '#ffffff', cloudShadow: 'rgba(160,185,220,0.30)',
            cloudShadeTop:'rgba(220,235,255,0.00)', cloudShadeMid:'rgba(190,210,240,0.05)', cloudShadeBot:'rgba(150,175,215,0.32)',
            birdRGB:      [30, 55, 100],
        },
        dark: {
            sky:          ['#060d18', '#091422', '#0e1e30', '#122438', '#162a40'],
            haloC:        'rgba(180,140,80,0.14)',  haloM: 'rgba(160,110,40,0.06)',  haloF: 'rgba(140,90,20,0.02)',
            corona0:      'rgba(200,170,80,0.60)',  corona1: 'rgba(180,140,50,0.18)',
            disc0:        '#e8c060', disc1: '#c08820', disc2: '#a06010',
            horizGlow:    'rgba(180,130,60,0.12)',
            hills:        [['#183020','#0c1c10'], ['#1c3824','#102014'], ['#204028','#142818']],
            cloud:        '#1e2e48', cloudShadow: 'rgba(0,10,30,0.50)',
            cloudShadeTop:'rgba(10,20,40,0.00)',    cloudShadeMid:'rgba(10,18,36,0.08)',    cloudShadeBot:'rgba(8,14,28,0.45)',
            birdRGB:      [140, 170, 210],
        },
    };

    function draw() {
        const w = canvas.width, h = canvas.height;
        t += 0.009;

        const pal = isNight ? nightScenePal : (isDark ? palettes.dark : palettes.light);

        // Sky
        const sky = ctx.createLinearGradient(0, 0, 0, h);
        const [s0,s1,s2,s3,s4] = pal.sky;
        sky.addColorStop(0, s0); sky.addColorStop(0.35, s1); sky.addColorStop(0.7, s2);
        sky.addColorStop(0.88, s3); sky.addColorStop(1, s4);
        ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h);

        if (isNight) {
            // Stars — same style as Playmerth space background
            stars.forEach(s => {
                s.opacity += s.twinkleSpeed * s.twinkleDir;
                if (s.opacity >= 1)   { s.opacity = 1;   s.twinkleDir = -1; }
                if (s.opacity <= 0.1) { s.opacity = 0.1; s.twinkleDir =  1; }
                s.y += s.speed;
                if (s.y > h * 0.72) { s.y = 0; s.x = Math.random() * w; }
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${s.opacity})`; ctx.fill();
                if (s.size > 1.5) {
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.size * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(200,220,255,${s.opacity * 0.15})`; ctx.fill();
                }
            });

            // Shooting stars
            if (Math.random() < 0.002) {
                shootingStars.push({
                    x: Math.random() * w * 0.8, y: Math.random() * h * 0.4,
                    speed: Math.random() * 8 + 6, angle: Math.PI / 6 + Math.random() * 0.3,
                    tailLen: Math.random() * 60 + 40, opacity: 1, life: 0
                });
            }
            shootingStars = shootingStars.filter(s => {
                s.x += s.speed * Math.cos(s.angle);
                s.y += s.speed * Math.sin(s.angle);
                s.life++; s.opacity = Math.max(0, 1 - s.life / 40);
                const grad = ctx.createLinearGradient(s.x, s.y, s.x - s.tailLen * Math.cos(s.angle), s.y - s.tailLen * Math.sin(s.angle));
                grad.addColorStop(0, `rgba(255,255,255,${s.opacity})`);
                grad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.strokeStyle = grad; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(s.x, s.y);
                ctx.lineTo(s.x - s.tailLen * Math.cos(s.angle), s.y - s.tailLen * Math.sin(s.angle));
                ctx.stroke();
                return s.opacity > 0;
            });

            // Moon — same upper-right position as sun
            const mx = w * 0.80, my = h * 0.11, mr = 24;
            const moonGlow = ctx.createRadialGradient(mx, my, 0, mx, my, mr * 5);
            moonGlow.addColorStop(0, 'rgba(200,215,255,0.13)'); moonGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = moonGlow; ctx.fillRect(0, 0, w, h);
            // Disc
            ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI * 2);
            const moonFill = ctx.createRadialGradient(mx - 6, my - 6, 0, mx, my, mr);
            moonFill.addColorStop(0, '#f0f4e2'); moonFill.addColorStop(0.65, '#d8e0c4'); moonFill.addColorStop(1, '#b8c8a0');
            ctx.fillStyle = moonFill; ctx.fill();
            // Crescent shadow cutout using sky color
            ctx.beginPath(); ctx.arc(mx + mr * 0.56, my - mr * 0.06, mr * 0.80, 0, Math.PI * 2);
            ctx.fillStyle = s0; ctx.fill();

            // Horizon glow from moonlight
            const hGlow = ctx.createLinearGradient(0, h * 0.65, 0, h);
            hGlow.addColorStop(0, 'transparent'); hGlow.addColorStop(1, 'rgba(100,130,200,0.08)');
            ctx.fillStyle = hGlow; ctx.fillRect(0, 0, w, h);

        } else {
            // Sun
            const sunX = w * 0.80, sunY = h * 0.11;
            const halo = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, w * 0.28);
            halo.addColorStop(0, pal.haloC); halo.addColorStop(0.3, pal.haloM);
            halo.addColorStop(0.7, pal.haloF); halo.addColorStop(1, 'transparent');
            ctx.fillStyle = halo; ctx.fillRect(0, 0, w, h);
            const corona = ctx.createRadialGradient(sunX, sunY, 18, sunX, sunY, 90);
            corona.addColorStop(0, pal.corona0); corona.addColorStop(0.4, pal.corona1); corona.addColorStop(1, 'transparent');
            ctx.fillStyle = corona; ctx.fillRect(0, 0, w, h);
            ctx.beginPath(); ctx.arc(sunX, sunY, 22, 0, Math.PI * 2);
            const disc = ctx.createRadialGradient(sunX - 6, sunY - 6, 0, sunX, sunY, 22);
            disc.addColorStop(0, pal.disc0); disc.addColorStop(0.6, pal.disc1); disc.addColorStop(1, pal.disc2);
            ctx.fillStyle = disc; ctx.fill();

            const hGlow = ctx.createLinearGradient(0, h * 0.65, 0, h);
            hGlow.addColorStop(0, 'transparent'); hGlow.addColorStop(1, pal.horizGlow);
            ctx.fillStyle = hGlow; ctx.fillRect(0, 0, w, h);
        }

        // Hills
        const hillPhases = [[h*0.82, h*0.06, w*1.3, 0], [h*0.87, h*0.05, w*0.9, 1.2], [h*0.91, h*0.04, w*0.7, 2.6]];
        hillPhases.forEach(([yBase, amp, period, phase], i) => {
            ctx.beginPath(); ctx.moveTo(0, h);
            for (let x = 0; x <= w; x += 4) {
                const y = yBase + Math.sin((x / period) * Math.PI * 2 + phase) * amp
                                + Math.sin((x / period * 1.7) * Math.PI * 2 + phase * 0.5) * amp * 0.35;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(w, h); ctx.closePath();
            const hg = ctx.createLinearGradient(0, yBase - amp, 0, h);
            hg.addColorStop(0, pal.hills[i][0]); hg.addColorStop(1, pal.hills[i][1]);
            ctx.fillStyle = hg; ctx.fill();
        });

        // Clouds layers 0 & 1
        const cloudAlphas = isNight ? [0.35, 0.50] : [0.55, 0.78];
        [[0, cloudAlphas[0]], [1, cloudAlphas[1]]].forEach(([layer, alpha]) => {
            clouds.filter(c => c.layer === layer).forEach(c => {
                c.x += c.speed;
                if (c.x - 200 * c.scale > w) c.x = -200 * c.scale;
                ctx.save(); ctx.globalAlpha = alpha;
                drawCloud(c.x, c.y, c.scale, pal);
                ctx.restore();
            });
        });

        // Birds (hidden at night)
        if (!isNight) {
            birds.forEach(b => {
                b.x += b.speed; b.flap += b.flapSpeed;
                b.y = b.baseY + Math.sin(t * 0.6 + b.offsetX * 0.05) * 4;
                if (b.x > w + 40) b.x = -40;
                drawBird(b, pal);
            });
        }

        // Near clouds over birds
        const nearAlpha = isNight ? 0.65 : 0.92;
        clouds.filter(c => c.layer === 2).forEach(c => {
            c.x += c.speed;
            if (c.x - 200 * c.scale > w) c.x = -200 * c.scale;
            ctx.save(); ctx.globalAlpha = nearAlpha;
            drawCloud(c.x, c.y, c.scale, pal);
            ctx.restore();
        });

        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
})();
</script>
</body>
</html>
