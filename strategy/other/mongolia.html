<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mongolia</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #87ceeb; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;

// Three paths, all converging at the peak
const PATHS = [
    // Left trail — winds up the left flank
    [
        [0.32, 0.97],
        [0.18, 0.87],
        [0.13, 0.77],
        [0.22, 0.67],
        [0.19, 0.57],
        [0.30, 0.47],
        [0.38, 0.37],
        [0.44, 0.26],
        [0.50, 0.14],
    ],
    // Center trail — winds up the middle
    [
        [0.50, 0.97],
        [0.44, 0.87],
        [0.55, 0.77],
        [0.46, 0.67],
        [0.53, 0.55],
        [0.48, 0.44],
        [0.51, 0.33],
        [0.50, 0.14],
    ],
    // Right trail — winds up the right flank
    [
        [0.68, 0.97],
        [0.82, 0.87],
        [0.87, 0.77],
        [0.78, 0.67],
        [0.81, 0.57],
        [0.70, 0.47],
        [0.62, 0.37],
        [0.56, 0.26],
        [0.50, 0.14],
    ],
];

function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, H * 0.6);
    g.addColorStop(0, '#3aa8e8');
    g.addColorStop(0.6, '#a8dcf5');
    g.addColorStop(1, '#c8edf8');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H * 0.6);
}

function drawSun() {
    const x = W * 0.82, y = H * 0.1, r = H * 0.065;
    const glow = ctx.createRadialGradient(x, y, r * 0.3, x, y, r * 2.5);
    glow.addColorStop(0, 'rgba(255,240,100,0.5)');
    glow.addColorStop(1, 'rgba(255,200,50,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(x, y, r * 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffe566';
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
}

function drawCloud(x, y, s) {
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    const blobs = [
        [0, 0, 30], [40, -12, 36], [80, -4, 28],
        [18, 10, 26], [58, 8, 24],
    ];
    blobs.forEach(([bx, by, r]) => {
        ctx.beginPath();
        ctx.arc(x + bx * s, y + by * s, r * s, 0, Math.PI * 2);
        ctx.fill();
    });
}

function mountainShape() {
    const cx = W * 0.5, top = H * 0.1;
    ctx.beginPath();
    ctx.moveTo(0, H * 0.74);
    ctx.lineTo(W * 0.06, H * 0.62);
    ctx.lineTo(W * 0.18, H * 0.52);
    ctx.lineTo(W * 0.28, H * 0.42);
    ctx.lineTo(W * 0.36, H * 0.28);
    ctx.lineTo(cx - W * 0.04, H * 0.16);
    ctx.lineTo(cx, top);
    ctx.lineTo(cx + W * 0.04, H * 0.16);
    ctx.lineTo(W * 0.64, H * 0.28);
    ctx.lineTo(W * 0.72, H * 0.42);
    ctx.lineTo(W * 0.82, H * 0.52);
    ctx.lineTo(W * 0.94, H * 0.62);
    ctx.lineTo(W, H * 0.74);
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
}

function drawMountain() {
    mountainShape();
    const g = ctx.createLinearGradient(W * 0.5, H * 0.1, W * 0.5, H);
    g.addColorStop(0,   '#5a9e42');
    g.addColorStop(0.3, '#4a9438');
    g.addColorStop(0.6, '#3a7e2e');
    g.addColorStop(1,   '#2a6020');
    ctx.fillStyle = g;
    ctx.fill();
}

function drawMountainShading() {
    // Left face darker
    ctx.save();
    mountainShape();
    ctx.clip();
    const gl = ctx.createLinearGradient(0, 0, W * 0.5, 0);
    gl.addColorStop(0, 'rgba(0,30,0,0.28)');
    gl.addColorStop(0.45, 'rgba(0,0,0,0)');
    gl.addColorStop(0.55, 'rgba(0,0,0,0)');
    gl.addColorStop(1, 'rgba(0,40,0,0.18)');
    ctx.fillStyle = gl;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
}

function drawTree(x, y, h, variant) {
    const w = h * 0.55;
    // trunk
    ctx.fillStyle = '#5c3a1e';
    ctx.fillRect(x - h * 0.07, y - h * 0.18, h * 0.14, h * 0.22);

    const canopies = [
        { color: '#1a6b1a', offset: 0,    rx: w * 0.9 },
        { color: '#267a26', offset: -0.28, rx: w * 0.75 },
        { color: '#2d8c2d', offset: -0.52, rx: w * 0.58 },
    ];
    if (variant === 1) {
        canopies[0].color = '#1e5c1e';
        canopies[1].color = '#256b25';
        canopies[2].color = '#2a7a2a';
    }
    if (variant === 2) {
        canopies[0].color = '#2d7a18';
        canopies[1].color = '#38941e';
        canopies[2].color = '#42a824';
    }

    canopies.forEach(({ color, offset, rx }) => {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.ellipse(x, y + offset * h, rx, h * 0.32, 0, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawForest() {
    const trees = [
        // Far left (outside left path)
        [0.05, 0.73, 48, 2], [0.09, 0.66, 42, 0], [0.07, 0.60, 36, 1],

        // Between left and center paths
        [0.28, 0.82, 46, 1], [0.34, 0.74, 42, 2], [0.30, 0.68, 36, 0],
        [0.36, 0.61, 32, 1], [0.34, 0.54, 28, 2], [0.38, 0.46, 24, 0],
        [0.40, 0.39, 20, 1], [0.43, 0.31, 17, 2],

        // Between center and right paths
        [0.56, 0.82, 46, 0], [0.62, 0.74, 42, 1], [0.58, 0.68, 36, 2],
        [0.64, 0.61, 32, 0], [0.62, 0.54, 28, 1], [0.60, 0.46, 24, 2],
        [0.58, 0.39, 20, 0], [0.57, 0.31, 17, 1],

        // Far right (outside right path)
        [0.95, 0.73, 48, 1], [0.91, 0.66, 42, 2], [0.93, 0.60, 36, 0],

        // Near top, flanking all paths
        [0.44, 0.22, 16, 0], [0.56, 0.22, 16, 1],
        [0.46, 0.18, 13, 2], [0.54, 0.18, 13, 0],
    ];
    trees.forEach(([nx, ny, h, v]) => drawTree(nx * W, ny * H, h, v));
}

function strokeCurve(pts) {
    ctx.beginPath();
    ctx.moveTo(...pts[0]);
    for (let i = 1; i < pts.length; i++) {
        const [px0, py0] = pts[i - 1], [px1, py1] = pts[i];
        ctx.quadraticCurveTo(px0, py0, (px0 + px1) / 2, (py0 + py1) / 2);
    }
    ctx.lineTo(...pts[pts.length - 1]);
    ctx.stroke();
}

function drawPaths() {
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    PATHS.forEach(rawPts => {
        const pts = rawPts.map(([nx, ny]) => [nx * W, ny * H]);

        ctx.lineWidth = W * 0.020;
        ctx.strokeStyle = 'rgba(90,50,8,0.32)';
        strokeCurve(pts);

        ctx.lineWidth = W * 0.015;
        ctx.strokeStyle = '#d4a35a';
        strokeCurve(pts);

        ctx.lineWidth = W * 0.005;
        ctx.strokeStyle = 'rgba(255,228,165,0.55)';
        strokeCurve(pts);
    });

    ctx.restore();
}

function drawTreasureChest(x, y, s) {
    // Outer glow
    const glow = ctx.createRadialGradient(x, y - s * 0.3, s * 0.2, x, y - s * 0.3, s * 2.2);
    glow.addColorStop(0, 'rgba(255,220,50,0.55)');
    glow.addColorStop(0.5, 'rgba(255,190,30,0.18)');
    glow.addColorStop(1, 'rgba(255,200,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(x, y - s * 0.3, s * 2.2, 0, Math.PI * 2); ctx.fill();

    // Base box
    ctx.fillStyle = '#7a3b10';
    roundRect(x - s, y, s * 2, s * 1.1, s * 0.12);
    ctx.fill();

    // Lid flat part
    ctx.fillStyle = '#9b4e18';
    roundRect(x - s, y - s * 0.58, s * 2, s * 0.6, s * 0.1);
    ctx.fill();

    // Lid dome
    ctx.fillStyle = '#a85820';
    ctx.beginPath();
    ctx.ellipse(x, y - s * 0.58, s * 1.02, s * 0.42, 0, Math.PI, 0);
    ctx.fill();

    // Gold bands
    ctx.fillStyle = '#f5c518';
    // horizontal band on base
    ctx.fillRect(x - s, y + s * 0.38, s * 2, s * 0.14);
    // lid band
    ctx.fillRect(x - s, y - s * 0.62, s * 2, s * 0.1);
    // vertical band center
    ctx.fillRect(x - s * 0.1, y - s * 0.58, s * 0.2, s * 1.7);

    // Corners
    ctx.fillStyle = '#f5c518';
    [[x - s, y], [x + s, y], [x - s, y + s * 1.1], [x + s, y + s * 1.1]].forEach(([cx, cy]) => {
        ctx.beginPath(); ctx.arc(cx, cy, s * 0.15, 0, Math.PI * 2); ctx.fill();
    });

    // Lock
    ctx.fillStyle = '#f5c518';
    ctx.beginPath(); ctx.arc(x, y + s * 0.26, s * 0.26, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#7a3b10';
    ctx.beginPath(); ctx.arc(x, y + s * 0.26, s * 0.14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#f5c518';
    ctx.fillRect(x - s * 0.08, y + s * 0.26, s * 0.16, s * 0.2);

    // Shimmer on lid
    ctx.fillStyle = 'rgba(255,255,200,0.22)';
    ctx.beginPath();
    ctx.ellipse(x - s * 0.25, y - s * 0.75, s * 0.4, s * 0.13, -0.4, 0, Math.PI * 2);
    ctx.fill();
}

function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function drawTitle() {
    ctx.save();
    ctx.font = `bold ${H * 0.048}px "Segoe UI", Georgia, serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.shadowColor = 'rgba(0,80,0,0.5)';
    ctx.shadowBlur = 8;
    ctx.fillText('MONGOLIA', W * 0.5, H * 0.055);
    ctx.restore();
}

// ── Path position helper ──
function getPosOnPath(path, t) {
    const n = path.length - 1;
    const seg = Math.min(Math.floor(t * n), n - 1);
    const st = t * n - seg;
    const [x0, y0] = path[seg], [x1, y1] = path[seg + 1];
    return [(x0 + st * (x1 - x0)) * W, (y0 + st * (y1 - y0)) * H];
}

// ── Blobs ──
let blobs = [];
let particles = [];
let gameOver = false;
let gameWon  = false;
let loseReason = '';
let killCount = 0;
const KILL_TARGET = 15;
const RANGER_COST = 20;
let nextBlueSpawn = Date.now() + 4000;
let level = 1;
let impostorWave2At = 0;
let coins = 0;
let rangers = [];
let rangerBtnBounds = null;

const ALL_LEG_ANGLES = [
    Math.PI * 5/6,  // left-front
    Math.PI / 6,    // right-front
    Math.PI,        // left-mid
    0,              // right-mid
    Math.PI * 7/6,  // left-back
   -Math.PI / 6,    // right-back
];

function spawnRedBlob() {
    blobs.push({
        pathIndex: Math.floor(Math.random() * 3),
        t: 0,
        type: 'red',
        wobble: Math.random() * Math.PI * 2,
        speed: 0.00046 + Math.random() * 0.00016,
    });
}

function initBlobs() {
    killCount = 0;
    coins = 0;
    rangers = [];
    nextBlueSpawn = Date.now() + 4000;
    const now = Date.now();
    blobs = [
        // Blue wanderers
        { pathIndex: 0, t: 0.22, type: 'blue', wobble: 0.0, speed: 0.00045, dir:  1, born: now },
        { pathIndex: 0, t: 0.62, type: 'blue', wobble: 1.8, speed: 0.00035, dir: -1, born: now },
        { pathIndex: 1, t: 0.35, type: 'blue', wobble: 0.7, speed: 0.00042, dir:  1, born: now },
        { pathIndex: 1, t: 0.68, type: 'blue', wobble: 2.4, speed: 0.00038, dir: -1, born: now },
        { pathIndex: 2, t: 0.42, type: 'blue', wobble: 1.2, speed: 0.00048, dir:  1, born: now },
        { pathIndex: 2, t: 0.75, type: 'blue', wobble: 3.1, speed: 0.00040, dir: -1, born: now },
        // Red enemies
        { pathIndex: 0, t: 0.10, type: 'red', wobble: 1.2, speed: 0.00055 },
        { pathIndex: 1, t: 0.20, type: 'red', wobble: 0.5, speed: 0.00050 },
        { pathIndex: 2, t: 0.15, type: 'red', wobble: 2.1, speed: 0.00052 },
        { pathIndex: 0, t: 0.50, type: 'red', wobble: 0.8, speed: 0.00048 },
        { pathIndex: 2, t: 0.55, type: 'red', wobble: 1.6, speed: 0.00058 },
    ];
    if (level === 2) {
        blobs.push(
            { pathIndex: 0, t: 0.05, type: 'red', disguised: true, showingBlue: true, wobble: 0.5, speed: 0.00052, nextToggle: now + 1500 + Math.random()*2000 },
            { pathIndex: 1, t: 0.08, type: 'red', disguised: true, showingBlue: true, wobble: 2.2, speed: 0.00048, nextToggle: now + 2000 + Math.random()*2000 },
            { pathIndex: 2, t: 0.06, type: 'red', disguised: true, showingBlue: true, wobble: 4.1, speed: 0.00055, nextToggle: now + 1000 + Math.random()*2000 },
        );
        impostorWave2At = now + 12000 + Math.random() * 6000;
    }
    if (level === 4) {
        [0, 1, 2, 1].forEach((pathIndex, idx) => {
            const legs = 2 + Math.floor(Math.random() * 5);
            blobs.push({ pathIndex, t: 0.04 + idx * 0.10, type: 'spider', legs, wobble: Math.random()*Math.PI*2, speed: 0.00038 + Math.random()*0.00012 });
        });
    }
    if (level === 3) {
        // 3 impostors
        blobs.push(
            { pathIndex: 0, t: 0.05, type: 'red', disguised: true, showingBlue: true, wobble: 0.5, speed: 0.00054, nextToggle: now + 1200 + Math.random()*2000 },
            { pathIndex: 1, t: 0.08, type: 'red', disguised: true, showingBlue: true, wobble: 2.2, speed: 0.00050, nextToggle: now + 1800 + Math.random()*2000 },
            { pathIndex: 2, t: 0.06, type: 'red', disguised: true, showingBlue: true, wobble: 4.1, speed: 0.00057, nextToggle: now + 900  + Math.random()*2000 },
        );
        // Give hoodies to 2 red blobs and 2 blue blobs already in the list
        blobs[6].hooded = true;   // first red
        blobs[8].hooded = true;   // third red
        blobs[0].hooded = true;   // first blue
        blobs[3].hooded = true;   // fourth blue
    }
}

function spawnParticles(x, y) {
    for (let i = 0; i < 10; i++) {
        const angle = (i / 10) * Math.PI * 2 + Math.random() * 0.4;
        const spd   = 1.8 + Math.random() * 2.8;
        particles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - 1,
            r: H * 0.007 + Math.random() * H * 0.006,
            alpha: 1,
        });
    }
}

function drawSpider(x, y, r, legs, wobble) {
    ctx.save();
    ctx.translate(x, y);
    const sq = Math.sin(wobble) * r * 0.08;

    // Legs (behind body)
    ctx.strokeStyle = '#1a1005';
    ctx.lineWidth = r * 0.13;
    ctx.lineCap = 'round';
    for (let i = 0; i < legs; i++) {
        const a = ALL_LEG_ANGLES[i];
        const side = Math.cos(a) < 0 ? -1 : 1;
        const bx0 = Math.cos(a) * r * 0.72, by0 = Math.sin(a) * r * 0.85 + sq * 0.5;
        const kx  = Math.cos(a) * r * 1.45, ky  = Math.sin(a) * r * 0.7 + sq * 0.3 - r * 0.28;
        const fx  = Math.cos(a) * r * 2.1  + side * r * 0.18;
        const fy  = Math.sin(a) * r * 0.55 + sq * 0.2 + r * 0.38;
        ctx.beginPath();
        ctx.moveTo(bx0, by0);
        ctx.quadraticCurveTo(kx, ky, fx, fy);
        ctx.stroke();
    }

    // Body
    ctx.beginPath();
    ctx.ellipse(0, sq * 0.4, r * 0.82, r * 0.95, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#1e1005';
    ctx.fill();
    ctx.strokeStyle = 'rgba(80,40,10,0.5)';
    ctx.lineWidth = r * 0.08;
    ctx.stroke();

    // Sheen
    ctx.beginPath();
    ctx.ellipse(-r*0.18, -r*0.28, r*0.22, r*0.14, -0.4, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fill();

    // 4 red eyes
    ctx.fillStyle = '#ff2222';
    for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc((i - 1.5) * r * 0.3, -r * 0.42 + sq * 0.3, r * 0.11, 0, Math.PI * 2);
        ctx.fill();
    }

    // Legs-remaining counter
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,160,50,0.95)';
    ctx.font = `bold ${r * 0.72}px sans-serif`;
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 4;
    ctx.fillText(legs, 0, r * 0.44 + sq * 0.3);
    ctx.shadowBlur = 0;

    ctx.restore();
}

function drawRanger(x, y, r, wobble) {
    const sq = Math.sin(wobble) * r * 0.08;
    ctx.save();
    ctx.translate(x, y);

    // Shadow
    ctx.beginPath();
    ctx.ellipse(r*0.1, r*0.35, r*0.75, r*0.22, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.13)';
    ctx.fill();

    // Body - forest green
    ctx.beginPath();
    ctx.ellipse(0, sq*0.4, r*0.9, r, 0, 0, Math.PI*2);
    ctx.fillStyle = '#2d8c20';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,60,0,0.3)';
    ctx.lineWidth = r*0.09;
    ctx.stroke();

    // Sheen
    ctx.beginPath();
    ctx.ellipse(-r*0.2, -r*0.26, r*0.26, r*0.14, -0.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fill();

    // Hat brim
    ctx.fillStyle = '#7a5010';
    ctx.beginPath();
    ctx.ellipse(0, -r*0.78+sq*0.3, r*0.75, r*0.14, 0, 0, Math.PI*2);
    ctx.fill();

    // Hat crown
    ctx.fillStyle = '#8c5c14';
    roundRect(-r*0.3, -r*1.3+sq*0.3, r*0.6, r*0.56, r*0.09);
    ctx.fill();

    // Eyes - determined
    const ey = -r*0.10 + sq*0.25, ex = r*0.27;
    [[-ex, ey], [ex, ey]].forEach(([bx, by]) => {
        ctx.beginPath(); ctx.arc(bx, by, r*0.19, 0, Math.PI*2);
        ctx.fillStyle = 'white'; ctx.fill();
        ctx.beginPath(); ctx.arc(bx, by+r*0.04, r*0.11, 0, Math.PI*2);
        ctx.fillStyle = '#1a1a1a'; ctx.fill();
    });

    // Stern flat mouth
    ctx.strokeStyle = 'rgba(0,60,0,0.45)';
    ctx.lineWidth = r*0.08; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-r*0.18, r*0.26); ctx.lineTo(r*0.18, r*0.26); ctx.stroke();

    // Badge
    ctx.fillStyle = '#f5c518';
    ctx.beginPath(); ctx.arc(r*0.44, r*0.1, r*0.12, 0, Math.PI*2); ctx.fill();

    ctx.restore();
}

function drawHood(r) {
    // Cloak that covers the blob — hides its colour
    ctx.beginPath();
    ctx.arc(0, -r * 0.05, r * 1.08, Math.PI, 0);
    ctx.lineTo(r * 1.08, r * 0.55);
    ctx.quadraticCurveTo(r * 0.7, r * 0.85, 0, r * 0.72);
    ctx.quadraticCurveTo(-r * 0.7, r * 0.85, -r * 1.08, r * 0.55);
    ctx.closePath();
    ctx.fillStyle = '#2b1f0e';
    ctx.fill();
    // Inner shadow of hood opening
    ctx.beginPath();
    ctx.ellipse(0, r * 0.08, r * 0.52, r * 0.46, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#0e0a04';
    ctx.fill();
    // Mysterious glowing eyes inside hood
    ctx.fillStyle = 'rgba(255,200,60,0.75)';
    ctx.beginPath(); ctx.arc(-r * 0.19, r * 0.04, r * 0.09, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( r * 0.19, r * 0.04, r * 0.09, 0, Math.PI * 2); ctx.fill();
}

function drawBlob(x, y, r, type, wobble, hooded) {
    const angry = type === 'red';
    const baseColor = hooded ? '#888' : (angry ? '#e83535' : '#38b0f0');
    const shineColor = angry ? '#ff7070' : '#88d8ff';
    const sq = Math.sin(wobble) * r * 0.11;
    const cq = Math.cos(wobble * 1.3) * r * 0.09;

    ctx.save();
    ctx.translate(x, y);

    // Drop shadow
    ctx.beginPath();
    ctx.ellipse(r * 0.1, r * 0.35, r * 0.75, r * 0.22, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.13)';
    ctx.fill();

    // Body
    ctx.beginPath();
    ctx.ellipse(0, sq * 0.4, r + cq, r - sq * 0.35, 0, 0, Math.PI * 2);
    ctx.fillStyle = baseColor;
    ctx.fill();
    ctx.strokeStyle = angry ? 'rgba(100,0,0,0.28)' : 'rgba(0,60,130,0.22)';
    ctx.lineWidth = r * 0.09;
    ctx.stroke();

    // Sheen
    ctx.beginPath();
    ctx.ellipse(-r * 0.2, -r * 0.26, r * 0.28, r * 0.15, -0.5, 0, Math.PI * 2);
    ctx.fillStyle = shineColor.replace(')', ',0.35)').replace('rgb', 'rgba');
    ctx.fillStyle = `rgba(255,255,255,0.30)`;
    ctx.fill();

    // Eyes
    const ey = -r * 0.10 + sq * 0.25;
    const ex = r * 0.27;
    [[-ex, ey], [ex, ey]].forEach(([bx, by], side) => {
        ctx.beginPath();
        ctx.arc(bx, by, r * 0.20, 0, Math.PI * 2);
        ctx.fillStyle = 'white';
        ctx.fill();
        const px = bx + (angry ? (side === 0 ? -r * 0.04 : r * 0.04) : 0);
        ctx.beginPath();
        ctx.arc(px, by + r * 0.06, r * 0.10, 0, Math.PI * 2);
        ctx.fillStyle = '#1a1a1a';
        ctx.fill();
    });

    ctx.lineCap = 'round';
    if (!hooded) {
        if (angry) {
            ctx.strokeStyle = 'rgba(70,0,0,0.7)';
            ctx.lineWidth = r * 0.09;
            ctx.beginPath(); ctx.moveTo(-ex - r*0.13, ey - r*0.22); ctx.lineTo(-ex + r*0.10, ey - r*0.08); ctx.stroke();
            ctx.beginPath(); ctx.moveTo( ex + r*0.13, ey - r*0.22); ctx.lineTo( ex - r*0.10, ey - r*0.08); ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, r * 0.40, r * 0.18, Math.PI, 0);
            ctx.strokeStyle = 'rgba(70,0,0,0.45)';
            ctx.lineWidth = r * 0.08;
            ctx.stroke();
        } else {
            ctx.beginPath();
            ctx.arc(0, r * 0.16, r * 0.22, 0.1, Math.PI - 0.1);
            ctx.strokeStyle = 'rgba(0,60,130,0.40)';
            ctx.lineWidth = r * 0.08;
            ctx.stroke();
        }
    } else {
        drawHood(r);
    }

    ctx.restore();
}

// ── Main draw ──
function drawScene() {
    ctx.clearRect(0, 0, W, H);
    drawSky();
    drawSun();
    drawCloud(W * 0.08, H * 0.07, 0.85);
    drawCloud(W * 0.55, H * 0.05, 0.65);
    drawCloud(W * 0.35, H * 0.09, 0.55);
    drawMountain();
    drawMountainShading();
    drawForest();
    drawPaths();
    drawTreasureChest(W * 0.5, H * 0.09, H * 0.038);
    drawTitle();
}

// ── Kill counter HUD ──
function drawHUD() {
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 6;

    ctx.textAlign = 'left';
    ctx.font = `bold ${H * 0.028}px "Segoe UI", sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fillText(`Level ${level}  |  Defeated: ${killCount} / ${KILL_TARGET}  |  Coins: ${coins}`, W * 0.02, H * 0.052);

    // Ranger buy button
    const btnW = W * 0.15, btnH = H * 0.044;
    const btnX = W * 0.02, btnY = H * 0.068;
    rangerBtnBounds = { x: btnX, y: btnY, w: btnW, h: btnH };
    const canAfford = coins >= RANGER_COST;

    ctx.shadowBlur = 0;
    ctx.fillStyle = canAfford ? 'rgba(30,110,30,0.88)' : 'rgba(50,50,50,0.65)';
    roundRect(btnX, btnY, btnW, btnH, 6); ctx.fill();
    ctx.strokeStyle = canAfford ? 'rgba(80,200,80,0.7)' : 'rgba(100,100,100,0.4)';
    ctx.lineWidth = 1.5;
    roundRect(btnX, btnY, btnW, btnH, 6); ctx.stroke();

    ctx.textAlign = 'center';
    ctx.fillStyle = canAfford ? '#fff' : 'rgba(180,180,180,0.55)';
    ctx.font = `bold ${H * 0.021}px "Segoe UI", sans-serif`;
    ctx.fillText(`Ranger  (${RANGER_COST})`, btnX + btnW * 0.5, btnY + btnH * 0.67);

    ctx.restore();
}

// ── Win screen ──
function drawWinScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.50)';
    ctx.fillRect(0, 0, W, H);

    const pw = Math.min(420, W * 0.7), ph = H * 0.28;
    const px = W * 0.5 - pw * 0.5, py = H * 0.5 - ph * 0.5;
    ctx.fillStyle = 'rgba(8,30,8,0.92)';
    roundRect(px, py, pw, ph, 14);
    ctx.fill();
    ctx.strokeStyle = 'rgba(50,200,80,0.6)';
    ctx.lineWidth = 2;
    roundRect(px, py, pw, ph, 14);
    ctx.stroke();

    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(50,220,80,0.8)';
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#44ee66';
    ctx.font = `bold ${H * 0.072}px "Segoe UI", Georgia, serif`;
    const winTitles = ['LEVEL 1 CLEAR!', 'LEVEL 2 CLEAR!', 'LEVEL 3 CLEAR!', 'YOU WIN!'];
    const winSubs   = [
        'Watch out — some impostors ahead...',
        'Some blobs wear hoodies in Level 3!',
        'Level 4 has spiders — click them once per leg!',
        'The treasure chest is safe!',
    ];
    const winBtns   = ['Click to start Level 2', 'Click to start Level 3', 'Click to start Level 4', 'Click to play again'];
    const wi = Math.min(level - 1, 3);
    ctx.fillText(winTitles[wi], W * 0.5, py + ph * 0.45);

    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(180,255,190,0.75)';
    ctx.font = `${H * 0.028}px "Segoe UI", sans-serif`;
    ctx.fillText(winSubs[wi], W * 0.5, py + ph * 0.68);

    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = `${H * 0.022}px "Segoe UI", sans-serif`;
    ctx.fillText(winBtns[wi], W * 0.5, py + ph * 0.88);
}

// ── Lose screen ──
function drawLoseScreen() {
    // Dim overlay
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);

    // Panel
    const pw = Math.min(420, W * 0.7), ph = H * 0.28;
    const px = W * 0.5 - pw * 0.5, py = H * 0.5 - ph * 0.5;
    ctx.fillStyle = 'rgba(30,8,8,0.92)';
    roundRect(px, py, pw, ph, 14);
    ctx.fill();
    ctx.strokeStyle = 'rgba(220,50,50,0.6)';
    ctx.lineWidth = 2;
    roundRect(px, py, pw, ph, 14);
    ctx.stroke();

    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(220,30,30,0.8)';
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#ff4444';
    ctx.font = `bold ${H * 0.072}px "Segoe UI", Georgia, serif`;
    ctx.fillText('YOU LOSE', W * 0.5, py + ph * 0.45);

    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,200,200,0.75)';
    ctx.font = `${H * 0.028}px "Segoe UI", sans-serif`;
    ctx.fillText(loseReason, W * 0.5, py + ph * 0.68);

    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = `${H * 0.022}px "Segoe UI", sans-serif`;
    ctx.fillText('Click anywhere to try again', W * 0.5, py + ph * 0.88);
}

// ── Game loop ──
function gameLoop() {
    if (gameOver) return;

    drawScene();
    drawHUD();

    const r = H * 0.024;
    const now = Date.now();

    blobs = blobs.filter(b => !(b.type === 'blue' && now - b.born > 10000));

    if (impostorWave2At > 0 && now >= impostorWave2At) {
        blobs.push(
            { pathIndex: Math.floor(Math.random()*3), t: 0, type: 'red', disguised: true, showingBlue: true, wobble: Math.random()*Math.PI*2, speed: 0.00050 + Math.random()*0.00010, nextToggle: now + 1000 + Math.random()*2000 },
            { pathIndex: Math.floor(Math.random()*3), t: 0, type: 'red', disguised: true, showingBlue: true, wobble: Math.random()*Math.PI*2, speed: 0.00050 + Math.random()*0.00010, nextToggle: now + 1500 + Math.random()*2000 },
        );
        impostorWave2At = 0;
    }

    if (now >= nextBlueSpawn) {
        blobs.push({
            pathIndex: Math.floor(Math.random() * 3),
            t: Math.random() * 0.6,
            type: 'blue',
            wobble: Math.random() * Math.PI * 2,
            speed: 0.00035 + Math.random() * 0.00015,
            dir: Math.random() < 0.5 ? 1 : -1,
            born: now,
        });
        nextBlueSpawn = now + 3000 + Math.random() * 4000;
    }

    for (const b of blobs) {
        b.wobble += 0.055;
        if (b.type === 'red' || b.type === 'spider') {
            b.t += b.speed;
            if (b.type === 'red' && b.disguised && b.t < 0.75 && now >= b.nextToggle) {
                b.showingBlue = !b.showingBlue;
                b.nextToggle = now + 1500 + Math.random() * 2500;
            }
            if (b.t >= 1.0) {
                gameOver = true;
                loseReason = b.type === 'spider'
                    ? 'A spider reached the treasure chest!'
                    : 'A red blob reached the treasure chest!';
                drawScene();
                drawLoseScreen();
                return;
            }
        } else {
            b.t += b.speed * b.dir;
            if (b.t >= 1.0) { b.t = 1.0; b.dir = -1; }
            if (b.t <= 0.0) { b.t = 0.0; b.dir =  1; }
            if (Math.random() < 0.0008) b.dir *= -1;
        }
        const [x, y] = getPosOnPath(PATHS[b.pathIndex], b.t);
        if (b.type === 'spider') {
            drawSpider(x, y, r, b.legs, b.wobble);
        } else {
            const visType  = (b.disguised && b.showingBlue) ? 'blue' : b.type;
            const isHooded = b.hooded && b.t < 0.5;
            drawBlob(x, y, r, visType, b.wobble, isHooded);
        }
    }

    // Rangers — attack enemies, cannot be fooled by disguises
    rangers = rangers.filter(ranger => {
        ranger.wobble += 0.055;
        ranger.t += 0.00055;
        if (ranger.t >= 1.0) return false;
        if (ranger.attackCooldown > 0) {
            ranger.attackCooldown--;
        } else {
            const [rx, ry] = getPosOnPath(PATHS[ranger.pathIndex], ranger.t);
            let target = null, bestDist = H * 0.09;
            for (const b of blobs) {
                if (b.type !== 'red' && b.type !== 'spider') continue;
                const [bx, by] = getPosOnPath(PATHS[b.pathIndex], b.t);
                const d = Math.hypot(rx - bx, ry - by);
                if (d < bestDist) { target = b; bestDist = d; }
            }
            if (target) {
                const [tx, ty] = getPosOnPath(PATHS[target.pathIndex], target.t);
                if (target.type === 'spider') {
                    target.legs--;
                    if (target.legs <= 0) {
                        spawnParticles(tx, ty);
                        blobs.splice(blobs.indexOf(target), 1);
                        killCount++; coins++;
                        if (killCount < KILL_TARGET) spawnRedBlob();
                    }
                } else {
                    spawnParticles(tx, ty);
                    blobs.splice(blobs.indexOf(target), 1);
                    killCount++; coins++;
                    if (killCount < KILL_TARGET) spawnRedBlob();
                }
                ranger.attackCooldown = 90;
            }
        }
        const [rx, ry] = getPosOnPath(PATHS[ranger.pathIndex], ranger.t);
        drawRanger(rx, ry, r, ranger.wobble);
        return true;
    });

    // Death particles
    particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.87; p.vy *= 0.87;
        p.alpha -= 0.045;
        if (p.alpha > 0) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r * p.alpha, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(232,50,50,${p.alpha})`;
            ctx.fill();
        }
        return p.alpha > 0;
    });

    if (killCount >= KILL_TARGET && !blobs.some(b => b.type === 'red' || b.type === 'spider')) {
        gameOver = true;
        gameWon  = true;
        drawScene();
        drawHUD();
        drawWinScreen();
        return;
    }

    requestAnimationFrame(gameLoop);
}

// ── Click handler ──
canvas.style.cursor = 'crosshair';
canvas.addEventListener('click', e => {
    if (gameOver) {
        const wasWon = gameWon, wasLevel = level;
        gameOver = false;
        gameWon  = false;
        particles = [];
        level = (wasWon && wasLevel < 4) ? wasLevel + 1 : 1;
        initBlobs();
        gameLoop();
        return;
    }

    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top) * (H / rect.height);
    const r = H * 0.024;

    // Ranger buy button
    if (rangerBtnBounds &&
        mx >= rangerBtnBounds.x && mx <= rangerBtnBounds.x + rangerBtnBounds.w &&
        my >= rangerBtnBounds.y && my <= rangerBtnBounds.y + rangerBtnBounds.h) {
        if (coins >= RANGER_COST) {
            coins -= RANGER_COST;
            rangers.push({ pathIndex: Math.floor(Math.random()*3), t: 0, wobble: 0, attackCooldown: 0 });
        }
        return;
    }

    for (let i = blobs.length - 1; i >= 0; i--) {
        const b = blobs[i];
        const [bx, by] = getPosOnPath(PATHS[b.pathIndex], b.t);
        if (Math.hypot(mx - bx, my - by) < r * 1.4) {
            if (b.hooded && b.t < 0.5) break;
            if (b.type === 'spider') {
                b.legs--;
                if (b.legs <= 0) {
                    spawnParticles(bx, by);
                    blobs.splice(i, 1);
                    killCount++; coins++;
                    if (killCount < KILL_TARGET) spawnRedBlob();
                }
            } else {
                const appearsBlue = b.type === 'blue' || (b.disguised && b.showingBlue);
                if (appearsBlue) {
                    gameOver = true;
                    loseReason = b.disguised ? 'You hit an impostor while it was disguised!' : 'You hit a friendly blue blob!';
                    drawScene();
                    drawLoseScreen();
                } else {
                    spawnParticles(bx, by);
                    blobs.splice(i, 1);
                    killCount++; coins++;
                    if (killCount < KILL_TARGET) spawnRedBlob();
                }
            }
            break;
        }
    }
});

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();
initBlobs();
gameLoop();
</script>
