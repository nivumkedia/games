<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mongolia</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #87ceeb; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    draw();
}

// Path control points (normalized 0-1)
const pathPts = [
    [0.50, 0.96],
    [0.44, 0.86],
    [0.54, 0.76],
    [0.42, 0.66],
    [0.52, 0.55],
    [0.46, 0.44],
    [0.51, 0.33],
    [0.49, 0.22],
    [0.50, 0.14],
];

function px(p) { return [p[0] * W, p[1] * H]; }

function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, H * 0.6);
    g.addColorStop(0, '#3aa8e8');
    g.addColorStop(0.6, '#a8dcf5');
    g.addColorStop(1, '#c8edf8');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H * 0.6);
}

function drawSun() {
    const x = W * 0.82, y = H * 0.1, r = H * 0.065;
    const glow = ctx.createRadialGradient(x, y, r * 0.3, x, y, r * 2.5);
    glow.addColorStop(0, 'rgba(255,240,100,0.5)');
    glow.addColorStop(1, 'rgba(255,200,50,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(x, y, r * 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffe566';
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
}

function drawCloud(x, y, s) {
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    const blobs = [
        [0, 0, 30], [40, -12, 36], [80, -4, 28],
        [18, 10, 26], [58, 8, 24],
    ];
    blobs.forEach(([bx, by, r]) => {
        ctx.beginPath();
        ctx.arc(x + bx * s, y + by * s, r * s, 0, Math.PI * 2);
        ctx.fill();
    });
}

function mountainShape() {
    const cx = W * 0.5, top = H * 0.1;
    ctx.beginPath();
    ctx.moveTo(0, H * 0.74);
    ctx.lineTo(W * 0.06, H * 0.62);
    ctx.lineTo(W * 0.18, H * 0.52);
    ctx.lineTo(W * 0.28, H * 0.42);
    ctx.lineTo(W * 0.36, H * 0.28);
    ctx.lineTo(cx - W * 0.04, H * 0.16);
    ctx.lineTo(cx, top);
    ctx.lineTo(cx + W * 0.04, H * 0.16);
    ctx.lineTo(W * 0.64, H * 0.28);
    ctx.lineTo(W * 0.72, H * 0.42);
    ctx.lineTo(W * 0.82, H * 0.52);
    ctx.lineTo(W * 0.94, H * 0.62);
    ctx.lineTo(W, H * 0.74);
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
}

function drawMountain() {
    mountainShape();
    const g = ctx.createLinearGradient(W * 0.5, H * 0.1, W * 0.5, H);
    g.addColorStop(0,   '#5a9e42');
    g.addColorStop(0.3, '#4a9438');
    g.addColorStop(0.6, '#3a7e2e');
    g.addColorStop(1,   '#2a6020');
    ctx.fillStyle = g;
    ctx.fill();
}

function drawMountainShading() {
    // Left face darker
    ctx.save();
    mountainShape();
    ctx.clip();
    const gl = ctx.createLinearGradient(0, 0, W * 0.5, 0);
    gl.addColorStop(0, 'rgba(0,30,0,0.28)');
    gl.addColorStop(0.45, 'rgba(0,0,0,0)');
    gl.addColorStop(0.55, 'rgba(0,0,0,0)');
    gl.addColorStop(1, 'rgba(0,40,0,0.18)');
    ctx.fillStyle = gl;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
}

function drawTree(x, y, h, variant) {
    const w = h * 0.55;
    // trunk
    ctx.fillStyle = '#5c3a1e';
    ctx.fillRect(x - h * 0.07, y - h * 0.18, h * 0.14, h * 0.22);

    const canopies = [
        { color: '#1a6b1a', offset: 0,    rx: w * 0.9 },
        { color: '#267a26', offset: -0.28, rx: w * 0.75 },
        { color: '#2d8c2d', offset: -0.52, rx: w * 0.58 },
    ];
    if (variant === 1) {
        canopies[0].color = '#1e5c1e';
        canopies[1].color = '#256b25';
        canopies[2].color = '#2a7a2a';
    }
    if (variant === 2) {
        canopies[0].color = '#2d7a18';
        canopies[1].color = '#38941e';
        canopies[2].color = '#42a824';
    }

    canopies.forEach(({ color, offset, rx }) => {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.ellipse(x, y + offset * h, rx, h * 0.32, 0, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawForest() {
    // trees scattered over mountain; avoid the path center
    const trees = [
        // left side
        [0.10, 0.70, 38, 0], [0.15, 0.64, 44, 1], [0.08, 0.64, 36, 2],
        [0.20, 0.58, 40, 0], [0.12, 0.58, 32, 1], [0.26, 0.52, 38, 2],
        [0.17, 0.50, 34, 0], [0.22, 0.44, 30, 1], [0.30, 0.46, 36, 2],
        [0.27, 0.38, 28, 0], [0.33, 0.36, 32, 1], [0.36, 0.30, 26, 2],
        [0.31, 0.28, 24, 0], [0.38, 0.24, 22, 1],
        [0.04, 0.72, 48, 2], [0.24, 0.68, 42, 0],
        // right side
        [0.90, 0.70, 38, 1], [0.85, 0.64, 44, 0], [0.92, 0.64, 36, 2],
        [0.80, 0.58, 40, 1], [0.88, 0.58, 32, 0], [0.74, 0.52, 38, 2],
        [0.83, 0.50, 34, 1], [0.78, 0.44, 30, 0], [0.70, 0.46, 36, 2],
        [0.73, 0.38, 28, 1], [0.67, 0.36, 32, 0], [0.64, 0.30, 26, 2],
        [0.69, 0.28, 24, 1], [0.62, 0.24, 22, 0],
        [0.96, 0.72, 48, 2], [0.76, 0.68, 42, 1],
        // near top
        [0.42, 0.20, 18, 0], [0.58, 0.20, 18, 1],
        [0.44, 0.16, 14, 2], [0.56, 0.16, 14, 0],
    ];
    trees.forEach(([nx, ny, h, v]) => drawTree(nx * W, ny * H, h, v));
}

function drawPath() {
    const pts = pathPts.map(px);

    // Shadow/border pass
    ctx.save();
    ctx.lineWidth = W * 0.022;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(100,60,10,0.35)';
    ctx.beginPath();
    ctx.moveTo(...pts[0]);
    for (let i = 1; i < pts.length; i++) {
        const prev = pts[i - 1], cur = pts[i];
        const mx = (prev[0] + cur[0]) / 2, my = (prev[1] + cur[1]) / 2;
        ctx.quadraticCurveTo(prev[0], prev[1], mx, my);
    }
    ctx.lineTo(...pts[pts.length - 1]);
    ctx.stroke();

    // Main dirt path
    ctx.lineWidth = W * 0.018;
    ctx.strokeStyle = '#d4a35a';
    ctx.beginPath();
    ctx.moveTo(...pts[0]);
    for (let i = 1; i < pts.length; i++) {
        const prev = pts[i - 1], cur = pts[i];
        const mx = (prev[0] + cur[0]) / 2, my = (prev[1] + cur[1]) / 2;
        ctx.quadraticCurveTo(prev[0], prev[1], mx, my);
    }
    ctx.lineTo(...pts[pts.length - 1]);
    ctx.stroke();

    // Light center stripe
    ctx.lineWidth = W * 0.006;
    ctx.strokeStyle = 'rgba(255,225,160,0.55)';
    ctx.stroke();

    ctx.restore();
}

function drawTreasureChest(x, y, s) {
    // Outer glow
    const glow = ctx.createRadialGradient(x, y - s * 0.3, s * 0.2, x, y - s * 0.3, s * 2.2);
    glow.addColorStop(0, 'rgba(255,220,50,0.55)');
    glow.addColorStop(0.5, 'rgba(255,190,30,0.18)');
    glow.addColorStop(1, 'rgba(255,200,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(x, y - s * 0.3, s * 2.2, 0, Math.PI * 2); ctx.fill();

    // Base box
    ctx.fillStyle = '#7a3b10';
    roundRect(x - s, y, s * 2, s * 1.1, s * 0.12);
    ctx.fill();

    // Lid flat part
    ctx.fillStyle = '#9b4e18';
    roundRect(x - s, y - s * 0.58, s * 2, s * 0.6, s * 0.1);
    ctx.fill();

    // Lid dome
    ctx.fillStyle = '#a85820';
    ctx.beginPath();
    ctx.ellipse(x, y - s * 0.58, s * 1.02, s * 0.42, 0, Math.PI, 0);
    ctx.fill();

    // Gold bands
    ctx.fillStyle = '#f5c518';
    // horizontal band on base
    ctx.fillRect(x - s, y + s * 0.38, s * 2, s * 0.14);
    // lid band
    ctx.fillRect(x - s, y - s * 0.62, s * 2, s * 0.1);
    // vertical band center
    ctx.fillRect(x - s * 0.1, y - s * 0.58, s * 0.2, s * 1.7);

    // Corners
    ctx.fillStyle = '#f5c518';
    [[x - s, y], [x + s, y], [x - s, y + s * 1.1], [x + s, y + s * 1.1]].forEach(([cx, cy]) => {
        ctx.beginPath(); ctx.arc(cx, cy, s * 0.15, 0, Math.PI * 2); ctx.fill();
    });

    // Lock
    ctx.fillStyle = '#f5c518';
    ctx.beginPath(); ctx.arc(x, y + s * 0.26, s * 0.26, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#7a3b10';
    ctx.beginPath(); ctx.arc(x, y + s * 0.26, s * 0.14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#f5c518';
    ctx.fillRect(x - s * 0.08, y + s * 0.26, s * 0.16, s * 0.2);

    // Shimmer on lid
    ctx.fillStyle = 'rgba(255,255,200,0.22)';
    ctx.beginPath();
    ctx.ellipse(x - s * 0.25, y - s * 0.75, s * 0.4, s * 0.13, -0.4, 0, Math.PI * 2);
    ctx.fill();
}

function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function drawTitle() {
    ctx.save();
    ctx.font = `bold ${H * 0.048}px "Segoe UI", Georgia, serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.shadowColor = 'rgba(0,80,0,0.5)';
    ctx.shadowBlur = 8;
    ctx.fillText('MONGOLIA', W * 0.5, H * 0.055);
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    drawSky();
    drawSun();
    drawCloud(W * 0.08, H * 0.07, 0.85);
    drawCloud(W * 0.55, H * 0.05, 0.65);
    drawCloud(W * 0.35, H * 0.09, 0.55);

    drawMountain();
    drawMountainShading();
    drawForest();
    drawPath();

    // Treasure chest at peak
    const peakX = W * 0.5, peakY = H * 0.1;
    drawTreasureChest(peakX, peakY - H * 0.01, H * 0.038);

    drawTitle();
}

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
