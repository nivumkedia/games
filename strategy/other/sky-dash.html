// Polyfill for ctx.roundRect (missing in some browsers)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
    const r = typeof radii === 'number' ? [radii,radii,radii,radii]
            : Array.isArray(radii) ? [radii[0]??0, radii[1]??radii[0]??0, radii[2]??radii[0]??0, radii[3]??radii[1]??radii[0]??0]
            : [0,0,0,0];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);   this.arcTo(x+w, y,   x+w, y+h,   r[1]);
    this.lineTo(x+w, y + h - r[2]); this.arcTo(x+w, y+h, x,   y+h,   r[2]);
    this.lineTo(x + r[3], y+h);     this.arcTo(x,   y+h, x,   y,     r[3]);
    this.lineTo(x, y + r[0]);       this.arcTo(x,   y,   x+w, y,     r[0]);
    this.closePath();
    return this;
  };
}

function loadLevel(idx) {
  const lev = LEVELS[idx];
  platforms = lev.plats.map(p => ({ ...p }));
  enemies = lev.enemies.map(e => ({
    ...e, w: 24, h: 24, vx: 1.1, alive: true, stomped: false, stompTimer: 0
  }));
  coins = lev.coinPos.map(c => ({ ...c, w: 14, h: 14, got: false, bobT: Math.random() * Math.PI * 2 }));
  coinsTotal = coins.length;
  coinsGot = 0;
  exitDoor = { ...lev.exit, w: 32, h: 48 };
  P.x = lev.spawn.x; P.y = lev.spawn.y;
  P.vx = 0; P.vy = 0; P.onGround = false;
  P.coyote = 0; P.jumpBuffer = 0; P.invincible = 0;
  cam.x = 0; cam.y = 0;
  particles = [];
  jumpHeld = false;
}

function overlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function update() {
  if (state !== 'playing') { menuT += 0.02; return; }
  menuT += 0.02;

  const lev = LEVELS[levelIdx];

  // Horizontal movement
  if (keys['ArrowLeft'] || keys['KeyA']) { P.vx -= ACCEL; P.dir = -1; }
  if (keys['ArrowRight'] || keys['KeyD']) { P.vx += ACCEL; P.dir = 1; }
  P.vx *= FRICTION;
  if (Math.abs(P.vx) > SPEED) P.vx = Math.sign(P.vx) * SPEED;

  // Jump input with buffering
  const jumpKey = keys['ArrowUp'] || keys['KeyW'] || keys['Space'];
  if (jumpKey && !jumpHeld) { P.jumpBuffer = 10; }
  jumpHeld = !!jumpKey;
  if (P.jumpBuffer > 0 && P.coyote > 0) {
    P.vy = JUMP_F;
    P.coyote = 0; P.jumpBuffer = 0;
  }
  if (P.jumpBuffer > 0) P.jumpBuffer--;
  if (P.coyote > 0) P.coyote--;

  // Gravity
  P.vy += GRAV;
  if (P.vy > 18) P.vy = 18;

  // Move X, resolve platforms
  P.x += P.vx;
  P.onGround = false;
  resolveX();

  // Move Y, resolve platforms
  P.y += P.vy;
  resolveY();

  // Level bounds
  if (P.x < 0) { P.x = 0; P.vx = 0; }
  if (P.x + P.w > lev.width) { P.x = lev.width - P.w; P.vx = 0; }

  // Walk animation
  if (P.onGround && Math.abs(P.vx) > 0.4) {
    P.walkTimer++;
    if (P.walkTimer > 7) { P.walkFrame = (P.walkFrame + 1) % 4; P.walkTimer = 0; }
  } else if (!P.onGround) {
    P.walkFrame = 2;
  }
  if (P.invincible > 0) P.invincible--;

  // Fall death
  if (P.y > 520) { playerDie(); return; }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    if (e.stomped) { e.stompTimer--; if (e.stompTimer <= 0) e.alive = false; continue; }
    e.x += e.vx;
    if (e.x <= e.pl || e.x + e.w >= e.pr) e.vx *= -1;
    if (P.invincible === 0 && overlap(P.x,P.y,P.w,P.h, e.x,e.y,e.w,e.h)) {
      // Stomp check: was player above enemy top before this frame?
      if (P.vy > 0 && P.y + P.h - P.vy <= e.y + 6) {
        e.stomped = true; e.stompTimer = 22;
        P.vy = -8;
        score += 100;
        burst(e.x + e.w/2, e.y + e.h/2, '#ff5555', 8);
      } else {
        playerDie(); return;
      }
    }
  }

  // Coins
  for (const c of coins) {
    if (c.got) continue;
    c.bobT += 0.055;
    if (overlap(P.x,P.y,P.w,P.h, c.x, c.y + Math.sin(c.bobT)*4, c.w, c.h)) {
      c.got = true; coinsGot++; score += 50;
      burst(c.x + c.w/2, c.y + c.h/2, '#ffd700', 5);
    }
  }

  // Exit
  if (overlap(P.x,P.y,P.w,P.h, exitDoor.x,exitDoor.y,exitDoor.w,exitDoor.h)) {
    score += Math.round(coinsGot / coinsTotal * 500);
    if (levelIdx < LEVELS.length - 1) {
      levelIdx++;
      loadLevel(levelIdx);
      state = 'levelclear';
      setTimeout(() => { state = 'playing'; }, 2200);
    } else {
      state = 'win';
    }
    return;
  }

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life--;
    return p.life > 0;
  });

  // Camera (smooth follow, clamped)
  const tx = P.x - W/2 + P.w/2;
  const ty = Math.max(0, Math.min(P.y - H*0.45, 480 - H));
  cam.x += (tx - cam.x) * 0.10;
  cam.y += (ty - cam.y) * 0.08;
  cam.x = Math.max(0, Math.min(cam.x, lev.width - W));
  cam.y = Math.max(0, Math.min(cam.y, 0)); // vertical locked for now
}

function resolveX() {
  for (const p of platforms) {
    if (!overlap(P.x,P.y,P.w,P.h, p.x,p.y,p.w,p.h)) continue;
    if (P.vx > 0) P.x = p.x - P.w;
    else if (P.vx < 0) P.x = p.x + p.w;
    P.vx = 0;
  }
}

function resolveY() {
  for (const p of platforms) {
    if (!overlap(P.x,P.y,P.w,P.h, p.x,p.y,p.w,p.h)) continue;
    if (P.vy > 0) {
      // Only land on top if we were above it last frame
      if (P.y + P.h - P.vy <= p.y + 2) {
        P.y = p.y - P.h;
        P.vy = 0;
        P.onGround = true;
        P.coyote = 8;
        P.walkFrame = 0;
      }
    } else if (P.vy < 0) {
      if (P.y - P.vy >= p.y + p.h - 2) {
        P.y = p.y + p.h;
        P.vy = 0;
      }
    }
  }
}

function playerDie() {
  if (P.invincible > 0) return;
  lives--;
  burst(P.x + P.w/2, P.y + P.h/2, '#ff3333', 14);
  if (lives <= 0) { state = 'gameover'; return; }
  P.x = LEVELS[levelIdx].spawn.x; P.y = LEVELS[levelIdx].spawn.y;
  P.vx = 0; P.vy = 0; P.invincible = 100;
}

function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i / n) + Math.random() * 0.4;
    const sp = 2.5 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 2,
      color, size: 3 + Math.random()*3, life: 22 + Math.random()*14|0 });
  }
}

// --- Drawing helpers ---
function hex2rgb(h) {
  const n = parseInt(h.slice(1), 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}
function lighten(hex, amt) {
  const [r,g,b] = hex2rgb(hex);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}

function drawBg(lev) {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, lev.bg1); g.addColorStop(1, lev.bg2);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // Parallax hills
  ctx.fillStyle = lev.hillCol;
  ctx.beginPath(); ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 8) {
    const hx = x + cam.x * 0.35;
    const hy = H - 55 - Math.sin(hx/220)*45 - Math.sin(hx/90)*18;
    x === 0 ? ctx.moveTo(0, hy) : ctx.lineTo(x, hy);
  }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  // Clouds (parallax)
  ctx.fillStyle = 'rgba(255,255,255,0.72)';
  const cx = cam.x * 0.28;
  const cloudSeeds = [80,220,420,620,800,1050,1300,1550,1800];
  for (let i = 0; i < cloudSeeds.length; i++) {
    const bx = (cloudSeeds[i] - cx % (W + 300) + W + 300) % (W + 300) - 50;
    const by = 45 + (i % 3) * 28;
    const r = 32 + (i % 4) * 12;
    ctx.beginPath();
    ctx.arc(bx,     by,     r,      0, Math.PI*2);
    ctx.arc(bx-r*.7,by+8, r*.65,  0, Math.PI*2);
    ctx.arc(bx+r*.75,by+10,r*.55, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawPlat(p, lev) {
  const px = p.x - cam.x, py = p.y - cam.y;
  if (px > W + p.w || px + p.w < 0) return;
  if (p.h > 30) {
    // Ground
    ctx.fillStyle = lev.groundCol;
    ctx.fillRect(px, py, p.w, p.h);
    ctx.fillStyle = lev.platCol;
    ctx.fillRect(px, py, p.w, 12);
    ctx.fillStyle = lighten(lev.platCol, 28);
    for (let gx = px+14; gx < px+p.w-14; gx += 22) {
      ctx.fillRect(gx, py-3, 5, 5);
      ctx.fillRect(gx+9, py-5, 4, 7);
    }
  } else {
    // Floating platform
    ctx.fillStyle = lev.platCol;
    ctx.beginPath(); ctx.roundRect(px, py, p.w, p.h, 4); ctx.fill();
    ctx.fillStyle = lighten(lev.platCol, 30);
    ctx.beginPath(); ctx.roundRect(px+4, py+2, p.w-8, 5, 2); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(px+3, py+p.h, p.w-3, 4);
  }
}

function drawExit() {
  const ex = exitDoor.x - cam.x, ey = exitDoor.y - cam.y;
  // Frame
  ctx.fillStyle = '#8b5e20';
  ctx.fillRect(ex-5, ey-5, exitDoor.w+10, exitDoor.h+5);
  // Door
  ctx.fillStyle = '#2a8a2a';
  ctx.fillRect(ex, ey, exitDoor.w, exitDoor.h);
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(ex+4, ey+4, 8, exitDoor.h-8);
  // Star
  ctx.fillStyle = '#ffd700';
  ctx.font = '18px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('★', ex + exitDoor.w/2, ey + 26);
  // Label
  ctx.fillStyle = '#fff'; ctx.font = 'bold 8px sans-serif';
  ctx.fillText('EXIT', ex + exitDoor.w/2, ey + exitDoor.h - 7);
}

function drawCoin(c) {
  if (c.got) return;
  const cx = c.x - cam.x, cy = c.y - cam.y + Math.sin(c.bobT) * 4;
  if (cx > W+20 || cx < -20) return;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(cx+7, cy+14, 6, 3, 0, 0, Math.PI*2); ctx.fill();
  // Coin
  ctx.fillStyle = '#ffd700';
  ctx.strokeStyle = '#d4a000'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx+7, cy+7, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // Shine
  ctx.fillStyle = 'rgba(255,255,200,0.6)';
  ctx.beginPath(); ctx.arc(cx+5, cy+5, 3, 0, Math.PI*2); ctx.fill();
}

function drawEnemy(e) {
  if (!e.alive) return;
  const ex = e.x - cam.x, ey = e.y - cam.y;
  if (ex > W+50 || ex < -50) return;
  ctx.save();
  if (e.stomped) {
    ctx.globalAlpha = e.stompTimer / 22;
    ctx.translate(ex + e.w/2, ey + e.h);
    ctx.scale(1.4, 0.25);
    ctx.translate(-e.w/2, -e.h);
  } else {
    ctx.translate(ex, ey);
  }
  // Body
  ctx.fillStyle = '#3aba3a';
  ctx.beginPath(); ctx.roundRect(1, 6, e.w-2, e.h-6, 6); ctx.fill();
  // Head
  ctx.fillStyle = '#4ece4e';
  ctx.beginPath(); ctx.arc(e.w/2, 8, 9, 0, Math.PI*2); ctx.fill();
  // Eyes (angry)
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(e.w/2-3, 6, 3.5, 3.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(e.w/2+3, 6, 3.5, 3.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#c00';
  ctx.beginPath(); ctx.arc(e.w/2-2, 6, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(e.w/2+4, 6, 2, 0, Math.PI*2); ctx.fill();
  // Brow
  ctx.strokeStyle = '#1a6a1a'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(e.w/2-6, 3); ctx.lineTo(e.w/2-1, 5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(e.w/2+7, 3); ctx.lineTo(e.w/2+2, 5); ctx.stroke();
  ctx.restore();
}

function drawPlayer() {
  const px = P.x - cam.x, py = P.y - cam.y;
  if (P.invincible > 0 && Math.floor(P.invincible/5) % 2 === 0) return;

  ctx.save();
  ctx.translate(px + P.w/2, py + P.h/2);
  if (P.dir === -1) ctx.scale(-1,1);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(0, P.h/2+2, 10, 4, 0, 0, Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle = '#e05030';
  ctx.beginPath(); ctx.roundRect(-9,-6, 18,18, 3); ctx.fill();
  // Shirt detail
  ctx.fillStyle = '#c03820';
  ctx.beginPath(); ctx.roundRect(-9,4, 18,8, [0,0,3]); ctx.fill();

  // Head
  ctx.fillStyle = '#f4c08a';
  ctx.beginPath(); ctx.arc(0,-14, 11, 0, Math.PI*2); ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(4,-15, 4,4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a2a55';
  ctx.beginPath(); ctx.arc(5,-15, 2.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(5.8,-15.8, 0.8, 0, Math.PI*2); ctx.fill();

  // Hat
  ctx.fillStyle = '#284cb0';
  ctx.fillRect(-10,-27, 20,7);
  ctx.fillRect(-7,-37, 14,12);

  // Legs
  const legAnim = P.onGround ? [[0,5],[5,0],[0,5],[5,0]][P.walkFrame] : [0,0];
  ctx.fillStyle = '#284cb0';
  ctx.beginPath(); ctx.roundRect(-7,12, 6,10+legAnim[0], 2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(1,12, 6,10+legAnim[1], 2); ctx.fill();

  // Arm
  ctx.fillStyle = '#e05030';
  ctx.beginPath(); ctx.roundRect(9,-5, 5,9, 2); ctx.fill();

  ctx.restore();
}

function drawHUD() {
  // Panel BG
  roundedRect(8,8,150,34,8,'rgba(0,0,0,0.42)');
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px Segoe UI'; ctx.textAlign = 'left';
  ctx.fillText(`❤️ ${lives}   ⭐ ${score}`, 16, 30);

  roundedRect(8,48,130,26,8,'rgba(0,0,0,0.42)');
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 12px Segoe UI';
  ctx.fillText(`🪙 ${coinsGot} / ${coinsTotal}`, 16, 65);

  // Level name center
  const lname = `Level ${levelIdx+1}: ${LEVELS[levelIdx].name}`;
  const tw = ctx.measureText(lname).width + 24;
  roundedRect(W/2-tw/2, 8, tw, 26, 8, 'rgba(0,0,0,0.42)');
  ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText(lname, W/2, 25);
}

function roundedRect(x,y,w,h,r,color) {
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fill();
}

function drawMenu() {
  // Sky BG
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#6ec6e8'); g.addColorStop(1,'#c8eaf8');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // Hills
  ctx.fillStyle = 'rgba(60,140,50,0.35)';
  ctx.beginPath(); ctx.moveTo(0,H);
  for (let x=0;x<=W;x+=8) {
    const hy = H - 75 - Math.sin(x/180)*50 - Math.sin(x/85)*22;
    x===0 ? ctx.moveTo(0,hy) : ctx.lineTo(x,hy);
  }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.78)';
  [[160,60,38],[380,45,28],[590,72,44],[750,50,30]].forEach(([x,y,r]) => {
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2); ctx.arc(x-r*.7,y+9,r*.6,0,Math.PI*2);
    ctx.arc(x+r*.75,y+10,r*.5,0,Math.PI*2); ctx.fill();
  });

  // Title card
  roundedRect(W/2-190,90,380,210,18,'rgba(0,0,0,0.38)');

  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 56px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText('Sky Dash', W/2, 168);
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = '16px Segoe UI';
  ctx.fillText('Arrow Keys / WASD  —  Move', W/2, 206);
  ctx.fillText('Space / Up  —  Jump', W/2, 228);
  ctx.fillText('Stomp enemies from above  ·  Collect coins  ·  Reach the exit', W/2, 252);

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 20px Segoe UI';
  ctx.globalAlpha = 0.72 + 0.28 * Math.sin(menuT * 2.8);
  ctx.fillText('Press SPACE to Start', W/2, 288);
  ctx.globalAlpha = 1;
}

function drawLevelClear() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#ffd700'; ctx.font = 'bold 46px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText('Level Clear! ⭐', W/2, H/2 - 18);
  ctx.fillStyle = '#fff'; ctx.font = '20px Segoe UI';
  ctx.fillText(`Loading Level ${levelIdx + 1}…`, W/2, H/2 + 26);
}

function drawOverlay(title, sub, col) {
  ctx.fillStyle = 'rgba(0,0,0,0.58)'; ctx.fillRect(0,0,W,H);
  roundedRect(W/2-220, H/2-70, 440, 140, 14, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = col; ctx.font = 'bold 46px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText(title, W/2, H/2);
  ctx.fillStyle = '#fff'; ctx.font = '18px Segoe UI';
  ctx.fillText(sub, W/2, H/2 + 38);
}

function draw() {
  ctx.clearRect(0,0,W,H);

  if (state === 'menu') { drawMenu(); return; }

  const lev = LEVELS[levelIdx];
  drawBg(lev);
  for (const p of platforms) drawPlat(p, lev);
  drawExit();
  for (const c of coins) drawCoin(c);
  for (const e of enemies) drawEnemy(e);

  ctx.save();
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / 36);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x - cam.x, p.y - cam.y, p.size, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();

  drawPlayer();
  drawHUD();

  if (state === 'levelclear') drawLevelClear();
  if (state === 'gameover') drawOverlay('Game Over', `Score: ${score}  —  Press SPACE to retry`, '#ff4444');
  if (state === 'win') drawOverlay('You Win! 🎉', `Final Score: ${score}  —  Press SPACE to play again`, '#ffd700');
}

function handleMenuKey(code) {
  if (code !== 'Space' && code !== 'Enter') return;
  if (state === 'menu') {
    score = 0; lives = 3; levelIdx = 0;
    loadLevel(0); state = 'playing';
  } else if (state === 'gameover') {
    score = 0; lives = 3; levelIdx = 0;
    loadLevel(0); state = 'playing';
  } else if (state === 'win') {
    state = 'menu';
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loadLevel(0);
loop();
</script>
</body>
</html>
