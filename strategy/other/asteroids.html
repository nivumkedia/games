        e.turretStage = 0;
        e.turretStages = [
            // Stage 0: Twin cannons - fire parallel bullet lines
            [
                { offsetX: -0.3, offsetY: -45, shootTimer: 0, alive: true, hp: Math.ceil(40 * tHpMult), maxHp: Math.ceil(40 * tHpMult), type: 'cannon', icon: '🔫', name: 'CANNON' },
                { offsetX: -0.3, offsetY: 45, shootTimer: 0, alive: true, hp: Math.ceil(40 * tHpMult), maxHp: Math.ceil(40 * tHpMult), type: 'cannon', icon: '🔫', name: 'CANNON' }
            ],
            // Stage 1: Missile pods + bomb dropper
            [
                { offsetX: -0.5, offsetY: -30, shootTimer: 0, alive: true, hp: Math.ceil(50 * tHpMult), maxHp: Math.ceil(50 * tHpMult), type: 'missile', icon: '🚀', name: 'MISSILE' },
                { offsetX: -0.5, offsetY: 30, shootTimer: 0, alive: true, hp: Math.ceil(50 * tHpMult), maxHp: Math.ceil(50 * tHpMult), type: 'missile', icon: '🚀', name: 'MISSILE' },
                { offsetX: -0.2, offsetY: 0, shootTimer: 0, alive: true, hp: Math.ceil(60 * tHpMult), maxHp: Math.ceil(60 * tHpMult), type: 'bomber', icon: '💣', name: 'BOMBER' }
            ],
            // Stage 2: Spread turrets + gatling
            [
                { offsetX: -0.6, offsetY: -50, shootTimer: 0, alive: true, hp: Math.ceil(55 * tHpMult), maxHp: Math.ceil(55 * tHpMult), type: 'spread', icon: '🔱', name: 'SPREAD' },
                { offsetX: -0.6, offsetY: 50, shootTimer: 0, alive: true, hp: Math.ceil(55 * tHpMult), maxHp: Math.ceil(55 * tHpMult), type: 'spread', icon: '🔱', name: 'SPREAD' },
                { offsetX: -0.3, offsetY: 0, shootTimer: 0, alive: true, hp: Math.ceil(70 * tHpMult), maxHp: Math.ceil(70 * tHpMult), type: 'gatling', icon: '⚡', name: 'GATLING' }
            ],
            // Stage 3 (final): Core laser - single powerful turret
            [
                { offsetX: -0.4, offsetY: 0, shootTimer: 0, alive: true, hp: Math.ceil(100 * tHpMult), maxHp: Math.ceil(100 * tHpMult), type: 'laser', icon: '🔴', name: 'CORE LASER' }
            ]
        ];
        e.turrets = e.turretStages[0];
        e.movePattern = 0;
        e.moveTimer = 0;
        e.targetY = H / 2;
        e.chargeTimer = 0;
        e.charging = false;
        e.chargeStartX = 0;
        e.minionTimer = 600;
        bossActive = e;
        bossWarningTimer = 180;
        bossScrapStorm = true;
        waveBannerText = 'WARNING: BOSS INCOMING';
        waveBannerTimer = 180;
        setTimeout(() => {
            if (bossActive) spawnFloatingText(W / 2, H / 2 + 40, 'SCRAP AUTO-COLLECT ACTIVE', '#66ff88');
        }, 2500);
    }
    enemies.push(e);
}

// ==================== PICKUP & POWERUP SYSTEM ====================
function spawnPickups(x, y, enemyType) {
    const def = ENEMY_TYPES[enemyType];
    const scrapMult = getScrapMultiplier();
    const totalScrap = Math.floor((def.scrapMin + Math.random() * (def.scrapMax - def.scrapMin)) * scrapMult);
    const numDrops = def.scrapDrops || 3;
    const perDrop = Math.max(1, Math.floor(totalScrap / numDrops));

    // Scatter individual scrap pickups
    for (let d = 0; d < numDrops; d++) {
        const angle = (d / numDrops) * Math.PI * 2 + Math.random() * 0.5;
        const dist = 8 + Math.random() * 15;
        pickups.push({
            x: x + Math.cos(angle) * dist, y: y + Math.sin(angle) * dist,
            vx: Math.cos(angle) * (1.5 + Math.random() * 2), vy: Math.sin(angle) * (1.5 + Math.random() * 2),
            type: 'scrap', amount: d === 0 ? totalScrap - perDrop * (numDrops - 1) : perDrop,
            life: 500, maxLife: 500
        });
    }

    // Crystal drops - much higher chances, boosted by crystalBonus upgrade
    const crystalMult = 1 + (saveData.upgradeLevels.crystalBonus || 0) * 0.25;
    const crystalChance = def.crystalChance * crystalMult;
    // Can drop multiple crystals
    const crystalRolls = enemyType === 'boss' ? 10 : (enemyType === 'elite' || enemyType === 'dreadnought') ? 3 : (def.crystalChance >= 0.15 ? 2 : 1);
    for (let cr = 0; cr < crystalRolls; cr++) {
        if (Math.random() < crystalChance) {
            const crystalAmt = enemyType === 'boss' ? (3 + Math.floor(Math.random() * 4)) : (enemyType === 'elite' || enemyType === 'dreadnought') ? (2 + Math.floor(Math.random() * 3)) : 1;
            const angle = Math.random() * Math.PI * 2;
            pickups.push({
                x: x + Math.cos(angle) * 12, y: y + Math.sin(angle) * 12,
                vx: Math.cos(angle) * 1.5 + (Math.random() - 0.5), vy: Math.sin(angle) * 1.5 + (Math.random() - 0.5),
                type: 'crystal', amount: crystalAmt,
                life: 500, maxLife: 500
            });
        }
    }

    // Parts drops - from more enemy types now
    if (def.partsMin && def.partsMin > 0) {
        const partsAmt = def.partsMin + Math.floor(Math.random() * (def.partsMax - def.partsMin + 1));
        for (let pd = 0; pd < partsAmt; pd++) {
            const angle = Math.random() * Math.PI * 2;
            pickups.push({
                x: x + Math.cos(angle) * 10, y: y + Math.sin(angle) * 10,
                vx: Math.cos(angle) * 1.2 + (Math.random() - 0.5), vy: Math.sin(angle) * 1.2 + (Math.random() - 0.5),
                type: 'parts', amount: 1,
                life: 500, maxLife: 500
            });
        }
    }

    // Powerup drop chance
    const unlockedPowerups = Object.entries(saveData.powerupUnlocks).filter(([k, v]) => v).map(([k]) => k);
    if (unlockedPowerups.length > 0) {
        const dropChance = (enemyType === 'elite' || enemyType === 'dreadnought') ? 0.35 : 0.07;
        if (Math.random() < dropChance) {
            const puKey = unlockedPowerups[Math.floor(Math.random() * unlockedPowerups.length)];
            pickups.push({
                x: x + (Math.random() - 0.5) * 30, y: y + (Math.random() - 0.5) * 30,
                vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5,
                type: 'powerup', powerupKey: puKey,
                life: 600, maxLife: 600
            });
        }
    }
}

function collectPickup(p) {
    playSound(p.type === 'powerup' ? 'powerup' : 'pickup');
    if (p.type === 'scrap') {
        const mult = activePowerups.doubleScrap ? 2 : 1;
        const amt = p.amount * mult;
        saveData.scrap += amt;
        runScrap += amt;
        spawnFloatingText(p.x, p.y, `+${amt} ⬡`, '#66ff88');
    } else if (p.type === 'crystal') {
        saveData.crystals += p.amount;
        runCrystals += p.amount;
        spawnFloatingText(p.x, p.y, `+${p.amount} ◆`, '#44aaff');
    } else if (p.type === 'parts') {
        saveData.parts += p.amount;
        runParts += p.amount;
        spawnFloatingText(p.x, p.y, `+${p.amount} ⚙`, '#cc77ff');
    } else if (p.type === 'powerup') {
        activatePowerup(p.powerupKey);
    }
}

function activatePowerup(key) {
    if (key === 'bomb') {
        bombs = Math.min(bombs + 1, 3);
        spawnFloatingText(ship.x, ship.y - 30, '+BOMB', '#ff6633');
    } else if (key === 'bubble') {
        activePowerups.bubble = 300; // 5s at 60fps
        spawnFloatingText(ship.x, ship.y - 30, 'SHIELD!', '#44aaff');
    } else if (key === 'wingmen') {
        activePowerups.wingmen = 600; // 10s
        wingmenShips = [
            { x: ship.x - 30, y: ship.y - 35, shootTimer: 0 },
            { x: ship.x - 30, y: ship.y + 35, shootTimer: 0 }
        ];
        spawnFloatingText(ship.x, ship.y - 30, 'WINGMEN!', '#ffcc33');
    } else if (key === 'overdrive') {
        activePowerups.overdrive = 360; // 6s
        spawnFloatingText(ship.x, ship.y - 30, 'OVERDRIVE!', '#ff3333');
    } else if (key === 'scrapStorm') {
        activePowerups.scrapStorm = 180; // 3s
        spawnFloatingText(ship.x, ship.y - 30, 'SCRAP STORM!', '#66ff88');
    } else if (key === 'timeWarp') {
        activePowerups.timeWarp = 480; // 8s
        spawnFloatingText(ship.x, ship.y - 30, 'TIME WARP!', '#aa88ff');
    } else if (key === 'superNova') {
        // Damage all on-screen enemies for 50% of their max HP
        for (const e of enemies) {
            const dmg = Math.ceil(e.maxHp * 0.5);
            e.hp -= dmg;
            e.flashTimer = 10;
            spawnFloatingText(e.x, e.y - e.size, `-${dmg}`, '#ffff00');
        }
        screenShake = 15;
        for (let i = 0; i < 40; i++) {
            const angle = Math.random() * Math.PI * 2;
            particles.push({ x: ship.x, y: ship.y, vx: Math.cos(angle) * (3 + Math.random() * 5), vy: Math.sin(angle) * (3 + Math.random() * 5), life: 30 + Math.random() * 20, maxLife: 50, r: 255, g: 255, b: 100, size: 2 + Math.random() * 3 });
        }
        spawnFloatingText(ship.x, ship.y - 30, 'SUPERNOVA!', '#ffff44');
    } else if (key === 'ghostMode') {
        activePowerups.ghostMode = 300; // 5s
        spawnFloatingText(ship.x, ship.y - 30, 'GHOST MODE!', '#aaccff');
    } else if (key === 'doubleScrap') {
        activePowerups.doubleScrap = 900; // 15s
        spawnFloatingText(ship.x, ship.y - 30, 'DOUBLE SCRAP!', '#66ff88');
    } else if (key === 'healPack') {
        const heal = Math.min(3, maxShieldHP - shieldHP);
        shieldHP = Math.min(maxShieldHP, shieldHP + 3);
        spawnFloatingText(ship.x, ship.y - 30, `+${heal} HP`, '#66ff88');
    }
}

function useBomb() {
    if (bombs <= 0) return;
    bombs--;
    screenShake = 20;
    // Kill all enemies, spawn explosions
    for (const e of enemies) {
        score += e.maxHp * 10;
        spawnExplosion(e.x, e.y, e.size, { r: e.r, g: e.g, b: e.b });
        spawnPickups(e.x, e.y, e.type);
    }
    enemies = [];
    enemyBullets = [];
    // White flash particles
    for (let i = 0; i < 60; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        particles.push({
            x: W / 2, y: H / 2,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 30 + Math.random() * 30, maxLife: 60,
            r: 255, g: 255, b: 255, size: 2 + Math.random() * 3
        });
    }
}

function spawnFloatingText(x, y, text, color) {
    if (floatingTexts.length > 30) return; // cap for performance
    floatingTexts.push({ x, y, text, color, life: 60, maxLife: 60 });
}

// ==================== UPDATE ====================
function update() {
    if (!running || paused) return;
    gameTime++;
    camX += SCROLL_SPEED;

    if (shootCooldown > 0) shootCooldown--;
    // Tick per-weapon cooldowns
    if (window.weaponCooldowns) {
        for (const key in window.weaponCooldowns) {
            if (window.weaponCooldowns[key] > 0) window.weaponCooldowns[key]--;
        }
    }
    if (invulnTimer > 0) invulnTimer--;
    if (screenShake > 0) screenShake *= 0.9;
    if (waveBannerTimer > 0) waveBannerTimer--;

    // Update active powerups
    for (const key in activePowerups) {
        activePowerups[key]--;
        if (activePowerups[key] <= 0) {
            delete activePowerups[key];
            if (key === 'wingmen') wingmenShips = [];
        }
    }

    // Auto regen
    const regenLv = saveData.upgradeLevels.regen || 0;
    if (regenLv > 0 && ship.alive && shieldHP < maxShieldHP) {
        const regenInterval = (30 - regenLv * 3) * 60; // frames
        if (gameTime % regenInterval === 0) {
            shieldHP = Math.min(maxShieldHP, shieldHP + 1);
            spawnFloatingText(ship.x, ship.y - 30, '+1 HP', '#66ff88');
        }
    }

    // Spawn queue
    if (spawnQueue.length > 0) {
        spawnTimer--;
        if (spawnTimer <= 0) {
            spawnEnemy(spawnQueue.shift());
            spawnTimer = 20 + Math.floor(Math.random() * 25);
        }
    }

    // Ship movement (8-directional, clamped to screen)
    if (ship.alive) {
        const spd = getShipSpeed();
        let mx = 0, my = 0;
        if (keys['ArrowLeft'] || keys['KeyA']) mx -= 1;
        if (keys['ArrowRight'] || keys['KeyD']) mx += 1;
        if (keys['ArrowUp'] || keys['KeyW']) my -= 1;
        if (keys['ArrowDown'] || keys['KeyS']) my += 1;
        if (mx !== 0 || my !== 0) {
            const len = Math.hypot(mx, my);
            ship.x += (mx / len) * spd;
            ship.y += (my / len) * spd;
            ship.thrust = true;
        } else {
            ship.thrust = false;
        }
        // Clamp to screen
        ship.x = Math.max(SHIP_SIZE, Math.min(W - SHIP_SIZE, ship.x));
        ship.y = Math.max(SHIP_SIZE, Math.min(H - SHIP_SIZE, ship.y));

        // Engine trail
        if (ship.thrust) {
            for (let i = 0; i < 2; i++) {
                const spread = (Math.random() - 0.5) * 0.4;
                const backAngle = Math.PI + spread;
                engineTrail.push({
                    x: ship.x - Math.cos(0) * SHIP_SIZE * 0.5,
                    y: ship.y - Math.sin(0) * SHIP_SIZE * 0.5,
                    vx: Math.cos(backAngle) * (1.5 + Math.random()),
                    vy: Math.sin(backAngle) * (1.5 + Math.random()) + (Math.random() - 0.5) * 0.5,
                    life: 20 + Math.random() * 15,
                    maxLife: 35,
                    size: 1.5 + Math.random() * 2
                });
            }
        }

        // Shooting (auto-fire)
        if (shootCooldown <= 0) {
            fireWeapon();
        }
    }

    // Update wingmen
    if (activePowerups.wingmen && ship.alive) {
        for (const wm of wingmenShips) {
            // Follow ship
            const targetX = ship.x - 30;
            const targetY0 = wingmenShips.indexOf(wm) === 0 ? ship.y - 35 : ship.y + 35;
            wm.x += (targetX - wm.x) * 0.1;
            wm.y += (targetY0 - wm.y) * 0.1;
            wm.shootTimer--;
            if (wm.shootTimer <= 0) {
                wm.shootTimer = 15;
                bullets.push({
                    x: wm.x + SHIP_SIZE, y: wm.y,
                    vx: BULLET_SPEED, vy: 0,
                    life: BULLET_LIFE, damage: 5, trail: [], pierce: false, wavePhase: 0
                });
            }
        }
    }

    updateBullets();
    updateEnemyBullets();
    updateEnemies();
    updatePickups();
    updateParticles();
    updateEngineTrail();
    updateFloatingTexts();

    // Cap player bullets for performance
    while (bullets.length > 100) bullets.shift();

    // Bullet-enemy collision
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            const dx = b.x - e.x, dy = b.y - e.y;
            const hitR = e.size + 4;
            if (dx * dx + dy * dy < hitR * hitR) {
                // Boss shield blocks damage
                if (e === bossActive && bossActive.shieldActive) {
                    if (!b.pierce) { bullets.splice(i, 1); }
                    break;
                }
                e.hp -= b.damage;
                e.flashTimer = 6;
                spawnFloatingText(e.x, e.y - e.size, `-${Math.floor(b.damage)}`, '#ffcc33');
                if (b.isMissile) {
                    // Missile explosion — big fiery blast + area damage
                    playSound('explosion');
                    screenShake = Math.max(screenShake, 8);
                    shockwaves.push({ x: b.x, y: b.y, r: 0, maxR: 60, life: 15, maxLife: 15 });
                    // Fiery explosion particles
                    for (let k = 0; k < 10; k++) {
                        const angle = Math.random() * Math.PI * 2;
                        const spd = 1 + Math.random() * 4;
                        const colors = [[255,200,50],[255,120,30],[255,80,20],[255,50,10]];
                        const c = colors[Math.floor(Math.random() * colors.length)];
                        particles.push({
                            x: b.x, y: b.y,
                            vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
                            life: 15 + Math.random() * 15, maxLife: 30,
                            r: c[0], g: c[1], b: c[2], size: 2 + Math.random() * 3
                        });
                    }
                    // Smoke particles
                    for (let k = 0; k < 4; k++) {
                        const angle = Math.random() * Math.PI * 2;
                        particles.push({
                            x: b.x, y: b.y,
                            vx: Math.cos(angle) * (0.5 + Math.random()), vy: Math.sin(angle) * (0.5 + Math.random()),
                            life: 20 + Math.random() * 15, maxLife: 35,
                            r: 150, g: 150, b: 150, size: 3 + Math.random() * 3
                        });
                    }
                    // Area damage to nearby enemies
                    const blastRadius = 60;
                    for (let ej = enemies.length - 1; ej >= 0; ej--) {
                        if (ej === j) continue;
                        const ae = enemies[ej];
                        const dist = Math.hypot(ae.x - b.x, ae.y - b.y);
                        if (dist < blastRadius) {
                            const splashDmg = Math.floor(b.damage * 0.5 * (1 - dist / blastRadius));
                            ae.hp -= splashDmg;
                            ae.flashTimer = 6;
                            if (splashDmg > 0) spawnFloatingText(ae.x, ae.y - ae.size, `-${splashDmg}`, '#ff8844');
                            if (ae.hp <= 0) {
                                score += ae.maxHp * 10;
                                spawnExplosion(ae.x, ae.y, ae.size, { r: ae.r, g: ae.g, b: ae.b });
                                spawnPickups(ae.x, ae.y, ae.type);
                                enemies.splice(ej, 1);
                                if (ej < j) j--;
                            }
                        }
                    }
                } else {
                    // Normal hit particles
                    for (let k = 0; k < 4; k++) {
                        const angle = Math.random() * Math.PI * 2;
                        particles.push({
                            x: b.x, y: b.y,
                            vx: Math.cos(angle) * (1 + Math.random() * 2),
                            vy: Math.sin(angle) * (1 + Math.random() * 2),
                            life: 10 + Math.random() * 10, maxLife: 20,
                            r: 255, g: 255, b: 200, size: 1 + Math.random()
                        });
                    }
                }
                if (e.hp <= 0) {
                    score += e.maxHp * 10;
                    spawnExplosion(e.x, e.y, e.size, { r: e.r, g: e.g, b: e.b });
                    spawnPickups(e.x, e.y, e.type);
                    screenShake = Math.min(e.size * 0.5, 10);
                    enemies.splice(j, 1);
                }
                if (!b.pierce) {
                    bullets.splice(i, 1);
                    break;
                }
            }
        }
    }

    // Enemy bullet-ship collision
    const isInvincible = invulnTimer > 0 || activePowerups.bubble || activePowerups.ghostMode;
    if (ship.alive && !isInvincible) {
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            const eb = enemyBullets[i];
            const hitRadius = eb.isPlasma ? SHIP_SIZE * 1.5 : eb.isMine ? SHIP_SIZE * 0.9 : SHIP_SIZE * 0.7;
            const edx = eb.x - ship.x, edy = eb.y - ship.y;
            if (edx * edx + edy * edy < hitRadius * hitRadius) {
                enemyBullets.splice(i, 1);
                damageShip();
                break;
            }
        }
    }

    // Enemy-ship collision (ghostMode phases through)
    if (ship.alive && !isInvincible) {
        for (const e of enemies) {
            if (Math.hypot(ship.x - e.x, ship.y - e.y) < e.size + SHIP_SIZE * 0.6) {
                damageShip();
                break;
            }
        }
    }

    // Spawn space turrets (stationary hazards) — only after wave 15
    if (wave >= 15 && !betweenWaves && spaceTurrets.length < 3 && Math.random() < getStage().turretChance * 0.3) {
        const turretTypes = ['cannon', 'missile', 'laser', 'flak', 'gatling', 'plasma', 'mine', 'shotgun'];
        const tt = turretTypes[Math.floor(Math.random() * turretTypes.length)];
        // Attached to space debris: satellites, space stations, wrecked ships
        const shapes = ['satellite', 'station', 'wreck', 'satellite', 'station', 'wreck', 'beacon', 'platform'];
        spaceTurrets.push({
            x: W + 60,
            y: 60 + Math.random() * (H - 120),
            vx: -(0.6 + Math.random() * 0.4),
            turretType: tt,
            shape: shapes[Math.floor(Math.random() * shapes.length)],
            hp: 15 + wave * 2,
            maxHp: 15 + wave * 2,
            size: 22 + Math.random() * 10,
            shootTimer: 60 + Math.floor(Math.random() * 40),
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.008,
            laserCharging: false,
            laserCharge: 0,
            laserFiring: false,
            laserAngle: 0,
            laserDuration: 0,
            flashTimer: 0
        });
    }
    for (let i = spaceTurrets.length - 1; i >= 0; i--) {
        const st = spaceTurrets[i];
        st.x += st.vx;
        st.rotation += st.rotSpeed;
        if (st.flashTimer > 0) st.flashTimer--;

        // Shooting at player
        if (ship.alive) {
            st.shootTimer--;
            const aimAngle = Math.atan2(ship.y - st.y, ship.x - st.x);
            if (st.turretType === 'cannon' && st.shootTimer <= 0) {
                st.shootTimer = 50 + Math.floor(Math.random() * 30);
                // 3-round burst
                for (let b = 0; b < 3; b++) {
                    const spread = (b - 1) * 0.12;
                    enemyBullets.push({ x: st.x, y: st.y, vx: Math.cos(aimAngle + spread) * 4, vy: Math.sin(aimAngle + spread) * 4, life: 200, homing: false });
                }
            } else if (st.turretType === 'missile' && st.shootTimer <= 0) {
                st.shootTimer = 90 + Math.floor(Math.random() * 40);
                enemyBullets.push({ x: st.x, y: st.y, vx: Math.cos(aimAngle) * 2.5, vy: Math.sin(aimAngle) * 2.5, life: 300, homing: true });
            } else if (st.turretType === 'flak' && st.shootTimer <= 0) {
                st.shootTimer = 70 + Math.floor(Math.random() * 30);
                // Fires a shell that explodes into fragments near the player
                const dist = Math.hypot(ship.x - st.x, ship.y - st.y);
                const travelTime = Math.floor(dist / 5);
                enemyBullets.push({ x: st.x, y: st.y, vx: Math.cos(aimAngle) * 5, vy: Math.sin(aimAngle) * 5, life: Math.min(travelTime + 5, 60), homing: false, isFlakEnemy: true });
            } else if (st.turretType === 'gatling' && st.shootTimer <= 0) {
                st.shootTimer = 5; // very fast fire rate
                const spread = (Math.random() - 0.5) * 0.2;
                enemyBullets.push({ x: st.x, y: st.y, vx: Math.cos(aimAngle + spread) * 5.5, vy: Math.sin(aimAngle + spread) * 5.5, life: 120, homing: false });
            } else if (st.turretType === 'plasma' && st.shootTimer <= 0) {
                st.shootTimer = 100 + Math.floor(Math.random() * 30);
                // Big slow plasma ball that does area damage
                enemyBullets.push({ x: st.x, y: st.y, vx: Math.cos(aimAngle) * 2, vy: Math.sin(aimAngle) * 2, life: 250, homing: false, isPlasma: true });
            } else if (st.turretType === 'mine' && st.shootTimer <= 0) {
                st.shootTimer = 120 + Math.floor(Math.random() * 60);
                // Drops a proximity mine that drifts slowly
                const driftAngle = aimAngle + (Math.random() - 0.5) * 0.5;
                enemyBullets.push({ x: st.x, y: st.y, vx: Math.cos(driftAngle) * 0.8, vy: Math.sin(driftAngle) * 0.8, life: 600, homing: false, isMine: true, mineArmed: 60 });
            } else if (st.turretType === 'shotgun' && st.shootTimer <= 0) {
                st.shootTimer = 80 + Math.floor(Math.random() * 30);
                // Wide spread of pellets
                for (let p = 0; p < 7; p++) {
                    const spread = (p - 3) * 0.15 + (Math.random() - 0.5) * 0.08;
                    const spd = 3.5 + Math.random() * 1.5;
                    enemyBullets.push({ x: st.x, y: st.y, vx: Math.cos(aimAngle + spread) * spd, vy: Math.sin(aimAngle + spread) * spd, life: 60, homing: false });
                }
            } else if (st.turretType === 'laser') {
                if (!st.laserFiring && !st.laserCharging && st.shootTimer <= 0) {
                    st.laserCharging = true;
                    st.laserCharge = 60;
                    st.laserAngle = aimAngle;
                    st.shootTimer = 180;
                }
                if (st.laserCharging) {
                    st.laserCharge--;
                    st.laserAngle = st.laserAngle * 0.92 + aimAngle * 0.08;
                    if (st.laserCharge <= 0) {
                        st.laserCharging = false;
                        st.laserFiring = true;
                        st.laserDuration = 50;
                    }
                }
                if (st.laserFiring) {
                    st.laserDuration--;
                    st.laserAngle += 0.008 * Math.sign(ship.y - st.y);
                    // Damage player
                    if (!isInvincible) {
                        const toShipAngle = Math.atan2(ship.y - st.y, ship.x - st.x);
                        let ad = toShipAngle - st.laserAngle;
                        while (ad > Math.PI) ad -= Math.PI * 2;
                        while (ad < -Math.PI) ad += Math.PI * 2;
                        if (Math.abs(ad) < 0.07 && Math.hypot(ship.x - st.x, ship.y - st.y) < W && gameTime % 20 === 0) {
                            damageShip();
                        }
                    }
                    if (st.laserDuration <= 0) st.laserFiring = false;
                }
            }
        }

        // Player bullets hit turret
        for (let j = bullets.length - 1; j >= 0; j--) {
            const b = bullets[j];
            if (Math.hypot(b.x - st.x, b.y - st.y) < st.size) {
                st.hp -= b.damage;
                st.flashTimer = 6;
                for (let k = 0; k < 3; k++) {
                    const a = Math.random() * Math.PI * 2;
                    particles.push({ x: b.x, y: b.y, vx: Math.cos(a) * 2, vy: Math.sin(a) * 2, life: 10, maxLife: 10, r: 200, g: 180, b: 150, size: 1.5 });
                }
                if (!b.pierce) { bullets.splice(j, 1); }
                break;
            }
        }
        if (st.hp <= 0) {
            spawnExplosion(st.x, st.y, st.size, { r: 180, g: 160, b: 120 });
            score += 150;
            // Drop some scrap
            for (let d = 0; d < 4; d++) {
                const a = (d / 4) * Math.PI * 2;
                pickups.push({ x: st.x + Math.cos(a) * 8, y: st.y + Math.sin(a) * 8, vx: Math.cos(a) * 1.5, vy: Math.sin(a) * 1.5, type: 'scrap', amount: 15 + Math.floor(Math.random() * 10), life: 500, maxLife: 500 });
            }
            spaceTurrets.splice(i, 1);
            continue;
        }

        // Ship collision
        if (ship.alive && !isInvincible && Math.hypot(ship.x - st.x, ship.y - st.y) < st.size + SHIP_SIZE * 0.5) {
            damageShip();
        }

        if (st.x < -80) spaceTurrets.splice(i, 1);
    }

    // Update asteroids
    if (wave >= 8 && !betweenWaves && gameTime % 800 < 1 && Math.random() < getStage().asteroidChance * 0.4 && asteroids.length < 4) {
        const count = 2 + Math.floor(Math.random() * 3);
        for (let a = 0; a < count && asteroids.length < 4; a++) {
            const verts = [];
            const numVerts = 6 + Math.floor(Math.random() * 4);
            for (let v = 0; v < numVerts; v++) {
                verts.push(0.6 + Math.random() * 0.4);
            }
            asteroids.push({
                x: W + 40 + Math.random() * 100,
                y: 40 + Math.random() * (H - 80),
                vx: -(1.5 + Math.random() * 2),
                vy: (Math.random() - 0.5) * 1.5,
                size: 15 + Math.random() * 25,
                hp: 3 + Math.floor(Math.random() * 4),
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.03,
                verts: verts,
                r: 120 + Math.floor(Math.random() * 40),
                g: 100 + Math.floor(Math.random() * 30),
                b: 80 + Math.floor(Math.random() * 20)
            });
        }
    }
    for (let i = asteroids.length - 1; i >= 0; i--) {
        const a = asteroids[i];
        a.x += a.vx;
        a.y += a.vy;
        a.rotation += a.rotSpeed;
        // Asteroid-bullet collision
        for (let j = bullets.length - 1; j >= 0; j--) {
            const b = bullets[j];
            if (Math.hypot(b.x - a.x, b.y - a.y) < a.size * 0.7) {
                a.hp -= b.damage;
                for (let k = 0; k < 3; k++) {
                    const angle = Math.random() * Math.PI * 2;
                    particles.push({ x: b.x, y: b.y, vx: Math.cos(angle) * 2, vy: Math.sin(angle) * 2, life: 12, maxLife: 12, r: a.r, g: a.g, b: a.b, size: 1.5 });
                }
                if (!b.pierce) { bullets.splice(j, 1); }
                break;
            }
        }
        if (a.hp <= 0) {
            spawnExplosion(a.x, a.y, a.size * 0.6, { r: a.r, g: a.g, b: a.b });
            score += 20;
            asteroids.splice(i, 1);
            continue;
        }
        // Asteroid-ship collision
        if (ship.alive && !isInvincible && Math.hypot(ship.x - a.x, ship.y - a.y) < a.size * 0.6 + SHIP_SIZE * 0.5) {
            damageShip();
        }
        // Asteroid-enemy collision
        for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if (Math.hypot(e.x - a.x, e.y - a.y) < a.size * 0.5 + e.size * 0.5) {
                e.hp -= 3;
                e.flashTimer = 6;
                if (e.hp <= 0) {
                    score += e.maxHp * 10;
                    spawnExplosion(e.x, e.y, e.size, { r: e.r, g: e.g, b: e.b });
                    spawnPickups(e.x, e.y, e.type);
                    enemies.splice(j, 1);
                }
            }
        }
        if (a.x < -60) asteroids.splice(i, 1);
    }

    // Update supply crates
    if (!betweenWaves && wave >= 1 && Math.random() < 0.0005) {
        supplyCrates.push({
            x: W + 30,
            y: 60 + Math.random() * (H - 120),
            vx: -(0.8 + Math.random() * 0.5),
            vy: (Math.random() - 0.5) * 0.3,
            hp: 8,
            maxHp: 8,
            size: 18,
            pulse: Math.random() * Math.PI * 2
        });
    }
    for (let i = supplyCrates.length - 1; i >= 0; i--) {
        const c = supplyCrates[i];
        c.x += c.vx;
        c.y += c.vy;
        c.pulse += 0.05;
        // Bullet collision
        for (let j = bullets.length - 1; j >= 0; j--) {
            const b = bullets[j];
            if (Math.hypot(b.x - c.x, b.y - c.y) < c.size) {
                c.hp -= b.damage;
                for (let k = 0; k < 3; k++) {
                    const angle = Math.random() * Math.PI * 2;
                    particles.push({ x: b.x, y: b.y, vx: Math.cos(angle) * 2, vy: Math.sin(angle) * 2, life: 10, maxLife: 10, r: 255, g: 200, b: 50, size: 1.5 });
                }
                if (!b.pierce) { bullets.splice(j, 1); }
                break;
            }
        }
        if (c.hp <= 0) {
            // Drop loot
            spawnExplosion(c.x, c.y, 20, { r: 255, g: 200, b: 50 });
            const scrapMult = getScrapMultiplier();
            const scrapAmt = Math.floor((80 + Math.random() * 60) * scrapMult);
            for (let d = 0; d < 8; d++) {
                const angle = (d / 8) * Math.PI * 2;
                pickups.push({ x: c.x + Math.cos(angle) * 10, y: c.y + Math.sin(angle) * 10, vx: Math.cos(angle) * 2, vy: Math.sin(angle) * 2, type: 'scrap', amount: Math.ceil(scrapAmt / 8), life: 500, maxLife: 500 });
            }
            // Guaranteed crystals
            for (let d = 0; d < 2; d++) {
                const angle = Math.random() * Math.PI * 2;
                pickups.push({ x: c.x + Math.cos(angle) * 8, y: c.y + Math.sin(angle) * 8, vx: Math.cos(angle) * 1.5, vy: Math.sin(angle) * 1.5, type: 'crystal', amount: 1 + Math.floor(Math.random() * 2), life: 500, maxLife: 500 });
            }
            // Chance of parts
            if (Math.random() < 0.4) {
                const angle = Math.random() * Math.PI * 2;
                pickups.push({ x: c.x + Math.cos(angle) * 8, y: c.y + Math.sin(angle) * 8, vx: Math.cos(angle) * 1.2, vy: Math.sin(angle) * 1.2, type: 'parts', amount: 1, life: 500, maxLife: 500 });
            }
            spawnFloatingText(c.x, c.y - 20, 'SUPPLY CRATE!', '#ffcc33');
            supplyCrates.splice(i, 1);
            continue;
        }
        if (c.x < -40) supplyCrates.splice(i, 1);
    }

    // Sky Force-style boss AI
    if (bossActive && bossActive.hp > 0 && ship.alive) {
        const b = bossActive;
        const hpPct = b.hp / b.maxHp;
        b.phaseTimer++;

        // Update phase based on HP
        if (hpPct <= 0.25 && b.phase > 0) {
            if (b.phase !== 0) { b.phase = 0; waveBannerText = 'BOSS ENRAGED!'; waveBannerTimer = 90; screenShake = 15; }
        } else if (hpPct <= 0.50 && b.phase > 1) {
            if (b.phase !== 1) { b.phase = 1; waveBannerText = 'BOSS PHASE 2'; waveBannerTimer = 90; screenShake = 10; }
        } else if (hpPct <= 0.75 && b.phase > 2) {
            if (b.phase !== 2) { b.phase = 2; waveBannerText = 'BOSS WEAKENING'; waveBannerTimer = 90; }
        }

        // Boss movement - sweeps up and down, gets faster at lower HP
        b.moveTimer++;
        const moveSpeed = b.phase <= 1 ? 2.5 : 1.5;
        if (b.moveTimer > 120) {
            b.moveTimer = 0;
            b.targetY = 80 + Math.random() * (H - 160);
        }
        const dy = b.targetY - b.y;
        b.y += Math.sign(dy) * Math.min(Math.abs(dy) * 0.03, moveSpeed);

        // Charge attack (phase 1 and 0): boss rushes left toward player then retreats
        if (b.phase <= 1 && !b.charging && b.chargeTimer <= 0 && Math.random() < 0.003) {
            b.charging = true;
            b.chargeStartX = b.x;
            b.chargeTimer = 120;
            b.targetY = ship.y;
            waveBannerText = 'INCOMING!';
            waveBannerTimer = 40;
        }
        if (b.charging) {
            b.chargeTimer--;
            if (b.chargeTimer > 60) {
                b.x -= 4; // rush forward
            } else {
                b.x += 3; // retreat
                if (b.x >= b.hoverX) { b.x = b.hoverX; b.charging = false; b.chargeTimer = 300; }
            }
        } else if (b.chargeTimer > 0) {
            b.chargeTimer--;
        }

        // Shield phase: periodically becomes invulnerable for a few seconds
        if (b.shieldCooldown > 0) {
            b.shieldCooldown--;
        } else if (!b.shieldActive && b.phase <= 2 && Math.random() < 0.002) {
            b.shieldActive = true;
            b.shieldTimer = 180 + (b.phase === 0 ? 120 : 0); // 3-5s shield
            spawnFloatingText(b.x, b.y - b.size - 10, 'SHIELDED!', '#44ffdd');
        }
        if (b.shieldActive) {
            b.shieldTimer--;
            if (b.shieldTimer <= 0) {
                b.shieldActive = false;
                b.shieldCooldown = 480 - b.phase * 60; // shorter cooldown at lower phases
            }
        }

        // Sky Force-style turret fire by type
        for (const turret of b.turrets) {
            if (!turret.alive) continue;
            turret.shootTimer--;
            if (turret.shootTimer <= 0) {
                const tx = b.x + (turret.offsetX || -0.6) * b.size;
                const ty = b.y + turret.offsetY;
                const aimAngle = Math.atan2(ship.y - ty, ship.x - tx);

                if (turret.type === 'cannon') {
                    // Two parallel lines of bullets (Sky Force style)
                    turret.shootTimer = 18;
                    for (let line = -1; line <= 1; line += 2) {
                        enemyBullets.push({ x: tx, y: ty + line * 6, vx: -3.5, vy: 0, life: 999, homing: false, bossBullet: true, hp: 2 });
                    }
                } else if (turret.type === 'missile') {
                    // Homing missiles in salvos
                    turret.shootTimer = 60 + Math.floor(Math.random() * 30);
                    for (let m = 0; m < 3; m++) {
                        const spread = (m - 1) * 0.3;
                        enemyBullets.push({ x: tx, y: ty, vx: Math.cos(aimAngle + spread) * 2.0, vy: Math.sin(aimAngle + spread) * 2.0, life: 300, homing: true, bossBullet: true, hp: 3 });
                    }
                } else if (turret.type === 'bomber') {
                    // 3 big slow bombs that explode into fragments
                    turret.shootTimer = 90 + Math.floor(Math.random() * 30);
                    for (let d = 0; d < 3; d++) {
                        const spread = (d - 1) * 0.4;
                        enemyBullets.push({ x: tx, y: ty, vx: Math.cos(aimAngle + spread) * 2, vy: Math.sin(aimAngle + spread) * 2, life: 120, homing: false, bossBullet: true, hp: 6, isFlakEnemy: true });
                    }
                } else if (turret.type === 'spread') {
                    // Wide fan of bullets
                    turret.shootTimer = 25 + Math.floor(Math.random() * 10);
                    const count = 7;
                    for (let s = 0; s < count; s++) {
                        const a = aimAngle + (s - (count-1)/2) * 0.2;
                        enemyBullets.push({ x: tx, y: ty, vx: Math.cos(a) * 3, vy: Math.sin(a) * 3, life: 999, homing: false, bossBullet: true, hp: 2 });
                    }
                } else if (turret.type === 'gatling') {
                    // Rapid fire stream aimed at player
                    turret.shootTimer = 8;
                    const jitter = (Math.random() - 0.5) * 0.15;
                    enemyBullets.push({ x: tx, y: ty, vx: Math.cos(aimAngle + jitter) * 4.5, vy: Math.sin(aimAngle + jitter) * 4.5, life: 999, homing: false, bossBullet: true, hp: 1 });
                } else if (turret.type === 'laser') {
                    // Core laser: charge then fire beam (use existing laser system)
                    turret.shootTimer = 5;
                    if (!b.laserFiring && b.laserChargeTimer <= 0 && Math.random() < 0.01) {
                        b.laserChargeTimer = 90;
                        b.laserAngle = aimAngle;
                    }
                }
            }
        }

        // Check if all turrets in current stage are dead -> advance to next stage
        const allDead = b.turrets.every(t => !t.alive);
        if (allDead && b.turretStage < b.turretStages.length - 1) {
            b.turretStage++;
            b.turrets = b.turretStages[b.turretStage];
            // Reset boss HP for new stage, each stage gets tougher
            b.maxHp = Math.ceil(b.maxHp * 1.3);
            b.hp = b.maxHp;
            const stageNames = ['CANNONS', 'MISSILES & BOMBS', 'SPREAD & GATLING', 'CORE LASER'];
            waveBannerText = `STAGE ${b.turretStage + 1}: ${stageNames[b.turretStage]}`;
            waveBannerTimer = 120;
            screenShake = 15;
            playSound('powerup');
            spawnFloatingText(b.x, b.y - b.size - 20, 'NEW WEAPONS ONLINE!', '#ff4444');
            spawnFloatingText(b.x, b.y - b.size - 40, 'HULL RESTORED!', '#44ff88');
            // Drop loot between stages
            for (let d = 0; d < 5; d++) {
                const angle = Math.random() * Math.PI * 2;
                pickups.push({ x: b.x + Math.cos(angle) * 30, y: b.y + Math.sin(angle) * 30, vx: Math.cos(angle) * 2, vy: Math.sin(angle) * 2, type: 'scrap', amount: 50, life: 500, maxLife: 500 });
            }
        }

        // Laser beam attack (only if a laser turret is alive)
        const hasLaserTurret = b.turrets.some(t => t.alive && t.type === 'laser');
        if (hasLaserTurret) {
            if (b.laserChargeTimer > 0) {
                b.laserChargeTimer--;
                b.laserAngle = b.laserAngle * 0.95 + Math.atan2(ship.y - b.y, ship.x - b.x) * 0.05;
                if (b.laserChargeTimer <= 0) {
                    b.laserFiring = true;
                    b.laserDuration = 100;
                }
            }
            if (b.laserFiring) {
                b.laserDuration--;
                b.laserAngle += 0.012 * Math.sign(ship.y - b.y);
                if (!isInvincible) {
                    const lx = b.x - b.size * 0.5;
                    const ly = b.y;
                    const toShipAngle = Math.atan2(ship.y - ly, ship.x - lx);
                    let angleDiff = toShipAngle - b.laserAngle;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    const distToShip = Math.hypot(ship.x - lx, ship.y - ly);
                    if (Math.abs(angleDiff) < 0.06 && distToShip < W * 0.8 && gameTime % 15 === 0) {
                        damageShip();
                    }
                }
                if (b.laserDuration <= 0) {
                    b.laserFiring = false;
                    b.laserChargeTimer = 0;
                }
            }
        } else {
            b.laserFiring = false;
        }

        // Spawn minions (phase 2 and below)
        if (b.phase <= 2) {
            b.minionTimer--;
            if (b.minionTimer <= 0) {
                b.minionTimer = b.phase <= 0 ? 300 : b.phase <= 1 ? 450 : 600;
                const minionCount = b.phase <= 0 ? 4 : b.phase <= 1 ? 3 : 2;
                for (let m = 0; m < minionCount; m++) {
                    spawnEnemy(b.phase <= 0 ? 'interceptor' : 'scout');
                }
                spawnFloatingText(b.x, b.y - b.size - 15, 'DEPLOYING DRONES!', '#ff6666');
            }
        }

        // Bullet damage immunity when shielded — destroy bullets on contact
        if (b.shieldActive) {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bl = bullets[i];
                if (Math.hypot(bl.x - b.x, bl.y - b.y) < b.size + 10) {
                    bl.life = 0;
                    // Shield spark
                    particles.push({ x: bl.x, y: bl.y, vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3, life: 12, maxLife: 12, r: 68, g: 255, b: 220, size: 2 });
                }
            }
        }

        // Turret destruction by player bullets
        for (const turret of b.turrets) {
            if (!turret.alive) continue;
            const tx = b.x + (turret.offsetX || -0.6) * b.size;
            const ty = b.y + turret.offsetY;
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bl = bullets[i];
                if (Math.hypot(bl.x - tx, bl.y - ty) < 14) {
                    turret.hp -= bl.damage;
                    spawnFloatingText(tx, ty - 10, `-${Math.floor(bl.damage)}`, '#ffaa33');
                    if (!bl.pierce) bullets.splice(i, 1);
                    if (turret.hp <= 0) {
                        turret.alive = false;
                        spawnExplosion(tx, ty, 20, { r: 255, g: 100, b: 50 });
                        spawnFloatingText(tx, ty - 15, `${turret.name || 'TURRET'} DOWN!`, '#ffcc33');
                        score += 300;
                    }
                    break;
                }
            }
        }
    }
    if (bossWarningTimer > 0) bossWarningTimer--;
    // Check if boss died
    if (bossActive && !enemies.includes(bossActive)) {
        playerLevel++;
        levelUpBanner = 240;
        waveBannerText = `LEVEL ${playerLevel}!`;
        waveBannerTimer = 180;
        screenShake = 15;
        bossActive = null;
        bossScrapStorm = false;
    }

    // Update ally encounter
    if (allyEncounter && !allyEncounter.rescued) {
        allyEncounter.x -= allyEncounter.driftSpeed;
        allyEncounter.flashTimer = (allyEncounter.flashTimer + 1) % 60;
        // Check if player is near to rescue
        if (ship.alive && Math.hypot(ship.x - allyEncounter.x, ship.y - allyEncounter.y) < 50) {
            allyEncounter.rescued = true;
            const spdMult = 1 + (saveData.allyUpgrades.allySpeed || 0) * 0.15;
            const allyHP = 5 + (saveData.allyUpgrades.allyArmor || 0) * 2;
            const newAlly = {
                x: allyEncounter.x, y: allyEncounter.y,
                type: allyEncounter.type,
                hp: allyHP, maxHp: allyHP,
                shootTimer: 0,
                healTimer: 0,
                speed: (allyEncounter.type === 'scout' ? 4.5 : allyEncounter.type === 'gunner' ? 2.5 : 3.0) * spdMult
            };
            allyShips.push(newAlly);
            spawnFloatingText(allyEncounter.x, allyEncounter.y - 30, 'ALLY RESCUED!', '#66ff88');
            allyEncounter = null;
        }
        if (allyEncounter && allyEncounter.x < -80) allyEncounter = null;
    }

    // Update ally ships
    const allyDmgMult = 1 + (saveData.allyUpgrades.allyFirepower || 0) * 0.2;
    for (let i = allyShips.length - 1; i >= 0; i--) {
        const ally = allyShips[i];
        // Follow player with offset
        const offsetY = (i === 0 ? -50 : 50);
        const offsetX = -40;
        const tx = ship.x + offsetX;
        const ty = ship.y + offsetY;
        ally.x += (tx - ally.x) * 0.06;
        ally.y += (ty - ally.y) * 0.06;

        ally.shootTimer--;
        if (ally.shootTimer <= 0 && enemies.length > 0) {
            // Find nearest enemy
            let nearest = null, nearDist = Infinity;
            for (const e of enemies) {
                const d = Math.hypot(e.x - ally.x, e.y - ally.y);
                if (d < nearDist) { nearDist = d; nearest = e; }
            }
            if (nearest) {
                const angle = Math.atan2(nearest.y - ally.y, nearest.x - ally.x);
                if (ally.type === 'scout') {
                    ally.shootTimer = 12;
                    bullets.push({ x: ally.x + 12, y: ally.y, vx: Math.cos(angle) * BULLET_SPEED * 1.1, vy: Math.sin(angle) * BULLET_SPEED * 1.1, life: BULLET_LIFE, damage: 4 * allyDmgMult, trail: [], pierce: false, wavePhase: 0 });
                } else if (ally.type === 'gunner') {
                    ally.shootTimer = 30;
                    bullets.push({ x: ally.x + 12, y: ally.y, vx: Math.cos(angle) * BULLET_SPEED * 0.8, vy: Math.sin(angle) * BULLET_SPEED * 0.8, life: BULLET_LIFE * 1.5, damage: 18 * allyDmgMult, trail: [], pierce: false, wavePhase: 0 });
                }
            }
        }
        // Medic heal
        if (ally.type === 'medic') {
            ally.healTimer++;
            if (ally.healTimer >= 1200 && shieldHP < maxShieldHP) { // 20s at 60fps
                ally.healTimer = 0;
                shieldHP = Math.min(maxShieldHP, shieldHP + 1);
                spawnFloatingText(ally.x, ally.y - 20, '+1 HP', '#66ff88');
            }
            // Medic also shoots but slowly
            ally.shootTimer--;
            if (ally.shootTimer <= 0 && enemies.length > 0) {
                let nearest = null, nearDist = Infinity;
                for (const e of enemies) {
                    const d = Math.hypot(e.x - ally.x, e.y - ally.y);
                    if (d < nearDist) { nearDist = d; nearest = e; }
                }
                if (nearest) {
                    const angle = Math.atan2(nearest.y - ally.y, nearest.x - ally.x);
                    ally.shootTimer = 25;
                    bullets.push({ x: ally.x + 10, y: ally.y, vx: Math.cos(angle) * BULLET_SPEED, vy: Math.sin(angle) * BULLET_SPEED, life: BULLET_LIFE, damage: 3 * allyDmgMult, trail: [], pierce: false, wavePhase: 0 });
                }
            }
        }

        // Ally takes damage from enemy bullets
        for (let j = enemyBullets.length - 1; j >= 0; j--) {
            const eb = enemyBullets[j];
            if (Math.hypot(eb.x - ally.x, eb.y - ally.y) < 15) {
                ally.hp--;
                enemyBullets.splice(j, 1);
                if (ally.hp <= 0) {
                    spawnExplosion(ally.x, ally.y, 15, { r: 100, g: 200, b: 255 });
                    spawnFloatingText(ally.x, ally.y - 20, 'ALLY LOST!', '#ff4444');
                    allyShips.splice(i, 1);
                }
                break;
            }
        }
    }

    // Check wave complete
    const realEnemies = enemies.filter(e => e.type !== undefined);
    if (realEnemies.length === 0 && spawnQueue.length === 0 && !betweenWaves && wave > 0) {
        betweenWaves = true;
        // Planet checkpoint every 5 waves
        if (wave % 5 === 0) {
            waveTimer = 360; // 6 seconds for planet flyby
            checkpointCollected = false;
            const planetNames = ['Kepler-22b', 'Proxima b', 'Gliese 581g', 'Trappist-1e', 'HD 40307g', 'Tau Ceti f'];
            const planetColors = [[60, 120, 200], [180, 80, 40], [40, 160, 80], [200, 150, 60], [100, 60, 180], [60, 180, 180]];
            const ci = Math.floor(Math.random() * planetColors.length);
            checkpointPlanet = {
                x: W + 200,
                y: H * 0.3 + Math.random() * H * 0.4,
                radius: 60 + Math.random() * 30,
                r: planetColors[ci][0], g: planetColors[ci][1], b: planetColors[ci][2],
                name: planetNames[ci],
                hasRing: Math.random() > 0.5,
                collected: false
            };
        } else {
            waveTimer = 180; // 3 seconds between normal waves
        }
        waveBannerText = 'WAVE COMPLETE';
        waveBannerTimer = 120;
        writeSave();
    }

    // Update checkpoint planet
    if (checkpointPlanet) {
        checkpointPlanet.x -= 1.5;
        // Check if player passes planet to collect bonus
        if (!checkpointCollected && ship.alive && Math.hypot(ship.x - checkpointPlanet.x, ship.y - checkpointPlanet.y) < checkpointPlanet.radius + 80) {
            checkpointCollected = true;
            const scrapBonus = 100 + wave * 20;
            const crystalBonus = 1 + Math.floor(Math.random() * 2);
            saveData.scrap += scrapBonus;
            runScrap += scrapBonus;
            saveData.crystals += crystalBonus;
            runCrystals += crystalBonus;
            spawnFloatingText(checkpointPlanet.x, checkpointPlanet.y - checkpointPlanet.radius - 20, `+${scrapBonus} ⬡  +${crystalBonus} ◆`, '#ffcc33');
            writeSave();
        }
        if (checkpointPlanet.x < -checkpointPlanet.radius * 3) {
            checkpointPlanet = null;
        }
    }

    if (betweenWaves) {
        waveTimer--;
        if (waveTimer <= 0) {
            checkpointPlanet = null;
            startNextWave();
        }
    }

    updateHUD();
}

function getStatsForWeapon(key) {
    const w = WEAPONS[key];
    const fpLv = saveData.upgradeLevels.firepower;
    const frLv = saveData.upgradeLevels.fireRate;
    const damage = w.damage * (1 + fpLv * 0.15);
    const delay = w.delay * Math.pow(0.88, frLv);
    const overdriveMultiplier = activePowerups.overdrive ? 0.5 : 1;
    return { ...w, damage, delay: Math.max(2, Math.floor(delay * overdriveMultiplier)) };
}

function firePatternBullets(ws, tipX, tipY) {
    const beforeCount = bullets.length;
    if (ws.pattern === 'single') {
        bullets.push({
            x: tipX, y: tipY, vx: BULLET_SPEED, vy: 0,
            life: BULLET_LIFE, damage: ws.damage, trail: [], pierce: false, wavePhase: 0
        });
    } else if (ws.pattern === 'spread') {
        for (let i = -1; i <= 1; i++) {
            const angle = i * 0.2;
            bullets.push({
                x: tipX, y: tipY,
                vx: Math.cos(angle) * BULLET_SPEED,
                vy: Math.sin(angle) * BULLET_SPEED,
                life: BULLET_LIFE, damage: ws.damage, trail: [], pierce: false, wavePhase: 0
            });
        }
    } else if (ws.pattern === 'rapid') {
        bullets.push({
            x: tipX, y: tipY, vx: BULLET_SPEED * 1.2, vy: (Math.random() - 0.5) * 0.5,
            life: 30, damage: ws.damage, trail: [], pierce: false, wavePhase: 0
        });
    } else if (ws.pattern === 'pierce') {
        bullets.push({
            x: tipX, y: tipY, vx: BULLET_SPEED * 1.5, vy: 0,
            life: BULLET_LIFE * 1.5, damage: ws.damage, trail: [], pierce: true, wavePhase: 0
        });
    } else if (ws.pattern === 'wave') {
        bullets.push({
            x: tipX, y: tipY, vx: BULLET_SPEED, vy: 0,
            life: BULLET_LIFE, damage: ws.damage, trail: [], pierce: false,
            wavePhase: gameTime * 0.1, waveAmplitude: 4
        });
    } else if (ws.pattern === 'shotgun') {
        for (let i = 0; i < 5; i++) {
            const angle = (Math.random() - 0.5) * 0.5;
            const spd = BULLET_SPEED * (0.8 + Math.random() * 0.4);
            bullets.push({
                x: tipX, y: tipY, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
                life: 25, damage: ws.damage, trail: [], pierce: false, wavePhase: 0
            });
        }
    } else if (ws.pattern === 'dual') {
        bullets.push({
            x: tipX, y: tipY - 6, vx: BULLET_SPEED, vy: 0,
            life: BULLET_LIFE, damage: ws.damage, trail: [], pierce: false, wavePhase: 0
        });
        bullets.push({
            x: tipX, y: tipY + 6, vx: BULLET_SPEED, vy: 0,
            life: BULLET_LIFE, damage: ws.damage, trail: [], pierce: false, wavePhase: 0
        });
    } else if (ws.pattern === 'homing') {
        // Launch 2 missiles with slight vertical spread
        for (let m = -1; m <= 1; m += 2) {
            bullets.push({
                x: tipX, y: tipY + m * 8, vx: BULLET_SPEED * 0.6, vy: m * 1.5,
                life: BULLET_LIFE * 2, damage: ws.damage, trail: [], pierce: false, wavePhase: 0,
                homingPlayer: true, isMissile: true, smokeTimer: 0
            });
        }
    } else if (ws.pattern === 'laser') {
        // Burst beam - 8 rapid piercing segments then cooldown
        for (let i = 0; i < 8; i++) {
            bullets.push({
                x: tipX + i * 18, y: tipY, vx: BULLET_SPEED * 2.5, vy: 0,
                life: BULLET_LIFE, damage: ws.damage, trail: [], pierce: true, wavePhase: 0,
                isLaser: true
            });
        }
    } else if (ws.pattern === 'flak') {
        bullets.push({
            x: tipX, y: tipY, vx: BULLET_SPEED * 0.9, vy: 0,
            life: 35, damage: ws.damage, trail: [], pierce: false, wavePhase: 0,
            isFlak: true
        });
    } else if (ws.pattern === 'crescent') {
        bullets.push({
            x: tipX, y: tipY, vx: BULLET_SPEED * 0.8, vy: -3,
            life: BULLET_LIFE, damage: ws.damage, trail: [], pierce: false, wavePhase: 0,
            curveAccel: 0.12
        });
        bullets.push({
            x: tipX, y: tipY, vx: BULLET_SPEED * 0.8, vy: 3,
            life: BULLET_LIFE, damage: ws.damage, trail: [], pierce: false, wavePhase: 0,
            curveAccel: -0.12
        });
    } else if (ws.pattern === 'nova') {
        const count = 12;
        for (let i = 0; i < count; i++) {
            const angle = (i / count) * Math.PI * 2;
            bullets.push({
                x: tipX, y: tipY, vx: Math.cos(angle) * BULLET_SPEED * 0.8, vy: Math.sin(angle) * BULLET_SPEED * 0.8,
                life: 40, damage: ws.damage, trail: [], pierce: false, wavePhase: 0
            });
        }
    }
    // Tag all new bullets with weapon color
    const newCount = bullets.length - beforeCount;
    if (ws.bulletColor) {
        for (let i = bullets.length - newCount; i < bullets.length; i++) {
            bullets[i].bulletColor = ws.bulletColor;
        }
    }
    return newCount;
}

function fireWeapon() {
    const tipX = ship.x + SHIP_SIZE;
    const tipY = ship.y;

    // Fire only equipped weapons — each weapon has its own cooldown
    const unlockedKeys = saveData.equippedWeapons.filter(k => saveData.weaponUnlocks[k]);
    if (!window.weaponCooldowns) window.weaponCooldowns = {};

    let totalNewBullets = 0;
    let minReady = Infinity;
    for (const key of unlockedKeys) {
        if (!window.weaponCooldowns[key]) window.weaponCooldowns[key] = 0;
        if (window.weaponCooldowns[key] <= 0) {
            const ws = getStatsForWeapon(key);
            totalNewBullets += firePatternBullets(ws, tipX, tipY);
            window.weaponCooldowns[key] = ws.delay;
        }
    }
    // Set global shootCooldown to shortest ready weapon so autofire keeps ticking
    shootCooldown = 1;

    // Critical hit check — applied across all bullets just fired
    const critLv = saveData.upgradeLevels.critChance || 0;
    if (critLv > 0 && Math.random() < critLv * 0.05) {
        for (let i = bullets.length - totalNewBullets; i < bullets.length; i++) {
            bullets[i].damage *= 2;
            bullets[i].isCrit = true;
        }
    }

    playSound('shoot');

    // Muzzle flash
    for (let i = 0; i < 5; i++) {
        const spread = (Math.random() - 0.5) * 0.8;
        particles.push({
            x: tipX, y: tipY,
            vx: Math.cos(spread) * (2 + Math.random() * 2),
            vy: Math.sin(spread) * (2 + Math.random() * 2),
            life: 6 + Math.random() * 6, maxLife: 12,
            r: 255, g: 255, b: 150, size: 1 + Math.random()
        });
    }
}

function damageShip() {
    // Armor check
    const armorLv = saveData.upgradeLevels.armor || 0;
    if (armorLv > 0 && Math.random() < armorLv * 0.1) {
        spawnFloatingText(ship.x, ship.y - 25, 'BLOCKED!', '#aaddff');
        invulnTimer = 30;
        screenShake = 4;
        return;
    }
    shieldHP--;
    invulnTimer = INVULN_TIME;
    screenShake = 12;
    damageFlash = 15;
    playSound('damage');
    // Hit particles
    for (let i = 0; i < 15; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        const sc = getShipColor();
        particles.push({
            x: ship.x, y: ship.y,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 15 + Math.random() * 20, maxLife: 35,
            r: sc.r, g: sc.g, b: sc.b, size: 1 + Math.random() * 2
        });
    }
    if (shieldHP <= 0) {
        ship.alive = false;
        playSound('death');
        spawnExplosion(ship.x, ship.y, 30, getShipColor());
        setTimeout(showGameOver, 1500);
    }
}

function updateBullets() {
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.trail.push({ x: b.x, y: b.y });
        if (b.trail.length > 8) b.trail.shift();

        // Missile smoke trail
        if (b.isMissile && particles.length < 200) {
            b.smokeTimer = (b.smokeTimer || 0) + 1;
            if (b.smokeTimer % 3 === 0) {
                const angle = Math.atan2(b.vy, b.vx);
                particles.push({
                    x: b.x - Math.cos(angle) * 10, y: b.y - Math.sin(angle) * 10,
                    vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
                    life: 15, maxLife: 15, r: 180, g: 180, b: 180, size: 2 + Math.random() * 2
                });
            }
        }
        // Homing player bullets: track nearest enemy
        if (b.homingPlayer && enemies.length > 0) {
            let nearest = null, nearDist = Infinity;
            for (const e of enemies) {
                const d = Math.hypot(e.x - b.x, e.y - b.y);
                if (d < nearDist) { nearDist = d; nearest = e; }
            }
            if (nearest) {
                const angle = Math.atan2(nearest.y - b.y, nearest.x - b.x);
                const curAngle = Math.atan2(b.vy, b.vx);
                let diff = angle - curAngle;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                const newAngle = curAngle + Math.sign(diff) * Math.min(Math.abs(diff), 0.06);
                const spd = Math.hypot(b.vx, b.vy);
                b.vx = Math.cos(newAngle) * spd;
                b.vy = Math.sin(newAngle) * spd;
            }
        }

        // Crescent curve
        if (b.curveAccel) {
            b.vy += b.curveAccel;
        }

        b.x += b.vx;
        // Sine-wave bullets
        if (b.waveAmplitude) {
            b.wavePhase += 0.15;
            b.y += Math.cos(b.wavePhase) * b.waveAmplitude;
        }
        b.y += b.vy;
        b.life--;

        // Flak: explode when at end of life — missile-style explosion with area damage
        if (b.isFlak && b.life <= 0) {
            playSound('explosion');
            screenShake = Math.max(screenShake, 6);
            shockwaves.push({ x: b.x, y: b.y, r: 0, maxR: 50, life: 12, maxLife: 12 });
            // Fiery explosion particles
            for (let k = 0; k < 8; k++) {
                const angle = Math.random() * Math.PI * 2;
                const spd = 1 + Math.random() * 3.5;
                const colors = [[255,200,50],[255,120,30],[255,80,20],[255,50,10]];
                const c = colors[Math.floor(Math.random() * colors.length)];
                particles.push({
                    x: b.x, y: b.y,
                    vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
                    life: 12 + Math.random() * 12, maxLife: 24,
                    r: c[0], g: c[1], b: c[2], size: 2 + Math.random() * 2.5
                });
            }
            // Smoke
            for (let k = 0; k < 3; k++) {
                const angle = Math.random() * Math.PI * 2;
                particles.push({
                    x: b.x, y: b.y,
                    vx: Math.cos(angle) * (0.5 + Math.random()), vy: Math.sin(angle) * (0.5 + Math.random()),
                    life: 18 + Math.random() * 12, maxLife: 30,
                    r: 150, g: 150, b: 150, size: 3 + Math.random() * 2
                });
            }
            // Area damage to nearby enemies
            const blastR = 50;
            for (let ej = enemies.length - 1; ej >= 0; ej--) {
                const ae = enemies[ej];
                const dist = Math.hypot(ae.x - b.x, ae.y - b.y);
                if (dist < blastR) {
                    const splashDmg = Math.floor(b.damage * (1 - dist / blastR));
                    ae.hp -= splashDmg;
                    ae.flashTimer = 6;
                    if (splashDmg > 0) spawnFloatingText(ae.x, ae.y - ae.size, `-${splashDmg}`, '#ff8844');
                    if (ae.hp <= 0) {
                        score += ae.maxHp * 10;
                        spawnExplosion(ae.x, ae.y, ae.size, { r: ae.r, g: ae.g, b: ae.b });
                        spawnPickups(ae.x, ae.y, ae.type);
                        enemies.splice(ej, 1);
                    }
                }
            }
        }

        // Player bullets can destroy boss bullets that have HP (only check when boss active)
        if (bossActive) {
            for (let j = enemyBullets.length - 1; j >= 0; j--) {
                const eb = enemyBullets[j];
                if (eb.bossBullet && eb.hp > 0) {
                    const dx2 = eb.x - b.x, dy2 = eb.y - b.y;
                    if (dx2 * dx2 + dy2 * dy2 < 324) { // 18*18
                        eb.hp -= b.damage;
                        b.life = 0;
                        if (eb.hp <= 0) {
                            for (let p = 0; p < 4; p++) {
                                const pa = Math.random() * Math.PI * 2;
                                particles.push({ x: eb.x, y: eb.y, vx: Math.cos(pa) * 2, vy: Math.sin(pa) * 2, life: 10, maxLife: 10, r: 255, g: 100, b: 100, size: 1.5 });
                            }
                            enemyBullets.splice(j, 1);
                        }
                        break;
                    }
                }
            }
        }

        if (b.life <= 0 || b.x > W + 50 || b.x < -50 || b.y > H + 50 || b.y < -50)
            bullets.splice(i, 1);
    }
}

function updateEnemyBullets() {
    // Cap enemy bullets for performance
    while (enemyBullets.length > 150) enemyBullets.shift();
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        if (b.homing && ship.alive) {
            const dx = ship.x - b.x;
            const dy = ship.y - b.y;
            const angle = Math.atan2(dy, dx);
            const currentAngle = Math.atan2(b.vy, b.vx);
            let diff = angle - currentAngle;
            while (diff > Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            const turnRate = 0.03;
            const newAngle = currentAngle + Math.sign(diff) * Math.min(Math.abs(diff), turnRate);
            const spd = Math.hypot(b.vx, b.vy);
            b.vx = Math.cos(newAngle) * spd;
            b.vy = Math.sin(newAngle) * spd;
        }
        // Mine: count down arming, then explode near player
        if (b.isMine) {
            if (b.mineArmed > 0) b.mineArmed--;
            b.vx *= 0.99; b.vy *= 0.99; // slow drift
            if (b.mineArmed <= 0 && ship.alive && Math.hypot(ship.x - b.x, ship.y - b.y) < 60) {
                // Explode into ring of bullets
                for (let f = 0; f < 10; f++) {
                    const fa = (f / 10) * Math.PI * 2;
                    const mb = { x: b.x, y: b.y, vx: Math.cos(fa) * 3.5, vy: Math.sin(fa) * 3.5, life: 80, homing: false };
                    if (b.bossBullet) { mb.bossBullet = true; mb.hp = 1; }
                    enemyBullets.push(mb);
                }
                for (let p = 0; p < 8; p++) {
                    const pa = Math.random() * Math.PI * 2;
                    particles.push({ x: b.x, y: b.y, vx: Math.cos(pa) * 3, vy: Math.sin(pa) * 3, life: 15, maxLife: 15, r: 255, g: 100, b: 50, size: 2 });
                }
                enemyBullets.splice(i, 1);
                continue;
            }
        }

        b.x += b.vx;
        b.y += b.vy;
        b.life--;

        // Flak: explode into fragments at end of life
        if (b.isFlakEnemy && b.life <= 0) {
            for (let f = 0; f < 8; f++) {
                const fa = (f / 8) * Math.PI * 2 + Math.random() * 0.3;
                const fb = { x: b.x, y: b.y, vx: Math.cos(fa) * 4, vy: Math.sin(fa) * 4, life: 40, homing: false };
                if (b.bossBullet) { fb.bossBullet = true; fb.hp = 1; }
                enemyBullets.push(fb);
            }
            for (let p = 0; p < 6; p++) {
                const pa = Math.random() * Math.PI * 2;
                particles.push({ x: b.x, y: b.y, vx: Math.cos(pa) * 2.5, vy: Math.sin(pa) * 2.5, life: 12, maxLife: 12, r: 255, g: 180, b: 50, size: 2 });
            }
        }

        // Plasma: slow down and grow, check area damage on player
        if (b.isPlasma) {
            b.vx *= 0.998;
            b.vy *= 0.998;
        }

        if (b.life <= 0 || b.x < -50 || b.x > W + 50 || b.y < -50 || b.y > H + 50)
            enemyBullets.splice(i, 1);
    }
}

function updateEnemies() {
    const timeWarpMult = activePowerups.timeWarp ? 0.3 : 1;
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (e.flashTimer > 0) e.flashTimer--;
        const spd = e.speed * timeWarpMult;

        // Movement behavior
        if (e.behavior === 'straight') {
            e.x -= spd;
        } else if (e.behavior === 'track') {
            e.x -= spd;
            if (ship.alive) {
                const dy = ship.y - e.y;
                e.y += Math.sign(dy) * Math.min(Math.abs(dy) * 0.03, spd * 0.8);
            }
        } else if (e.behavior === 'hover') {
            if (e.x > e.hoverX) {
                e.x -= spd;
            }
            e.y += Math.sin(gameTime * 0.02 + e.zigzagPhase) * 0.5 * timeWarpMult;
        } else if (e.behavior === 'zigzag') {
            e.x -= spd * 0.5;
            e.zigzagPhase += 0.05 * timeWarpMult;
            e.y += Math.sin(e.zigzagPhase) * e.zigzagSpeed * timeWarpMult;
        }

        e.rot += 0.01;

        // Shooting
        if (e.shoots && ship.alive) {
            // Burst fire for gunships
            if (e.burstCount > 0 && e.burstRemaining > 0) {
                e.burstTimer--;
                if (e.burstTimer <= 0) {
                    e.burstRemaining--;
                    e.burstTimer = ENEMY_TYPES[e.type].burstDelay || 6;
                    // If enemy also has spread, fire spread per burst
                    if (e.spreadCount > 0) {
                        const isBoss = e.type === 'boss';
                        for (let s = 0; s < e.spreadCount; s++) {
                            const spreadAngle = Math.PI + ((s - (e.spreadCount - 1) / 2) * 0.25);
                            const sb = { x: e.x - e.size, y: e.y, vx: Math.cos(spreadAngle) * 3, vy: Math.sin(spreadAngle) * 3, life: 120, homing: false };
                            if (isBoss) { sb.bossBullet = true; sb.hp = 2; sb.life = 999; }
                            enemyBullets.push(sb);
                        }
                    } else {
                        fireEnemyBullet(e);
                    }
                }
            } else {
                e.shootTimer--;
                if (e.shootTimer <= 0) {
                    e.shootTimer = e.shootDelay + Math.floor(Math.random() * 20);
                    if (e.burstCount > 0) {
                        e.burstRemaining = e.burstCount;
                        e.burstTimer = 0;
                    } else if (e.spreadCount > 0) {
                        const isBoss2 = e.type === 'boss';
                        for (let s = 0; s < e.spreadCount; s++) {
                            const spreadAngle = Math.PI + ((s - (e.spreadCount - 1) / 2) * 0.25);
                            const sb = { x: e.x - e.size, y: e.y, vx: Math.cos(spreadAngle) * 3, vy: Math.sin(spreadAngle) * 3, life: 120, homing: false };
                            if (isBoss2) { sb.bossBullet = true; sb.hp = 2; sb.life = 999; }
                            enemyBullets.push(sb);
                        }
                    } else {
                        fireEnemyBullet(e);
                    }
                }
            }
        }

        // Remove if off screen left
        if (e.x < -60) {
            enemies.splice(i, 1);
        }
    }
}

function fireEnemyBullet(e) {
    const isBoss = e.type === 'boss';
    if (e.homing) {
        const dx = ship.x - e.x;
        const dy = ship.y - e.y;
        const angle = Math.atan2(dy, dx);
        const b = { x: e.x - e.size, y: e.y, vx: Math.cos(angle) * 2.0, vy: Math.sin(angle) * 2.0, life: 140, homing: true };
        if (isBoss) { b.bossBullet = true; b.hp = 3; b.life = 300; }
        enemyBullets.push(b);
    } else if (ship.alive) {
        const dx = ship.x - e.x;
        const dy = ship.y - e.y;
        const angle = Math.atan2(dy, dx);
        const bulletSpeed = e.type === 'drone' ? 2.0 : 2.8;
        const b = { x: e.x - e.size, y: e.y, vx: Math.cos(angle) * bulletSpeed, vy: Math.sin(angle) * bulletSpeed, life: 150, homing: false };
        if (isBoss) { b.bossBullet = true; b.hp = 2; b.life = 999; }
        enemyBullets.push(b);
    }
}

function updatePickups() {
    const magnetRange = getMagnetRange();
    const stormActive = !!activePowerups.scrapStorm || bossScrapStorm;

    for (let i = pickups.length - 1; i >= 0; i--) {
        const p = pickups[i];
        p.vx *= 0.97;
        p.vy *= 0.97;

        // Magnet attraction
        if (ship.alive) {
            const dx = ship.x - p.x;
            const dy = ship.y - p.y;
            const dist = Math.hypot(dx, dy);
            const range = stormActive ? 9999 : magnetRange;
            if (dist < range) {
                const pull = stormActive ? 0.15 : 0.08;
                p.vx += (dx / dist) * pull * (range / (dist + 10));
                p.vy += (dy / dist) * pull * (range / (dist + 10));
            }

            // Collection
            if (dist < 20) {
                collectPickup(p);
                pickups.splice(i, 1);
                continue;
            }
        }

        p.x += p.vx;
        p.y += p.vy;

        // Remove only if off-screen left
        if (p.x < -50) pickups.splice(i, 1);
    }
}

function updateEngineTrail() {
    for (let i = engineTrail.length - 1; i >= 0; i--) {
        const p = engineTrail[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.life--;
        if (p.life <= 0) engineTrail.splice(i, 1);
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.97;
        p.vy *= 0.97;
        p.life--;
        if (p.lineAngle !== undefined) p.lineAngle += p.rotSpeed;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function updateFloatingTexts() {
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const t = floatingTexts[i];
        t.y -= 0.8;
        t.life--;
        if (t.life <= 0) floatingTexts.splice(i, 1);
    }
}

function spawnExplosion(x, y, size, color) {
    playSound(size > 20 ? 'bomb' : 'explosion');
    // Shockwave ring
    if (size >= 10) {
        shockwaves.push({ x, y, radius: 5, maxRadius: size * 3, life: 1, r: color.r || 255, g: color.g || 200, b: color.b || 100 });
    }
    if (particles.length > 200) return; // cap particles for performance
    const count = Math.min(12, Math.max(6, Math.floor(size * 0.5)));
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 0.5;
        let pr, pg, pb;
        if (Math.random() < 0.4) { pr = 255; pg = 255; pb = 255; }
        else { pr = color.r; pg = color.g; pb = color.b; }
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 25 + Math.random() * 35, maxLife: 60,
            r: pr, g: pg, b: pb, size: Math.random() * 3 + 0.5
        });
    }
    // Ring burst
    for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const speed = 2 + Math.random();
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 15 + Math.random() * 10, maxLife: 25,
            r: color.r, g: color.g, b: color.b, size: 2 + Math.random() * 2
        });
    }
    // Line debris
    for (let i = 0; i < 5; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 2.5 + 0.3;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 40 + Math.random() * 25, maxLife: 65,
            r: color.r, g: color.g, b: color.b, size: 0,
            lineLen: size * 0.4 + Math.random() * 10,
            lineAngle: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.12
        });
    }
}

    // Shield bar - polished game-style HP bar

                <div style="width:${pct*100}%;height:100%;background:linear-gradient(90deg,${barColor},${pct > 0.6 ? '#66ffaa' : pct > 0.3 ? '#ffee66' : '#ff6644'});border-radius:4px;box-shadow:${barGlow};transition:width 0.2s;"></div>
                <div style="position:absolute;top:0;left:0;width:100%;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.15),transparent);border-radius:5px 5px 0 0;"></div>

        const secs = Math.ceil(activePowerups[key] / 60);

        puHtml += `<span style="color:rgba(255,220,100,0.9);font-size:10px;">${icon}${secs}s</span> `;
