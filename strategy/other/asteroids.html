// ==================== DRAWING ====================
function drawBg(t) {
    // Deep space gradient background
    const bgGrad = bgCtx.createLinearGradient(0, 0, W * 0.3, H);
    bgGrad.addColorStop(0, '#020010');
    bgGrad.addColorStop(0.3, '#050520');
    bgGrad.addColorStop(0.6, '#080028');
    bgGrad.addColorStop(1, '#0a0015');
    bgCtx.fillStyle = bgGrad;
    bgCtx.fillRect(0, 0, W, H);

    // Milky Way band - a diagonal hazy strip of light
    bgCtx.save();
    bgCtx.translate(W * 0.5, H * 0.5);
    bgCtx.rotate(-0.5);
    const mwGrad = bgCtx.createLinearGradient(0, -H * 0.12, 0, H * 0.12);
    mwGrad.addColorStop(0, 'rgba(0,0,0,0)');
    mwGrad.addColorStop(0.3, 'rgba(60,50,100,0.04)');
    mwGrad.addColorStop(0.5, 'rgba(80,70,130,0.07)');
    mwGrad.addColorStop(0.7, 'rgba(60,50,100,0.04)');
    mwGrad.addColorStop(1, 'rgba(0,0,0,0)');
    bgCtx.fillStyle = mwGrad;
    bgCtx.fillRect(-W, -H * 0.12, W * 2.5, H * 0.24);
    // Add some bright clusters to the milky way
    for (let i = 0; i < 15; i++) {
        const cx = -W * 0.4 + i * W * 0.12 + Math.sin(i * 3.7) * 30;
        const cy = Math.sin(i * 2.1) * H * 0.06;
        const cg = bgCtx.createRadialGradient(cx, cy, 0, cx, cy, 20 + Math.random() * 30);
        cg.addColorStop(0, 'rgba(120,110,170,0.06)');
        cg.addColorStop(1, 'rgba(0,0,0,0)');
        bgCtx.fillStyle = cg;
        bgCtx.beginPath();
        bgCtx.arc(cx, cy, 20 + Math.random() * 30, 0, Math.PI * 2);
        bgCtx.fill();
    }
    bgCtx.restore();

    // Cosmic dust layer (adds depth and atmosphere)
    for (const d of cosmicDust) {
        const dx = ((d.x - camX * d.speed) % (W * 2) + W * 2) % (W * 2) - W * 0.25;
        bgCtx.beginPath();
        bgCtx.arc(dx, d.y, d.r, 0, Math.PI * 2);
        bgCtx.fillStyle = `rgba(${d.color[0]},${d.color[1]},${d.color[2]},${d.a})`;
        bgCtx.fill();
    }

    // Nebulae
    for (const n of nebulae) {
        const nx = ((n.x - camX * n.speed * 0.3) % (W * 2) + W * 2) % (W * 2) - W * 0.5;
        const grad = bgCtx.createRadialGradient(nx, n.y, 0, nx, n.y, n.rx);
        grad.addColorStop(0, `rgba(${n.r},${n.g},${n.b},${n.a})`);
        grad.addColorStop(0.4, `rgba(${n.r},${n.g},${n.b},${n.a * 0.5})`);
        grad.addColorStop(0.7, `rgba(${n.r},${n.g},${n.b},${n.a * 0.15})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        bgCtx.fillStyle = grad;
        bgCtx.beginPath();
        bgCtx.ellipse(nx, n.y, n.rx, n.ry, 0, 0, Math.PI * 2);
        bgCtx.fill();
    }

    // Distant spiral galaxy
    if (distantGalaxy) {
        const g = distantGalaxy;
        const gx = ((g.x - camX * g.speed) % (W * 2) + W * 2) % (W * 2) - W * 0.25;
        bgCtx.save();
        bgCtx.translate(gx, g.y);
        bgCtx.rotate(g.angle + t * 0.00003);
        // Galaxy core glow
        const coreGlow = bgCtx.createRadialGradient(0, 0, 0, 0, 0, g.size * 0.3);
        coreGlow.addColorStop(0, 'rgba(200,180,255,0.12)');
        coreGlow.addColorStop(1, 'rgba(0,0,0,0)');
        bgCtx.fillStyle = coreGlow;
        bgCtx.beginPath();
        bgCtx.arc(0, 0, g.size * 0.3, 0, Math.PI * 2);
        bgCtx.fill();
        // Spiral arms
        for (let arm = 0; arm < 2; arm++) {
            bgCtx.beginPath();
            const armOffset = arm * Math.PI;
            for (let j = 0; j < 60; j++) {
                const angle = armOffset + j * 0.15;
                const dist = 3 + j * (g.size / 60);
                const px = Math.cos(angle) * dist;
                const py = Math.sin(angle) * dist * 0.5;
                if (j === 0) bgCtx.moveTo(px, py);
                else bgCtx.lineTo(px, py);
            }
            bgCtx.strokeStyle = `rgba(160,140,220,${0.08})`;
            bgCtx.lineWidth = 3 + Math.sin(t * 0.0005) * 0.5;
            bgCtx.stroke();
            // Arm glow
            bgCtx.strokeStyle = `rgba(140,120,200,0.03)`;
            bgCtx.lineWidth = 8;
            bgCtx.stroke();
        }
        bgCtx.restore();
    }

    // Distant planets
    for (const p of bgPlanets) {
        const px = ((p.x - camX * p.speed) % (W * 2) + W * 2) % (W * 2) - W * 0.25;
        bgCtx.save();
        // Planet glow
        const glow = bgCtx.createRadialGradient(px, p.y, p.radius * 0.8, px, p.y, p.radius * 3);
        glow.addColorStop(0, `rgba(${p.r},${p.g},${p.b},${p.a * 0.3})`);
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        bgCtx.fillStyle = glow;
        bgCtx.beginPath();
        bgCtx.arc(px, p.y, p.radius * 3, 0, Math.PI * 2);
        bgCtx.fill();
        // Planet body with atmosphere edge
        const pGrad = bgCtx.createRadialGradient(px - p.radius * 0.3, p.y - p.radius * 0.3, 0, px, p.y, p.radius);
        pGrad.addColorStop(0, `rgba(${p.r + 80},${p.g + 80},${p.b + 80},${p.a})`);
        pGrad.addColorStop(0.8, `rgba(${p.r},${p.g},${p.b},${p.a})`);
        pGrad.addColorStop(1, `rgba(${Math.max(0, p.r - 30)},${Math.max(0, p.g - 30)},${Math.max(0, p.b - 30)},${p.a * 0.8})`);
        bgCtx.fillStyle = pGrad;
        bgCtx.beginPath();
        bgCtx.arc(px, p.y, p.radius, 0, Math.PI * 2);
        bgCtx.fill();
        // Atmosphere rim
        bgCtx.strokeStyle = `rgba(${p.r + 100},${p.g + 100},${Math.min(255, p.b + 150)},${p.a * 0.3})`;
        bgCtx.lineWidth = 1.5;
        bgCtx.beginPath();
        bgCtx.arc(px, p.y, p.radius + 1, Math.PI * 0.8, Math.PI * 1.8);
        bgCtx.stroke();
        // Ring
        if (p.hasRing) {
            const rc = p.ringColor;
            bgCtx.strokeStyle = `rgba(${rc[0]},${rc[1]},${rc[2]},${p.a * 0.6})`;
            bgCtx.lineWidth = 2;
            bgCtx.beginPath();
            bgCtx.ellipse(px, p.y, p.radius * 1.7, p.radius * 0.35, -0.3, 0, Math.PI * 2);
            bgCtx.stroke();
            bgCtx.strokeStyle = `rgba(${rc[0]},${rc[1]},${rc[2]},${p.a * 0.35})`;
            bgCtx.lineWidth = 5;
            bgCtx.beginPath();
            bgCtx.ellipse(px, p.y, p.radius * 2.0, p.radius * 0.45, -0.3, 0, Math.PI * 2);
            bgCtx.stroke();
            bgCtx.strokeStyle = `rgba(${rc[0]},${rc[1]},${rc[2]},${p.a * 0.15})`;
            bgCtx.lineWidth = 8;
            bgCtx.beginPath();
            bgCtx.ellipse(px, p.y, p.radius * 2.4, p.radius * 0.55, -0.3, 0, Math.PI * 2);
            bgCtx.stroke();
        }
        bgCtx.restore();
    }

    // Floating space debris/asteroids
    for (const d of spaceDebris) {
        const dx = ((d.x - camX * d.speed) % (W * 2) + W * 2) % (W * 2) - W * 0.25;
        d.rotation += d.rotSpeed;
        bgCtx.save();
        bgCtx.translate(dx, d.y);
        bgCtx.rotate(d.rotation);
        bgCtx.beginPath();
        for (let v = 0; v < d.verts; v++) {
            const angle = (v / d.verts) * Math.PI * 2;
            const jag = 1 - d.jaggedness + Math.sin(v * 7.3) * d.jaggedness;
            const vx = Math.cos(angle) * d.size * jag;
            const vy = Math.sin(angle) * d.size * jag;
            if (v === 0) bgCtx.moveTo(vx, vy);
            else bgCtx.lineTo(vx, vy);
        }
        bgCtx.closePath();
        bgCtx.fillStyle = `rgba(80,70,90,${d.a})`;
        bgCtx.fill();
        bgCtx.strokeStyle = `rgba(120,110,130,${d.a * 0.5})`;
        bgCtx.lineWidth = 0.5;
        bgCtx.stroke();
        bgCtx.restore();
    }

    // Stars with cross-shaped glints on bright ones
    for (const layer of starLayers) {
        for (const s of layer.stars) {
            const sx = ((s.x - camX * layer.speed) % (W * 2) + W * 2) % (W * 2) - W * 0.25;
            const f = 0.5 + 0.5 * Math.sin(t * 0.001 * s.twinkleSpeed + s.phase);
            bgCtx.beginPath();
            bgCtx.arc(sx, s.y, s.r, 0, Math.PI * 2);
            bgCtx.fillStyle = `rgba(${s.sr},${s.sg},${s.sb},${s.a * f})`;
            bgCtx.fill();
            if (s.r > 2) {
                // Soft glow
                bgCtx.beginPath();
                bgCtx.arc(sx, s.y, s.r * 3, 0, Math.PI * 2);
                bgCtx.fillStyle = `rgba(${s.sr},${s.sg},${s.sb},${s.a * f * 0.18})`;
                bgCtx.fill();
                // Cross glint on brightest stars
                if (s.r > 2.5 && f > 0.6) {
                    const glintLen = s.r * 6 * f;
                    const ga = s.a * f * 0.35;
                    bgCtx.strokeStyle = `rgba(${s.sr},${s.sg},${s.sb},${ga})`;
                    bgCtx.lineWidth = 0.5;
                    bgCtx.beginPath();
                    bgCtx.moveTo(sx - glintLen, s.y);
                    bgCtx.lineTo(sx + glintLen, s.y);
                    bgCtx.moveTo(sx, s.y - glintLen);
                    bgCtx.lineTo(sx, s.y + glintLen);
                    bgCtx.stroke();
                    // Diagonal glint for extra sparkle on the biggest stars
                    if (s.r > 3) {
                        const dLen = glintLen * 0.5;
                        bgCtx.strokeStyle = `rgba(${s.sr},${s.sg},${s.sb},${ga * 0.5})`;
                        bgCtx.beginPath();
                        bgCtx.moveTo(sx - dLen, s.y - dLen);
                        bgCtx.lineTo(sx + dLen, s.y + dLen);
                        bgCtx.moveTo(sx + dLen, s.y - dLen);
                        bgCtx.lineTo(sx - dLen, s.y + dLen);
                        bgCtx.stroke();
                    }
                }
            }
        }
    }

    // Bright foreground star with lens flare
    const flareX = W * 0.88;
    const flareY = H * 0.1;
    const flarePhase = 0.7 + 0.3 * Math.sin(t * 0.0008);
    const flareGlow = bgCtx.createRadialGradient(flareX, flareY, 0, flareX, flareY, 40);
    flareGlow.addColorStop(0, `rgba(255,250,240,${0.6 * flarePhase})`);
    flareGlow.addColorStop(0.1, `rgba(255,230,200,${0.25 * flarePhase})`);
    flareGlow.addColorStop(0.4, `rgba(200,180,255,${0.06 * flarePhase})`);
    flareGlow.addColorStop(1, 'rgba(0,0,0,0)');
    bgCtx.fillStyle = flareGlow;
    bgCtx.beginPath();
    bgCtx.arc(flareX, flareY, 40, 0, Math.PI * 2);
    bgCtx.fill();
    // Lens flare streaks
    bgCtx.strokeStyle = `rgba(200,210,255,${0.12 * flarePhase})`;
    bgCtx.lineWidth = 1;
    bgCtx.beginPath();
    bgCtx.moveTo(flareX - 60, flareY);
    bgCtx.lineTo(flareX + 60, flareY);
    bgCtx.stroke();
    bgCtx.strokeStyle = `rgba(200,210,255,${0.08 * flarePhase})`;
    bgCtx.lineWidth = 0.5;
    bgCtx.beginPath();
    bgCtx.moveTo(flareX, flareY - 50);
    bgCtx.lineTo(flareX, flareY + 50);
    bgCtx.stroke();
    // Tiny lens flare dots
    const flareDots = [[0.35, 12], [0.55, 8], [0.75, 5]];
    for (const [frac, sz] of flareDots) {
        const fdx = flareX + (W * 0.5 - flareX) * frac;
        const fdy = flareY + (H * 0.5 - flareY) * frac;
        bgCtx.beginPath();
        bgCtx.arc(fdx, fdy, sz, 0, Math.PI * 2);
        bgCtx.fillStyle = `rgba(150,170,255,${0.04 * flarePhase})`;
        bgCtx.fill();
    }

    // Shooting stars (more frequent)
    if (Math.random() < 0.012) {
        shootingStars.push({
            x: Math.random() * W * 1.5, y: Math.random() * H * 0.5,
            vx: 8 + Math.random() * 8, vy: 3 + Math.random() * 4,
            life: 1.0, len: 50 + Math.random() * 80
        });
    }
    for (let i = shootingStars.length - 1; i >= 0; i--) {
        const ss = shootingStars[i];
        ss.x += ss.vx;
        ss.y += ss.vy;
        ss.life -= 0.018;
        if (ss.life <= 0) { shootingStars.splice(i, 1); continue; }
        const grad = bgCtx.createLinearGradient(ss.x, ss.y, ss.x - ss.vx * ss.len / 10, ss.y - ss.vy * ss.len / 10);
        grad.addColorStop(0, `rgba(255,255,255,${ss.life * 0.9})`);
        grad.addColorStop(0.3, `rgba(200,220,255,${ss.life * 0.4})`);
        grad.addColorStop(1, 'rgba(150,180,255,0)');
        bgCtx.strokeStyle = grad;
        bgCtx.lineWidth = 1.5;
        bgCtx.beginPath();
        bgCtx.moveTo(ss.x, ss.y);
        bgCtx.lineTo(ss.x - ss.vx * ss.len / 10, ss.y - ss.vy * ss.len / 10);
        bgCtx.stroke();
        // Bright head
        bgCtx.beginPath();
        bgCtx.arc(ss.x, ss.y, 1.5, 0, Math.PI * 2);
        bgCtx.fillStyle = `rgba(255,255,255,${ss.life * 0.7})`;
        bgCtx.fill();
    }
}

function getShipRGB(t) {
    const skin = SKINS[saveData.equippedSkin];
    if (skin && skin.rainbow) {
        const r = Math.floor(128 + 127 * Math.sin(t * 0.003));
        const g = Math.floor(128 + 127 * Math.sin(t * 0.003 + 2.1));
        const b = Math.floor(128 + 127 * Math.sin(t * 0.003 + 4.2));
        return { r, g, b, hex: `rgb(${r},${g},${b})` };
    }
    return getShipColor();
}

function drawShip(t) {
    if (!ship.alive) return;
    const S = SHIP_SIZE;

    ctx.save();
    ctx.translate(ship.x, ship.y);

    // Invulnerability blink
    if (invulnTimer > 0 && Math.floor(invulnTimer / 5) % 2 === 0) {
        ctx.restore();
        return;
    }

    const sc = getShipRGB(t);

    // Ghost mode transparency
    if (activePowerups.ghostMode) {
        ctx.globalAlpha = 0.4 + Math.sin(gameTime * 0.15) * 0.15;
    }

    // Shield bubble powerup
    if (activePowerups.bubble) {
        const ba = 0.15 + Math.sin(gameTime * 0.1) * 0.08;
        ctx.beginPath();
        ctx.arc(0, 0, S * 2, 0, Math.PI * 2);
        const bubbleGrad = ctx.createRadialGradient(0, 0, S * 0.5, 0, 0, S * 2);
        bubbleGrad.addColorStop(0, `rgba(${sc.r},${sc.g},${sc.b},0)`);
        bubbleGrad.addColorStop(0.7, `rgba(${sc.r},${sc.g},${sc.b},${ba * 0.3})`);
        bubbleGrad.addColorStop(1, `rgba(${sc.r},${sc.g},${sc.b},${ba})`);
        ctx.fillStyle = bubbleGrad;
        ctx.fill();
        ctx.strokeStyle = `rgba(${sc.r},${sc.g},${sc.b},0.5)`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    // Invuln shield glow
    if (invulnTimer > 0) {
        const sa = (invulnTimer / INVULN_TIME) * 0.3;
        ctx.beginPath();
        ctx.arc(0, 0, S * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${sc.r},${sc.g},${sc.b},${sa})`;
        ctx.fill();
    }

    // Ship ambient glow
    ctx.shadowColor = sc.hex;
    ctx.shadowBlur = 25;

    // Main hull fill
    const hullGrad = ctx.createLinearGradient(-S, -S * 0.7, S, S * 0.7);
    hullGrad.addColorStop(0, `rgba(${sc.r},${sc.g},${sc.b},0.08)`);
    hullGrad.addColorStop(0.5, `rgba(${sc.r},${sc.g},${sc.b},0.2)`);
    hullGrad.addColorStop(1, `rgba(${sc.r},${sc.g},${sc.b},0.05)`);
    ctx.fillStyle = hullGrad;
    ctx.beginPath();
    ctx.moveTo(S, 0);
    ctx.lineTo(-S * 0.3, -S * 0.55);
    ctx.lineTo(-S * 0.7, -S * 0.65);
    ctx.lineTo(-S * 0.45, -S * 0.1);
    ctx.lineTo(-S * 0.45, S * 0.1);
    ctx.lineTo(-S * 0.7, S * 0.65);
    ctx.lineTo(-S * 0.3, S * 0.55);
    ctx.closePath();
    ctx.fill();

    // Hull outline
    ctx.strokeStyle = sc.hex;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(S, 0);
    ctx.lineTo(-S * 0.3, -S * 0.55);
    ctx.lineTo(-S * 0.7, -S * 0.65);
    ctx.lineTo(-S * 0.45, -S * 0.1);
    ctx.lineTo(-S * 0.45, S * 0.1);
    ctx.lineTo(-S * 0.7, S * 0.65);
    ctx.lineTo(-S * 0.3, S * 0.55);
    ctx.closePath();
    ctx.stroke();

    // Wing struts
    ctx.shadowBlur = 6;
    ctx.strokeStyle = `rgba(${sc.r},${sc.g},${sc.b},0.5)`;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(S * 0.1, -S * 0.15);
    ctx.lineTo(-S * 0.5, -S * 0.6);
    ctx.moveTo(S * 0.1, S * 0.15);
    ctx.lineTo(-S * 0.5, S * 0.6);
    ctx.stroke();

    // Center spine
    ctx.strokeStyle = `rgba(${sc.r},${sc.g},${sc.b},0.35)`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(S * 0.7, 0);
    ctx.lineTo(-S * 0.4, 0);
    ctx.stroke();

    // Engine pods (two small rectangles at the back)
    ctx.fillStyle = `rgba(${sc.r},${sc.g},${sc.b},0.25)`;
    ctx.fillRect(-S * 0.55, -S * 0.5, S * 0.15, S * 0.2);
    ctx.fillRect(-S * 0.55, S * 0.3, S * 0.15, S * 0.2);
    ctx.strokeStyle = `rgba(${sc.r},${sc.g},${sc.b},0.6)`;
    ctx.lineWidth = 1;
    ctx.strokeRect(-S * 0.55, -S * 0.5, S * 0.15, S * 0.2);
    ctx.strokeRect(-S * 0.55, S * 0.3, S * 0.15, S * 0.2);

    // Cockpit (glowing canopy)
    ctx.shadowColor = sc.hex;
    ctx.shadowBlur = 12;
    const cockpitGrad = ctx.createRadialGradient(S * 0.2, 0, 1, S * 0.2, 0, 5);
    cockpitGrad.addColorStop(0, `rgba(255,255,255,0.6)`);
    cockpitGrad.addColorStop(0.5, `rgba(${sc.r},${sc.g},${sc.b},0.5)`);
    cockpitGrad.addColorStop(1, `rgba(${sc.r},${sc.g},${sc.b},0.1)`);
    ctx.fillStyle = cockpitGrad;
    ctx.beginPath();
    ctx.ellipse(S * 0.2, 0, 4, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Weapon tip glow
    ctx.beginPath();
    ctx.arc(S * 0.95, 0, 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${sc.r},${sc.g},${sc.b},${0.4 + Math.sin(t * 0.005) * 0.2})`;
    ctx.fill();

    // Thrust flames (dual engine)
    if (ship.thrust) {
        const flicker = 0.7 + Math.random() * 0.5;
        const len = 0.7 + Math.random() * 0.6;

        // Top engine flame
        ctx.shadowColor = '#ff6600';
        ctx.shadowBlur = 20;
        ctx.fillStyle = `rgba(255, 120, 30, ${flicker * 0.6})`;
        ctx.beginPath();
        ctx.moveTo(-S * 0.55, -S * 0.45);
        ctx.lineTo(-S * (0.8 + len * 0.4), -S * 0.4);
        ctx.lineTo(-S * 0.55, -S * 0.35);
        ctx.closePath();
        ctx.fill();

        // Bottom engine flame
        ctx.beginPath();
        ctx.moveTo(-S * 0.55, S * 0.35);
        ctx.lineTo(-S * (0.8 + len * 0.4), S * 0.4);
        ctx.lineTo(-S * 0.55, S * 0.45);
        ctx.closePath();
        ctx.fill();

        // Inner white-hot cores
        ctx.shadowBlur = 10;
        ctx.fillStyle = `rgba(255, 240, 150, ${flicker * 0.8})`;
        ctx.beginPath();
        ctx.moveTo(-S * 0.52, -S * 0.43);
        ctx.lineTo(-S * (0.65 + len * 0.2), -S * 0.4);
        ctx.lineTo(-S * 0.52, -S * 0.37);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-S * 0.52, S * 0.37);
        ctx.lineTo(-S * (0.65 + len * 0.2), S * 0.4);
        ctx.lineTo(-S * 0.52, S * 0.43);
        ctx.closePath();
        ctx.fill();
    }

    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawWingmen() {
    if (!activePowerups.wingmen) return;
    const sc = getShipColor();
    for (const wm of wingmenShips) {
        ctx.save();
        ctx.translate(wm.x, wm.y);
        ctx.shadowColor = sc.hex;
        ctx.shadowBlur = 12;
        ctx.strokeStyle = `rgba(${sc.r},${sc.g},${sc.b},0.6)`;
        ctx.lineWidth = 1.5;
        const s = SHIP_SIZE * 0.6;
        ctx.beginPath();
        ctx.moveTo(s, 0);
        ctx.lineTo(-s * 0.7, -s * 0.65);
        ctx.lineTo(-s * 0.35, 0);
        ctx.lineTo(-s * 0.7, s * 0.65);
        ctx.closePath();
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

function drawEngineTrail() {
    for (const p of engineTrail) {
        const alpha = (p.life / p.maxLife);
        const t = 1 - alpha;
        const r = 255;
        const g = Math.floor(200 * alpha + 50 * t);
        const b = Math.floor(50 * alpha);
        const sz = p.size * alpha;
        // Outer glow
        ctx.beginPath();
        ctx.arc(p.x, p.y, sz * 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.15})`;
        ctx.fill();
        // Core
        ctx.beginPath();
        ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.7})`;
        ctx.fill();
        // White hot center
        if (alpha > 0.5) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, sz * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,200,${(alpha - 0.5) * 1.2})`;
            ctx.fill();
        }
    }
}

function drawBullets() {
    for (const b of bullets) {
        if (b.isLaser) {
            // Laser beam segment - glowing red line
            const alpha = Math.min(1, b.life / 10);
            const flicker = 0.8 + Math.sin(gameTime * 0.5 + b.x * 0.1) * 0.2;
            ctx.strokeStyle = `rgba(255, 60, 60, ${alpha * flicker})`;
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(b.x - 15, b.y);
            ctx.lineTo(b.x + 15, b.y);
            ctx.stroke();
            // Bright core
            ctx.strokeStyle = `rgba(255, 200, 200, ${alpha * flicker})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(b.x - 15, b.y);
            ctx.lineTo(b.x + 15, b.y);
            ctx.stroke();
            continue;
        }
        if (b.isMissile) {
            // Realistic missile rendering
            const angle = Math.atan2(b.vy, b.vx);
            const alpha = Math.min(1, b.life / 10);
            ctx.save();
            ctx.translate(b.x, b.y);
            ctx.rotate(angle);
            // Exhaust flame
            const flicker = 0.7 + Math.random() * 0.3;
            const flameLen = 10 + Math.random() * 6;
            ctx.globalAlpha = alpha * flicker;
            ctx.fillStyle = 'rgb(255,120,30)';
            ctx.beginPath();
            ctx.moveTo(-8, -3);
            ctx.lineTo(-8 - flameLen, 0);
            ctx.lineTo(-8, 3);
            ctx.fill();
            // Missile body — dark grey metallic
            ctx.fillStyle = `rgba(140,145,155,${alpha})`;
            ctx.beginPath();
            ctx.moveTo(10, 0);
            ctx.lineTo(6, -3);
            ctx.lineTo(-8, -2.5);
            ctx.lineTo(-8, 2.5);
            ctx.lineTo(6, 3);
            ctx.closePath();
            ctx.fill();
            // Red nose cone
            ctx.fillStyle = `rgba(220,50,40,${alpha})`;
            ctx.beginPath();
            ctx.moveTo(14, 0);
            ctx.lineTo(10, -2.5);
            ctx.lineTo(10, 2.5);
            ctx.closePath();
            ctx.fill();
            // Fins
            ctx.fillStyle = `rgba(100,105,115,${alpha})`;
            ctx.beginPath();
            ctx.moveTo(-6, -2.5);
            ctx.lineTo(-9, -6);
            ctx.lineTo(-8, -2.5);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-6, 2.5);
            ctx.lineTo(-9, 6);
            ctx.lineTo(-8, 2.5);
            ctx.fill();
            // Body stripe
            ctx.strokeStyle = `rgba(200,60,50,${alpha * 0.8})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(2, -2.8);
            ctx.lineTo(2, 2.8);
            ctx.stroke();
            // Highlight
            ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.3})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(-6, -2.2);
            ctx.lineTo(8, -2.2);
            ctx.stroke();
            ctx.globalAlpha = 1;
            ctx.restore();
            continue;
        }
        // Sky Force-style elongated energy bolts (optimized)
        const bc = b.bulletColor || [255, 50, 50];
        const alpha = Math.min(1, b.life / 10);
        const bLen = b.pierce ? 18 : b.isCrit ? 16 : 12;
        const bWid = b.pierce ? 4 : b.isCrit ? 3.5 : 2.5;
        const angle = Math.atan2(b.vy, b.vx);
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(angle);
        // Glow
        ctx.globalAlpha = alpha * 0.25;
        ctx.fillStyle = `rgb(${bc[0]},${bc[1]},${bc[2]})`;
        ctx.beginPath();
        ctx.ellipse(-bLen * 0.3, 0, bLen * 1.2, bWid * 2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        // Main bolt body
        ctx.globalAlpha = alpha * 0.9;
        ctx.beginPath();
        ctx.ellipse(0, 0, bLen, bWid, 0, 0, Math.PI * 2);
        ctx.fill();
        // White-hot core
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(bLen * 0.3, 0, bLen * 0.4, bWid * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
        // Crit ring
        if (b.isCrit) {
            ctx.strokeStyle = `rgba(255,255,100,${alpha * 0.5})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(b.x, b.y, bLen * 0.8, 0, Math.PI * 2);
            ctx.stroke();
        }
    }
}

function drawEnemyBullets() {
    for (const b of enemyBullets) {
        if (b.isMine) {
            // Mine: pulsing circle with warning
            const armed = !b.mineArmed || b.mineArmed <= 0;
            const pulse = armed ? 0.6 + Math.sin(gameTime * 0.2) * 0.4 : 0.3;
            ctx.fillStyle = `rgba(${armed ? 255 : 150},${armed ? 80 : 120},${armed ? 30 : 60},${pulse})`;
            ctx.beginPath();
            ctx.arc(b.x, b.y, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = `rgba(255,150,50,${pulse * 0.8})`;
            ctx.lineWidth = 1;
            ctx.stroke();
            // Spikes
            if (armed) {
                for (let s = 0; s < 6; s++) {
                    const a = (s / 6) * Math.PI * 2 + gameTime * 0.02;
                    ctx.beginPath();
                    ctx.moveTo(b.x + Math.cos(a) * 7, b.y + Math.sin(a) * 7);
                    ctx.lineTo(b.x + Math.cos(a) * 11, b.y + Math.sin(a) * 11);
                    ctx.stroke();
                }
            }
            continue;
        }
        if (b.isPlasma) {
            // Plasma: big glowing ball (optimized)
            const sz = 8 + Math.sin(gameTime * 0.1) * 2;
            ctx.globalAlpha = 0.35;
            ctx.fillStyle = 'rgb(150,50,255)';
            ctx.beginPath();
            ctx.arc(b.x, b.y, sz, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 0.7;
            ctx.fillStyle = 'rgb(255,220,255)';
            ctx.beginPath();
            ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            continue;
        }
        if (b.bossBullet) {
            // Boss bullets: large, glowing, destructible (optimized — no gradients)
            const sz = b.isFlakEnemy ? 12 : 10;
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = 'rgb(255,30,30)';
            ctx.beginPath();
            ctx.arc(b.x, b.y, sz, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 0.95;
            ctx.fillStyle = 'rgb(255,180,150)';
            ctx.beginPath();
            ctx.arc(b.x, b.y, sz * 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgb(255,255,255)';
            ctx.beginPath();
            ctx.arc(b.x, b.y, sz * 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            // HP bar under boss bullet
            if (b.hp > 0 && b.hp < (b.isFlakEnemy ? 6 : 3)) {
                const maxHp = b.isFlakEnemy ? 6 : b.homing ? 3 : 2;
                const barW = 14;
                const pct = Math.max(0, b.hp / maxHp);
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(b.x - barW/2, b.y + sz + 2, barW, 3);
                ctx.fillStyle = 'rgba(255,80,80,0.9)';
                ctx.fillRect(b.x - barW/2, b.y + sz + 2, barW * pct, 3);
            }
        } else {
            ctx.fillStyle = 'rgba(255,40,30,0.9)';
            ctx.beginPath();
            ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.beginPath();
            ctx.arc(b.x, b.y, 1.2, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

function drawEnemyShape(ctx, shape, size) {
    ctx.beginPath();
    if (shape === 'triangle') {
        ctx.moveTo(size, 0);
        ctx.lineTo(-size * 0.7, -size * 0.7);
        ctx.lineTo(-size * 0.7, size * 0.7);
    } else if (shape === 'diamond') {
        ctx.moveTo(size, 0);
        ctx.lineTo(0, -size * 0.7);
        ctx.lineTo(-size, 0);
        ctx.lineTo(0, size * 0.7);
    } else if (shape === 'arrow') {
        ctx.moveTo(size, 0);
        ctx.lineTo(-size * 0.3, -size * 0.8);
        ctx.lineTo(-size * 0.6, -size * 0.3);
        ctx.lineTo(-size * 0.9, -size * 0.4);
        ctx.lineTo(-size * 0.5, 0);
        ctx.lineTo(-size * 0.9, size * 0.4);
        ctx.lineTo(-size * 0.6, size * 0.3);
        ctx.lineTo(-size * 0.3, size * 0.8);
    } else if (shape === 'pentagon') {
        for (let i = 0; i < 5; i++) {
            const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
            const px = Math.cos(a) * size;
            const py = Math.sin(a) * size;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
    } else if (shape === 'hexagon') {
        for (let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            const px = Math.cos(a) * size;
            const py = Math.sin(a) * size;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
    } else if (shape === 'star') {
        for (let i = 0; i < 10; i++) {
            const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
            const r = i % 2 === 0 ? size : size * 0.5;
            const px = Math.cos(a) * r;
            const py = Math.sin(a) * r;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
    }
    ctx.closePath();
}

function drawEnemies() {
    for (const e of enemies) {
        ctx.save();
        ctx.translate(e.x, e.y);

        // Flash white on damage
        const fr = e.flashTimer > 0 ? 255 : e.r;
        const fg = e.flashTimer > 0 ? 255 : e.g;
        const fb = e.flashTimer > 0 ? 255 : e.b;

        // Ambient glow behind enemy
        ctx.shadowColor = `rgb(${e.r},${e.g},${e.b})`;
        ctx.shadowBlur = 15;

        // Fill
        ctx.fillStyle = `rgba(${fr},${fg},${fb},0.15)`;
        drawEnemyShape(ctx, e.shape, e.size);
        ctx.fill();

        // Outline with glow
        ctx.strokeStyle = `rgba(${fr},${fg},${fb},0.9)`;
        ctx.lineWidth = 2;
        drawEnemyShape(ctx, e.shape, e.size);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Interior detail: center core
        ctx.fillStyle = `rgba(255,255,255,0.2)`;
        ctx.beginPath();
        ctx.arc(0, 0, e.size * 0.2, 0, Math.PI * 2);
        ctx.fill();

        // Interior panel lines
        ctx.strokeStyle = `rgba(${fr},${fg},${fb},0.2)`;
        ctx.lineWidth = 0.8;
        if (e.shape === 'hexagon' || e.shape === 'pentagon') {
            // Radial spokes
            const n = e.shape === 'hexagon' ? 6 : 5;
            for (let i = 0; i < n; i++) {
                const a = (i / n) * Math.PI * 2 + (e.shape === 'pentagon' ? -Math.PI / 2 : 0);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(Math.cos(a) * e.size * 0.7, Math.sin(a) * e.size * 0.7);
                ctx.stroke();
            }
        } else if (e.shape === 'star') {
            // Inner ring
            ctx.beginPath();
            ctx.arc(0, 0, e.size * 0.4, 0, Math.PI * 2);
            ctx.stroke();
        } else {
            // Cross pattern for triangle/diamond/arrow
            ctx.beginPath();
            ctx.moveTo(-e.size * 0.3, 0);
            ctx.lineTo(e.size * 0.3, 0);
            ctx.moveTo(0, -e.size * 0.3);
            ctx.lineTo(0, e.size * 0.3);
            ctx.stroke();
        }

        // Engine glow on back of enemy
        ctx.shadowColor = e.color;
        ctx.shadowBlur = 8;
        ctx.fillStyle = `rgba(${fr},${fg},${fb},0.5)`;
        ctx.beginPath();
        ctx.arc(-e.size * 0.6, 0, 2 + Math.random(), 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.restore();

        // HP bar (for cruiser/elite/dreadnought/shielder or any damaged enemy)
        if (e.showHpBar || e.hp < e.maxHp) {
            const barW = e.size * 2.2;
            const barH = 4;
            const barX = e.x - barW / 2;
            const barY = e.y - e.size - 10;
            // Background
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
            ctx.fillStyle = 'rgba(20,20,40,0.8)';
            ctx.fillRect(barX, barY, barW, barH);
            const hpPct = Math.max(0, e.hp / e.maxHp);
            const hpColor = hpPct > 0.5 ? '#66ff88' : hpPct > 0.25 ? '#ffcc33' : '#ff4444';
            // Gradient HP fill
            ctx.fillStyle = hpColor;
            ctx.shadowColor = hpColor;
            ctx.shadowBlur = 4;
            ctx.fillRect(barX, barY, barW * hpPct, barH);
            ctx.shadowBlur = 0;
            // Border
            ctx.strokeStyle = `rgba(${e.r},${e.g},${e.b},0.4)`;
            ctx.lineWidth = 0.5;
            ctx.strokeRect(barX, barY, barW, barH);
        }
    }
}

function drawPickups() {
    for (const p of pickups) {
        const alpha = Math.min(1, p.life / 60);
        const bob = Math.sin(gameTime * 0.08 + p.x * 0.1) * 3;
        const spin = gameTime * 0.03 + p.x * 0.01;
        const pulse = 1 + Math.sin(gameTime * 0.1 + p.y * 0.05) * 0.15;
        ctx.save();
        ctx.translate(p.x, p.y + bob);
        ctx.rotate(spin);
        ctx.scale(pulse, pulse);

        if (p.type === 'scrap') {
            // Glow ring
            ctx.shadowColor = '#66ff88';
            ctx.shadowBlur = 12;
            ctx.strokeStyle = `rgba(100,255,136,${alpha * 0.3})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(0, 0, 9, 0, Math.PI * 2);
            ctx.stroke();
            // Hexagon fill with gradient
            const sg = ctx.createRadialGradient(0, 0, 0, 0, 0, 7);
            sg.addColorStop(0, `rgba(180,255,200,${alpha})`);
            sg.addColorStop(1, `rgba(60,200,100,${alpha * 0.6})`);
            ctx.fillStyle = sg;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2;
                const px = Math.cos(a) * 6;
                const py = Math.sin(a) * 6;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
            // Hex outline
            ctx.strokeStyle = `rgba(150,255,180,${alpha * 0.8})`;
            ctx.lineWidth = 1;
            ctx.stroke();
        } else if (p.type === 'crystal') {
            // Sparkle glow
            ctx.shadowColor = '#44aaff';
            ctx.shadowBlur = 15;
            // Outer glow ring
            ctx.strokeStyle = `rgba(68,170,255,${alpha * 0.25})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(0, 0, 10, 0, Math.PI * 2);
            ctx.stroke();
            // Diamond with gradient
            const cg = ctx.createLinearGradient(0, -8, 0, 8);
            cg.addColorStop(0, `rgba(150,220,255,${alpha})`);
            cg.addColorStop(0.5, `rgba(68,170,255,${alpha})`);
            cg.addColorStop(1, `rgba(30,100,200,${alpha * 0.8})`);
            ctx.fillStyle = cg;
            ctx.beginPath();
            ctx.moveTo(0, -8); ctx.lineTo(5.5, 0); ctx.lineTo(0, 8); ctx.lineTo(-5.5, 0);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = `rgba(150,220,255,${alpha * 0.8})`;
            ctx.lineWidth = 1;
            ctx.stroke();
            // Inner highlight
            ctx.fillStyle = `rgba(255,255,255,${alpha * 0.4})`;
            ctx.beginPath();
            ctx.moveTo(0, -4); ctx.lineTo(2, 0); ctx.lineTo(0, 1); ctx.lineTo(-2, 0);
            ctx.closePath();
            ctx.fill();
        } else if (p.type === 'parts') {
            ctx.shadowColor = '#cc77ff';
            ctx.shadowBlur = 10;
            // Gear teeth
            ctx.fillStyle = `rgba(204,119,255,${alpha})`;
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
                const a = (i / 8) * Math.PI * 2;
                const outerR = (i % 2 === 0) ? 7 : 5;
                ctx.lineTo(Math.cos(a) * outerR, Math.sin(a) * outerR);
            }
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = `rgba(220,150,255,${alpha * 0.7})`;
            ctx.lineWidth = 1;
            ctx.stroke();
            // Center hole
            ctx.fillStyle = `rgba(30,10,60,${alpha})`;
            ctx.beginPath();
            ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
            ctx.fill();
            // Center dot
            ctx.fillStyle = `rgba(200,120,255,${alpha * 0.6})`;
            ctx.beginPath();
            ctx.arc(0, 0, 1, 0, Math.PI * 2);
            ctx.fill();
        } else if (p.type === 'powerup') {
            const pu = POWERUPS[p.powerupKey];
            ctx.shadowColor = '#ffcc33';
            ctx.shadowBlur = 18;
            // Outer pulsing ring
            ctx.strokeStyle = `rgba(255,204,50,${alpha * 0.4})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(0, 0, 12, 0, Math.PI * 2);
            ctx.stroke();
            // Inner glow
            const pg = ctx.createRadialGradient(0, 0, 0, 0, 0, 10);
            pg.addColorStop(0, `rgba(255,230,100,${alpha * 0.4})`);
            pg.addColorStop(1, `rgba(255,180,30,${alpha * 0.05})`);
            ctx.fillStyle = pg;
            ctx.beginPath();
            ctx.arc(0, 0, 10, 0, Math.PI * 2);
            ctx.fill();
            // Reset rotation for icon
            ctx.rotate(-spin);
            ctx.scale(1 / pulse, 1 / pulse);
            ctx.font = '13px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.fillText(pu ? pu.icon : '?', 0, 1);
        }
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

function drawParticles() {
    for (const p of particles) {
        const alpha = p.life / p.maxLife;
        if (p.size > 0) {
            ctx.shadowColor = `rgba(${p.r},${p.g},${p.b},0.8)`;
            ctx.shadowBlur = 8;
            ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        } else if (p.lineLen) {
            ctx.strokeStyle = `rgba(${p.r},${p.g},${p.b},${alpha})`;
            ctx.lineWidth = 1.5;
            ctx.shadowColor = `rgba(${p.r},${p.g},${p.b},0.5)`;
            ctx.shadowBlur = 6;
            const dx = Math.cos(p.lineAngle) * p.lineLen * 0.5;
            const dy = Math.sin(p.lineAngle) * p.lineLen * 0.5;
            ctx.beginPath();
            ctx.moveTo(p.x - dx, p.y - dy);
            ctx.lineTo(p.x + dx, p.y + dy);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
    }
}

function drawFloatingTexts() {
    for (const t of floatingTexts) {
        const alpha = t.life / t.maxLife;
        ctx.font = '700 11px Orbitron';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = t.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
        // Handle hex colors
        if (t.color.startsWith('#')) {
            const r = parseInt(t.color.slice(1, 3), 16);
            const g = parseInt(t.color.slice(3, 5), 16);
            const b = parseInt(t.color.slice(5, 7), 16);
            ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        }
        ctx.fillText(t.text, t.x, t.y);
    }
}

function drawCheckpointPlanet() {
    if (!checkpointPlanet) return;
    const p = checkpointPlanet;
    ctx.save();
    // Outer glow
    const glow = ctx.createRadialGradient(p.x, p.y, p.radius * 0.8, p.x, p.y, p.radius * 3);
    glow.addColorStop(0, `rgba(${p.r},${p.g},${p.b},0.3)`);
    glow.addColorStop(0.5, `rgba(${p.r},${p.g},${p.b},0.1)`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * 3, 0, Math.PI * 2);
    ctx.fill();
    // Planet body
    const pGrad = ctx.createRadialGradient(p.x - p.radius * 0.3, p.y - p.radius * 0.3, 0, p.x, p.y, p.radius);
    pGrad.addColorStop(0, `rgba(${Math.min(255,p.r+80)},${Math.min(255,p.g+80)},${Math.min(255,p.b+80)},0.9)`);
    pGrad.addColorStop(0.7, `rgba(${p.r},${p.g},${p.b},0.9)`);
    pGrad.addColorStop(1, `rgba(${Math.max(0,p.r-40)},${Math.max(0,p.g-40)},${Math.max(0,p.b-40)},0.8)`);
    ctx.fillStyle = pGrad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
    // Atmosphere rim
    ctx.strokeStyle = `rgba(${Math.min(255,p.r+100)},${Math.min(255,p.g+100)},${Math.min(255,p.b+150)},0.4)`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius + 2, Math.PI * 0.7, Math.PI * 1.9);
    ctx.stroke();
    // Ring
    if (p.hasRing) {
        ctx.strokeStyle = `rgba(${Math.min(255,p.r+40)},${Math.min(255,p.g+40)},${Math.min(255,p.b+40)},0.5)`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, p.radius * 1.8, p.radius * 0.3, -0.2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = `rgba(${Math.min(255,p.r+40)},${Math.min(255,p.g+40)},${Math.min(255,p.b+40)},0.2)`;
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, p.radius * 2.1, p.radius * 0.4, -0.2, 0, Math.PI * 2);
        ctx.stroke();
    }
    // Name label
    ctx.font = '700 11px Orbitron';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(200,220,255,0.7)';
    ctx.fillText(p.name, p.x, p.y + p.radius + 20);
    // Bonus indicator
    if (!checkpointCollected) {
        const pulse = 0.6 + Math.sin(gameTime * 0.1) * 0.4;
        ctx.font = '700 10px Orbitron';
        ctx.fillStyle = `rgba(255,204,50,${pulse})`;
        ctx.fillText('FLY NEAR FOR BONUS', p.x, p.y + p.radius + 36);
    } else {
        ctx.font = '700 10px Orbitron';
        ctx.fillStyle = 'rgba(100,255,136,0.7)';
        ctx.fillText('CHECKPOINT!', p.x, p.y + p.radius + 36);
    }
    ctx.restore();
}

function drawAsteroids() {
    for (const a of asteroids) {
        ctx.save();
        ctx.translate(a.x, a.y);
        ctx.rotate(a.rotation);
        ctx.beginPath();
        for (let v = 0; v < a.verts.length; v++) {
            const angle = (v / a.verts.length) * Math.PI * 2;
            const r = a.size * a.verts[v];
            const px = Math.cos(angle) * r;
            const py = Math.sin(angle) * r;
            if (v === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.closePath();
        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, a.size);
        grad.addColorStop(0, `rgba(${a.r+30},${a.g+30},${a.b+30},0.8)`);
        grad.addColorStop(1, `rgba(${a.r-20},${a.g-20},${a.b-20},0.6)`);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = `rgba(${a.r+50},${a.g+50},${a.b+50},0.5)`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Crater detail
        ctx.beginPath();
        ctx.arc(a.size * 0.2, -a.size * 0.15, a.size * 0.15, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${a.r-20},${a.g-20},${a.b-20},0.3)`;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();
    }
}

function drawSupplyCrates() {
    for (const c of supplyCrates) {
        const pulse = 0.7 + Math.sin(c.pulse) * 0.3;
        ctx.save();
        ctx.translate(c.x, c.y);
        // Glow
        ctx.shadowColor = '#ffcc33';
        ctx.shadowBlur = 15 * pulse;
        // Box shape
        const s = c.size;
        const grad = ctx.createLinearGradient(-s, -s, s, s);
        grad.addColorStop(0, `rgba(255,200,50,${0.3 * pulse})`);
        grad.addColorStop(0.5, `rgba(255,170,30,${0.5 * pulse})`);
        grad.addColorStop(1, `rgba(200,130,20,${0.3 * pulse})`);
        ctx.fillStyle = grad;
        ctx.fillRect(-s, -s, s * 2, s * 2);
        ctx.strokeStyle = `rgba(255,220,100,${0.8 * pulse})`;
        ctx.lineWidth = 2;
        ctx.strokeRect(-s, -s, s * 2, s * 2);
        // Cross on crate
        ctx.strokeStyle = `rgba(255,240,150,${0.5 * pulse})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.6);
        ctx.lineTo(0, s * 0.6);
        ctx.moveTo(-s * 0.6, 0);
        ctx.lineTo(s * 0.6, 0);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
        // HP bar
        const barW = c.size * 2.5;
        const barH = 3;
        const barX = c.x - barW / 2;
        const barY = c.y - c.size - 8;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(barX, barY, barW, barH);
        const hpPct = c.hp / c.maxHp;
        ctx.fillStyle = '#ffcc33';
        ctx.fillRect(barX, barY, barW * hpPct, barH);
    }
}

function drawBossHPBar() {
    if (!bossActive || bossActive.hp <= 0) return;
    const b = bossActive;
    const barW = W * 0.65;
    const barH = 14;
    const barX = (W - barW) / 2;
    const barY = 42;
    const hpPct = Math.max(0, b.hp / b.maxHp);

    // Background panel
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(barX - 4, barY - 18, barW + 8, barH + 28);
    ctx.strokeStyle = 'rgba(255,34,100,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX - 4, barY - 18, barW + 8, barH + 28);

    // Phase markers at 75%, 50%, 25%
    ctx.fillStyle = 'rgba(20,10,30,0.9)';
    ctx.fillRect(barX, barY, barW, barH);
    for (const pct of [0.25, 0.5, 0.75]) {
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(barX + barW * pct, barY);
        ctx.lineTo(barX + barW * pct, barY + barH);
        ctx.stroke();
    }

    // HP fill with gradient
    const hpColor = hpPct > 0.5 ? '#ff3366' : hpPct > 0.25 ? '#ff6633' : '#ff2222';
    const hpGrad = ctx.createLinearGradient(barX, barY, barX + barW * hpPct, barY + barH);
    hpGrad.addColorStop(0, hpColor);
    hpGrad.addColorStop(0.5, hpPct > 0.25 ? '#ff5577' : '#ff4422');
    hpGrad.addColorStop(1, hpColor);
    ctx.fillStyle = hpGrad;
    ctx.shadowColor = hpColor;
    ctx.shadowBlur = 10;
    ctx.fillRect(barX, barY, barW * hpPct, barH);

    // Animated damage pulse on bar
    if (b.flashTimer > 0) {
        ctx.fillStyle = `rgba(255,255,255,${b.flashTimer * 0.05})`;
        ctx.fillRect(barX, barY, barW * hpPct, barH);
    }
    ctx.shadowBlur = 0;

    // Border
    ctx.strokeStyle = 'rgba(255,50,100,0.6)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(barX, barY, barW, barH);

    // Shield indicator
    if (b.shieldActive) {
        const sa = 0.5 + Math.sin(gameTime * 0.15) * 0.3;
        ctx.strokeStyle = `rgba(68,255,220,${sa})`;
        ctx.lineWidth = 2;
        ctx.strokeRect(barX - 2, barY - 2, barW + 4, barH + 4);
    }

    // Boss name + phase
    ctx.font = '900 11px Orbitron';
    ctx.textAlign = 'center';
    const phaseNames = ['ENRAGED', 'PHASE 3', 'PHASE 2', 'PHASE 1'];
    const phaseColors = ['#ff2222', '#ff6633', '#ff9933', '#ff3366'];
    ctx.fillStyle = phaseColors[b.phase];
    ctx.fillText(`BOSS - ${phaseNames[b.phase]}`, W / 2, barY - 5);

    // HP percentage text
    ctx.font = '700 9px Orbitron';
    ctx.fillStyle = 'rgba(255,200,220,0.8)';
    ctx.fillText(`${Math.ceil(hpPct * 100)}%`, W / 2, barY + barH + 12);

    // Turret status indicators with HP bars
    const turretStartX = barX + barW + 10;
    ctx.font = '7px Orbitron';
    for (let i = 0; i < b.turrets.length; i++) {
        const t = b.turrets[i];
        const ty = barY - 5 + i * 12;
        ctx.fillStyle = t.alive ? 'rgba(255,100,50,0.8)' : 'rgba(80,80,80,0.4)';
        ctx.textAlign = 'left';
        ctx.fillText(t.alive ? (t.name || `T${i+1}`) : 'X', turretStartX, ty + 6);
        if (t.alive && t.maxHp) {
            const thpW = 30; const thpH = 3;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(turretStartX + 35, ty + 1, thpW, thpH);
            ctx.fillStyle = 'rgba(255,100,50,0.8)';
            ctx.fillRect(turretStartX + 35, ty + 1, thpW * (t.hp / t.maxHp), thpH);
        }
    }
    // Stage indicator
    ctx.font = '8px Orbitron';
    ctx.fillStyle = 'rgba(255,200,100,0.7)';
    ctx.textAlign = 'left';
    ctx.fillText(`STAGE ${b.turretStage + 1}/${b.turretStages.length}`, turretStartX, barY + b.turrets.length * 12 + 5);

    // Draw boss shield visual on the boss itself
    if (b.shieldActive) {
        ctx.save();
        const sa = 0.3 + Math.sin(gameTime * 0.12) * 0.15;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size + 15, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(68,255,220,${sa})`;
        ctx.lineWidth = 3;
        ctx.stroke();
        // Inner shield
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size + 8, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(68,255,220,${sa * 0.5})`;
        ctx.lineWidth = 6;
        ctx.stroke();
        ctx.restore();
    }

    // Draw turrets on boss body - Sky Force-style visible towers
    for (const turret of b.turrets) {
        const tx = b.x + (turret.offsetX || -0.6) * b.size;
        const ty = b.y + turret.offsetY;
        if (turret.alive) {
            ctx.save();
            const aimAngle = Math.atan2(ship.y - ty, ship.x - tx);
            // Turret base (tower)
            const colors = { cannon: '#ff8833', missile: '#33aaff', bomber: '#ff3366', spread: '#ffcc00', gatling: '#88ff44', laser: '#ff2222' };
            const turretColor = colors[turret.type] || '#ff6633';
            ctx.shadowColor = turretColor;
            ctx.shadowBlur = 12;
            // Tower base
            ctx.fillStyle = 'rgba(80,70,90,0.9)';
            ctx.fillRect(tx - 8, ty - 8, 16, 16);
            ctx.strokeStyle = turretColor;
            ctx.lineWidth = 1.5;
            ctx.strokeRect(tx - 8, ty - 8, 16, 16);
            // Turret dome
            ctx.fillStyle = turretColor;
            ctx.beginPath();
            ctx.arc(tx, ty, 7, 0, Math.PI * 2);
            ctx.fill();
            // Inner glow
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(tx, ty, 3.5, 0, Math.PI * 2);
            ctx.fill();
            // Gun barrel(s)
            ctx.strokeStyle = turretColor;
            ctx.lineWidth = 3;
            if (turret.type === 'cannon' || turret.type === 'gatling') {
                // Double barrel
                for (let barrel = -1; barrel <= 1; barrel += 2) {
                    const bx = tx + Math.cos(aimAngle + Math.PI/2) * barrel * 3;
                    const by = ty + Math.sin(aimAngle + Math.PI/2) * barrel * 3;
                    ctx.beginPath();
                    ctx.moveTo(bx, by);
                    ctx.lineTo(bx + Math.cos(aimAngle) * 15, by + Math.sin(aimAngle) * 15);
                    ctx.stroke();
                }
            } else if (turret.type === 'missile') {
                // Missile pod - 3 small tubes
                for (let m = -1; m <= 1; m++) {
                    const bx = tx + Math.cos(aimAngle + Math.PI/2) * m * 4;
                    const by = ty + Math.sin(aimAngle + Math.PI/2) * m * 4;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(bx, by);
                    ctx.lineTo(bx + Math.cos(aimAngle) * 10, by + Math.sin(aimAngle) * 10);
                    ctx.stroke();
                }
            } else if (turret.type === 'bomber') {
                // Bomb bay - wider single barrel
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(tx, ty);
                ctx.lineTo(tx + Math.cos(aimAngle) * 12, ty + Math.sin(aimAngle) * 12);
                ctx.stroke();
            } else {
                // Default single barrel
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(tx, ty);
                ctx.lineTo(tx + Math.cos(aimAngle) * 14, ty + Math.sin(aimAngle) * 14);
                ctx.stroke();
            }
            // HP indicator on turret
            const hpPctT = turret.hp / turret.maxHp;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(tx - 10, ty + 11, 20, 3);
            ctx.fillStyle = hpPctT > 0.5 ? 'rgba(0,255,100,0.8)' : hpPctT > 0.25 ? 'rgba(255,200,0,0.8)' : 'rgba(255,50,50,0.8)';
            ctx.fillRect(tx - 10, ty + 11, 20 * hpPctT, 3);
            ctx.shadowBlur = 0;
            ctx.restore();
        } else {
            // Destroyed turret - smoking wreckage
            ctx.fillStyle = 'rgba(40,35,35,0.6)';
            ctx.fillRect(tx - 6, ty - 6, 12, 12);
            ctx.strokeStyle = 'rgba(80,60,50,0.4)';
            ctx.lineWidth = 1;
            ctx.strokeRect(tx - 6, ty - 6, 12, 12);
            if (Math.random() < 0.15) {
                particles.push({ x: tx + (Math.random()-0.5)*8, y: ty, vx: (Math.random()-0.5)*1.5, vy: -1 - Math.random(), life: 15, maxLife: 15, r: 100, g: 80, b: 60, size: 2 + Math.random() * 2 });
            }
        }
    }

    // Draw laser beam
    if (b.laserFiring) {
        const lx = b.x - b.size * 0.5;
        const ly = b.y;
        const endX = lx + Math.cos(b.laserAngle) * W;
        const endY = ly + Math.sin(b.laserAngle) * W;
        // Outer beam glow
        ctx.save();
        ctx.strokeStyle = `rgba(255,30,30,${0.15 + Math.random() * 0.1})`;
        ctx.lineWidth = 20;
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        // Mid beam
        ctx.strokeStyle = `rgba(255,100,50,${0.4 + Math.random() * 0.2})`;
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        // Core beam
        ctx.strokeStyle = `rgba(255,220,200,${0.8 + Math.random() * 0.2})`;
        ctx.lineWidth = 3;
        ctx.shadowColor = '#ff3300';
        ctx.shadowBlur = 25;
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
    } else if (b.laserChargeTimer > 0) {
        // Charging indicator - pulsing red line showing where laser will fire
        const lx = b.x - b.size * 0.5;
        const ly = b.y;
        const endX = lx + Math.cos(b.laserAngle) * W;
        const endY = ly + Math.sin(b.laserAngle) * W;
        const chargePulse = 0.2 + Math.sin(gameTime * 0.3) * 0.15;
        ctx.save();
        ctx.setLineDash([8, 8]);
        ctx.strokeStyle = `rgba(255,50,50,${chargePulse})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        ctx.setLineDash([]);
        // Charging glow at source
        ctx.beginPath();
        ctx.arc(lx, ly, 8 + Math.sin(gameTime * 0.2) * 4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,50,30,${chargePulse * 1.5})`;
        ctx.fill();
        ctx.restore();
    }

    // Warning banner during entry
    if (bossWarningTimer > 0) {
        const wa = Math.min(1, bossWarningTimer / 30);
        const flash = Math.floor(gameTime / 8) % 2;
        if (flash) {
            ctx.fillStyle = `rgba(255,20,20,${wa * 0.08})`;
            ctx.fillRect(0, 0, W, H);
        }
    }
}

function drawAllyShips() {
    for (const ally of allyShips) {
        ctx.save();
        ctx.translate(ally.x, ally.y);
        const typeColors = { scout: [100,200,255], gunner: [255,150,50], medic: [100,255,150] };
        const c = typeColors[ally.type] || [100,200,255];
        ctx.shadowColor = `rgb(${c[0]},${c[1]},${c[2]})`;
        ctx.shadowBlur = 10;
        // Ship shape (smaller friendly ship)
        const s = 12;
        ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},0.8)`;
        ctx.lineWidth = 1.5;
        ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},0.15)`;
        ctx.beginPath();
        ctx.moveTo(s, 0);
        ctx.lineTo(-s * 0.5, -s * 0.6);
        ctx.lineTo(-s * 0.3, 0);
        ctx.lineTo(-s * 0.5, s * 0.6);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        // Type indicator
        ctx.font = '8px Orbitron';
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},0.6)`;
        const label = ally.type === 'scout' ? 'S' : ally.type === 'gunner' ? 'G' : 'M';
        ctx.fillText(label, 0, -s - 4);
        ctx.shadowBlur = 0;
        ctx.restore();
        // HP bar
        if (ally.hp < ally.maxHp) {
            const barW = 20;
            const barH = 2;
            const barX = ally.x - barW / 2;
            const barY = ally.y + 16;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(barX, barY, barW, barH);
            ctx.fillStyle = '#66ff88';
            ctx.fillRect(barX, barY, barW * (ally.hp / ally.maxHp), barH);
        }
    }
}

function drawSpaceTurrets() {
    for (const st of spaceTurrets) {
        ctx.save();
        ctx.translate(st.x, st.y);

        const fr = st.flashTimer > 0 ? 255 : 180;
        const fg = st.flashTimer > 0 ? 255 : 160;
        const fb = st.flashTimer > 0 ? 255 : 120;

        // Base structure
        ctx.save();
        ctx.rotate(st.rotation);
        if (st.shape === 'satellite') {
            // Central body
            ctx.fillStyle = `rgba(${fr},${fg},${fb},0.3)`;
            ctx.fillRect(-8, -8, 16, 16);
            ctx.strokeStyle = `rgba(${fr},${fg},${fb},0.7)`;
            ctx.lineWidth = 1.5;
            ctx.strokeRect(-8, -8, 16, 16);
            // Solar panels
            ctx.fillStyle = `rgba(60,80,${fb+40},0.5)`;
            ctx.fillRect(-st.size, -5, st.size - 10, 10);
            ctx.fillRect(10, -5, st.size - 10, 10);
            ctx.strokeStyle = `rgba(100,120,180,0.4)`;
            ctx.strokeRect(-st.size, -5, st.size - 10, 10);
            ctx.strokeRect(10, -5, st.size - 10, 10);
            // Panel lines
            for (let p = 0; p < 3; p++) {
                const px = -st.size + 5 + p * ((st.size - 10) / 3);
                ctx.beginPath(); ctx.moveTo(px, -5); ctx.lineTo(px, 5); ctx.stroke();
                const px2 = 10 + 5 + p * ((st.size - 10) / 3);
                ctx.beginPath(); ctx.moveTo(px2, -5); ctx.lineTo(px2, 5); ctx.stroke();
            }
        } else if (st.shape === 'station') {
            // Octagonal station
            ctx.beginPath();
            for (let v = 0; v < 8; v++) {
                const a = (v / 8) * Math.PI * 2;
                const r = st.size * 0.7;
                if (v === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
                else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
            }
            ctx.closePath();
            ctx.fillStyle = `rgba(${fr},${fg},${fb},0.15)`;
            ctx.fill();
            ctx.strokeStyle = `rgba(${fr},${fg},${fb},0.6)`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            // Inner ring
            ctx.beginPath();
            ctx.arc(0, 0, st.size * 0.35, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(${fr},${fg},${fb},0.3)`;
            ctx.stroke();
            // Spokes
            for (let s = 0; s < 4; s++) {
                const a = (s / 4) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * st.size * 0.35, Math.sin(a) * st.size * 0.35);
                ctx.lineTo(Math.cos(a) * st.size * 0.65, Math.sin(a) * st.size * 0.65);
                ctx.stroke();
            }
        } else if (st.shape === 'wreck') {
            // Wreck - jagged broken ship
            ctx.beginPath();
            ctx.moveTo(st.size * 0.6, 0);
            ctx.lineTo(st.size * 0.2, -st.size * 0.5);
            ctx.lineTo(-st.size * 0.3, -st.size * 0.6);
            ctx.lineTo(-st.size * 0.5, -st.size * 0.2);
            ctx.lineTo(-st.size * 0.6, st.size * 0.1);
            ctx.lineTo(-st.size * 0.2, st.size * 0.5);
            ctx.lineTo(st.size * 0.3, st.size * 0.4);
            ctx.closePath();
            ctx.fillStyle = `rgba(${fr},${fg},${fb},0.15)`;
            ctx.fill();
            ctx.strokeStyle = `rgba(${fr},${fg},${fb},0.5)`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        } else if (st.shape === 'beacon') {
            // Tall antenna tower
            ctx.strokeStyle = `rgba(${fr},${fg},${fb},0.6)`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -st.size * 0.8);
            ctx.lineTo(0, st.size * 0.8);
            ctx.stroke();
            // Cross beams
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(-st.size * 0.4, -st.size * 0.3);
            ctx.lineTo(st.size * 0.4, -st.size * 0.3);
            ctx.moveTo(-st.size * 0.3, st.size * 0.2);
            ctx.lineTo(st.size * 0.3, st.size * 0.2);
            ctx.stroke();
            // Blinking light on top
            const blink = Math.sin(gameTime * 0.15) > 0 ? 0.8 : 0.2;
            ctx.fillStyle = `rgba(255,50,50,${blink})`;
            ctx.shadowColor = '#ff3333';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(0, -st.size * 0.8, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        } else if (st.shape === 'platform') {
            // Flat gun platform
            ctx.fillStyle = `rgba(${fr},${fg},${fb},0.2)`;
            ctx.fillRect(-st.size * 0.8, -st.size * 0.25, st.size * 1.6, st.size * 0.5);
            ctx.strokeStyle = `rgba(${fr},${fg},${fb},0.6)`;
            ctx.lineWidth = 1.5;
            ctx.strokeRect(-st.size * 0.8, -st.size * 0.25, st.size * 1.6, st.size * 0.5);
            // Deck lines
            ctx.strokeStyle = `rgba(${fr},${fg},${fb},0.25)`;
            ctx.lineWidth = 1;
            for (let d = 0; d < 3; d++) {
                const dx = -st.size * 0.5 + d * st.size * 0.4;
                ctx.beginPath();
                ctx.moveTo(dx, -st.size * 0.25);
                ctx.lineTo(dx, st.size * 0.25);
                ctx.stroke();
            }
            // Side bumpers
            ctx.fillStyle = `rgba(${fr},${fg},${fb},0.35)`;
            ctx.fillRect(-st.size * 0.85, -st.size * 0.15, st.size * 0.1, st.size * 0.3);
            ctx.fillRect(st.size * 0.75, -st.size * 0.15, st.size * 0.1, st.size * 0.3);
        }
        ctx.restore();

        // Turret gun (always aims at player)
        if (ship.alive) {
            const aimAngle = Math.atan2(ship.y - st.y, ship.x - st.x);
            const tColorMap = { cannon: [255,150,50], missile: [255,80,80], laser: [100,200,255], flak: [255,200,80], gatling: [200,255,100], plasma: [180,80,255], mine: [255,120,40], shotgun: [255,180,120] };
            const tColor = tColorMap[st.turretType] || [255,150,50];
            // Gun mount
            ctx.beginPath();
            ctx.arc(0, 0, 6, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${tColor[0]},${tColor[1]},${tColor[2]},0.4)`;
            ctx.fill();
            ctx.strokeStyle = `rgba(${tColor[0]},${tColor[1]},${tColor[2]},0.7)`;
            ctx.lineWidth = 1;
            ctx.stroke();
            // Barrel
            ctx.strokeStyle = `rgba(${tColor[0]},${tColor[1]},${tColor[2]},0.8)`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(aimAngle) * 14, Math.sin(aimAngle) * 14);
            ctx.stroke();
            // Muzzle glow
            ctx.shadowColor = `rgb(${tColor[0]},${tColor[1]},${tColor[2]})`;
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(Math.cos(aimAngle) * 14, Math.sin(aimAngle) * 14, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${tColor[0]},${tColor[1]},${tColor[2]},0.6)`;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // Laser visuals
        if (st.laserFiring) {
            const endX = Math.cos(st.laserAngle) * W - st.x;
            const endY = Math.sin(st.laserAngle) * W;
            ctx.strokeStyle = `rgba(100,200,255,${0.12 + Math.random() * 0.08})`;
            ctx.lineWidth = 14;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(endX, endY); ctx.stroke();
            ctx.strokeStyle = `rgba(150,230,255,${0.4 + Math.random() * 0.2})`;
            ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(endX, endY); ctx.stroke();
            ctx.strokeStyle = `rgba(220,250,255,${0.8})`;
            ctx.lineWidth = 2;
            ctx.shadowColor = '#66ccff';
            ctx.shadowBlur = 15;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(endX, endY); ctx.stroke();
            ctx.shadowBlur = 0;
        } else if (st.laserCharging) {
            const endX = Math.cos(st.laserAngle) * W - st.x;
            const endY = Math.sin(st.laserAngle) * W;
            const pulse = 0.15 + Math.sin(gameTime * 0.3) * 0.1;
            ctx.save();
            ctx.setLineDash([6, 6]);
            ctx.strokeStyle = `rgba(100,200,255,${pulse})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(endX, endY); ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
            // Charge glow
            ctx.beginPath();
            ctx.arc(0, 0, 6 + Math.sin(gameTime * 0.2) * 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(100,200,255,${pulse * 1.5})`;
            ctx.fill();
        }

        ctx.restore();

        // HP bar
        if (st.hp < st.maxHp) {
            const barW = st.size * 2;
            const barH = 3;
            const barX = st.x - barW / 2;
            const barY = st.y - st.size - 8;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(barX, barY, barW, barH);
            const hpPct = st.hp / st.maxHp;
            ctx.fillStyle = hpPct > 0.5 ? '#ccaa66' : '#ff6633';
            ctx.fillRect(barX, barY, barW * hpPct, barH);
        }
    }
}

function drawAllyEncounter() {
    if (!allyEncounter || allyEncounter.rescued) return;
    const e = allyEncounter;
    ctx.save();
    ctx.translate(e.x, e.y);
    // Distress signal pulse
    const pulse = 0.5 + Math.sin(gameTime * 0.15) * 0.5;
    ctx.beginPath();
    ctx.arc(0, 0, 25 + pulse * 10, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,100,100,${pulse * 0.3})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    // Damaged ship
    const c = e.type === 'scout' ? [100,200,255] : e.type === 'gunner' ? [255,150,50] : [100,255,150];
    ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${0.5 + pulse * 0.3})`;
    ctx.lineWidth = 1.5;
    const s = 14;
    ctx.beginPath();
    ctx.moveTo(s, 0);
    ctx.lineTo(-s * 0.5, -s * 0.6);
    ctx.lineTo(-s * 0.3, 0);
    ctx.lineTo(-s * 0.5, s * 0.6);
    ctx.closePath();
    ctx.stroke();
    // SOS label
    ctx.font = '700 9px Orbitron';
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(255,100,100,${pulse})`;
    ctx.fillText('SOS', 0, -22);
    ctx.font = '8px Orbitron';
    ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},0.6)`;
    const typeLabel = e.type.charAt(0).toUpperCase() + e.type.slice(1);
    ctx.fillText(typeLabel, 0, 22);
    ctx.restore();
}

function drawWaveBanner() {
    if (waveBannerTimer <= 0) return;
    const alpha = waveBannerTimer > 100 ? Math.min(1, (120 - waveBannerTimer) / 20) :
                  waveBannerTimer < 20 ? waveBannerTimer / 20 : 1;

    // Cinematic dark stripe behind text
    const stripeH = 70;
    ctx.fillStyle = `rgba(0,0,10,${alpha * 0.6})`;
    ctx.fillRect(0, H/2 - stripeH/2 - 10, W, stripeH);
    // Top/bottom lines
    ctx.strokeStyle = `rgba(0,200,255,${alpha * 0.4})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, H/2 - stripeH/2 - 10);
    ctx.lineTo(W, H/2 - stripeH/2 - 10);
    ctx.moveTo(0, H/2 + stripeH/2 - 10);
    ctx.lineTo(W, H/2 + stripeH/2 - 10);
    ctx.stroke();

    // Determine text color
    const isWarning = waveBannerText.includes('WARNING') || waveBannerText.includes('ENRAGED') || waveBannerText.includes('INCOMING');
    const isNewEnemy = waveBannerText.includes('NEW ENEMY');
    const textColor = isWarning ? [255, 60, 60] : isNewEnemy ? [255, 200, 50] : [0, 200, 255];

    ctx.font = '900 32px Orbitron';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(${textColor[0]},${textColor[1]},${textColor[2]},${alpha * 0.9})`;
    ctx.shadowColor = `rgb(${textColor[0]},${textColor[1]},${textColor[2]})`;
    ctx.shadowBlur = 30;
    ctx.fillText(waveBannerText, W / 2, H / 2 - 20);
    // Subtle text outline for readability
    ctx.strokeStyle = `rgba(${textColor[0]},${textColor[1]},${textColor[2]},${alpha * 0.3})`;
    ctx.lineWidth = 1;
    ctx.strokeText(waveBannerText, W / 2, H / 2 - 20);
    if (betweenWaves) {
        ctx.font = '700 12px Orbitron';
        ctx.fillStyle = `rgba(150, 200, 240, ${alpha * 0.6})`;
        ctx.shadowBlur = 10;
        ctx.fillText('PRESS TAB FOR SHOP', W / 2, H / 2 + 15);
    }
    ctx.shadowBlur = 0;
}

function drawPauseOverlay() {
    ctx.fillStyle = 'rgba(2, 2, 12, 0.7)';
    ctx.fillRect(0, 0, W, H);
    // Scanline effect
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    for (let y = 0; y < H; y += 3) {
        ctx.fillRect(0, y, W, 1);
    }
    // Centered pause box
    const boxW = 240, boxH = 80;
    ctx.fillStyle = 'rgba(5,5,25,0.9)';
    ctx.strokeStyle = 'rgba(0,200,255,0.3)';
    ctx.lineWidth = 1;
    ctx.fillRect(W/2 - boxW/2, H/2 - boxH/2, boxW, boxH);
    ctx.strokeRect(W/2 - boxW/2, H/2 - boxH/2, boxW, boxH);
    ctx.font = '900 28px Orbitron';
    ctx.fillStyle = 'rgba(0, 200, 255, 0.9)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = '#00c8ff';
    ctx.shadowBlur = 30;
    ctx.fillText('PAUSED', W / 2, H / 2 - 5);
    ctx.font = '700 10px Orbitron';
    ctx.fillStyle = 'rgba(150,200,240,0.5)';
    ctx.shadowBlur = 0;
    ctx.fillText('PRESS P TO RESUME', W / 2, H / 2 + 20);
}

function drawShockwaves() {
    for (let i = shockwaves.length - 1; i >= 0; i--) {
        const sw = shockwaves[i];
        sw.radius += (sw.maxRadius - sw.radius) * 0.15;
        sw.life -= 0.04;
        if (sw.life <= 0) { shockwaves.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${sw.r},${sw.g},${sw.b},${sw.life * 0.5})`;
        ctx.lineWidth = 2 + sw.life * 3;
        ctx.stroke();
        // Inner ring
        ctx.beginPath();
        ctx.arc(sw.x, sw.y, sw.radius * 0.7, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${sw.life * 0.2})`;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
}

function drawVignette() {
    const grad = ctx.createRadialGradient(W/2, H/2, W * 0.3, W/2, H/2, W * 0.75);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.7, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,10,0.55)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
}

function drawDamageFlash() {
    if (damageFlash > 0) {
        const alpha = (damageFlash / 15) * 0.3;
        ctx.fillStyle = `rgba(255,20,20,${alpha})`;
        ctx.fillRect(0, 0, W, H);
        damageFlash--;
    }
}

let bloomFrame = 0;
function drawBloom() {
    // Lightweight bloom every other frame for performance
    bloomFrame++;
    if (bloomFrame % 2 !== 0) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.06;
    ctx.drawImage(canvas, 0, 0, W, H);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
}

function draw(t) {
    ctx.clearRect(0, 0, W, H);
    if (!running) return;

    ctx.save();
    if (screenShake > 0.5) {
        ctx.translate(
            (Math.random() - 0.5) * screenShake * 2,
            (Math.random() - 0.5) * screenShake * 2
        );
    }

    drawEngineTrail();
    drawPickups();
    drawAsteroids();
    drawSpaceTurrets();
    drawSupplyCrates();
    drawCheckpointPlanet();
    drawEnemies();
    drawShockwaves();
    drawEnemyBullets();
    drawBullets();
    drawShip(t);
    drawWingmen();
    drawAllyShips();
    drawAllyEncounter();
    drawParticles();
    drawFloatingTexts();
    drawWaveBanner();

    ctx.restore();

    // Post-processing
    drawBloom();
    drawVignette();
    drawDamageFlash();

    // Draw boss HUD outside screen shake
    drawBossHPBar();

    if (paused) drawPauseOverlay();
}

// ==================== MAIN LOOP ====================
function gameLoop(t) {
    drawBg(t);
    update();
    draw(t);
    requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
