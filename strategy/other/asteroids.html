<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Cosmic Blitz</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #050510;
    overflow: hidden;
    font-family: 'Orbitron', 'Segoe UI', sans-serif;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
}
#bgCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
canvas#gameCanvas {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1;
}
#ui-overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    z-index: 10; pointer-events: none;
}
.panel {
    background: rgba(5, 5, 20, 0.94);
    border: 1px solid rgba(0, 200, 255, 0.25);
    border-radius: 20px;
    padding: 28px 36px;
    pointer-events: all;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 60px rgba(0, 150, 255, 0.12), inset 0 0 60px rgba(0, 100, 200, 0.04);
    max-height: 92vh;
    overflow-y: auto;
    text-align: center;
}
.hidden { display: none !important; }
h1 {
    font-size: 32px; font-weight: 900; letter-spacing: 5px; margin-bottom: 4px;
    text-shadow: 0 0 30px rgba(0, 180, 255, 0.8), 0 0 60px rgba(0, 120, 255, 0.4);
}
h2 {
    font-size: 18px; font-weight: 700; letter-spacing: 4px; margin-bottom: 14px;
    text-shadow: 0 0 20px rgba(0, 180, 255, 0.5);
}
.subtitle {
    color: rgba(120, 180, 220, 0.7); font-size: 10px; margin-bottom: 18px;
    letter-spacing: 3px; text-transform: uppercase;
}
.btn {
    display: block; width: 200px; margin: 6px auto; padding: 12px 0;
    font-size: 13px; font-weight: 700; border: none; border-radius: 10px;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.25s, filter 0.25s;
    color: #fff; letter-spacing: 2px; text-transform: uppercase;
    position: relative; overflow: hidden;
    font-family: 'Orbitron', sans-serif;
}
.btn::after {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.4s;
}
.btn:hover::after { left: 100%; }
.btn:hover { transform: scale(1.05); filter: brightness(1.15); }
.btn:active { transform: scale(0.97); }
.btn-play {
    background: linear-gradient(135deg, #00e676, #00c853);
    box-shadow: 0 4px 20px rgba(0,230,118,0.3);
}
.btn-shop {
    background: linear-gradient(135deg, #ff9800, #f57c00);
    box-shadow: 0 4px 20px rgba(255,152,0,0.3);
}
.btn-settings {
    background: linear-gradient(135deg, #7c4dff, #651fff);
    box-shadow: 0 4px 20px rgba(124,77,255,0.3);
}
.btn-back {
    background: linear-gradient(135deg, #546e7a, #37474f);
    box-shadow: 0 4px 20px rgba(84,110,122,0.2);
    width: 160px; margin-top: 14px;
}
.btn-restart {
    background: linear-gradient(135deg, #d500f9, #aa00ff);
    box-shadow: 0 4px 20px rgba(213,0,249,0.3);
    margin-top: 14px;
}
.controls-grid {
    text-align: left; margin: 10px 0; padding: 0 10px;
}
.controls-grid div {
    color: rgba(200,220,240,0.7); font-size: 10px; letter-spacing: 1px;
    padding: 4px 0; display: flex; justify-content: space-between; gap: 20px;
}
.controls-grid .key {
    color: rgba(0,200,255,0.8); font-weight: 700;
}
#hud {
    position: fixed; top: 10px; left: 0; right: 0; z-index: 20;
    display: none; justify-content: space-between; align-items: flex-start;
    padding: 0 14px; pointer-events: none;
}
.hud-left, .hud-center, .hud-right {
    pointer-events: all;
}
.hud-left { display: flex; flex-direction: column; gap: 2px; }
.hud-center { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.hud-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.hud-text {
    color: rgba(180,220,255,0.7); font-family: 'Orbitron', sans-serif;
    font-size: 11px; letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0,150,255,0.3);
}
.hud-score {
    font-size: 20px; font-weight: 900; letter-spacing: 3px;
    color: #fff; text-shadow: 0 0 20px rgba(0,180,255,0.6);
}
.hud-btn {
    background: rgba(5,5,20,0.8); border: 1px solid rgba(0,200,255,0.2);
    border-radius: 7px; color: rgba(180,220,255,0.7);
    font-family: 'Orbitron', sans-serif; font-size: 9px;
    padding: 6px 10px; cursor: pointer; letter-spacing: 1px;
    transition: all 0.2s; backdrop-filter: blur(10px);
}
.hud-btn:hover {
    background: rgba(0,100,200,0.3); border-color: rgba(0,200,255,0.5);
}
.hud-row { display: flex; gap: 5px; }
.hud-currency {
    font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 1px;
    text-shadow: 0 0 8px rgba(0,150,255,0.3);
}
.hud-powerups {
    display: flex; gap: 4px; font-size: 10px;
}
#game-over-score {
    color: #fff; font-size: 28px; margin-bottom: 6px; font-weight: 900;
    letter-spacing: 3px; text-shadow: 0 0 30px rgba(0,200,255,0.6);
}
#game-over-highscore {
    color: rgba(150,200,240,0.8); font-size: 14px; margin-bottom: 4px; letter-spacing: 2px;
}
#game-over-wave {
    color: rgba(150,200,240,0.6); font-size: 11px; margin-bottom: 6px; letter-spacing: 2px;
}
#game-over-loot {
    color: rgba(180,220,255,0.7); font-size: 11px; margin-bottom: 12px; letter-spacing: 1px;
    line-height: 1.8;
}
.new-highscore {
    color: #ffab00 !important;
    text-shadow: 0 0 20px rgba(255,171,0,0.6) !important;
}

/* Shop styles */
#shop-panel {
    width: 600px; max-width: 95vw; padding: 20px 24px;
}
.shop-header {
    display: flex; justify-content: center; gap: 8px; margin-bottom: 6px;
}
.shop-currency {
    font-size: 12px; letter-spacing: 1px; padding: 4px 10px;
    border-radius: 8px; background: rgba(0,0,0,0.3);
}
.shop-tabs {
    display: flex; gap: 4px; margin-bottom: 12px; justify-content: center;
}
.shop-tab {
    background: rgba(30,30,60,0.6); border: 1px solid rgba(0,200,255,0.15);
    border-radius: 8px 8px 0 0; padding: 8px 16px; cursor: pointer;
    font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 1px;
    color: rgba(150,180,210,0.7); transition: all 0.2s; font-weight: 700;
}
.shop-tab:hover { background: rgba(0,80,150,0.3); }
.shop-tab.active {
    background: rgba(0,100,200,0.25); border-color: rgba(0,200,255,0.4);
    color: #fff; text-shadow: 0 0 10px rgba(0,200,255,0.5);
}
.shop-items {
    max-height: 55vh; overflow-y: auto; padding-right: 4px;
}
.shop-items::-webkit-scrollbar { width: 4px; }
.shop-items::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.2); border-radius: 2px; }
.shop-item {
    display: flex; align-items: center; gap: 12px;
    background: rgba(10,10,30,0.6); border: 1px solid rgba(0,200,255,0.1);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 6px;
    transition: all 0.2s;
}
.shop-item:hover { border-color: rgba(0,200,255,0.3); background: rgba(10,20,40,0.7); }
.shop-item-icon {
    font-size: 24px; width: 40px; text-align: center; flex-shrink: 0;
}
.shop-item-info {
    flex: 1; text-align: left;
}
.shop-item-name {
    font-size: 12px; font-weight: 700; letter-spacing: 1px; margin-bottom: 2px;
}
.shop-item-desc {
    font-size: 9px; color: rgba(150,180,210,0.6); letter-spacing: 0.5px; margin-bottom: 4px;
}
.shop-item-level {
    display: flex; gap: 3px; align-items: center;
}
.level-pip {
    width: 14px; height: 5px; border-radius: 2px; background: rgba(40,40,80,0.8);
    border: 1px solid rgba(0,200,255,0.15);
}
.level-pip.filled {
    background: rgba(0,200,255,0.6); border-color: rgba(0,200,255,0.8);
    box-shadow: 0 0 4px rgba(0,200,255,0.4);
}
.shop-item-btn {
    font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700;
    padding: 6px 14px; border: none; border-radius: 7px; cursor: pointer;
    letter-spacing: 1px; transition: all 0.2s; flex-shrink: 0; color: #fff;
}
.shop-item-btn.buy {
    background: linear-gradient(135deg, #00e676, #00c853);
    box-shadow: 0 2px 10px rgba(0,230,118,0.2);
}
.shop-item-btn.buy:hover { filter: brightness(1.2); transform: scale(1.05); }
.shop-item-btn.equip {
    background: linear-gradient(135deg, #2196f3, #1976d2);
    box-shadow: 0 2px 10px rgba(33,150,243,0.2);
}
.shop-item-btn.equip:hover { filter: brightness(1.2); transform: scale(1.05); }
.shop-item-btn.equipped {
    background: rgba(0,200,255,0.15); border: 1px solid rgba(0,200,255,0.3);
    cursor: default;
}
.shop-item-btn.maxed {
    background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.3);
    color: rgba(255,215,0,0.8); cursor: default;
}
.shop-item-btn.locked {
    background: rgba(80,80,80,0.3); border: 1px solid rgba(80,80,80,0.3);
    color: rgba(150,150,150,0.5); cursor: not-allowed;
}
@keyframes shieldPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
}
@keyframes scorePopIn {
    0% { transform: scale(1.4); color: #ffcc00; }
    100% { transform: scale(1); color: #fff; }
}
.score-pop {
    animation: scorePopIn 0.2s ease-out;
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<canvas id="gameCanvas"></canvas>

<div id="hud">
    <div class="hud-left">
        <div class="hud-score" id="hud-score">0</div>
        <div id="hud-shield"></div>
        <div class="hud-text" id="hud-stage" style="color:#ffcc33;font-size:11px;"></div>
        <div class="hud-text" id="hud-wave"></div>
    </div>
    <div class="hud-center">
        <div id="hud-wave-banner" style="display:none;"></div>
    </div>
    <div class="hud-right">
        <div class="hud-row">
            <span class="hud-currency" id="hud-scrap" style="color:#66ff88;">⬡ 0</span>
            <span class="hud-currency" id="hud-crystals" style="color:#44aaff;">◆ 0</span>
        </div>
        <div class="hud-powerups" id="hud-powerups"></div>
        <div class="hud-text" id="hud-bombs"></div>
        <div class="hud-row">
            <button class="hud-btn" id="pause-btn" onclick="togglePause()">PAUSE</button>
            <button class="hud-btn" onclick="openShopFromGame()">SHOP</button>
            <button class="hud-btn" onclick="showMenu()">MENU</button>
        </div>
    </div>
</div>

<div id="ui-overlay">
    <div id="menu" class="panel">
        <h1>COSMIC BLITZ</h1>
        <p class="subtitle">Destroy. Loot. Upgrade. Repeat.</p>
        <button class="btn btn-play" onclick="startGame()">PLAY</button>
        <button class="btn btn-shop" onclick="openShop()">ARMORY</button>
        <button class="btn btn-settings" onclick="showSettings()">CONTROLS</button>
        <button class="btn" style="background:#ff4444;margin-top:12px;font-size:13px;padding:8px 20px;" onclick="if(confirm('Reset all progress? This cannot be undone.')){localStorage.removeItem('alien-shooter-save');location.reload();}">RESET PROGRESS</button>
    </div>

    <div id="settings" class="panel hidden">
        <h2>CONTROLS</h2>
        <div class="controls-grid">
            <div><span>Move Up</span><span class="key">W / UP</span></div>
            <div><span>Move Down</span><span class="key">S / DOWN</span></div>
            <div><span>Move Left</span><span class="key">A / LEFT</span></div>
            <div><span>Move Right</span><span class="key">D / RIGHT</span></div>
            <div><span>Shoot</span><span class="key">AUTO</span></div>
            <div><span>Mega Bomb</span><span class="key">B</span></div>
            <div><span>Shop (between waves)</span><span class="key">TAB</span></div>
            <div><span>Pause</span><span class="key">P / ESC</span></div>
        </div>
        <button class="btn btn-back" onclick="showMenu()">BACK</button>
    </div>

    <div id="game-over" class="panel hidden">
        <h2>GAME OVER</h2>
        <div id="game-over-score"></div>
        <div id="game-over-highscore"></div>
        <div id="game-over-wave"></div>
        <div id="game-over-loot"></div>
        <button class="btn btn-restart" onclick="startGame()">PLAY AGAIN</button>
        <button class="btn btn-shop" onclick="openShopFromGameOver()">ARMORY</button>
        <button class="btn btn-back" onclick="showMenu()">MENU</button>
    </div>

    <div id="shop-panel" class="panel hidden">
        <h2>ARMORY</h2>
        <div class="shop-header">
            <span class="shop-currency" style="color:#66ff88;" id="shop-scrap">⬡ 0</span>
            <span class="shop-currency" style="color:#44aaff;" id="shop-crystals">◆ 0</span>
            <span class="shop-currency" style="color:#cc77ff;" id="shop-parts">⚙ 0</span>
        </div>
        <div class="shop-tabs">
            <button class="shop-tab active" onclick="switchShopTab('weapons')">WEAPONS</button>
            <button class="shop-tab" onclick="switchShopTab('upgrades')">UPGRADES</button>
            <button class="shop-tab" onclick="switchShopTab('powerups')">POWERUPS</button>
            <button class="shop-tab" onclick="switchShopTab('allies')">ALLIES</button>
            <button class="shop-tab" onclick="switchShopTab('skins')">SKINS</button>
        </div>
        <div class="shop-items" id="shop-items"></div>
        <button class="btn btn-back" onclick="closeShop()">BACK</button>
    </div>
</div>

<script>
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hudEl = document.getElementById('hud');

let W, H;

// ==================== SAVE SYSTEM ====================
const SAVE_KEY = 'alien-shooter-save';
const defaultSave = () => ({
    scrap: 0, crystals: 0, parts: 0,
    weaponUnlocks: { pulse: true, spread: false, plasma: false, railgun: false, wave: false, shotgun: false, dual: false, homing: false, laser: false, flak: false, crescent: false, nova: false },
    equippedWeapons: ['pulse'],
    upgradeLevels: { firepower: 0, fireRate: 0, shield: 0, engine: 0, magnet: 0, scrapBonus: 0, critChance: 0, armor: 0, regen: 0, crystalBonus: 0, weaponSlots: 0 },
    powerupUnlocks: { bomb: false, bubble: false, wingmen: false, overdrive: false, scrapStorm: false, timeWarp: false, superNova: false, ghostMode: false, doubleScrap: false, healPack: false },
    skinUnlocks: { cyan: true, crimson: false, emerald: false, solar: false, phantom: false, arctic: false, inferno: false, toxic: false, nebula: false, midnight: false, plasma: false, rainbow: false },
    equippedSkin: 'cyan',
    allyUpgrades: { allyFirepower: 0, allyArmor: 0, allySpeed: 0 },
    highScore: 0, highWave: 0
});

let saveData;
function loadSave() {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (raw) {
            const parsed = JSON.parse(raw);
            const def = defaultSave();
            // Merge with defaults for forward compatibility
            saveData = {
                scrap: parsed.scrap ?? def.scrap,
                crystals: parsed.crystals ?? def.crystals,
                parts: parsed.parts ?? def.parts,
                weaponUnlocks: { ...def.weaponUnlocks, ...parsed.weaponUnlocks },
                equippedWeapons: Array.isArray(parsed.equippedWeapons) ? parsed.equippedWeapons : (parsed.equippedWeapon ? [parsed.equippedWeapon] : def.equippedWeapons),
                upgradeLevels: { ...def.upgradeLevels, ...parsed.upgradeLevels },
                powerupUnlocks: { ...def.powerupUnlocks, ...parsed.powerupUnlocks },
                skinUnlocks: { ...def.skinUnlocks, ...parsed.skinUnlocks },
                equippedSkin: parsed.equippedSkin ?? def.equippedSkin,
                allyUpgrades: { ...def.allyUpgrades, ...(parsed.allyUpgrades || {}) },
                highScore: parsed.highScore ?? def.highScore,
                highWave: parsed.highWave ?? def.highWave
            };
        } else {
            saveData = defaultSave();
        }
    } catch (e) {
        saveData = defaultSave();
    }
}
function writeSave() {
    localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
}
loadSave();

// ==================== DEFINITIONS ====================
const WEAPONS = {
    pulse:    { name: 'Pulse Cannon', desc: 'Reliable single shot', delay: 8, damage: 10, pattern: 'single', icon: '🔫', costParts: 0, costScrap: 0, bulletColor: [255,50,50] },
    spread:   { name: 'Spread Shot', desc: '3-way cone of fire', delay: 12, damage: 7, pattern: 'spread', icon: '🔱', costParts: 3, costScrap: 500, bulletColor: [255,60,40] },
    plasma:   { name: 'Plasma Lance', desc: 'Rapid fire, short range', delay: 3, damage: 4, pattern: 'rapid', icon: '⚡', costParts: 5, costScrap: 1000, bulletColor: [255,40,40] },
    railgun:  { name: 'Railgun', desc: 'Slow but devastating pierce', delay: 30, damage: 50, pattern: 'pierce', icon: '🎯', costParts: 8, costScrap: 2000, bulletColor: [255,70,70] },
    wave:     { name: 'Wave Emitter', desc: 'Sine-wave projectiles', delay: 10, damage: 8, pattern: 'wave', icon: '🌊', costParts: 10, costScrap: 3000, bulletColor: [255,50,50] },
    shotgun:  { name: 'Shotgun Blast', desc: '5 pellets, short range', delay: 20, damage: 5, pattern: 'shotgun', icon: '💨', costParts: 6, costScrap: 1200, bulletColor: [255,60,40] },
    dual:     { name: 'Dual Cannons', desc: 'Two parallel shots', delay: 7, damage: 8, pattern: 'dual', icon: '⚔️', costParts: 4, costScrap: 800, bulletColor: [255,50,50] },
    homing:   { name: 'Homing Missiles', desc: 'Launches 2 missiles every 2s', delay: 120, damage: 35, pattern: 'homing', icon: '🚀', costParts: 12, costScrap: 4000, bulletColor: [255,70,40] },
    laser:    { name: 'Laser Beam', desc: 'Powerful beam burst, then cooldown', delay: 45, damage: 4, pattern: 'laser', icon: '🔴', costParts: 15, costScrap: 5000, bulletColor: [255,30,30] },
    flak:     { name: 'Flak Cannon', desc: 'Explodes near enemies', delay: 15, damage: 12, pattern: 'flak', icon: '💥', costParts: 10, costScrap: 3500, bulletColor: [255,60,30] },
    crescent: { name: 'Crescent Blade', desc: 'Arcing energy blade', delay: 14, damage: 15, pattern: 'crescent', icon: '🌙', costParts: 8, costScrap: 2500, bulletColor: [255,40,50] },
    nova:     { name: 'Nova Cannon', desc: 'Charged radial burst', delay: 40, damage: 20, pattern: 'nova', icon: '🌟', costParts: 18, costScrap: 6000, bulletColor: [255,50,40] }
};

const UPGRADES = {
    firepower:    { name: 'Firepower', desc: '+15% damage per level', maxLv: 10, baseCost: 100, costMult: 1.5, icon: '💥' },
    fireRate:     { name: 'Fire Rate', desc: '+12% fire speed per level', maxLv: 10, baseCost: 120, costMult: 1.5, icon: '🔥' },
    shield:       { name: 'Shield', desc: '+1 max HP per level', maxLv: 10, baseCost: 200, costMult: 1.8, icon: '🛡️' },
    engine:       { name: 'Engine', desc: '+15% move speed per level', maxLv: 5, baseCost: 150, costMult: 2.0, icon: '🚀' },
    magnet:       { name: 'Magnet', desc: '+40px range/lv, LV6=full screen', maxLv: 6, baseCost: 100, costMult: 1.8, icon: '🧲' },
    scrapBonus:   { name: 'Scrap Bonus', desc: '+20% scrap drops per level', maxLv: 5, baseCost: 200, costMult: 2.0, icon: '💰' },
    critChance:   { name: 'Critical Hit', desc: '+5% crit chance per level (2x dmg)', maxLv: 10, baseCost: 150, costMult: 1.6, icon: '⚡' },
    armor:        { name: 'Armor Plating', desc: '10% chance to ignore damage/lv', maxLv: 5, baseCost: 300, costMult: 2.0, icon: '🔩' },
    regen:        { name: 'Auto Repair', desc: 'Heal 1 HP every 30s (-3s/lv)', maxLv: 5, baseCost: 400, costMult: 2.2, icon: '🔧' },
    crystalBonus: { name: 'Crystal Finder', desc: '+25% crystal drop chance/lv', maxLv: 5, baseCost: 250, costMult: 2.0, icon: '💎' },
    weaponSlots:  { name: 'Weapon Slots', desc: '+1 equipped weapon slot per level', maxLv: 7, baseCost: 5000, costMult: 2.5, icon: '🔰' }
};

const POWERUPS = {
    bomb:       { name: 'Mega Bomb', desc: 'Press B to clear screen (hold 3)', cost: 10, icon: '💣' },
    bubble:     { name: 'Shield Bubble', desc: '5s invulnerability', cost: 15, icon: '🔮' },
    wingmen:    { name: 'Wingmen', desc: 'AI helper ships for 10s', cost: 20, icon: '✈️' },
    overdrive:  { name: 'Overdrive', desc: '2x fire rate for 6s', cost: 25, icon: '⚡' },
    scrapStorm: { name: 'Scrap Storm', desc: 'Pull all pickups for 3s', cost: 12, icon: '🌪️' },
    timeWarp:   { name: 'Time Warp', desc: 'Slow all enemies for 8s', cost: 18, icon: '⏳' },
    superNova:  { name: 'Supernova', desc: 'Damage all enemies on screen', cost: 30, icon: '☀️' },
    ghostMode:  { name: 'Ghost Mode', desc: 'Phase through enemies 5s', cost: 22, icon: '👻' },
    doubleScrap:{ name: 'Double Scrap', desc: '2x scrap for 15s', cost: 15, icon: '🤑' },
    healPack:   { name: 'Repair Kit', desc: 'Restore 3 shield HP', cost: 20, icon: '💚' }
};

const SKINS = {

// ==================== SOUND EFFECTS ====================
let audioCtx = null;
const soundCooldowns = {};
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
    if (!audioCtx) return;
    // Throttle sounds to prevent audio overload
    const now = performance.now();
    const minGap = type === 'shoot' ? 80 : type === 'hit' ? 50 : type === 'pickup' ? 100 : type === 'explosion' ? 60 : 30;
    if (soundCooldowns[type] && now - soundCooldowns[type] < minGap) return;
    soundCooldowns[type] = now;
    const ctx = audioCtx;
    const t = ctx.currentTime;
    const gain = ctx.createGain();
    gain.connect(ctx.destination);

    if (type === 'shoot') {
        const osc = ctx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, t);
        osc.frequency.exponentialRampToValueAtTime(200, t + 0.08);
        gain.gain.setValueAtTime(0.08, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
        osc.connect(gain);
        osc.start(t);
        osc.stop(t + 0.08);
    } else if (type === 'hit') {
        const osc = ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, t);
        osc.frequency.exponentialRampToValueAtTime(80, t + 0.1);
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.connect(gain);
        osc.start(t);
        osc.stop(t + 0.1);
    } else if (type === 'explosion') {
        // Noise-based explosion
        const bufferSize = ctx.sampleRate * 0.2;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        gain.gain.setValueAtTime(0.15, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        noise.connect(gain);
        noise.start(t);
    } else if (type === 'pickup') {
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(500, t);
        osc.frequency.exponentialRampToValueAtTime(1200, t + 0.1);
        gain.gain.setValueAtTime(0.08, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        osc.connect(gain);
        osc.start(t);
        osc.stop(t + 0.12);
    } else if (type === 'damage') {
        const osc = ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, t);
        osc.frequency.exponentialRampToValueAtTime(50, t + 0.25);
        gain.gain.setValueAtTime(0.15, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        osc.connect(gain);
        osc.start(t);
        osc.stop(t + 0.25);
    } else if (type === 'powerup') {
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, t);
        osc.frequency.exponentialRampToValueAtTime(1600, t + 0.2);
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        osc.connect(gain);
        osc.start(t);
        osc.stop(t + 0.25);
    } else if (type === 'death') {
        const osc = ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, t);
        osc.frequency.exponentialRampToValueAtTime(30, t + 0.6);
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
        osc.connect(gain);
        osc.start(t);
        osc.stop(t + 0.6);
    } else if (type === 'bomb') {
        const bufferSize = ctx.sampleRate * 0.5;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        gain.gain.setValueAtTime(0.25, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        noise.connect(gain);
        noise.start(t);
    }
}

function initBg() {
    starLayers = [];
    const counts = [500, 250, 100];
    const speeds = [0.15, 0.4, 0.75];
    const sizes = [[0.5, 1.5], [1.0, 2.8], [2.2, 4.0]];
    const alphas = [0.6, 0.85, 1.0];
    for (let l = 0; l < 3; l++) {
        const layer = [];
        for (let i = 0; i < counts[l]; i++) {
            const colorRoll = Math.random();
            let sr, sg, sb;
            if (colorRoll < 0.5) { sr = 180; sg = 210; sb = 255; }
            else if (colorRoll < 0.7) { sr = 255; sg = 220; sb = 160; }
            else if (colorRoll < 0.8) { sr = 255; sg = 150; sb = 150; }
            else if (colorRoll < 0.9) { sr = 200; sg = 255; sb = 220; }
            else { sr = 255; sg = 255; sb = 255; }
            layer.push({
                x: Math.random() * W * 2, y: Math.random() * H,
                r: sizes[l][0] + Math.random() * (sizes[l][1] - sizes[l][0]),
                a: alphas[l] * (0.5 + Math.random() * 0.5),
                phase: Math.random() * Math.PI * 2,
                twinkleSpeed: 0.5 + Math.random() * 2,
                sr, sg, sb
            });
        }
        starLayers.push({ stars: layer, speed: speeds[l] });
    }
    nebulae = [];
    const nebulaColors = [[60, 10, 120], [10, 40, 120], [120, 10, 60], [10, 80, 90], [80, 30, 10], [20, 60, 100]];
    for (let i = 0; i < 8; i++) {

        nebulae.push({
            x: Math.random() * W * 2, y: Math.random() * H,
            rx: 200 + Math.random() * 350, ry: 120 + Math.random() * 200,
            r: c[0], g: c[1], b: c[2],
            a: 0.08 + Math.random() * 0.1,
            speed: 0.08 + Math.random() * 0.15
        });
    }
    // Distant planets/moons
    bgPlanets = [];
    bgPlanets.push({
        x: W * 0.15 + Math.random() * W * 0.3, y: H * 0.15 + Math.random() * H * 0.25,

        speed: 0.03
    });
    shootingStars = [];

    cosmicDust = [];
    for (let i = 0; i < 400; i++) {
        cosmicDust.push({
            x: Math.random() * W * 2, y: Math.random() * H,
            r: 0.2 + Math.random() * 0.5,
            a: 0.1 + Math.random() * 0.2,
            speed: 0.02 + Math.random() * 0.08,
            color: Math.random() < 0.5 ? [100, 120, 180] : (Math.random() < 0.5 ? [140, 100, 160] : [80, 140, 150])
        });
    }
    // Distant spiral galaxy
    distantGalaxy = {
        x: W * 0.7 + Math.random() * W * 0.4,
        y: H * 0.2 + Math.random() * H * 0.2,
        size: 60 + Math.random() * 40,
        angle: Math.random() * Math.PI * 2,

    // Floating space debris/asteroids in far background

        });
    }
}

}

    if (saveData.upgradeLevels.magnet >= 6) return 9999;
    return 60 + saveData.upgradeLevels.magnet * 40;
}

function getScrapMultiplier() {
    return 1 + saveData.upgradeLevels.scrapBonus * 0.2;
}

function getUpgradeCost(key) {
    const u = UPGRADES[key];
    const lv = saveData.upgradeLevels[key];
    if (lv >= u.maxLv) return Infinity;
    if (key === 'magnet' && lv === 5) return 10000;
    return Math.floor(u.baseCost * Math.pow(u.costMult, lv));
}

        for (const [key, w] of Object.entries(WEAPONS)) {

            const equipped = saveData.equippedWeapons.includes(key);
            const canAfford = saveData.scrap >= w.costScrap && saveData.parts >= w.costParts;
            const extraPartsForScrap = Math.ceil(w.costScrap / PARTS_TO_SCRAP);

function shopWeaponWithParts(key) {
    const w = WEAPONS[key];
    if (saveData.weaponUnlocks[key]) return;
    const extraParts = Math.ceil(w.costScrap / PARTS_TO_SCRAP);
    const totalParts = w.costParts + extraParts;
    if (saveData.parts >= totalParts) {
        saveData.parts -= totalParts;
        saveData.weaponUnlocks[key] = true;
        // Auto-equip if there's a free slot
        if (saveData.equippedWeapons.length < getMaxWeaponSlots()) {
            saveData.equippedWeapons.push(key);
        }
        writeSave();
        renderShop();
    }
}

function shopWeaponAction(key) {
    if (saveData.weaponUnlocks[key]) {
        const idx = saveData.equippedWeapons.indexOf(key);
        if (idx !== -1) {
            // Unequip (but must keep at least 1 weapon)
            if (saveData.equippedWeapons.length > 1) {
                saveData.equippedWeapons.splice(idx, 1);
            }
        } else if (saveData.equippedWeapons.length < getMaxWeaponSlots()) {
            // Equip into free slot
            saveData.equippedWeapons.push(key);
        } else {
            // Slots full — replace the last equipped weapon
            saveData.equippedWeapons[saveData.equippedWeapons.length - 1] = key;
        }
    } else {
        const w = WEAPONS[key];
        if (saveData.scrap >= w.costScrap && saveData.parts >= w.costParts) {
            saveData.scrap -= w.costScrap;
            saveData.parts -= w.costParts;
            saveData.weaponUnlocks[key] = true;
            if (saveData.equippedWeapons.length < getMaxWeaponSlots()) {
                saveData.equippedWeapons.push(key);
            }
        }
    }
    writeSave();
    renderShop();
}

function shopUpgradeAction(key) {
    const cost = getUpgradeCost(key);
    if (saveData.scrap >= cost && saveData.upgradeLevels[key] < UPGRADES[key].maxLv) {
        saveData.scrap -= cost;
        saveData.upgradeLevels[key]++;
        writeSave();
        renderShop();
    }
}

function shopPowerupAction(key) {
    const p = POWERUPS[key];
    if (!saveData.powerupUnlocks[key] && saveData.crystals >= p.cost) {
        saveData.crystals -= p.cost;
        saveData.powerupUnlocks[key] = true;
        writeSave();
        renderShop();
    }
}

function shopUpgradeWithParts(key, partsCost) {
    if (saveData.parts >= partsCost && saveData.upgradeLevels[key] < UPGRADES[key].maxLv) {
        saveData.parts -= partsCost;
        saveData.upgradeLevels[key]++;
        writeSave();
        renderShop();
    }
}

function shopAllyUpgradeWithParts(key, partsCost) {
    const maxLv = 5;
    if (saveData.parts >= partsCost && (saveData.allyUpgrades[key] || 0) < maxLv) {
        saveData.parts -= partsCost;
        saveData.allyUpgrades[key] = (saveData.allyUpgrades[key] || 0) + 1;
        writeSave();
        renderShop();
    }
}

function shopAllyUpgradeAction(key, cost) {
    const maxLv = 5;
    if (saveData.scrap >= cost && (saveData.allyUpgrades[key] || 0) < maxLv) {
        saveData.scrap -= cost;
        saveData.allyUpgrades[key] = (saveData.allyUpgrades[key] || 0) + 1;
        writeSave();
        renderShop();
    }
}

function shopSkinAction(key) {
    if (saveData.skinUnlocks[key]) {
        saveData.equippedSkin = key;
    } else {
        const s = SKINS[key];
        if (saveData.crystals >= s.cost) {
            saveData.crystals -= s.cost;
            saveData.skinUnlocks[key] = true;
            saveData.equippedSkin = key;
        }
    }
    writeSave();
    renderShop();
}

// ==================== WAVE SYSTEM ====================
function getWaveComposition(waveNum) {
    // Boss wave every 10 waves
    if (waveNum % 10 === 0 && waveNum > 0) {
        return ['boss'];
    }
    const comp = [];
    // Scouts always — start gentle, scale slowly
    const scoutCount = Math.min(8, 3 + Math.floor(waveNum * 0.5));
    for (let i = 0; i < scoutCount; i++) comp.push('scout');
    // Drones unlocked at wave 4
    if (waveNum >= 4) {
        const droneCount = Math.min(5, Math.floor(1 + (waveNum - 4) * 0.35));
        for (let i = 0; i < droneCount; i++) comp.push('drone');
    }
    // Interceptors from wave 7
    if (waveNum >= 7) {
        const intCount = Math.min(4, Math.floor(1 + (waveNum - 7) * 0.25));
        for (let i = 0; i < intCount; i++) comp.push('interceptor');
    }
    // Fighters from wave 9
    if (waveNum >= 9) {
        const fighterCount = Math.min(4, Math.floor(1 + (waveNum - 9) * 0.3));
        for (let i = 0; i < fighterCount; i++) comp.push('fighter');
    }
    // Bombers from wave 12
    if (waveNum >= 12) {
        const bomberCount = Math.min(3, Math.floor(1 + (waveNum - 12) * 0.2));
        for (let i = 0; i < bomberCount; i++) comp.push('bomber');
    }
    // Gunships from wave 15
    if (waveNum >= 15) {
        const gunshipCount = Math.min(3, Math.floor(1 + (waveNum - 15) * 0.2));
        for (let i = 0; i < gunshipCount; i++) comp.push('gunship');
    }
    // Shielders from wave 18
    if (waveNum >= 18) {
        const shielderCount = Math.min(3, Math.floor(1 + (waveNum - 18) * 0.15));
        for (let i = 0; i < shielderCount; i++) comp.push('shielder');
    }
    // Cruisers from wave 22
    if (waveNum >= 22) {
        const cruiserCount = Math.min(2, Math.floor(1 + (waveNum - 22) * 0.15));
        for (let i = 0; i < cruiserCount; i++) comp.push('cruiser');
    }
    // Dreadnoughts from wave 28
    if (waveNum >= 28) {
        const dreadCount = Math.min(2, Math.floor(1 + (waveNum - 28) * 0.1));
        for (let i = 0; i < dreadCount; i++) comp.push('dreadnought');
    }
    // Elites every 5th wave starting wave 15
    if (waveNum >= 15 && waveNum % 5 === 0) {
        const eliteCount = Math.min(3, Math.floor((waveNum - 10) / 5));
        for (let i = 0; i < eliteCount; i++) comp.push('elite');
    }
    // Adaptive difficulty: mild extra enemies
    const diffMult = getDifficultyMultiplier();
    const lvlMult = getLevelMultiplier();
    const bonusEnemies = Math.floor((diffMult - 1) * 3 + (lvlMult - 1) * 2);
    for (let i = 0; i < bonusEnemies; i++) {
        const pool = comp.length > 0 ? comp : ['scout'];
        comp.push(pool[Math.floor(Math.random() * pool.length)]);
    }
    return comp;
}

const ENEMY_UNLOCK_WAVES = {
    4: { name: 'DRONE', color: '#ffcc33' },
    7: { name: 'INTERCEPTOR', color: '#ffff44' },
    9: { name: 'FIGHTER', color: '#ff8833' },
    10: { name: 'BOSS', color: '#ff2266' },
    12: { name: 'BOMBER', color: '#ff5566' },
    15: { name: 'GUNSHIP', color: '#ff3333' },
    18: { name: 'SHIELDER', color: '#44ffdd' },
    22: { name: 'CRUISER', color: '#bb44ff' },
    28: { name: 'DREADNOUGHT', color: '#ff2266' }
};

function startNextWave() {
    wave++;
    const newStage = Math.min(8, Math.ceil(wave / 10));
    if (newStage !== currentStage) {
        currentStage = newStage;
        const stage = getStage();
        waveBannerText = `STAGE ${currentStage}: ${stage.name}`;
        waveBannerTimer = 180;
    } else if (ENEMY_UNLOCK_WAVES[wave]) {
        const unlock = ENEMY_UNLOCK_WAVES[wave];
        waveBannerText = `WAVE ${wave} — NEW ENEMY: ${unlock.name}`;
        waveBannerTimer = 180;
        waveBannerColor = unlock.color;
    } else {
        waveBannerText = `WAVE ${wave}`;
        waveBannerTimer = 120;
    }
    betweenWaves = false;
    bossActive = null;
    const comp = getWaveComposition(wave);
    spawnQueue = comp.slice();
    // Don't shuffle boss waves (only 1 enemy)
    if (comp.length > 1) {
        for (let i = spawnQueue.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [spawnQueue[i], spawnQueue[j]] = [spawnQueue[j], spawnQueue[i]];
        }
    }
    spawnTimer = 0;

    // Ally encounter chance (8% per wave, starting wave 3, max 2 allies)
    if (wave >= 3 && allyShips.length < 2 && !allyEncounter && Math.random() < 0.08) {
        const types = ['scout', 'gunner', 'medic'];
        const allyType = types[Math.floor(Math.random() * types.length)];
        allyEncounter = {
            x: W + 60,
            y: 80 + Math.random() * (H - 160),
            type: allyType,
            rescued: false,
            flashTimer: 0,
            driftSpeed: 0.5 + Math.random() * 0.3
        };
    }
}

function getPlayerPowerLevel() {
    // Calculate a "power level" from shop upgrades to scale difficulty
    let power = 0;
    for (const key in saveData.upgradeLevels) power += saveData.upgradeLevels[key];
    const equippedWeapons = saveData.equippedWeapons.length;
    power += (equippedWeapons - 1) * 2; // -1 for starter weapon
    const unlockedPowerups = Object.values(saveData.powerupUnlocks).filter(v => v).length;
    power += unlockedPowerups;
    for (const key in saveData.allyUpgrades) power += (saveData.allyUpgrades[key] || 0);
    return power;
}

function getDifficultyMultiplier() {
    // Gentle scaling - keeps the game fun without being punishing
    const power = getPlayerPowerLevel();
    if (power < 15) return 1 + power * 0.005;
    if (power < 30) return 1.075 + (power - 15) * 0.015;
    if (power < 50) return 1.3 + (power - 30) * 0.025;
    return 1.8 + (power - 50) * 0.03;
}

function spawnEnemy(type) {
    const def = ENEMY_TYPES[type];
    const diffMult = getDifficultyMultiplier();
    const stage = getStage();
    const lvlMult = getLevelMultiplier();
    const hpScale = (1 + (wave - 1) * 0.03) * diffMult * stage.enemyHpMult * lvlMult;
    const e = {
        type,
        x: W + 40 + Math.random() * 80,
        y: 40 + Math.random() * (H - 80),
        hp: Math.ceil(def.hp * hpScale),
        maxHp: Math.ceil(def.hp * hpScale),
        speed: def.speed * (1 + (diffMult - 1) * 0.15) * stage.enemySpeedMult * (1 + (lvlMult - 1) * 0.15),
        color: def.color,
        r: def.r, g: def.g, b: def.b,
        shape: def.shape,
        behavior: def.behavior,
        shoots: def.shoots,
        shootTimer: def.shootDelay ? (30 + Math.floor(Math.random() * def.shootDelay)) : 999,
        shootDelay: Math.max(10, Math.floor((def.shootDelay || 999) / (diffMult * stage.shootMult * (1 + (lvlMult - 1) * 0.3)))),
        burstCount: def.burstCount || 0,
        burstRemaining: 0,
        burstTimer: 0,
        spreadCount: def.spreadCount || 0,
        homing: def.homing || false,
        showHpBar: def.showHpBar,
        flashTimer: 0,
        size: {scout:14, drone:16, fighter:18, interceptor:16, bomber:20, gunship:22, shielder:24, cruiser:28, dreadnought:35, elite:24, boss:75}[type] || 20,
        hoverX: W * (0.6 + Math.random() * 0.25),
        zigzagPhase: Math.random() * Math.PI * 2,
        zigzagSpeed: 2 + Math.random(),
        rot: 0
    };
    if (type === 'boss') {
        e.hoverX = W * 0.72;
        e.y = H / 2;
        e.shootTimer = 90;
        e.missileTimer = 150;
        e.phase = 3; // 3=full HP, 2=<75%, 1=<50%, 0=<25% (rage)
        e.phaseTimer = 0;
        e.sweepAngle = 0;
        e.sweepDir = 1;
        e.sweepTimer = 0;

        // Sky Force-style turret stages - each stage has a set of turrets
