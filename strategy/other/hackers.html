<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hackers</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
    color: #00ff41;
    user-select: none;
    -webkit-user-select: none;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

#matrixCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
    opacity: 0.15;
}

/* ── Screens ── */
.screen {
    position: relative;
    z-index: 10;
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 600px;
    padding: 0 24px;
}
.screen.active { display: flex; }

/* ── Title (big) ── */
.title-big {
    font-size: clamp(60px, 12vw, 120px);
    font-weight: 900;
    letter-spacing: 0.2em;
    color: #00ff41;
    text-transform: uppercase;
    text-shadow: 0 0 10px #00ff41, 0 0 30px #00ff41, 0 0 60px #00af2f;
    animation: flicker 4s infinite;
    position: relative;
}
.title-big::before, .title-big::after {
    content: 'HACKERS';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
}
.title-big::before {
    color: #ff003c;
    animation: glitch-1 3.5s infinite;
    clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
    opacity: 0;
}
.title-big::after {
    color: #00d4ff;
    animation: glitch-2 3.5s infinite;
    clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
    opacity: 0;
}

/* ── Title (small) ── */
.title-sm {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    letter-spacing: 0.25em;
    color: #00ff41;
    text-transform: uppercase;
    text-shadow: 0 0 8px #00ff41, 0 0 20px #00ff41;
    animation: flicker 4s infinite;
    position: relative;
    margin-bottom: 32px;
}
.title-sm::before, .title-sm::after {
    content: 'HACKERS';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
}
.title-sm::before {
    color: #ff003c;
    animation: glitch-1 3.5s infinite;
    clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
    opacity: 0;
}
.title-sm::after {
    color: #00d4ff;
    animation: glitch-2 3.5s infinite;
    clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
    opacity: 0;
}

.subtitle {
    font-size: clamp(11px, 1.8vw, 16px);
    letter-spacing: 0.4em;
    color: #00af2f;
    text-transform: uppercase;
    margin-top: -12px;
    margin-bottom: 52px;
    animation: blink 2.5s infinite;
}

/* ── Buttons ── */
.btn {
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(14px, 2.2vw, 19px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #000;
    background: #00ff41;
    border: none;
    padding: 16px 52px;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: background 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 20px #00ff4180, 0 0 40px #00ff4140;
    animation: pulse-btn 2s infinite;
}
.btn:hover {
    background: #fff;
    box-shadow: 0 0 30px #00ff41, 0 0 60px #00ff41;
    animation: none;
}
.btn:active { transform: scale(0.97); }
.btn:disabled {
    opacity: 0.4;
    cursor: default;
    animation: none;
}

/* ── Player count picker ── */
.player-count-row {
    display: flex;
    gap: 16px;
    margin-top: 8px;
}
.pcount-btn {
    font-family: 'Courier New', monospace;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    color: #00ff41;
    background: transparent;
    border: 2px solid #00ff4155;
    width: 80px;
    height: 80px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
}
.pcount-btn:hover {
    border-color: #00ff41;
    background: rgba(0,255,65,0.1);
    box-shadow: 0 0 16px #00ff4160;
}
.pcount-btn:active { transform: scale(0.93); }
.setup-label {
    font-size: 12px;
    letter-spacing: 0.35em;
    color: #00af2f;
    margin-bottom: 28px;
    animation: blink 2.5s infinite;
}

/* ── Pass screen ── */
#screen-pass {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 20;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    gap: 0;
}
#screen-pass.active { display: flex; }
.pass-player {
    font-size: clamp(56px, 14vw, 110px);
    font-weight: 900;
    letter-spacing: 0.1em;
    color: #00ff41;
    text-shadow: 0 0 20px #00ff41, 0 0 50px #00ff41;
    animation: flicker 4s infinite;
}
.pass-label {
    font-size: clamp(11px, 2vw, 16px);
    letter-spacing: 0.5em;
    color: #00af2f;
    text-transform: uppercase;
    margin-bottom: 52px;
    animation: blink 2.5s infinite;
}

/* ── Password screen ── */
.pw-player-label {
    font-size: 12px;
    letter-spacing: 0.45em;
    color: #00ff4188;
    margin-bottom: 20px;
    text-transform: uppercase;
}
.password-display {
    display: flex;
    gap: 18px;
    margin-bottom: 16px;
}
.pslot {
    width: 58px;
    height: 76px;
    border-bottom: 3px solid #00ff4155;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    font-weight: 900;
    color: #00ff4155;
    transition: color 0.15s, border-color 0.15s, text-shadow 0.15s;
}
.pslot.filled {
    color: #00ff41;
    border-color: #00ff41;
    text-shadow: 0 0 12px #00ff41;
}
.pslot.locked {
    color: #ffaa00;
    border-color: #ffaa00;
    text-shadow: 0 0 12px #ffaa00;
}
.pw-label {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: #00af2f;
    margin-bottom: 28px;
    animation: blink 2s infinite;
}
.pw-label.is-locked {
    color: #ffaa00;
    animation: none;
}
.numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 228px;
}
.npbtn {
    font-family: 'Courier New', monospace;
    font-size: 22px;
    font-weight: 900;
    color: #00ff41;
    background: transparent;
    border: 1px solid #00ff4133;
    padding: 16px 0;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
}
.npbtn:hover:not(:disabled) {
    background: rgba(0,255,65,0.1);
    border-color: #00ff41;
}
.npbtn:active:not(:disabled) { transform: scale(0.93); }
.npbtn:disabled { opacity: 0.2; cursor: default; }
.npbtn-back { font-size: 18px; }
.npbtn-lock {
    background: #00ff4133;
    font-size: 13px;
    letter-spacing: 0.15em;
}
.npbtn-lock:not(:disabled) {
    background: #00ff41;
    color: #000;
    border-color: #00ff41;
}
.npbtn-lock:not(:disabled):hover {
    background: #fff;
    box-shadow: 0 0 20px #00ff41;
}

/* ── Coins screen ── */
.coins-number {
    font-size: clamp(100px, 25vw, 180px);
    font-weight: 900;
    color: #00ff41;
    text-shadow: 0 0 20px #00ff41, 0 0 60px #00ff41;
    line-height: 1;
    animation: flicker 4s infinite;
}
.coins-label {
    font-size: clamp(14px, 3vw, 22px);
    letter-spacing: 0.5em;
    color: #00af2f;
    margin-top: 8px;
    animation: blink 2.5s infinite;
}

/* ── Hub screen ── */
#screen-hub {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10;
    flex-direction: column;
    align-items: stretch;
    padding: 24px;
    background: #000;
}
#screen-hub.active { display: flex; }
.hub-topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    width: 100%;
}
.hub-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.hub-player {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: #00ff4166;
    margin-top: 10px;
    text-transform: uppercase;
}
.hub-bottom {
    display: flex;
    justify-content: center;
    padding-bottom: 8px;
}
.hub-btn {
    background: transparent;
    border: 1px solid #00ff4144;
    color: #00ff41;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    padding: 10px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
}
.hub-btn:hover {
    border-color: #00ff41;
    background: rgba(0,255,65,0.08);
    box-shadow: 0 0 12px #00ff4140;
}
.hub-btn-icon {
    font-size: 22px;
    line-height: 1;
    text-shadow: 0 0 8px #00ff41;
}
.hub-btn-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: #00af2f;
}
.end-turn-btn {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: #00ff41;
    background: transparent;
    border: 1px solid #00ff4155;
    padding: 12px 36px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
}
.end-turn-btn:hover {
    border-color: #00ff41;
    background: rgba(0,255,65,0.08);
}

/* ── Corners ── */
.corner {
    position: fixed;
    width: 50px;
    height: 50px;
    border-color: #00ff41;
    border-style: solid;
    opacity: 0.35;
    z-index: 5;
}
.corner.tl { top: 18px; left: 18px; border-width: 2px 0 0 2px; }
.corner.tr { top: 18px; right: 18px; border-width: 2px 2px 0 0; }
.corner.bl { bottom: 18px; left: 18px; border-width: 0 0 2px 2px; }
.corner.br { bottom: 18px; right: 18px; border-width: 0 2px 2px 0; }

/* ── Animations ── */
@keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.4; }
    97% { opacity: 1; }
    98% { opacity: 0.2; }
    99% { opacity: 1; }
}
@keyframes glitch-1 {
    0%, 80%, 100% { opacity: 0; transform: translateX(0); }
    82% { opacity: 0.8; transform: translateX(-6px); }
    84% { opacity: 0; }
    86% { opacity: 0.6; transform: translateX(4px); }
    88% { opacity: 0; }
}
@keyframes glitch-2 {
    0%, 80%, 100% { opacity: 0; transform: translateX(0); }
    83% { opacity: 0.7; transform: translateX(6px); }
    85% { opacity: 0; }
    87% { opacity: 0.5; transform: translateX(-4px); }
    89% { opacity: 0; }
}
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}
@keyframes pulse-btn {
    0%, 100% { box-shadow: 0 0 20px #00ff4180, 0 0 40px #00ff4140; }
    50% { box-shadow: 0 0 35px #00ff41cc, 0 0 60px #00ff4180; }
}
</style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- ── Home ── -->
<div id="screen-home" class="screen active">
    <div class="title-big">HACKERS</div>
    <div class="subtitle">Pass &nbsp;·&nbsp; Play &nbsp;·&nbsp; Steal</div>
    <button class="btn" onclick="goTo('setup')">START GAME</button>
</div>

<!-- ── Setup: choose player count ── -->
<div id="screen-setup" class="screen">
    <div class="title-sm">HACKERS</div>
    <div class="setup-label">HOW MANY PLAYERS?</div>
    <div class="player-count-row">
        <button class="pcount-btn" onclick="startGame(2)">2</button>
        <button class="pcount-btn" onclick="startGame(3)">3</button>
        <button class="pcount-btn" onclick="startGame(4)">4</button>
    </div>
</div>

<!-- ── Pass phone screen ── -->
<div id="screen-pass">
    <div class="pass-player" id="pass-player-num">PLAYER 1</div>
    <div class="pass-label" id="pass-sub">YOUR TURN</div>
    <button class="btn" onclick="readyForTurn()">READY</button>
</div>

<!-- ── Set password ── -->
<div id="screen-game" class="screen">
    <div class="title-sm">HACKERS</div>
    <div class="pw-player-label" id="pw-player-label">PLAYER 1</div>
    <div class="password-display">
        <span class="pslot" id="d0">_</span>
        <span class="pslot" id="d1">_</span>
        <span class="pslot" id="d2">_</span>
        <span class="pslot" id="d3">_</span>
    </div>
    <div class="pw-label" id="pw-label">SET YOUR PASSWORD</div>
    <div class="numpad">
        <button class="npbtn" onclick="enterDigit(1)">1</button>
        <button class="npbtn" onclick="enterDigit(2)">2</button>
        <button class="npbtn" onclick="enterDigit(3)">3</button>
        <button class="npbtn" onclick="enterDigit(4)">4</button>
        <button class="npbtn" onclick="enterDigit(5)">5</button>
        <button class="npbtn" onclick="enterDigit(6)">6</button>
        <button class="npbtn" onclick="enterDigit(7)">7</button>
        <button class="npbtn" onclick="enterDigit(8)">8</button>
        <button class="npbtn" onclick="enterDigit(9)">9</button>
        <button class="npbtn npbtn-back" onclick="backspace()">⌫</button>
        <button class="npbtn" onclick="enterDigit(0)">0</button>
        <button class="npbtn npbtn-lock" id="lock-btn" onclick="lockPassword()" disabled>LOCK</button>
    </div>
</div>

<!-- ── Coins splash ── -->
<div id="screen-coins" class="screen">
    <div class="coins-number">10</div>
    <div class="coins-label">COINS</div>
</div>

<!-- ── Hub ── -->
<div id="screen-hub">
    <div class="hub-topbar">
        <button class="hub-btn">
            <span class="hub-btn-icon">◈</span>
            <span class="hub-btn-label">SHOP</span>
        </button>
        <button class="hub-btn">
            <span class="hub-btn-icon">&gt;_</span>
            <span class="hub-btn-label">HACK</span>
        </button>
    </div>
    <div class="hub-center">
        <div class="coins-number" id="hub-coins">10</div>
        <div class="coins-label">COINS</div>
        <div class="hub-player" id="hub-player-label">PLAYER 1</div>
    </div>
    <div class="hub-bottom">
        <button class="end-turn-btn" onclick="endTurn()">END TURN</button>
    </div>
</div>

<script>
// ── Matrix rain ──────────────────────────────────────────────
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*<>/\\|{}[]';
const fontSize = 14;
let drops = [];
function initDrops() { drops = Array(Math.floor(canvas.width / fontSize)).fill(1); }
initDrops();
window.addEventListener('resize', initDrops);
setInterval(() => {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = fontSize + 'px Courier New';
    drops.forEach((y, i) => {
        ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fontSize, y * fontSize);
        if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    });
}, 50);

// ── Game state ───────────────────────────────────────────────
let numPlayers = 2;
let players = [];      // [{password:[], coins:10}]
let currentPlayer = 0;
let inSetupPhase = true;

function startGame(n) {
    numPlayers = n;
    players = Array.from({ length: n }, () => ({ password: [], coins: 10 }));
    currentPlayer = 0;
    inSetupPhase = true;
    showPassScreen();
}

function showPassScreen() {
    document.getElementById('pass-player-num').textContent = 'PLAYER ' + (currentPlayer + 1);
    document.getElementById('pass-sub').textContent = inSetupPhase ? 'SET YOUR PASSWORD' : 'YOUR TURN';
    goTo('pass');
}

function readyForTurn() {
    if (inSetupPhase) {
        document.getElementById('pw-player-label').textContent = 'PLAYER ' + (currentPlayer + 1);
        initPasswordScreen();
        goTo('game');
    } else {
        updateHub();
        goTo('hub');
    }
}

function endTurn() {
    currentPlayer = (currentPlayer + 1) % numPlayers;
    showPassScreen();
}

function updateHub() {
    document.getElementById('hub-player-label').textContent = 'PLAYER ' + (currentPlayer + 1);
    document.getElementById('hub-coins').textContent = players[currentPlayer].coins;
}

// ── Screen navigation ────────────────────────────────────────
function goTo(id) {
    document.querySelectorAll('.screen, #screen-hub, #screen-pass').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
}

// ── Password mechanics ───────────────────────────────────────
let password = [];
let passwordLocked = false;

function initPasswordScreen() {
    password = [];
    passwordLocked = false;
    for (let i = 0; i < 4; i++) {
        const el = document.getElementById('d' + i);
        if (el) { el.textContent = '_'; el.className = 'pslot'; }
    }
    const lbl = document.getElementById('pw-label');
    if (lbl) { lbl.textContent = 'SET YOUR PASSWORD'; lbl.className = 'pw-label'; }
    const lb = document.getElementById('lock-btn');
    if (lb) { lb.disabled = true; lb.textContent = 'LOCK'; }
    document.querySelectorAll('.npbtn').forEach(b => b.disabled = false);
}

function enterDigit(d) {
    if (passwordLocked || password.length >= 4) return;
    password.push(d);
    updatePasswordDisplay();
}

function backspace() {
    if (passwordLocked || password.length === 0) return;
    password.pop();
    updatePasswordDisplay();
}

function updatePasswordDisplay() {
    for (let i = 0; i < 4; i++) {
        const el = document.getElementById('d' + i);
        if (!el) continue;
        el.textContent = password[i] !== undefined ? password[i] : '_';
        el.className = 'pslot' + (password[i] !== undefined ? ' filled' : '');
    }
    const lb = document.getElementById('lock-btn');
    if (lb) lb.disabled = password.length < 4;
}

function lockPassword() {
    if (password.length < 4 || passwordLocked) return;
    passwordLocked = true;
    players[currentPlayer].password = [...password];

    for (let i = 0; i < 4; i++) {
        const el = document.getElementById('d' + i);
        if (el) { el.textContent = '●'; el.className = 'pslot locked'; }
    }
    const lbl = document.getElementById('pw-label');
    if (lbl) { lbl.textContent = 'PASSWORD LOCKED'; lbl.className = 'pw-label is-locked'; }
    const lb = document.getElementById('lock-btn');
    if (lb) { lb.textContent = 'LOCKED'; lb.disabled = true; }
    document.querySelectorAll('.npbtn').forEach(b => b.disabled = true);

    setTimeout(() => {
        goTo('coins');
        setTimeout(() => {
            currentPlayer++;
            if (currentPlayer < numPlayers) {
                // next player sets password
                showPassScreen();
            } else {
                // all passwords set — start play phase
                currentPlayer = 0;
                inSetupPhase = false;
                showPassScreen();
            }
        }, 1200);
    }, 800);
}
</script>
</body>
</html>
