<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hackers</title>
<script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
    color: #00ff41;
    user-select: none;
    -webkit-user-select: none;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

#matrixCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
    opacity: 0.15;
}

/* ── Screens ── */
.screen {
    position: relative;
    z-index: 10;
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 600px;
    padding: 0 24px;
}
.screen.active { display: flex; }

/* ── Title (big) ── */
.title-big {
    font-size: clamp(60px, 12vw, 120px);
    font-weight: 900;
    letter-spacing: 0.2em;
    color: #00ff41;
    text-transform: uppercase;
    text-shadow: 0 0 10px #00ff41, 0 0 30px #00ff41, 0 0 60px #00af2f;
    animation: flicker 4s infinite;
    position: relative;
}
.title-big::before, .title-big::after {
    content: 'HACKERS';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
}
.title-big::before {
    color: #ff003c;
    animation: glitch-1 3.5s infinite;
    clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
    opacity: 0;
}
.title-big::after {
    color: #00d4ff;
    animation: glitch-2 3.5s infinite;
    clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
    opacity: 0;
}

/* ── Title (small) ── */
.title-sm {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    letter-spacing: 0.25em;
    color: #00ff41;
    text-transform: uppercase;
    text-shadow: 0 0 8px #00ff41, 0 0 20px #00ff41;
    animation: flicker 4s infinite;
    position: relative;
    margin-bottom: 32px;
}
.title-sm::before, .title-sm::after {
    content: 'HACKERS';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
}
.title-sm::before {
    color: #ff003c;
    animation: glitch-1 3.5s infinite;
    clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
    opacity: 0;
}
.title-sm::after {
    color: #00d4ff;
    animation: glitch-2 3.5s infinite;
    clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
    opacity: 0;
}

.subtitle {
    font-size: clamp(11px, 1.8vw, 16px);
    letter-spacing: 0.4em;
    color: #00af2f;
    text-transform: uppercase;
    margin-top: -12px;
    margin-bottom: 52px;
    animation: blink 2.5s infinite;
}

/* ── Buttons ── */
.btn {
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(14px, 2.2vw, 19px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #000;
    background: #00ff41;
    border: none;
    padding: 16px 52px;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: background 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 20px #00ff4180, 0 0 40px #00ff4140;
    animation: pulse-btn 2s infinite;
}
.btn:hover {
    background: #fff;
    box-shadow: 0 0 30px #00ff41, 0 0 60px #00ff41;
    animation: none;
}
.btn:active { transform: scale(0.97); }
.btn:disabled {
    opacity: 0.4;
    cursor: default;
    animation: none;
}
.btn-danger {
    background: #ff003c;
    color: #fff;
    box-shadow: 0 0 20px #ff003c80, 0 0 40px #ff003c40;
    animation: pulse-danger 2s infinite;
}
.btn-danger:hover {
    background: #ff6688;
    box-shadow: 0 0 30px #ff003c, 0 0 60px #ff003c;
    animation: none;
}
@keyframes pulse-danger {
    0%, 100% { box-shadow: 0 0 20px #ff003c80, 0 0 40px #ff003c40; }
    50% { box-shadow: 0 0 35px #ff003ccc, 0 0 60px #ff003c80; }
}

/* ── Divider ── */
.divider {
    font-size: 11px;
    letter-spacing: 0.35em;
    color: #00ff4166;
    margin: 28px 0 18px;
    width: 100%;
    text-align: center;
}

/* ── Game list ── */
.game-list {
    width: 100%;
    max-height: 38vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.game-list::-webkit-scrollbar { width: 4px; }
.game-list::-webkit-scrollbar-track { background: transparent; }
.game-list::-webkit-scrollbar-thumb { background: #00ff4144; border-radius: 2px; }

.game-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid #00ff4133;
    padding: 12px 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: rgba(0, 255, 65, 0.03);
}
.game-row:hover {
    border-color: #00ff41;
    background: rgba(0, 255, 65, 0.08);
}
.game-row-name {
    font-size: 15px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
}
.game-row-meta {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #00af2f;
}

.no-games {
    font-size: 12px;
    letter-spacing: 0.3em;
    color: #00ff4144;
    text-align: center;
    padding: 24px 0;
}

/* ── Terminal input ── */
.terminal-input {
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(15px, 2.5vw, 20px);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #00ff41;
    background: transparent;
    border: none;
    border-bottom: 2px solid #00ff41;
    padding: 10px 4px;
    width: 100%;
    max-width: 360px;
    outline: none;
    text-align: center;
    margin-bottom: 36px;
    caret-color: #00ff41;
}
.terminal-input::placeholder { color: #00ff4144; }

/* ── Host waiting ── */
.game-name-display {
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 900;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #00ff41;
    text-shadow: 0 0 10px #00ff41;
    margin-bottom: 40px;
    text-align: center;
}
.count-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 28px;
}
.count-label {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: #00af2f;
    text-transform: uppercase;
}
.count-number {
    font-size: clamp(60px, 12vw, 100px);
    font-weight: 900;
    color: #00ff41;
    text-shadow: 0 0 20px #00ff41, 0 0 50px #00ff41;
    line-height: 1;
    transition: transform 0.15s;
}
.count-number.bump {
    transform: scale(1.25);
}
.waiting-label {
    font-size: 12px;
    letter-spacing: 0.35em;
    color: #00ff4166;
    animation: blink 2s infinite;
}

/* ── Joined screen ── */
.joined-game-name {
    font-size: clamp(20px, 3.5vw, 32px);
    font-weight: 900;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #00ff41;
    text-shadow: 0 0 10px #00ff41;
    margin-bottom: 8px;
}
.joined-sub {
    font-size: 11px;
    letter-spacing: 0.35em;
    color: #00af2f;
    margin-bottom: 36px;
}

/* ── Password screen ── */
.password-display {
    display: flex;
    gap: 18px;
    margin-bottom: 16px;
}
.pslot {
    width: 58px;
    height: 76px;
    border-bottom: 3px solid #00ff4155;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    font-weight: 900;
    color: #00ff4155;
    transition: color 0.15s, border-color 0.15s, text-shadow 0.15s;
}
.pslot.filled {
    color: #00ff41;
    border-color: #00ff41;
    text-shadow: 0 0 12px #00ff41;
}
.pslot.locked {
    color: #ffaa00;
    border-color: #ffaa00;
    text-shadow: 0 0 12px #ffaa00;
}
.pw-label {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: #00af2f;
    margin-bottom: 28px;
    animation: blink 2s infinite;
}
.pw-label.is-locked {
    color: #ffaa00;
    animation: none;
}
.numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 228px;
}
.npbtn {
    font-family: 'Courier New', monospace;
    font-size: 22px;
    font-weight: 900;
    color: #00ff41;
    background: transparent;
    border: 1px solid #00ff4133;
    padding: 16px 0;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
}
.npbtn:hover:not(:disabled) {
    background: rgba(0,255,65,0.1);
    border-color: #00ff41;
}
.npbtn:active:not(:disabled) { transform: scale(0.93); }
.npbtn:disabled { opacity: 0.2; cursor: default; }
.npbtn-back { font-size: 18px; }
.npbtn-lock {
    background: #00ff4133;
    font-size: 13px;
    letter-spacing: 0.15em;
}
.npbtn-lock:not(:disabled) {
    background: #00ff41;
    color: #000;
    border-color: #00ff41;
}
.npbtn-lock:not(:disabled):hover {
    background: #fff;
    box-shadow: 0 0 20px #00ff41;
}

/* ── Corner action buttons (coins screen) ── */
#screen-hub {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10;
    flex-direction: column;
    align-items: stretch;
    padding: 24px;
    background: #000;
}
#screen-hub.active { display: flex; }
.hub-topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    width: 100%;
}
.hub-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.hub-btn {
    background: transparent;
    border: 1px solid #00ff4144;
    color: #00ff41;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    padding: 10px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
}
.hub-btn:hover {
    border-color: #00ff41;
    background: rgba(0,255,65,0.08);
    box-shadow: 0 0 12px #00ff4140;
}
.hub-btn-icon {
    font-size: 22px;
    line-height: 1;
    text-shadow: 0 0 8px #00ff41;
}
.hub-btn-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: #00af2f;
}

/* ── Coins screen ── */
.coins-number {
    font-size: clamp(100px, 25vw, 180px);
    font-weight: 900;
    color: #00ff41;
    text-shadow: 0 0 20px #00ff41, 0 0 60px #00ff41;
    line-height: 1;
    animation: flicker 4s infinite;
}
.coins-label {
    font-size: clamp(14px, 3vw, 22px);
    letter-spacing: 0.5em;
    color: #00af2f;
    margin-top: 8px;
    animation: blink 2.5s infinite;
}

/* ── Corners ── */
.corner {
    position: fixed;
    width: 50px;
    height: 50px;
    border-color: #00ff41;
    border-style: solid;
    opacity: 0.35;
    z-index: 5;
}
.corner.tl { top: 18px; left: 18px; border-width: 2px 0 0 2px; }
.corner.tr { top: 18px; right: 18px; border-width: 2px 2px 0 0; }
.corner.bl { bottom: 18px; left: 18px; border-width: 0 0 2px 2px; }
.corner.br { bottom: 18px; right: 18px; border-width: 0 2px 2px 0; }

/* ── Status bar ── */
.status-bar {
    position: fixed;
    bottom: 22px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #00ff4144;
    animation: blink 3s infinite;
    z-index: 5;
}

/* ── Animations ── */
@keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.4; }
    97% { opacity: 1; }
    98% { opacity: 0.2; }
    99% { opacity: 1; }
}
@keyframes glitch-1 {
    0%, 80%, 100% { opacity: 0; transform: translateX(0); }
    82% { opacity: 0.8; transform: translateX(-6px); }
    84% { opacity: 0; }
    86% { opacity: 0.6; transform: translateX(4px); }
    88% { opacity: 0; }
}
@keyframes glitch-2 {
    0%, 80%, 100% { opacity: 0; transform: translateX(0); }
    83% { opacity: 0.7; transform: translateX(6px); }
    85% { opacity: 0; }
    87% { opacity: 0.5; transform: translateX(-4px); }
    89% { opacity: 0; }
}
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}
@keyframes pulse-btn {
    0%, 100% { box-shadow: 0 0 20px #00ff4180, 0 0 40px #00ff4140; }
    50% { box-shadow: 0 0 35px #00ff41cc, 0 0 60px #00ff4180; }
}
</style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- ── Screen: Home ── -->
<div id="screen-home" class="screen active">
    <div class="title-big">HACKERS</div>
    <div class="subtitle">Multiplayer &nbsp;·&nbsp; Zero Trust</div>
    <button class="btn" onclick="goTo('lobby')">START GAME</button>
</div>

<!-- ── Screen: Lobby ── -->
<div id="screen-lobby" class="screen">
    <div class="title-sm">HACKERS</div>
    <button class="btn" onclick="goTo('host-name')">HOST</button>
    <div class="divider">— ACTIVE GAMES —</div>
    <div class="game-list" id="game-list">
        <div class="no-games" id="no-games-msg">SCANNING FOR GAMES...</div>
    </div>
</div>

<!-- ── Screen: Host — enter name ── -->
<div id="screen-host-name" class="screen">
    <div class="title-sm">HACKERS</div>
    <input type="text" id="game-name-input" class="terminal-input"
           placeholder="ENTER GAME NAME" maxlength="24"
           onkeydown="if(event.key==='Enter') createGame()" />
    <button class="btn" id="create-btn" onclick="createGame()">CREATE GAME</button>
</div>

<!-- ── Screen: Host — waiting ── -->
<div id="screen-host-waiting" class="screen">
    <div class="title-sm">HACKERS</div>
    <div class="game-name-display" id="host-game-name-display"></div>
    <div class="waiting-label" id="host-waiting-label">WAITING FOR PLAYERS...</div>
    <div id="host-player-count" style="display:none"></div>
    <div style="display:flex;gap:20px;margin-top:36px;">
        <button class="btn" id="start-btn" disabled onclick="startGame()">START GAME</button>
        <button class="btn btn-danger" onclick="deleteGame()">DELETE</button>
    </div>
</div>

<!-- ── Screen: Joined — waiting ── -->
<div id="screen-joined" class="screen">
    <div class="title-sm">HACKERS</div>
    <div class="joined-game-name" id="joined-game-name"></div>
    <div class="joined-sub">YOU'RE IN</div>
    <div id="joined-player-count" style="display:none"></div>
    <div class="waiting-label">WAITING FOR HOST TO START...</div>
</div>

<!-- ── Screen: Game — set password ── -->
<div id="screen-game" class="screen">
    <div class="title-sm">HACKERS</div>
    <div class="password-display">
        <span class="pslot" id="d0">_</span>
        <span class="pslot" id="d1">_</span>
        <span class="pslot" id="d2">_</span>
        <span class="pslot" id="d3">_</span>
    </div>
    <div class="pw-label" id="pw-label">SET YOUR PASSWORD</div>
    <div class="numpad">
        <button class="npbtn" onclick="enterDigit(1)">1</button>
        <button class="npbtn" onclick="enterDigit(2)">2</button>
        <button class="npbtn" onclick="enterDigit(3)">3</button>
        <button class="npbtn" onclick="enterDigit(4)">4</button>
        <button class="npbtn" onclick="enterDigit(5)">5</button>
        <button class="npbtn" onclick="enterDigit(6)">6</button>
        <button class="npbtn" onclick="enterDigit(7)">7</button>
        <button class="npbtn" onclick="enterDigit(8)">8</button>
        <button class="npbtn" onclick="enterDigit(9)">9</button>
        <button class="npbtn npbtn-back" onclick="backspace()">⌫</button>
        <button class="npbtn" onclick="enterDigit(0)">0</button>
        <button class="npbtn npbtn-lock" id="lock-btn" onclick="lockPassword()" disabled>LOCK</button>
    </div>
</div>

<!-- ── Screen: Coins (brief splash) ── -->
<div id="screen-coins" class="screen">
    <div class="coins-number">10</div>
    <div class="coins-label">COINS</div>
</div>

<!-- ── Screen: Game Hub ── -->
<div id="screen-hub">
    <div class="hub-topbar">
        <button class="hub-btn">
            <span class="hub-btn-icon">◈</span>
            <span class="hub-btn-label">SHOP</span>
        </button>
        <button class="hub-btn">
            <span class="hub-btn-icon">&gt;_</span>
            <span class="hub-btn-label">HACK</span>
        </button>
    </div>
    <div class="hub-center">
        <div class="coins-number" id="hub-coins">10</div>
        <div class="coins-label">COINS</div>
    </div>
</div>

<div class="status-bar" id="status-bar">SYS://CONNECTING...</div>

<script>
// ── Matrix rain ──────────────────────────────────────────────
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*<>/\\|{}[]';
const fontSize = 14;
let drops = [];
function initDrops() { drops = Array(Math.floor(canvas.width / fontSize)).fill(1); }
initDrops();
window.addEventListener('resize', initDrops);
setInterval(() => {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = fontSize + 'px Courier New';
    drops.forEach((y, i) => {
        ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fontSize, y * fontSize);
        if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    });
}, 50);

// ── IDs & state ───────────────────────────────────────────────
const myId = 'p' + Date.now() + Math.random().toString(36).substr(2, 6);
let currentGameId = null;
let isHost = false;
let heartbeatTimer = null;
const ONE_HOUR = 60 * 60 * 1000;

const statusBar = document.getElementById('status-bar');

// ── MQTT — game list + cross-device presence ──────────────────
const mq = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
    clientId: 'hkrs_' + myId + '_' + Math.random().toString(36).substr(2,4),
    clean: true,
    reconnectPeriod: 3000,
    keepalive: 30
});
mq.on('connect', () => {
    statusBar.textContent = 'SYS://ONLINE';
    mq.subscribe('hkrs5/games/+');
});
mq.on('error', () => statusBar.textContent = 'SYS://OFFLINE — same-device only');

// ── BroadcastChannel — instant same-device sync ───────────────
const bc = new BroadcastChannel('hkrs_presence');

// presenceWatchers: gameId → { gameId, countElId, presenceMap }
const presenceWatchers = new Map();

function handlePresence(gameId, pid, alive) {
    const w = presenceWatchers.get(gameId);
    if (!w) return;
    if (alive) w.presenceMap.set(pid, Date.now());
    else w.presenceMap.delete(pid);
    renderCount(w);
}

mq.on('message', (topic, payload) => {
    const parts = topic.split('/');
    if (parts.length < 3 || parts[0] !== 'hkrs5') return;
    if (parts[1] === 'games') {
        const gameId = parts[2], str = payload.toString();
        if (!str) { gamesMap.delete(gameId); }
        else { try { const g = JSON.parse(str); if (!isExpired(g)) gamesMap.set(gameId, g); else gamesMap.delete(gameId); } catch(e) {} }
        renderGameList();
        return;
    }
    const gameId = parts[1], key = parts[2];
    if (key === 'ctrl') handleCtrl(gameId, payload.toString());
    else handlePresence(gameId, key, payload.toString() !== '0');
});

bc.onmessage = (e) => {
    if (e.data.type === 'ctrl') handleCtrl(e.data.gameId, e.data.cmd);
    else handlePresence(e.data.gameId, e.data.pid, e.data.alive);
};

function handleCtrl(gameId, cmd) {
    if (cmd === 'delete') {
        gamesMap.delete(gameId);
        renderGameList();
        if (currentGameId === gameId && !isHost) { currentGameId = null; goTo('lobby'); }
        return;
    }
    if (gameId !== currentGameId) return;
    if (cmd === 'start') { goTo('game'); initGame(); }
}

function renderCount(w) {
    const now = Date.now();
    // Evict players whose heartbeat is >7s stale (except ourselves)
    for (const [pid, ts] of w.presenceMap) {
        if (pid !== myId && now - ts > 7000) w.presenceMap.delete(pid);
    }
    const count = w.presenceMap.size;
    const el = document.getElementById(w.countElId);
    if (!el) return;
    const prev = parseInt(el.textContent) || 0;
    el.textContent = count;
    if (count !== prev) {
        el.classList.remove('bump');
        void el.offsetWidth;
        el.classList.add('bump');
        setTimeout(() => el.classList.remove('bump'), 200);
    }
    if (isHost && currentGameId === w.gameId) {
        const startBtn = document.getElementById('start-btn');
        const waitLabel = document.getElementById('host-waiting-label');
        if (startBtn) {
            startBtn.disabled = count < 2;
            if (waitLabel) waitLabel.style.display = count >= 2 ? 'none' : '';
        }
        if (count === 0) deleteGame();
    }
}

function startPresence(gameId, countElId) {
    const presenceMap = new Map([[myId, Date.now()]]);
    const w = { gameId, countElId, presenceMap };
    presenceWatchers.set(gameId, w);

    mq.subscribe('hkrs5/' + gameId + '/+');

    if (heartbeatTimer) clearInterval(heartbeatTimer);
    function beat() {
        mq.publish('hkrs5/' + gameId + '/' + myId, '1', { qos: 0 });
        bc.postMessage({ gameId, pid: myId, alive: true });
    }
    heartbeatTimer = setInterval(beat, 2500);
    beat();

    // Stale eviction check every second
    setInterval(() => renderCount(w), 1000);
    renderCount(w);
}

// ── Screen navigation ─────────────────────────────────────────
function goTo(id) {
    document.querySelectorAll('.screen, #screen-hub').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
}

// ── Lobby ─────────────────────────────────────────────────────
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function isExpired(g) { return g.deleted || (g.created && Date.now() - g.created > ONE_HOUR); }

const gamesMap = new Map();


function renderGameList() {
    const list = document.getElementById('game-list');
    const noMsg = document.getElementById('no-games-msg');
    const entries = [...gamesMap.entries()].filter(([,g]) => !isExpired(g))
                                           .sort((a,b) => b[1].created - a[1].created);
    list.querySelectorAll('.game-row').forEach(r => r.remove());
    if (entries.length === 0) { noMsg.style.display = ''; return; }
    noMsg.style.display = 'none';
    entries.forEach(([id, game]) => {
        const row = document.createElement('div');
        row.className = 'game-row';
        row.innerHTML = `<span class="game-row-name">${escHtml(game.name)}</span>
                         <span class="game-row-meta" id="lc-${id}">...</span>`;
        row.onclick = () => joinGame(id, game.name);
        list.appendChild(row);
        // Subscribe to presence for lobby count
        mq.subscribe('hkrs5/' + id + '/+');
        if (!presenceWatchers.has(id)) {
            presenceWatchers.set(id, { gameId: id, countElId: 'lc-' + id, presenceMap: new Map() });
        } else {
            presenceWatchers.get(id).countElId = 'lc-' + id;
        }
    });
}

// ── Create game ───────────────────────────────────────────────
function createGame() {
    const input = document.getElementById('game-name-input');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    const gameId = 'g' + Date.now();
    currentGameId = gameId;
    isHost = true;
    mq.publish('hkrs5/games/' + gameId, JSON.stringify({ name, host: myId, created: Date.now() }), { retain: true, qos: 1 });
    document.getElementById('host-game-name-display').textContent = name;
    goTo('host-waiting');
    input.value = '';
    startPresence(gameId, 'host-player-count');
    setTimeout(() => { if (currentGameId === gameId) deleteGame(); }, ONE_HOUR);
}

// ── Join game ─────────────────────────────────────────────────
function joinGame(gameId, gameName) {
    currentGameId = gameId;
    isHost = false;
    document.getElementById('joined-game-name').textContent = gameName;
    goTo('joined');
    startPresence(gameId, 'joined-player-count');
}

// ── Delete game ───────────────────────────────────────────────
function deleteGame() {
    if (!currentGameId) return;
    const gid = currentGameId;
    if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
    mq.publish('hkrs5/' + gid + '/ctrl', 'delete', { qos: 1 });
    bc.postMessage({ type: 'ctrl', gameId: gid, cmd: 'delete' });
    mq.publish('hkrs5/' + gid + '/' + myId, '0', { qos: 0 });
    mq.publish('hkrs5/games/' + gid, '', { retain: true, qos: 1 });
    gamesMap.delete(gid);
    renderGameList();
    currentGameId = null;
    isHost = false;
    goTo('lobby');
}

// ── Start game (host broadcasts, everyone navigates) ──────────
function startGame() {
    if (!currentGameId || !isHost) return;
    mq.publish('hkrs5/' + currentGameId + '/ctrl', 'start', { qos: 1 });
    bc.postMessage({ gameId: currentGameId, type: 'ctrl', cmd: 'start' });
    goTo('game');
    initGame();
}

// ── Password game ─────────────────────────────────────────────
let password = [];
let passwordLocked = false;

function initGame() {
    password = [];
    passwordLocked = false;
    for (let i = 0; i < 4; i++) {
        const el = document.getElementById('d' + i);
        if (el) { el.textContent = '_'; el.className = 'pslot'; }
    }
    const lbl = document.getElementById('pw-label');
    if (lbl) { lbl.textContent = 'SET YOUR PASSWORD'; lbl.className = 'pw-label'; }
    const lb = document.getElementById('lock-btn');
    if (lb) { lb.disabled = true; lb.textContent = 'LOCK'; }
    document.querySelectorAll('.npbtn').forEach(b => b.disabled = false);
}

function enterDigit(d) {
    if (passwordLocked || password.length >= 4) return;
    password.push(d);
    updatePasswordDisplay();
}

function backspace() {
    if (passwordLocked || password.length === 0) return;
    password.pop();
    updatePasswordDisplay();
}

function updatePasswordDisplay() {
    for (let i = 0; i < 4; i++) {
        const el = document.getElementById('d' + i);
        if (!el) continue;
        el.textContent = password[i] !== undefined ? password[i] : '_';
        el.className = 'pslot' + (password[i] !== undefined ? ' filled' : '');
    }
    const lb = document.getElementById('lock-btn');
    if (lb) lb.disabled = password.length < 4;
}

function lockPassword() {
    if (password.length < 4 || passwordLocked) return;
    passwordLocked = true;
    for (let i = 0; i < 4; i++) {
        const el = document.getElementById('d' + i);
        if (el) { el.textContent = '●'; el.className = 'pslot locked'; }
    }
    const lbl = document.getElementById('pw-label');
    if (lbl) { lbl.textContent = 'PASSWORD LOCKED'; lbl.className = 'pw-label is-locked'; }
    const lb = document.getElementById('lock-btn');
    if (lb) { lb.textContent = 'LOCKED'; lb.disabled = true; }
    document.querySelectorAll('.npbtn').forEach(b => b.disabled = true);
    setTimeout(() => { goTo('coins'); setTimeout(() => goTo('hub'), 1200); }, 800);
}

// ── Stale game cleanup — lobby removes games with no heartbeats ─
setInterval(() => {
    const now = Date.now();
    for (const [gameId, w] of presenceWatchers) {
        if (!gamesMap.has(gameId)) continue;
        for (const [pid, ts] of w.presenceMap) {
            if (now - ts > 9000) w.presenceMap.delete(pid);
        }
        if (w.presenceMap.size === 0) {
            mq.publish('hkrs5/games/' + gameId, '', { retain: true, qos: 1 });
            gamesMap.delete(gameId);
            renderGameList();
        }
    }
}, 5000);

window.addEventListener('beforeunload', () => {
    if (!currentGameId) return;
    mq.publish('hkrs5/' + currentGameId + '/' + myId, '0', { qos: 0 });
    bc.postMessage({ gameId: currentGameId, pid: myId, alive: false });
    if (isHost) {
        mq.publish('hkrs5/' + currentGameId + '/ctrl', 'delete', { qos: 0 });
        bc.postMessage({ type: 'ctrl', gameId: currentGameId, cmd: 'delete' });
        mq.publish('hkrs5/games/' + currentGameId, '', { retain: true, qos: 0 });
    }
});
</script>
